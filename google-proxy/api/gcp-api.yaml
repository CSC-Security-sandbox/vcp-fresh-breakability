          nullable: true
          default: false
          x-omitempty: false
        secondaryZone:
          title: SecondaryZone
          type: string
          description: The desired zone for the fail over.
          nullable: true
          readOnly: true
          example: us-east1-b
        largeVolumeConstituentCount:
          title: largeVolumeConstituentCount
          minimum: 2
          type: integer
