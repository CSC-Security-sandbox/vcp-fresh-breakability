          description: "UNIX permissions for NFS(NAS) volume accepted in octal 4 digit\
            \ format. First digit selects the set user Id(4), set group Id (2) and\
            \ sticky (1) attributes. Second digit selects permission for the owner\
            \ of the file: read (4), write (2) and execute (1). Third selects permissions\
            \ for other users in the same group. the fourth for other users not in\
