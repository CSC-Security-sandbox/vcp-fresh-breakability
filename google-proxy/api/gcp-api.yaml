        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VolumeUpdate_v1beta'
        required: true
      responses:
        "202":
          description: Updating volume
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Operation_v1beta'
              example:
                done: false
                name: /v1beta/projects/123456789/locations/some-location1/operations/ba2c8826-2627-057c-42ba-343ee7ab1ebe
                response:
                  created: 2024-01-24T11:03:07.254Z
                  creationToken: some-volume
                  backupConfig:
                    backupPolicyId: 9760acf5-4638-11e7-9bdb-020073ca7773
                    backupVaultId: 9760acf5-4638-11e7-9bdb-020073ca7773
