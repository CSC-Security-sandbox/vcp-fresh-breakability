          type: integer
          format: int64
          description: Cumulative bytes transferred for the relationship.
          example: 75
          readOnly: true
        totalTransferTimeSecs:
          title: totalTransferTimeSec
          type: integer
          format: int64
          description: Cumulative total transfer time in seconds for the relationship.
          example: 200
          readOnly: true
        lastTransferSize:
          title: lastTransferSize
          type: integer
          format: int64
          description: The total number of bytes transferred as part of the last transfer.
          example: 14758
          readOnly: true
        lastTransferError:
          title: lastTransferError
          type: string
          description: A message describing the cause of the last transfer failure.
          example: Something went wrong
          readOnly: true
        lastTransferDuration:
          title: lastTransferDuration
          type: integer
          format: int64
          description: The amount of time in seconds it took for the last transfer to complete.
          example: 200
          readOnly: true
        lastTransferEndTime:
          type: string
          format: date-time
          readOnly: true
          description: The time of the end of the last transfer.
          example: '2016-11-29T20:32:50.459Z'
          x-nullable: true
        progressLastUpdated:
          title: progressLastUpdated
          type: string
          format: date-time
          description: Time indicating when the progress of the transfer was last updated.
          example: '2016-11-29T20:32:50.459Z'
          readOnly: true
          x-nullable: true
        lagTime:
          title: lagTime
          type: integer
          format: int64
          description: The amount of time in seconds by which the data on the mirror lags behind the source.
          example: 1849
          readOnly: true
        createdAt:
          title: createdAt
          type: string
          format: date-time
          readOnly: true
          description: Creation date of the resource
          example: '2016-11-28T19:30:23.123Z'
        updatedAt:
          title: updatedAt
          type: string
          format: date-time
          readOnly: true
          description: Date of last update of the resource
          example: '2016-11-29T20:32:50.459Z'
        deletedAt:
          title: deletedAt
          type: string
          format: date-time
          readOnly: true
          description: Date the resource was deleted
          example: '2016-11-30T23:59:59.999Z'
          x-nullable: true
        jobs:
          title: jobs
          description: Jobs currently ongoing for the volume replication
          type: array
          readOnly: true
          items:
            $ref: '#/components/schemas/Job_v1beta'
        description:
          title: description
