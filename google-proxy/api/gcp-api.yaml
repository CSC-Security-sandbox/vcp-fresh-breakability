          description: Flag indicating if the volume is in a cross region replication
          readOnly: true
          default: false
        blockProperties:
          $ref: '#/components/schemas/BlockProperties_v1beta'
        protocols:
          title: protocol
          type: array
          description: Protocol type through which volume can be accessed.
          items:
            $ref: '#/components/schemas/protocols_v1beta'
        mountPoints:
          title: mountPoints
          type: array
          description: Mount points for the volume
          readOnly: true
          items:
            $ref: '#/components/schemas/MountPoint_v1beta'
        labels:
          title: labels
          type: object
          additionalProperties:
            type: string
          description: JSON dictionary of resource labels to allow linking of billing
            labels to a volume
          example:
            someKey: SomeValue
            someKey2: SomeValue2
        description:
          title: description
          maxLength: 2048
          type: string
          description: Description of the volume
          nullable: true
          example: My Volume description
        zone:
          title: zone
          type: string
          description: The target zone to which the storage pool has to be migrated.
          example: us-east1-b
        largeCapacity:
          title: largeCapacity
          type: boolean
          description: Flag indicating if the volume will be a large capacity volume
