                        Setting up your instance
                        Open an SSH client and connect to your instance.
                        Install the nfs client on your instance.
                        On Red Hat Enterprise Linux or SuSE Linux instance:
                        sudo yum install -y nfs-utils
                        On an Ubuntu or Debian instance:
                        sudo apt-get install nfs-common

                        Mounting your volume
                        Create a new directory on your instance, such as "/some-volume":
                        sudo mkdir /some-volume
                        Mount your volume using the example command below:
                        sudo mount -t nfs -o rw,hard,rsize=65536,wsize=65536,vers=3,tcp 1.2.3.4:/some-volume /some-volume
                        Note. Please use mount options appropriate for your specific workloads when known.
                      protocol: NFSV3
                  multipleEndpoints: false
                  network: projects/123456789/global/networks/systemic-qa-vpc
                  poolId: a20730de-511f-273c-4071-ac1a30478609
                  poolResourceId: projects/123456789/locations/some-location1/pools/some-pool
                  protocols:
                    - NFSV3
                  quotaInBytes: 4000000000000
                  resourceId: some-volume
                  securityStyle: UNIX
                  serviceLevel: PREMIUM
                  smbSettings: []
                  snapReserve: 0
                  snapshotDirectory: true
                  storageClass: SOFTWARE
                  tieringPolicy:
                    tierAction: ENABLED
                    coolingThresholdDays: 24
                  unixPermissions: "0770"
                  usedBytes: 1409024
                  volumeId: b78e8675-7e6f-64ec-3ec2-163753add2d5
                  volumeState: READY
                  volumeStateDetails: Available for use
