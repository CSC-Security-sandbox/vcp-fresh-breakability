      title: SnapshotPolicy
      type: object
      properties:
        enabled:
          type: boolean
          description: "If enabled, make snapshots automatically according to the\
            \ schedules. Default is false."
          nullable: true
          example: true
          default: false
        hourlySchedule:
          $ref: '#/components/schemas/HourlySchedule_v1beta'
        dailySchedule:
          $ref: '#/components/schemas/DailySchedule_v1beta'
        weeklySchedule:
          $ref: '#/components/schemas/WeeklySchedule_v1beta'
        monthlySchedule:
          $ref: '#/components/schemas/MonthlySchedule_v1beta'
      description: Snapshot policy for a volume
    HourlySchedule_v1beta:
      type: object
      properties:
        snapshotsToKeep:
          maximum: 1024
          minimum: 0
          type: number
          description: The maximum number of snapshots to keep for the hourly schedule
          format: double
          example: 24.0
          default: 0.0
        minute:
          title: minute
          maximum: 59
          minimum: 0
          type: number
          description: "Set the minute of the hour to start the snapshot (0-59), defaults\
            \ to the top of the hour (0)."
          format: double
          example: 10.0
          default: 0.0
      description: "If enabled (snapshotsToKeep > 0), make a snapshot every hour e.g.\
        \ at 04:00, 05:00, 06:00"
    DailySchedule_v1beta:
      type: object
      properties:
        snapshotsToKeep:
          maximum: 1024
          minimum: 0
          type: number
          description: The maximum number of snapshots to keep for the daily schedule
          format: double
          example: 7.0
          default: 0.0
        hour:
          title: hour
          maximum: 23
          minimum: 0
          type: number
          description: "Set the hour to start the snapshot (0-23), defaults to midnight\
            \ (0)."
          format: double
          example: 23.0
          default: 0.0
        minute:
          title: minute
          maximum: 59
          minimum: 0
          type: number
          description: "Set the minute of the hour to start the snapshot (0-59), defaults\
            \ to the top of the hour (0)."
          format: double
          example: 10.0
          default: 0.0
      description: "If enabled (snapshotsToKeep > 0), make a snapshot every day. Defaults\
        \ to midnight."
    WeeklySchedule_v1beta:
      type: object
      properties:
        snapshotsToKeep:
          maximum: 1024
          minimum: 0
          type: number
          description: The maximum number of snapshots to keep for the weekly schedule
          format: double
          example: 52.0
          default: 0.0
        day:
          title: day
          maxLength: 62
          minLength: 6
          type: string
          description: Set the day or days of the week to make a snapshot. Accepts
            a comma delimited string of week day names in english. Defaults to 'Sunday'
          default: Sunday
        hour:
          title: hour
          maximum: 23
          minimum: 0
          type: number
          description: "Set the hour to start the snapshot (0-23), defaults to midnight\
            \ (0)."
          format: double
          example: 23.0
          default: 0.0
        minute:
          title: minute
          maximum: 59
          minimum: 0
          type: number
          description: "Set the minute of the hour to start the snapshot (0-59), defaults\
            \ to the top of the hour (0)."
          format: double
          example: 10.0
          default: 0.0
      description: "If enabled (snapshotsToKeep > 0), make a snapshot every week at\
        \ a specific day or days, defaults to Sunday at midnight"
    MonthlySchedule_v1beta:
      type: object
      properties:
        snapshotsToKeep:
          maximum: 1024
          minimum: 0
          type: number
          description: The maximum number of snapshots to keep for the monthly schedule
          format: double
          example: 12.0
          default: 0.0
        daysOfMonth:
          title: daysOfMonth
          maxLength: 113
          minLength: 1
          type: string
          description: "Set the day or days of the month to make a snapshot (1-31).\
            \ Accepts a comma delimited string of the day of the month e.g. '1,15,31'.\
            \ Defaults to '1'"
          default: "1"
        hour:
          title: hour
          maximum: 23
          minimum: 0
          type: number
          description: "Set the hour to start the snapshot (0-23), defaults to midnight\
            \ (0)."
          format: double
          example: 23.0
          default: 0.0
        minute:
          title: minute
          maximum: 59
          minimum: 0
          type: number
          description: "Set the minute of the hour to start the snapshot (0-59), defaults\
            \ to the top of the hour (0)."
          format: double
          example: 10.0
          default: 0.0
      description: "If enabled (snapshotsToKeep > 0), make a snapshot every month\
        \ at a specific day or days, defaults to the first day of the month at midnight"
