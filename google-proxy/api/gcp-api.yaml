          title: username
          type: string
          description: Username of the Active Directory domain administrator
          minLength: 1
          maxLength: 255
          example: superman
        resourceId:
          type: string
          description: A human readable label for the resource which is restricted to
            letters, numbers, and hyphen, with the first character a letter, the last
            a letter or a number, and a 63 character maximum
          minLength: 1
          pattern: ^[a-z]([a-z0-9-]{0,61}[a-z0-9])?$
          maxLength: 63
          example: my-active-directory
          x-nullable: true
        password:
          title: password
          type: string
          description: Password of the Active Directory domain administrator
          minLength: 1
          maxLength: 255
          example: iluvpancakes
        domain:
          title: domain
          type: string
          description: Name of the Active Directory domain
          pattern: ^[A-Za-z0-9](?:[A-Za-z0-9_-]*[A-Za-z0-9])?(\.[A-Za-z0-9](?:[A-Za-z0-9_-]*[A-Za-z0-9])?)*$
          minLength: 1
          maxLength: 255
          example: krypton.com
        DNS:
          title: DNS
          type: string
          pattern: ^(25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?)\.(25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?)\.(25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?)\.(25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?)((,
            ?)(25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?)\.(25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?)\.(25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?)\.(25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?))*$
          description: Comma separated list of DNS server IP addresses for the Active
            Directory domain. Can only include a maximum of 3 items
          example: 101.102.103.104
        netBIOS:
          title: netBIOS
          type: string
          description: NetBIOS name of the server
          maxLength: 10
          minLength: 1
          example: cvserver
        organizationalUnit:
          title: organizationalUnit
          type: string
          description: The Organizational Unit (OU) within the Windows Active Directory
            the user belongs to.
          maxLength: 255
          default: CN=Computers
          example: CN=Computers
        site:
          title: site
          type: string
          description: The Active Directory site the service will limit domain controller
            discovery to. Site names have to be at least 2 characters long (an empty
            string clears site assignment), can contain only alphabetical characters
            (A-Z), numeric characters (0-9), the minus sign (-), and the period (.).
            Period characters are allowed only when they are used to delimit the components
            of domain style names.
          example: Default-First-Site-Name
          maxLength: 63
          x-nullable: true
        kdcIP:
          title: kdcIP
          type: string
          minLength: 7
          maxLength: 15
          description: KDC server IP address for the Active Directory machine. This
            optional parameter is used only while creating kerberos volume.
          example: 101.102.103.104
        kdcHostname:
          title: kdcHostname
          type: string
          maxLength: 64
          minLength: 1
          description: Name of the Active Directory machine. This optional parameter
            is used only while creating kerberos volume
          example: 2BOVAEKB44B
        activeDirectoryState:
          title: activeDirectoryState
          type: string
          readOnly: true
          description: The current lifecycle state of the configuration
          enum:
            - STATE_UNSPECIFIED
            - CREATING
            - READY
            - UPDATING
            - IN_USE
            - DELETING
            - ERROR
          example: READY
        activeDirectoryStateDetails:
          title: activeDirectoryStateDetails
          type: string
          readOnly: true
          description: Details about the current Active Directory credentials state
          example: Credentials saved and available for use
        createdAt:
          title: createdAt
          type: string
          format: date-time
          readOnly: true
          description: Creation date of the resource
          example: '2016-11-28T19:30:23.123Z'
        updatedAt:
          title: updatedAt
          type: string
          format: date-time
          readOnly: true
          description: Date of last update of the resource
          example: '2016-11-29T20:32:50.459Z'
        deletedAt:
          title: deletedAt
          type: string
          format: date-time
          readOnly: true
