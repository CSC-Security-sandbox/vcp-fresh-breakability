apiVersion: v1
kind: Namespace
metadata:
  name: vcp
  labels:
    name: vcp
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: vcp-service-account
  namespace: vcp
imagePullSecrets:
  - name: ghcr-secret
---
