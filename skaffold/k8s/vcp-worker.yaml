---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: vcp-customer-worker
  namespace: vcp
  labels:
    app: vcp-customer-worker
spec:
  replicas: 1
  selector:
    matchLabels:
      app: vcp-customer-worker
  template:
    metadata:
      labels:
        app: vcp-customer-worker
    spec:
      serviceAccountName: vcp-service-account
      containers:
        - name: vcp-customer-worker
          image: vcp-worker
          imagePullPolicy: Never
          ports:
            - containerPort: 8080
              name: http
          envFrom:
            - configMapRef:
                name: vcp-worker-config
          env:
            - name: WORKER_TASK_QUEUE
              value: "customer-workflows"
            - name: VSA_NODE_PASSWORD
              value: "<<VSA_NODE_PASSWORD>>"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: vcp-background-worker
  namespace: vcp
  labels:
    app: vcp-background-worker
spec:
  replicas: 1
  selector:
    matchLabels:
      app: vcp-background-worker
  template:
    metadata:
      labels:
        app: vcp-background-worker
    spec:
      serviceAccountName: vcp-service-account
      containers:
        - name: vcp-background-worker
          image: vcp-worker
          imagePullPolicy: Never
          ports:
            - containerPort: 8080
              name: http
          envFrom:
            - configMapRef:
                name: vcp-worker-config
          env:
            - name: WORKER_TASK_QUEUE
              value: "background-workflows"
            - name: VSA_NODE_PASSWORD
              value: "<<VSA_NODE_PASSWORD>>"
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: harvest-farm-lease-create
  namespace: vcp
rules:
  - apiGroups: [ "coordination.k8s.io" ]
    resources: [ "leases" ]
    verbs: [ "get", "list", "watch", "create", "update", "patch", "delete" ]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: harvest-farm-lease-create-binding
  namespace: vcp
subjects:
  - kind: ServiceAccount
    name: default
    namespace: vcp
roleRef:
  kind: Role
  name: harvest-farm-lease-create
  apiGroup: rbac.authorization.k8s.io
