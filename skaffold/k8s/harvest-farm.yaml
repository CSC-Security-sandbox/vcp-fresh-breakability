apiVersion: v1
kind: Namespace
metadata:
  name: vcp
  labels:
    name: vcp
---
apiVersion: v1
kind: Service
metadata:
  name: harvest-farm-service
  namespace: vcp
  labels:
    app: harvest-farm
spec:
  type: ClusterIP
  ports:
    - port: 3000
      targetPort: 3000
      name: http
  selector:
    app: harvest-farm
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: harvest-farm
  namespace: vcp
  labels:
    app: harvest-farm
spec:
  replicas: 1
  selector:
    matchLabels:
      app: harvest-farm
  template:
    metadata:
      labels:
        app: harvest-farm
    spec:
      containers:
        - name: harvest-farm
          image: ghcr.io/vcp-vsa-control-plane/harvest-multi:25.07.21-1
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
              name: http
          env:
            - name: ENV
              value: local
            - name: GCP_PROXY_PORT
              value: "8090"
            - name: DB_TYPE
              value: postgres
            - name: DB_HOST
              value: postgres.default.svc.cluster.local
            - name: DB_PORT
              value: "5432"
            - name: DB_USER
              value: postgres
            - name: DB_PASSWORD
              value: "testpass"
            - name: DB_NAME
              value: vcp
            - name: DB_SSL_MODE
              value: disable
            - name: DB_TIMEZONE
              value: UTC
            - name: DB_MAX_OPEN_CONNS
              value: "25"
            - name: DB_MAX_IDLE_CONNS
              value: "25"
            - name: DB_CONN_MAX_LIFETIME
              value: 1h
            - name: MIGRATION_PATH
              value: migrations/core
            - name: DB_ADMIN_USER
              value: postgres
            - name: DB_ADMIN_PASSWORD
              value: "testpass"
            - name: RUN_MIGRATION_ON_START
              value: "true"
            - name: GCE_METADATA_HOST
              value: host.minikube.internal:9090
            - name: CHOKIDAR_USEPOLLING
              value: "true"
          volumeMounts:
            - mountPath: "/configs/harvest"
              name: harvest-farm-shared
        - name: otel-collector
          image: otel/opentelemetry-collector-contrib:latest
          args:
            - "--config=/etc/otel-collector-config/config.yaml"
          env:
            - name: ENV
              value: local
            - name: GCP_PROXY_PORT
              value: "8090"
            - name: DB_TYPE
              value: postgres
            - name: DB_HOST
              value: postgres.default.svc.cluster.local
            - name: DB_PORT
              value: "5432"
            - name: DB_USER
              value: postgres
            - name: DB_PASSWORD
              value: "testpass"
            - name: DB_NAME
              value: vcp
            - name: DB_SSL_MODE
              value: disable
            - name: DB_TIMEZONE
              value: UTC
            - name: DB_MAX_OPEN_CONNS
              value: "25"
            - name: DB_MAX_IDLE_CONNS
              value: "25"
            - name: DB_CONN_MAX_LIFETIME
              value: 1h
            - name: MIGRATION_PATH
              value: migrations/core
            - name: DB_ADMIN_USER
              value: postgres
            - name: DB_ADMIN_PASSWORD
              value: "testpass"
            - name: RUN_MIGRATION_ON_START
              value: "true"
            - name: GCE_METADATA_HOST
              value: host.minikube.internal:9090
          volumeMounts:
            - mountPath: "/etc/otel-collector-config"
              name: "otel-collector-config"
              readOnly: true
      imagePullSecrets:
        - name: ghcr-secret
      volumes:
        - configMap:
            name: otel-collector-config
          name: "otel-collector-config"
        - name: harvest-farm-shared
          persistentVolumeClaim:
            claimName: harvest-farm-shared-pvc
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: otel-collector-config
  namespace: vcp
data:
  config.yaml: |
    receivers:
      otlp:
        protocols:
          grpc:
            endpoint: localhost:4317
      prometheus:
        config:
          scrape_configs:
            - job_name: 'otel-collector'
              scrape_interval: 30s
              http_sd_configs:
                - url: http://localhost:3000/pollers/prometheus-targets
                  refresh_interval: 30s
    
    processors:
      batch:
      groupbyattrs:
        keys:
          - tenant_project
      transform:
        error_mode: ignore
        metric_statements:
          - set(resource.attributes["gcp.project.id"], resource.attributes["tenant_project"])
          - delete_key(resource.attributes, "tenant_project")
    
    exporters:
      debug:
        verbosity: normal
      googlecloud:
        project: "netapp-au-se1-autopush-sde-tst"
        metric:
          prefix: custom.googleapis.com
          skip_create_descriptor: true
        sending_queue:
          enabled: true
          queue_size: 40000
    
    service:
      pipelines:
        metrics:
          receivers:
            - prometheus
          processors:
            - batch
            - groupbyattrs
            - transform
          exporters:
            # - debug
            - googlecloud
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: harvest-farm-lease-reader
  namespace: vcp
rules:
  - apiGroups: [ "coordination.k8s.io" ]
    resources: [ "leases" ]
    verbs: [ "get", "list", "watch", "create", "update", "patch", "delete" ]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: harvest-farm-lease-reader-binding
  namespace: vcp
subjects:
  - kind: ServiceAccount
    name: default
    namespace: vcp
roleRef:
  kind: Role
  name: harvest-farm-lease-reader
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: harvest-farm-shared-pvc
  namespace: vcp
spec:
  accessModes:
    - ReadWriteMany
  resources:
    requests:
      storage: 10Gi
  # storageClassName: <your-rwx-storage-class> # Uncomment and set if needed
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: harvest-farm-hpa
  namespace: vcp
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: harvest-farm
  minReplicas: 2
  maxReplicas: 20
  metrics:
    - type: Pods
      pods:
        metric:
          name: harvest_leases_total
        target:
          type: AverageValue
          averageValue: "1"

---


