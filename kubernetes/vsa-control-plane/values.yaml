global:
  primaryImageRegistry: ghcr.io
  primaryImageRegistryPath: vcp-vsa-control-plane
  primaryImageRegistryPasswordAuth: true
  primaryImagePullSecretName: ghcr.io
  secondaryImageRegistry: "europe-north1-docker.pkg.dev/gcnv-artifact-registry-nonprod"
  secondaryImageRegistryPath: "vcp-container-images-us"
  useTags: false
  secondaryImageRegistryPasswordAuth: false
  chartPrimaryImageRegistry: ""
  chartSecondaryImageRegistry: ""
  environment: gcp
  hyperscaler: gcp
  workloadIdentityEnabled: false
  enableJSwapVersionCheck: true
  # Cloud SQL IAM Authentication via Workload Identity
  # When enabled: Uses IAM authentication with Cloud SQL Proxy sidecar
  # When disabled: Uses traditional username/password authentication
  # Default: false - override in deployment-specific values files to enable
  cloudSqlIamAuthEnabled: false
  # Central Cloud SQL Proxy image used across charts when IAM DB auth is enabled
  # Override in deployment-specific values to pin/upgrade proxy versions consistently.
  cloudSqlProxy:
    image: "gcr.io/cloud-sql-connectors/cloud-sql-proxy:2.15.1"
    # Instance connection name in format: project:region:instance
    # Required when cloudSqlIamAuthEnabled=true
    # Example: "my-project:us-central1:my-instance"
    instanceConnectionName: ""
  enableBackgroundTasks: true
  requiredTakeoverReasons:
    - "reason1"
  jobPollingMaxDuration: 25 # seconds
  jobPollingInterval: 3 # seconds
  caName: "caName"
  caPoolName: "caPoolName"
  caPoolDeployedProjectId: "caPoolDeployedProjectId"
  vsaDeployedDnsName: "vsaDeployedDnsName"
  vsaManagedZone: "vsaManagedZone"
  vsaSecretCacheCleanupIntervalHours: 24
  vsaSecretAuthCacheExpirationHours: 24
  privateKeyBits: 4099
  secretManagerProjectId: "secretManagerProjectId"
  #NOTE: Adding key values to below coreConfig will be used in creating configmaps for both core and google-proxy as we wanted core config to get reflected in google-proxy as well, override of keys between services can be done by adding key values under resp. service values' overrideCoreConfig tag
  coreConfig:
    gcp: {}
    gcpServiceUrl: "https://cloudvolumesgcp-api.netapp.com"
    gcpAuthAcceptedServiceAccounts: ""
    apiCvpMaxRetries: "3"
    apiCvpRetryDelay: "100ms"
    broadcastDomainMtu: "9000"
    certCacheExpirationMinutes: "60"
    certCacheSleepRetryIntervalSeconds: "10"
    # Minimum required certificate lifetime for service startup (e.g. 5184000s = 2 months). Env: MINIMUM_CERTIFICATE_LIFETIME
    minimumCertificateLifetime: "5184000s"
    coreApiPort: "8080"
    cvpHost: ""
    dbConnMaxLifetime: "30m"
    dbHost: ""
    dbMaxIdleConns: "10"
    dbMaxOpenConns: "100"
    dbMsiUser: "msi"
    dbName: "coredb"
    dbPort: "5432"
    dbSslMode: "disable"
    dbTimezone: "UTC"
    dbType: "postgres"
    enableTemporalDataEncryption: "true"
    idleTimeout: "120s"
    jwkKidsUrl: ""
    jwkTimeoutSeconds: "30"
    logSql: "true"
    maxQuotaInBytesVolume: "1000000000"
    maxQuotaInBytesFileVolume: "329853488332800"
    maxConstituentVolumesPerVolumePerAggregate: "200"
    migrationPath: ""
    minQuotaInBytesPool: "10000000"
    minQuotaInBytesVolume: "10000000"
    maxHostsPerHostgroup: "128"
    msiEnabled: "false"
    ontapRestIdempotentTransportEnabled: ""
    ontapRestLogVerbose: ""
    ontapRestOauthEnabled: ""
    ontapRestXDotClientApp: "core-app"
    proxyClientApiMaxRetries: "5"
    proxyClientApiRetryDelay: "500ms"
    proxyClientTransportSchema: "https"
    readHeaderTimeout: "30s"
    readTimeout: "60s"
    retryBackoffCoefficient: "2.0"
    retryInterval: "1s"
    retryMaxAttempts: "5"
    retryMaxInterval: "60s"
    # Must be "false" — non-owner inline migrations fail when Cloud SQL IAM auth is enabled.
    runMigrationOnStart: "false"
    startToCloseWorkflowTimeout: "120s"
    svmPeerTimeout: "30s"
    temporalAddress: ""
    temporalEncryptionId: ""
    temporalNamespace: ""
    temporalTlsCert: ""
    temporalTlsKey: ""
    vcpPairedRegions: ""
    gcpKmsKeyRotationEnabled: "false"
    vsaDeploymentPollInterval: "15s"
    vsaDeploymentTimeout: "10m"
    vsaNodeHomePort: "443"
    vsaNodePassword: ""
    vsaNodeUsername: ""
    writeTimeout: "60s"
    finishProjectCvpMaxRetries: "10"
    finishProjectCvpRetryInterval: "30s"
    finishProjectBackoffCoefficient: "1.0"
    localRegion: ""
    coreApiClientTransportSchema: "https"
    ontapVersionDetails: "9.18.1P2"
    ontapVersionDetailsExperimental: ""
    skipOntapImageVersionMatch: "false"
    # Below variable is to be enabled when DB rollback is required
    enableDbRollback: "false"
    # Database rollback step configuration
    # Set to number of steps to rollback, 0 means no rollback
    vcpDbPreRollbackSteps: "0"
    vcpDbPostRollbackSteps: "0"
    metricsDbPreRollbackSteps: "0"
    metricsDbPostRollbackSteps: "0"
    workflowSupervisorNotFoundGracePeriod: "5m"
    snapshotApiSyncMode: "false"
    enableJobResourceUuidIndex: "true"
    maxAppConsistentSnapshotCount: "10"
    # Make sure to update the regionNumberMap if new regions are added. In both Google proxy and vcp-worker-chart
    regionNumberMap:
      africa-south1: "01"
      asia-east1: "02"
      asia-east2: "03"
      asia-northeast1: "04"
      asia-northeast2: "05"
      asia-northeast3: "06"
      asia-south1: "07"
      asia-south2: "08"
      asia-southeast1: "09"
      asia-southeast2: "10"
      australia-southeast1: "11"
      australia-southeast2: "12"
      europe-central2: "13"
      europe-north1: "14"
      europe-north2: "15"
      europe-southwest1: "16"
      europe-west1: "17"
      europe-west10: "18"
      europe-west12: "19"
      europe-west2: "20"
      europe-west3: "21"
      europe-west4: "22"
      europe-west6: "23"
      europe-west8: "24"
      europe-west9: "25"
      me-central1: "26"
      me-central2: "27"
      me-west1: "28"
      northamerica-northeast1: "29"
      northamerica-northeast2: "30"
      northamerica-south1: "31"
      southamerica-east1: "32"
      southamerica-west1: "33"
      us-central1: "34"
      us-east1: "35"
      us-east4: "36"
      us-east5: "37"
      us-south1: "38"
      us-west1: "39"
      us-west2: "40"
      us-west3: "41"
      us-west4: "42"
