    minQuotaInBytesVolume: "10000000"
    maxHostsPerHostgroup: "128"
    msiEnabled: "false"
    ontapRestIdempotentTransportEnabled: ""
    ontapRestLogVerbose: ""
    ontapRestOauthEnabled: ""
    ontapRestXDotClientApp: "core-app"
    proxyClientApiMaxRetries: "5"
