    dbMsiUser: "msi"
    dbName: "coredb"
    dbPort: "5432"
    dbSslMode: "disable"
    dbTimezone: "UTC"
    dbType: "postgres"
    enableTemporalDataEncryption: "true"
    idleTimeout: "120s"
    jwkKidsUrl: ""
    jwkTimeoutSeconds: "30"
    logSql: "true"
    maxQuotaInBytesVolume: "1000000000"
    migrationPath: ""
