# Global configuration
environment: gcp
enabled: true
enableDbMigration: true
ttlSecondsAfterFinished: 3600
msiEnabled: false
msiUser: db-msi-user
serviceAccountName: vcp-core
metricsEnabled: false
replicaCount: 1

images:
  core:
    name: core
    tag: 0.0.0
    digest: ""
    secondary: true
    pullPolicy: IfNotPresent
  vcpDbMigrate:
    name: vcp-db-migrate
    tag: 0.0.0
    digest: ""
    secondary: true
    pullPolicy: IfNotPresent
  telemetryDeployer:
    name: telemetry-deployer
    tag: 0.0.0
    digest: ""
    secondary: true
    pullPolicy: IfNotPresent
  telemetry:
    name: telemetry
    tag: 0.0.0
    digest: ""
    secondary: true
    pullPolicy: IfNotPresent

# Add values here in overrideCoreConfig to override the common configuration
overrideCoreConfig: {}

service:
  type: ClusterIP
  appPort: 8081

database:
  host: postgres-service
  user: vcp-db-user
  password: vcp-db-pass
  metricsUser: vcp-db-user
  metricsPassword: vcp-db-pass
  dbAdminUser: dbAdminUser
  dbAdminPassword: dbAdminPassword
  name: vcp
  port: 5432
  type: postgres
  sslMode: "disable"
  metricsHost: postgres-service
  metricsPort: 5432
  metricsDbName: metrics

resources:
  limits:
    cpu: 1000m
    memory: 512Mi
  requests:
    cpu: 200m
    memory: 256Mi

telemetryDeployer:
  enabled: false
  gcpProxyPort: 8090
  serviceName: telemetry-service
  image: us-docker.pkg.dev/gcnv-artifact-registry-nonprod/vcp-container-images-us/telemetry:0.0.0-DEV.15
  projectID: netapp-au-se1-autopush-sde-tst
  region: australia-southeast1
  minInstances: 1
  maxInstances: 3
  runMigrationOnStart: false
  rootUrl: "https://servicecontrol.googleapis.com"
  operationBatchSize: 200
  pusherServiceName: "autopush-netapp.sandbox.googleapis.com"
  pusherServiceProject: "netapp-au-se1-autopush-sde-tst"
  enableVolumeMetrics: false
  pushBatchSize: 1000
  maxGoogleBillingPushRetry: 5
  pageSize: 1000
  resources:
    limits:
      cpu: 1000m
      memory: 512Mi
    requests:
      cpu: 100m
      memory: 128Mi

# Annotations
serviceAccountAnnotations:
  "iam.gke.io/gcp-service-account": vcp-ci@gcnv-artifact-registry-nonprod.iam.gserviceaccount.com

#Enabling for secrets manager
#flag for enabling/disabling secret manager

secretManagerEnabled: false
externalSecrets:
  dbUsername:
    secretName: "vcp-worker-autopush-sqa-us-e4-db-username-key"
    secretKey: "dbUsername"
  dbPassword:
    secretName: "vcp-worker-autopush-sqa-us-e4-db-password-key"
    secretKey: "dbPassword"
  metricsDbUsername:
    secretName: "vcp-worker-autopush-sqa-us-e4-db-username-key"
    secretKey: "metricsDbUsername"
  metricsDbPassword:
    secretName: "vcp-worker-autopush-sqa-us-e4-db-password-key"
    secretKey: "metricsDbPassword"
  dbAdminUsername:
    secretName: "vcp-worker-autopush-sqa-us-e4-db-adminUsername-key"
    secretKey: "dbAdminUsername"
  dbAdminPassword:
    secretName: "vcp-worker-autopush-sqa-us-e4-db-adminPassword-key"
    secretKey: "dbAdminPassword"

# Pod affinity configuration
podAffinity:
  enabled: true
