enabled: true
enableDbMigration: true
ttlSecondsAfterFinished: 3600
msiEnabled: false
msiUser: db-msi-user
serviceAccountName: vcp-core

replicaCount: 1

images:
  core:
    name: core
    tag: 0.0.0
    digest: ""
    secondary: true
    pullPolicy: IfNotPresent
  vcpDbMigrate:
    name: vcp-db-migrate
    tag: 0.0.0
    digest: ""
    secondary: true
    pullPolicy: IfNotPresent

# Add values here in overrideCoreConfig to override the common configuration
overrideCoreConfig: {}

service:
  type: ClusterIP
  appPort: 8081

database:
  host: postgres-service
  user: vcp-db-user
  password: vcp-db-pass
  dbAdminUser: dbAdminUser
  dbAdminPassword: dbAdminPassword
  name: vcp
  port: 5432
  type: postgres

resources:
  limits:
    cpu: 1000m
    memory: 512Mi
  requests:
    cpu: 200m
    memory: 256Mi

# Annotations
serviceAccountAnnotations:
  "iam.gke.io/gcp-service-account": vcp-ci@gcnv-artifact-registry-nonprod.iam.gserviceaccount.com

#Enabling for secrets manager
#flag for enabling/disabling secret manager

secretManagerEnabled: false
externalSecrets:
  dbUsername:
    secretName: "vcp-worker-autopush-sqa-us-e4-db-username-key"
    secretKey: "dbUsername"
  dbPassword:
    secretName: "vcp-worker-autopush-sqa-us-e4-db-password-key"
    secretKey: "dbPassword"
  dbAdminUsername:
    secretName: "vcp-worker-autopush-sqa-us-e4-db-adminUsername-key"
    secretKey: "dbAdminUsername"
  dbAdminPassword:
    secretName: "vcp-worker-autopush-sqa-us-e4-db-adminPassword-key"
    secretKey: "dbAdminPassword"
