enabled: true
enableDbMigration: true
ttlSecondsAfterFinished: 3600
dbAdminUser: dbAdminUser
dbAdminPassword: dbAdminPassword
msiEnabled: false
msiUser: db-msi-user
serviceAccountName: vcp-core

replicaCount: 1

images:
  core:
    name: core
    tag: 0.0.0
    digest: ""
    secondary: true
    pullPolicy: IfNotPresent
  vcpDbMigrate:
    name: vcp-db-migrate
    tag: 0.0.0
    digest: ""
    secondary: true
    pullPolicy: IfNotPresent

# Add values here in overrideCoreConfig to override the common configuration
overrideCoreConfig: {}

service:
  type: ClusterIP
  appPort: 8081

database:
  host: postgres-service
  user: vcp-db-user
  password: vcp-db-pass
  name: vcp
  port: 5432
  type: postgres

resources:
  limits:
    cpu: 1000m
    memory: 512Mi
  requests:
    cpu: 200m
    memory: 256Mi

# Annotations
serviceAccountAnnotations:
  "iam.gke.io/gcp-service-account": vcp-ci@gcnv-artifact-registry-nonprod.iam.gserviceaccount.com
