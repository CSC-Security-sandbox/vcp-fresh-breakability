{{- if and (.Values.enabled) (.Values.enableDbMigration) }}
kind: Job
apiVersion: batch/v1
metadata:
  name: vcp-dbmigrate
  namespace: {{ .Release.Namespace }}
  annotations:
    {{- if .Release.IsUpgrade }}
    "helm.sh/hook": pre-upgrade
    "helm.sh/hook-weight": "-4"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
    {{- else }}
    "helm.sh/hook": pre-install
    "helm.sh/hook-weight": "-4"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
    {{- end }}
    {{- include "vcp-dbmigrate.helmchart.annotations" . | nindent 4 }}
  labels:
    {{- include "vcp-dbmigrate.kubernetes.labels" . | nindent 4 }}
    {{- include "vcp-dbmigrate.helmchart.labels" . | nindent 4 }}
spec:
  backoffLimit: 0
  ttlSecondsAfterFinished: {{ .Values.ttlSecondsAfterFinished | default 3600 }}
  template:
    metadata:
      annotations:
        {{- include "vcp-dbmigrate.helmchart.annotations" . | nindent 8 }}
        {{- if .Values.global.cloudSqlIamAuthEnabled }}
        # Kubernetes 1.28+ sidecar containers feature
        # Mark cloud-sql-proxy as a sidecar so Job completes when main container finishes
        # This is handled via container lifecycle type (see container definition)
        {{- end }}
      labels:
        {{- include "vcp-dbmigrate.kubernetes.labels" . | nindent 8 }}
        {{- include "vcp-dbmigrate.helmchart.labels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ .Values.serviceAccountName }}
      {{- if .Values.global.cloudSqlIamAuthEnabled }}
      nodeSelector:
        {{- if .Values.global.nodeSelector }}
        {{- toYaml .Values.global.nodeSelector | nindent 8 }}
        {{- end }}
        iam.gke.io/gke-metadata-server-enabled: "true"
      {{- else if .Values.global.nodeSelector }}
      nodeSelector:
        {{- toYaml .Values.global.nodeSelector | nindent 8 }}
      {{- end }}
      {{- if .Release.IsInstall }}
      initContainers:
        - name: vcp-dbmigrate-create
          command: ["/vcp-db-migrate"]
          args:
            {{- if .Values.msiEnabled | default false }}
            - "--setup"
            - "--admin-msi-user=$(MSI_USER)"
            {{- else }}
            - "--setup"
            - "--admin-user=$(DB_ADMIN_USERNAME)"
            - "--admin-pass=$(DB_ADMIN_PASSWORD)"
            {{- end }}
          {{- if .Values.images.vcpDbMigrate.secondary }}
          image: "{{- include "containerImage" (list . (dict "name" "vcpDbMigrate" "secondary" true)) | trim -}}"
          {{- else }}
          image: "{{- include "containerImage" (list . (dict "name" "vcpDbMigrate" "secondary" false)) | trim -}}"
          {{- end }}
          imagePullPolicy: {{ .Values.images.vcpDbMigrate.pullPolicy }}
          env:
            # DB migration admin credentials from Secret
            - name: DB_ADMIN_USERNAME
              valueFrom:
                secretKeyRef:
                  name: core-service-env-secret
                  key: DB_ADMIN_USER
            - name: DB_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: core-service-env-secret
                  key: DB_ADMIN_PASSWORD

            # MSI user (if enabled)
            - name: MSI_USER
              value: {{ .Values.msiUser | default "defaultUser" | quote }}

            # Regular database connection info (user/pass/host etc)
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: core-service-env-secret
                  key: DB_USER
            {{- if not .Values.global.cloudSqlIamAuthEnabled }}
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: core-service-env-secret
                  key: DB_PASSWORD
            {{- end }}
            - name: DB_HOST
              {{- if .Values.global.cloudSqlIamAuthEnabled }}
              value: "127.0.0.1"
              {{- else }}
              value: {{ .Values.database.host | default "localhost" | quote }}
              {{- end }}
            - name: DB_PORT
              value: {{ .Values.database.port | default "5432" | quote }}
            - name: DB_NAME
              value: {{ .Values.database.name | default "vcp" | quote }}
            - name: DB_TYPE
              value: {{ .Values.database.type | default "postgres" | quote }}
            - name: DB_SSL_MODE
              value: {{ .Values.database.sslMode | quote }}
            - name: LOCAL_REGION
              value: {{ .Values.global.coreConfig.localRegion | default "" | quote }}
            - name: REGION_NUMBER_MAP
              value: {{ .Values.global.coreConfig.regionNumberMap | toJson | quote }}
            # Cloud SQL IAM authentication flag (used by migration tool to shutdown proxy sidecar)
            - name: CLOUD_SQL_IAM_AUTH_ENABLED
              value: {{ .Values.global.cloudSqlIamAuthEnabled | default false | quote }}
            {{- if .Values.metricsEnabled }}
            - name: METRICS_DB_USER
              valueFrom:
                secretKeyRef:
                  name: core-service-env-secret
                  key: METRICS_DB_USER
            {{- if not .Values.global.cloudSqlIamAuthEnabled }}
            - name: METRICS_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: core-service-env-secret
                  key: METRICS_DB_PASSWORD
            {{- end }}
            - name: METRICS_DB_HOST
              {{- if .Values.global.cloudSqlIamAuthEnabled }}
              value: "127.0.0.1"
              {{- else }}
              value: {{ .Values.database.metricsHost | default "localhost" | quote }}
              {{- end }}
            - name: METRICS_DB_PORT
              value: {{ .Values.database.metricsPort | default "5432" | quote }}
            - name: METRICS_DB_NAME
              value: {{ .Values.database.metricsDbName | default "metrics" | quote }}
            - name: METRICS_DB_TYPE
              value: {{ .Values.database.type | default "postgres" | quote }}
            {{- end }}
          resources:
            limits:
              cpu: {{ .Values.resources.limits.cpu }}
              memory: {{ .Values.resources.limits.memory }}
            requests:
              cpu: {{ .Values.resources.requests.cpu }}
              memory: {{ .Values.resources.requests.memory }}
      {{- end }}
      containers:
        {{- include "core.databaseProxyContainerForJob" . | nindent 8 }}
        - name: vcp-dbmigrate-migrate
          command: ["/vcp-db-migrate"]
          args:
            {{- if .Values.msiEnabled | default false }}
            {{- if eq (.Values.global.coreConfig.enableDbRollback | default "false") "true" }}
            - "--rollback"
            {{- else }}
            - "--migrate"
            {{- end }}
            - "--admin-msi-user=$(MSI_USER)"
            {{- else }}
            {{- if eq (.Values.global.coreConfig.enableDbRollback | default "false") "true" }}
            - "--rollback"
            {{- else }}
            - "--migrate"
            {{- end }}
            - "--admin-user=$(DB_ADMIN_USERNAME)"
            - "--admin-pass=$(DB_ADMIN_PASSWORD)"
            {{- end }}
          {{- if .Values.images.vcpDbMigrate.secondary }}
          image: "{{- include "containerImage" (list . (dict "name" "vcpDbMigrate" "secondary" true)) | trim -}}"
          {{- else }}
          image: "{{- include "containerImage" (list . (dict "name" "vcpDbMigrate" "secondary" false)) | trim -}}"
          {{- end }}
          imagePullPolicy: {{ .Values.images.vcpDbMigrate.pullPolicy }}
          env:
            # DB migration admin credentials from Secret
            - name: DB_ADMIN_USERNAME
              valueFrom:
                secretKeyRef:
                  name: core-service-env-secret
                  key: DB_ADMIN_USER
            - name: DB_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: core-service-env-secret
                  key: DB_ADMIN_PASSWORD

            # MSI user (if enabled)
            - name: MSI_USER
              value: {{ .Values.msiUser | default "defaultUser" | quote }}

            # Regular database connection info (user/pass/host etc)
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: core-service-env-secret
                  key: DB_USER
            {{- if not .Values.global.cloudSqlIamAuthEnabled }}
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: core-service-env-secret
                  key: DB_PASSWORD
            {{- end }}
            - name: DB_HOST
              {{- if .Values.global.cloudSqlIamAuthEnabled }}
              value: "127.0.0.1"
              {{- else }}
              value: {{ .Values.database.host | default "localhost" | quote }}
              {{- end }}
            - name: DB_PORT
              value: {{ .Values.database.port | default "5432" | quote }}
            - name: DB_NAME
              value: {{ .Values.database.name | default "vcp" | quote }}
            - name: DB_TYPE
              value: {{ .Values.database.type | default "postgres" | quote }}
            - name: DB_SSL_MODE
              value: {{ .Values.database.sslMode | quote }}
            {{- if .Values.metricsEnabled }}
            - name: METRICS_DB_USER
              valueFrom:
                secretKeyRef:
                  name: core-service-env-secret
                  key: METRICS_DB_USER
            {{- if not .Values.global.cloudSqlIamAuthEnabled }}
            - name: METRICS_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: core-service-env-secret
                  key: METRICS_DB_PASSWORD
            {{- end }}
            - name: METRICS_DB_HOST
              {{- if .Values.global.cloudSqlIamAuthEnabled }}
              value: "127.0.0.1"
              {{- else }}
              value: {{ .Values.database.metricsHost | default "localhost" | quote }}
              {{- end }}
            - name: METRICS_DB_PORT
              value: {{ .Values.database.metricsPort | default "5432" | quote }}
            - name: METRICS_DB_NAME
              value: {{ .Values.database.metricsDbName | default "metrics" | quote }}
            - name: METRICS_DB_TYPE
              value: {{ .Values.database.type | default "postgres" | quote }}
            {{- end }}
            - name: LOCAL_REGION
              value: {{ .Values.global.coreConfig.localRegion | default "" | quote }}
            - name: REGION_NUMBER_MAP
              value: {{ .Values.global.coreConfig.regionNumberMap | toJson | quote }}
            - name: METRICS_ENABLED
              value: {{ .Values.metricsEnabled | quote }}
            # Cloud SQL IAM authentication flag (used by migration tool to shutdown proxy sidecar)
            - name: CLOUD_SQL_IAM_AUTH_ENABLED
              value: {{ .Values.global.cloudSqlIamAuthEnabled | default false | quote }}
            # Database rollback step configuration
            - name: VCP_DB_PRE_ROLLBACK_STEPS
              value: {{ .Values.global.coreConfig.vcpDbPreRollbackSteps | default "0" | quote }}
            - name: VCP_DB_POST_ROLLBACK_STEPS
              value: {{ .Values.global.coreConfig.vcpDbPostRollbackSteps | default "0" | quote }}
            - name: METRICS_DB_PRE_ROLLBACK_STEPS
              value: {{ .Values.global.coreConfig.metricsDbPreRollbackSteps | default "0" | quote }}
            - name: METRICS_DB_POST_ROLLBACK_STEPS
              value: {{ .Values.global.coreConfig.metricsDbPostRollbackSteps | default "0" | quote }}
          resources:
            limits:
              cpu: {{ .Values.resources.limits.cpu }}
              memory: {{ .Values.resources.limits.memory }}
            requests:
              cpu: {{ .Values.resources.requests.cpu }}
              memory: {{ .Values.resources.requests.memory }}
      restartPolicy: Never
{{- end }}
