{{- $instConnName := .Values.global.coreConfig.gcp.instanceConnectionName | default .Values.telemetryDeployer.cloudSqlConnector | default .Values.global.cloudSqlProxy.instanceConnectionName }}
{{- if and (.Values.enabled) (.Values.enableDbMigration) (.Values.enableIamLifecycle) $instConnName }}
{{- $projectId := .Values.global.coreConfig.gcp.projectId | default .Values.telemetryDeployer.projectID }}
{{- $vcpCoreIAMUser := printf "%s@%s.iam" .Values.serviceAccountName $projectId }}
{{- $vcpWorkerIAMUser := printf "vcp-worker-ksa@%s.iam" $projectId }}
{{- $temporalIAMUser := printf "temporal-ksa@%s.iam" $projectId }}
{{- $metricsProducerIAMUser := printf "vcp-metrics-producer@%s.iam" $projectId }}
{{- $clhSA := "" }}
{{- if .Values.global.gcpHydrateAuthServiceAccount }}
  {{- $gsaParts := .Values.global.gcpHydrateAuthServiceAccount | splitList "@" }}
  {{- $ksaName := $gsaParts | first }}
  {{- $projectPart := index $gsaParts 1 | splitList "." | first }}
  {{- $clhSA = printf "%s@%s.iam" $ksaName $projectPart }}
{{- else }}
  {{- $clhSA = printf "netapp-clh-sa@%s.iam" $projectId }}
{{- end }}
kind: Job
apiVersion: batch/v1
metadata:
  name: vcp-iam-lifecycle
  namespace: {{ .Release.Namespace }}
  annotations:
    "helm.sh/hook": pre-upgrade,pre-install
    "helm.sh/hook-weight": "-6"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
    {{- include "vcp-dbmigrate.helmchart.annotations" . | nindent 4 }}
  labels:
    app: vcp-iam-lifecycle
    {{- include "vcp-dbmigrate.helmchart.labels" . | nindent 4 }}
spec:
  backoffLimit: 0
  ttlSecondsAfterFinished: {{ .Values.ttlSecondsAfterFinished | default 3600 }}
  activeDeadlineSeconds: 900  # 15 minutes - prevents runaway jobs
  template:
    metadata:
      annotations:
        {{- include "vcp-dbmigrate.helmchart.annotations" . | nindent 8 }}
      labels:
        app: vcp-iam-lifecycle
        {{- include "vcp-dbmigrate.helmchart.labels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ .Values.serviceAccountName }}
      nodeSelector:
        {{- if .Values.global.nodeSelector }}
        {{- toYaml .Values.global.nodeSelector | nindent 8 }}
        {{- end }}
        iam.gke.io/gke-metadata-server-enabled: "true"
      containers:
        {{- include "core.databaseProxyContainerAlways" . | nindent 8 }}
        - name: cloud-sql-proxy-temporal
          image: {{ .Values.global.cloudSqlProxy.image | default "gcr.io/cloud-sql-connectors/cloud-sql-proxy:2.21.1" | quote }}
          args:
            - "--private-ip"
            - "--auto-iam-authn"
            - "--structured-logs"
            - "--quitquitquit"
            - "--admin-port=9092"
            - "--port=5433"
            - "--impersonate-service-account=temporal-ksa@{{ $projectId }}.iam.gserviceaccount.com"
            - {{ $instConnName | quote }}
          securityContext:
            runAsNonRoot: true
          resources:
            limits:
              cpu: 500m
              memory: 512Mi
            requests:
              cpu: 100m
              memory: 128Mi
        - name: vcp-iam-lifecycle
          {{- if .Values.images.vcpIamLifecycle.secondary }}
          image: "{{- include "containerImage" (list . (dict "name" "vcpIamLifecycle" "secondary" true)) | trim -}}"
          {{- else }}
          image: "{{- include "containerImage" (list . (dict "name" "vcpIamLifecycle" "secondary" false)) | trim -}}"
          {{- end }}
          imagePullPolicy: {{ .Values.images.vcpIamLifecycle.pullPolicy | default "IfNotPresent" }}
          securityContext:
            runAsNonRoot: true
            runAsUser: 65532
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          env:
            - name: CLOUD_SQL_IAM_AUTH_ENABLED
              value: {{ .Values.global.cloudSqlIamAuthEnabled | default false | quote }}
            - name: INSTANCE_CONNECTION_NAME
              value: {{ .Values.global.coreConfig.gcp.instanceConnectionName | default .Values.telemetryDeployer.cloudSqlConnector | quote }}
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: DB_HOST
              value: "127.0.0.1"
            - name: DB_PORT
              value: {{ .Values.database.port | default "5432" | quote }}
            - name: DB_SSL_MODE
              value: {{ .Values.database.sslMode | quote }}
            {{- if and .Values.global.cloudSqlIamAuthEnabled .Values.secretManagerEnabled }}
            - name: DB_ADMIN_USER
              valueFrom:
                secretKeyRef:
                  name: iam-lifecycle-admin-secret
                  key: DB_ADMIN_USER
            - name: DB_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: iam-lifecycle-admin-secret
                  key: DB_ADMIN_PASSWORD
            {{- else if and .Values.global.cloudSqlIamAuthEnabled (not .Values.secretManagerEnabled) }}
            - name: DB_ADMIN_USER
              value: {{ .Values.database.dbAdminUser | quote }}
            - name: DB_ADMIN_PASSWORD
              value: {{ .Values.database.dbAdminPassword | quote }}
            {{- else }}
            - name: DB_ADMIN_USER
              valueFrom:
                secretKeyRef:
                  name: core-service-env-secret
                  key: DB_ADMIN_USER
            - name: DB_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: core-service-env-secret
                  key: DB_ADMIN_PASSWORD
            {{- end }}
            - name: DB_NAME
              value: {{ .Values.database.name | default "vcp" | quote }}
            - name: METRICS_ENABLED
              value: {{ .Values.metricsEnabled | quote }}
            - name: METRICS_DB_NAME
              value: {{ .Values.database.metricsDbName | default "metrics" | quote }}
            - name: TEMPORAL_ENABLED
              value: "true"
            - name: TEMPORAL_DB_NAME
              value: "temporal"
            - name: TEMPORAL_VISIBILITY_DB_NAME
              value: "temporal_visibility"
            - name: IAM_VCP_CORE
              value: {{ $vcpCoreIAMUser | quote }}
            - name: IAM_VCP_WORKER
              value: {{ $vcpWorkerIAMUser | quote }}
            - name: IAM_CLH_SA
              value: {{ $clhSA | quote }}
            - name: IAM_TEMPORAL
              value: {{ $temporalIAMUser | quote }}
            - name: IAM_METRICS_PRODUCER
              value: {{ $metricsProducerIAMUser | quote }}
            - name: TEMPORAL_DB_PORT
              value: "5433"
            - name: CLOUD_SQL_PROXY_TEMPORAL_ADMIN_PORT
              value: "9092"
          resources:
            limits:
              cpu: {{ .Values.resources.limits.cpu }}
              memory: {{ .Values.resources.limits.memory }}
            requests:
              cpu: {{ .Values.resources.requests.cpu }}
              memory: {{ .Values.resources.requests.memory }}
      restartPolicy: Never
{{- end }}
