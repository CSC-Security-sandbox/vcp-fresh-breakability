{{- $instConnName := .Values.global.coreConfig.gcp.instanceConnectionName | default .Values.telemetryDeployer.cloudSqlConnector | default .Values.global.cloudSqlProxy.instanceConnectionName }}
{{- if and (.Values.enabled) (.Values.enableDbMigration) $instConnName }}
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: vcp-iam-lifecycle-cleanup
  namespace: {{ .Release.Namespace }}
  labels:
    app: vcp-iam-lifecycle
    {{- include "vcp-dbmigrate.helmchart.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-10"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
    {{- include "vcp-dbmigrate.helmchart.annotations" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    resourceNames: ["iam-lifecycle-admin-secret"]
    verbs: ["delete"]
  - apiGroups: ["external-secrets.io"]
    resources: ["externalsecrets"]
    resourceNames: ["iam-lifecycle-admin-secret"]
    verbs: ["delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: vcp-iam-lifecycle-cleanup
  namespace: {{ .Release.Namespace }}
  labels:
    app: vcp-iam-lifecycle
    {{- include "vcp-dbmigrate.helmchart.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-10"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
    {{- include "vcp-dbmigrate.helmchart.annotations" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: vcp-iam-lifecycle-cleanup
subjects:
  - kind: ServiceAccount
    name: {{ .Values.serviceAccountName }}
    namespace: {{ .Release.Namespace }}
{{- end }}
