{{- if not .Values.secretManagerEnabled }}
apiVersion: v1
kind: Secret
metadata:
  name: core-service-env-secret
  labels:
    app: core-service
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-10"
    {{- include "core.kubernetes.annotations" . | nindent 4 }}
    {{- include "core.helmchart.annotations" . | nindent 4 }}
type: Opaque
stringData:
  DB_USER: {{ .Values.database.user | quote }}
  DB_PASSWORD: {{ .Values.database.password | quote }}
  DB_ADMIN_USER: {{ .Values.database.dbAdminUser | quote }}
  DB_ADMIN_PASSWORD: {{ .Values.database.dbAdminPassword | quote }}
{{- end }}

{{- if .Values.secretManagerEnabled }}
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: core-service-env-secret
  labels:
    app: core-service
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-10"
    {{- include "core.kubernetes.annotations" . | nindent 4 }}
    {{- include "core.helmchart.annotations" . | nindent 4 }}
spec:
  refreshInterval: "1h"
  secretStoreRef:
    name: main-cluster-secret-store     # Configured same everywhere
    kind: ClusterSecretStore
  target:
    name: core-service-env-secret
    creationPolicy: Owner
    template:
      type: Opaque
  data:
    - secretKey: DB_USER
      remoteRef:
        key: {{ .Values.externalSecrets.dbUsername.secretName | quote }}
    - secretKey: DB_PASSWORD
      remoteRef:
        key: {{ .Values.externalSecrets.dbPassword.secretName | quote }}
    - secretKey: DB_ADMIN_USER
      remoteRef:
        key: {{ .Values.externalSecrets.dbAdminUsername.secretName | quote }}
    - secretKey: DB_ADMIN_PASSWORD
      remoteRef:
        key: {{ .Values.externalSecrets.dbAdminPassword.secretName | quote }}
{{- end }}
