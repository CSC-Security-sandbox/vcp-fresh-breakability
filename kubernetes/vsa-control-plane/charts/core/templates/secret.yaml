{{- if not .Values.secretManagerEnabled }}
apiVersion: v1
kind: Secret
metadata:
  name: core-service-env-secret
  labels:
    app: core-service
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-10"
    {{- include "core.kubernetes.annotations" . | nindent 4 }}
    {{- include "core.helmchart.annotations" . | nindent 4 }}
type: Opaque
stringData:
  {{- if .Values.global.cloudSqlIamAuthEnabled }}
  {{- $projectId := .Values.global.coreConfig.gcp.projectId | default .Values.telemetryDeployer.projectID }}
  DB_USER: {{ printf "%s@%s.iam" .Values.serviceAccountName $projectId | quote }}
  {{- else }}
  DB_USER: {{ .Values.database.user | quote }}
  DB_PASSWORD: {{ .Values.database.password | quote }}
  {{- end }}
  DB_ADMIN_USER: {{ .Values.database.dbAdminUser | quote }}
  DB_ADMIN_PASSWORD: {{ .Values.database.dbAdminPassword | quote }}
  {{- if .Values.metricsEnabled }}
  {{- if .Values.global.cloudSqlIamAuthEnabled }}
  {{- $projectId := .Values.global.coreConfig.gcp.projectId | default .Values.telemetryDeployer.projectID }}
  METRICS_DB_USER: {{ printf "%s@%s.iam" .Values.serviceAccountName $projectId | quote }}
  {{- else }}
  METRICS_DB_USER: {{ .Values.database.metricsUser | quote }}
  METRICS_DB_PASSWORD: {{ .Values.database.metricsPassword | quote }}
  {{- end }}
  {{- end }}
{{- end }}

{{- if .Values.secretManagerEnabled }}
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: core-service-env-secret
  labels:
    app: core-service
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-10"
    {{- include "core.kubernetes.annotations" . | nindent 4 }}
    {{- include "core.helmchart.annotations" . | nindent 4 }}
spec:
  refreshInterval: "1h"
  secretStoreRef:
    name: main-cluster-secret-store     # Configured same everywhere
    kind: ClusterSecretStore
  target:
    name: core-service-env-secret
    creationPolicy: Owner
    template:
      type: Opaque
      {{- if .Values.global.cloudSqlIamAuthEnabled }}
      {{- $projectId := .Values.global.coreConfig.gcp.projectId | default .Values.telemetryDeployer.projectID }}
      mergePolicy: Merge
      data:
        DB_USER: {{ printf "%s@%s.iam" .Values.serviceAccountName $projectId | quote }}
        {{- if .Values.metricsEnabled }}
        METRICS_DB_USER: {{ printf "%s@%s.iam" .Values.serviceAccountName $projectId | quote }}
        {{- end }}
      {{- end }}
  data:
    {{- if not .Values.global.cloudSqlIamAuthEnabled }}
    - secretKey: DB_USER
      remoteRef:
        key: {{ .Values.externalSecrets.dbUsername.secretName | quote }}
    - secretKey: DB_PASSWORD
      remoteRef:
        key: {{ .Values.externalSecrets.dbPassword.secretName | quote }}
    {{- end }}
    {{- if .Values.metricsEnabled }}
    {{- if not .Values.global.cloudSqlIamAuthEnabled }}
    - secretKey: METRICS_DB_USER
      remoteRef:
        key: {{ .Values.externalSecrets.metricsDbUsername.secretName | quote }}
    - secretKey: METRICS_DB_PASSWORD
      remoteRef:
        key: {{ .Values.externalSecrets.metricsDbPassword.secretName | quote }}
    {{- end }}
    {{- end }}
    - secretKey: DB_ADMIN_USER
      remoteRef:
        key: {{ .Values.externalSecrets.dbAdminUsername.secretName | quote }}
    - secretKey: DB_ADMIN_PASSWORD
      remoteRef:
        key: {{ .Values.externalSecrets.dbAdminPassword.secretName | quote }}
{{- end }}
