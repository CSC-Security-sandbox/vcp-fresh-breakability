apiVersion: v1
kind: ConfigMap
metadata:
  name: google-proxy-service-env-config
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    {{- include "google_proxy.kubernetes.annotations" . | nindent 4 }}
    {{- include "google_proxy.helmchart.annotations" . | nindent 4 }}
  labels:
    {{- include "google_proxy.kubernetes.labels" . | nindent 4 }}
    {{- include "google_proxy.helmchart.labels" . | nindent 4 }}
    app: google-proxy-service
data:
  # TODO: Remove these fields after application code fix
  {{- if not .Values.global.cloudSqlIamAuthEnabled }}
  DB_HOST: "{{ index .Values "database" "host" }}"
  {{- end }}
  DB_NAME: "{{ index .Values "database" "name" }}"
  DB_SSL_MODE: "{{ index .Values "database" "sslMode" }}"
  GCP_AUTH_ACCEPTED_SERVICE_ACCOUNTS: "{{ index .Values "acceptedSAs" }}"
  GCP_CONSUMER_MGMT_ENDPOINT_URL: "{{ index .Values "gcpConsumerMgmtEndpointUrl" }}"
  GCP_SERVICE_NETWORKING_ENDPOINT_URL: "{{ index .Values "gcpServiceNetworkingEndpointUrl" }}"
  GCP_SERVICE_URL: "{{ index .Values "gcpServiceUrl" }}"
  LOCAL_REGION: "{{ index .Values "localRegion" }}"
  OTEL_GOOGLE_PROJECT_ID: "{{ index .Values "otelGoogleProjectId" }}"
  RUN_MIGRATION_ON_START: "{{ index .Values "runMigrationOnStart" }}"
  TEMPORAL_ADDRESS: "{{ index .Values "temporalAddress" }}"
  OBJECT_STORE_PROVIDER: "{{ index .Values "objectStoreProvider" }}"
  OBJECT_STORES_SERVER: "{{ index .Values "objectStoresServer" }}"
  OBJECT_STORE_AUTH_TYPE: "{{ index .Values "objectStoreAuthType" }}"
  SMC_GCP_PROJECT_ID: "{{ index .Values "smcProjectId" }}"
  GCP_SMC_SECRET_NAME: "{{ index .Values "gcpSmcSecretName" }}"
  GCP_SMC_SECRET_VERSION_NAME: "{{ index .Values "gcpSmcSecretVersionName" }}"
  GCP_HYDRATE_ENABLED: "{{ index .Values "gcpHydrateEnabled" }}"
  GCP_HYDRATE_AUTH_SERVICE_ACCOUNT: "{{ index .Values "gcpHydrateAuthServiceAccount" }}"
  GCP_AUTH_SERVICE_ACCOUNT: "{{ index .Values "gcpAuthServiceAccount" }}"
  JWT_TTL_MINUTES: "{{ index .Values "jwtTtlMinutes" }}"
  GCP_HYDRATE_BASE_URL: "{{ index .Values "gcpHydrateBaseUrl" }}"
  PROXY_CLIENT_TRANSPORT_SCHEMA: "{{ index .Values "proxyClientTransportSchema" }}"
  VCP_PAIRED_REGIONS: "{{ index .Values "vcpPairedRegions" }}"
  DELETE_RESOURCES_CRON_EXPRESSION: "{{ index .Values "deleteResourcesCronExpression" }}"
  CERTIFICATE_ROTATION_CRON_EXPRESSION: "{{ index .Values "certificateRotationCronExpression" }}"
  LOGGER_LEVEL: "{{ index .Values "loggerLevel" }}"
  CVP_HOST: "{{ index .Values "cvpHost" }}"
  CORE_API_HOST: "{{ index .Values "coreApi" "host" }}"
  VSA_AUTH_TYPE: "{{ index .Values "vsaAuthType" }}" #0 for username/password, 1 for username/password in secret manager and 2 for certificate authentication
  BACKUP_ENABLED: "{{ index .Values "backupEnabled" }}"
  GCBDR_VAULT_ENABLED: "{{ index .Values "gcbdrVaultEnabled" }}"
  EXPERT_MODE_BACKUP_ENABLED: "{{ index .Values "expertModeBackupEnabled" }}"
  SFR_ENABLED: "{{ index .Values "sfrEnabled" }}"
  QA_ENABLED: "{{ index .Values "qaEnabled" }}"
  IMMUTABLE_BACKUP_ENABLED: "{{ index .Values "immutableBackupEnabled" }}"
  CROSS_REGION_BACKUP_ENABLED: "{{ index .Values "crossRegionBackupEnabled" }}"
  ENABLE_BACKUP_VAULT_SWITCHING: "{{ index .Values "enableBackupVaultSwitching" }}"
  CRR_ENABLED: "{{ index .Values "crrEnabled" }}"
  CPCRR_ENABLED: "{{ index .Values "cpcrrEnabled" }}"
  CZCRR_ENABLED: "{{ index .Values "czcrrEnabled" }}"
  ENABLE_QUOTA_RULE: "{{ index .Values "enableQuotaRule" }}"
  FLEXCACHE_ENABLED: "{{ index .Values "flexCacheEnabled" }}"
  HYBRID_REPLICATION_ENABLED: "{{ index .Values "hybridReplicationEnabled" }}"
  BIDI_REPLICATION_ENABLED: "{{ index .Values "bidiReplicationEnabled" }}"
  REFRESH_ADMIN_JOB_SPECS: "{{ index .Values "refreshAdminJobSpecs" }}"
  AUTO_TIERING_ENABLED: "{{ index .Values "autoTieringEnabled" }}"
  BLOCK_UPDATE_POOL_TO_AT_POOL: "{{ index .Values "blockUpdatePoolToATPool" }}"
  REGIONAL_SUPPORT_ENABLED: "{{ index .Values "regionalSupportEnabled" }}"
  FILES_PROTOCOL_SUPPORT: "{{ index .Values "filesProtocolSupport" }}"
  EXPERIMENTAL_VERSION_ALLOWLISTED_ACCOUNTS: "{{ index .Values "experimentalVersionAllowlistedAccounts" }}"
  IS_ALL_SQUASH_ENABLED: "{{ index .Values "isAllSquashEnabled" }}"
  MIN_QUOTA_IN_BYTES_POOL: "{{ index .Values "minQuotaInBytesPool" }}"
  MAX_QUOTA_IN_BYTES_POOL: "{{ index .Values "maxQuotaInBytesPool" }}"
  MIN_QUOTA_IN_BYTES_VOLUME: "{{ index .Values "minQuotaInBytesVolume" }}"
  MAX_QUOTA_IN_BYTES_VOLUME: "{{ index .Values "maxQuotaInBytesVolume" }}"
  MAX_QUOTA_IN_BYTES_FILE_VOLUME: "{{ index .Values "maxQuotaInBytesFileVolume" }}"
  MIN_QUOTA_IN_BYTES_LARGE_VOLUME: "{{ index .Values "minQuotaInBytesLargeVolume" }}"
  MIN_QUOTA_IN_BYTES_LARGE_VOLUME_WITH_CV: "{{ index .Values "minQuotaInBytesLargeVolumeWithCV" }}"
  MAX_QUOTA_IN_BYTES_LARGE_VOLUME: "{{ index .Values "maxQuotaInBytesLargeVolume" }}"
  MAX_CONSTITUENTS_PER_AGGREGATE: "{{ index .Values "maxConstituentsPerAggregate" }}"
  DEFAULT_CONSTITUENTS_PER_AGGREGATE: "{{ index .Values "defaultConstituentsPerAggregate" }}"
  MAX_CONSTITUENTS_PER_VOLUME_PER_AGGREGATE: "{{ index .Values "maxConstituentsPerVolumePerAggregate" }}"
  MIN_SIZE_GRANULARITY: "{{ index .Values "minSizeGranularity" }}"
  MIN_CUSTOM_THROUGHPUT: "{{ index .Values "minCustomThroughput" }}"
  CREATE_COMMON_RESOURCES_IN_VCP: "{{ index .Values "createCommonResourcesInVCP" }}"
  AD_CREATE_SYNC_SDE_ENABLED: "{{ index .Values "adCreateSyncFlow" }}"
  MIN_CUSTOM_IOPS: "{{ index .Values "minCustomIops" }}"
  MAX_CUSTOM_THROUGHPUT: "{{ index .Values "maxCustomThroughput" }}"
  MAX_CUSTOM_IOPS: "{{ index .Values "maxCustomIops" }}"
  IOPS_PER_MIBPS: "{{ index .Values "iopsPerMibps" }}"
  JWK_KIDS_URL: "{{ index .Values "jwkKidsUrl" }}"
  WORKFLOW_GLOBAL_TIMEOUT_MINUTES: "{{ index .Values "workflowGlobalTimeoutMinutes" }}"
  CMEK_WORKFLOW_GLOBAL_TIMEOUT_MINUTES: "{{ index .Values "cmekWorkflowGlobalTimeoutMinutes" }}"
  CREATE_POOL_WORKFLOW_TIMEOUT_MINUTES: "{{ index .Values "createPoolWorkflowTimeoutMinutes" }}"
  CREATE_POOL_WORKFLOW_TIMEOUT_MINUTES_LV: "{{ index .Values "createPoolWorkflowTimeoutMinutesLV" }}"
  UPDATE_POOL_WORKFLOW_TIMEOUT_MINUTES: "{{ index .Values "updatePoolWorkflowTimeoutMinutes" }}"
  UPDATE_POOL_WORKFLOW_TIMEOUT_MINUTES_LV: "{{ index .Values "updatePoolWorkflowTimeoutMinutesLV" }}"
  CREATE_BACKUP_WORKFLOW_TIMEOUT_MINUTES: "{{ index .Values "createBackupWorkflowTimeoutMinutes" }}"
  DELETE_BACKUP_WORKFLOW_TIMEOUT_MINUTES: "{{ index .Values "deleteBackupWorkflowTimeoutMinutes" }}"
  SFR_WORKFLOW_TIMEOUT_MINUTES: "{{ index .Values "sfrWorkflowTimeoutMinutes" }}"
  CMEK_BACKUP_ENABLED: "{{ index .Values "cmekBackupEnabled" }}"
  WORKFLOW_GLOBAL_TIMEOUT_FOR_REPLICATION_MINUTES: {{ index .Values "workflowGlobalTimeoutForReplicationMinutes" | quote }}
  MAX_HOSTS_PER_HOSTGROUP: "{{ index .Values "maxHostsPerHostgroup" }}"
  PROBER_PROJECT_LIST: {{ .Values.proberProjectList | quote }}
  ENABLE_UNIQUE_SERIAL_NUMBER_GENERATION: "{{ index .Values "enableUniqueSerialNumberGeneration" }}"
  CLUSTER_SERIAL_NUMBER_PREFIX: "{{ index .Values "clusterSerialNumberPrefix" }}"
  REGION_NUMBER_MAP: {{ .Values.global.coreConfig.regionNumberMap | toJson | quote }}
  ONTAP_VERSION_DETAILS: "{{ index .Values "ontapVersionDetails" }}"
  ONTAP_VERSION_DETAILS_EXPERIMENTAL: "{{ index .Values "ontapVersionDetailsExperimental" }}"
  FINISH_PROJECT_CVP_CLIENT_RETRY_MAX_ATTEMPTS: "{{ index .Values "finishProjectCvpMaxRetries" }}"
  FINISH_PROJECT_CVP_CLIENT_RETRY_INTERVAL: "{{ index .Values "finishProjectCvpRetryInterval" }}"
  FINISH_PROJECT_CVP_CLIENT_BACKOFF_COEFFICIENT: "{{ index .Values "finishProjectBackoffCoefficient" }}"
  GCP_KMS_KEY_ROTATION_ENABLED: "{{ index .Values "gcpKmsKeyRotationEnabled" }}"
  MOCK_ACCESS_TOKEN: "{{ index .Values "mockAccessToken" }}"
  INTEGRATION_TEST: "{{ index .Values "integrationTest" }}"
  NKDEV_TEST: "{{ index .Values "nkdevTest" }}"
  HARD_DELETE_RESOURCES: "{{ index .Values "hardDeleteResources" }}"
  SCHEDULED_HARD_DELETE: "{{ index .Values "scheduleHardDelete" }}"
  WAIT_FOR_TEMPORAL_ENABLED: "{{ index .Values "waitForTemporalEnabled" }}"
  TASK_QUEUE_VERSION: "{{ index .Chart.Version | lower | replace "." "-" }}"
  METRICS_DB_CLEANUP_ENABLED: "{{ index .Values "metricsDbCleanupEnabled" }}"
  VOLUME_REFRESH_INTERVAL_MINUTES: "{{ index .Values "volumeRefreshIntervalMinutes" }}"
  FLEXCACHE_CREATE_VOLUME_SUPERVISOR_GRACE_PERIOD: "{{ index .Values "flexCacheCreateVolumeSupervisorGracePeriod" }}"
  THIN_CLONE_GA_SUPPORT: "{{ index .Values "thinCloneGASupport" }}"
  VALIDATE_CLONE_AT_POLICY_MATCH_PARENT: "{{ index .Values "validateCloneATPolicyMatchParent" }}"
  ENABLE_CLONE_INFO_REFRESH: "{{ index .Values "enableCloneInfoRefresh" }}"
  MAX_THIN_CLONES_PER_POOL: "{{ index .Values "maxThinClonesPerPool" }}"
  ENABLE_AUTO_POOL_SCALING: "{{ index .Values "enableAutoPoolScaling" }}"
  SECRET_MANAGER_PROJECT_ID: "{{ index .Values "secretManagerProjectId" }}"
  AUTO_POOL_SCALING_LIMITS:  {{ index .Values "autoPoolScalingLimits" | toJson | quote }}
  NUMBER_OF_HA_PAIRS_LARGE_CAPACITY: {{ index .Values "numberOfHaPairsLargeCapacity" | quote }}
  SNAPSHOT_API_SYNC_MODE: {{index .Values "snapshotApiSyncMode" | toString | quote}}
  SYNC_SNAPSHOT_ONTAP_JOB_POLL_TIMEOUT_MILLISECONDS: {{ index .Values "syncSnapshotOntapJobPollTimeoutMilliseconds" | quote }}
  SYNC_SNAPSHOT_ONTAP_JOB_POLL_INTERVAL_MILLISECONDS: {{ index .Values "syncSnapshotOntapJobPollIntervalMilliseconds" | quote }}
  MAX_APP_CONSISTENT_SNAPSHOT_COUNT: {{ index .Values "maxAppConsistentSnapshotCount" | quote }}
  CA_POOL_NAME: {{ index .Values "caPoolName" | quote }}
  CA_NAME: {{ index .Values "caName" | quote }}
  CA_POOL_DEPLOYED_PROJECT_ID: {{ index .Values "caPoolDeployedProjectId" | quote }}
  VSA_DEPLOYED_DNS_NAME: {{ index .Values "vsaDeployedDnsName" | quote }}
  VSA_MANAGED_ZONE: {{ index .Values "vsaManagedZone" | quote }}
  VSA_SECRET_CACHE_CLEANUP_INTERVAL_HOURS: {{ index .Values "vsaSecretCacheCleanupIntervalHours" | quote }}
  VSA_SECRET_AUTH_CACHE_EXPIRATION_HOURS: {{ index .Values "vsaSecretAuthCacheExpirationHours" | quote }}
  PRIVATE_KEY_BITS: {{ index .Values "privateKeyBits" | quote }}
  MIN_CONSTITUENT_VOLUME_SIZE_BYTES: {{ index .Values "minConstituentVolumeSizeInBytes" | quote }}
  MAX_CONSTITUENT_VOLUME_SIZE_BYTES: {{ index .Values "maxConstituentVolumeSizeInBytes" | quote }}
  ENABLE_LDAP: "{{ index .Values "enableLdap" }}"
  ENABLE_SMB: "{{ index .Values "enableSmb" }}"
  ENABLE_KERBEROS: "{{ index .Values "enableKerberos" }}"
  ENABLE_UNIX_PERMISSIONS: "{{ index .Values "enableUnixPermissions" }}"
  SMB_CA_SHARE_ENABLED: "{{ index .Values "enableSmbCaShare" }}"
  ENABLE_MULTI_AD: "{{ index .Values "enableMultiAd" }}"
  MAX_NUMBER_OF_AD_PER_ACCOUNT: "{{ index .Values "maxNumberOfAdPerAccount" }}"
  READINESS_PROBE_FAILURE_THRESHOLD: "{{ index .Values "readinessProbe" "failureThreshold" }}"
  READINESS_PROBE_PERIOD_SECONDS: "{{ index .Values "readinessProbe" "periodSeconds" }}"
  EXPORT_POLICY_RULES_LIMIT: "{{ index .Values "exportPolicyRulesLimit" }}"
  ENABLE_MQOS: "{{ index .Values "enableMqos" }}"
  ENABLE_INFERRED_IOPS: "{{ index .Values "enableInferredIops" | default false }}"
  ENABLE_VPG_ENDPOINTS: "{{ index .Values "enableVpgEndpoints" }}"
  ENABLE_VOLUME_PERFORMANCE_GROUP_ASSIGNMENT: "{{ index .Values "enableVolumePerformanceGroupAssignment" }}"
  
  {{- if .Values.global.cloudSqlIamAuthEnabled }}
  {{- $gsaParts := .Values.gcpHydrateAuthServiceAccount | splitList "@" }}
  {{- $dbServiceAccount := $gsaParts | first }}
  {{- $projectPart := index $gsaParts 1 | splitList "." | first }}
  # IAM authentication values - only set when cloudSqlIamAuthEnabled=true
  DB_HOST: "127.0.0.1"
  DB_USER: {{ printf "%s@%s.iam" $dbServiceAccount $projectPart | quote }}
  {{- else }}
  # When IAM is disabled, DB_HOST is set from values.yaml above
  {{- end }}
  
  # CLOUD_SQL_IAM_AUTH_ENABLED controls authentication method for database connections
  # true = Use IAM authentication via Cloud SQL Proxy sidecar (connects to 127.0.0.1)
  # false = Use password authentication via shared proxy service (connects to cloud-sql-proxy.sde.svc.cluster.local)
  CLOUD_SQL_IAM_AUTH_ENABLED: {{ .Values.global.cloudSqlIamAuthEnabled | default false | quote }}
  
  config.yaml: |
    {{- if .Values.global.cloudSqlIamAuthEnabled }}
    {{- $gsaParts := .Values.gcpHydrateAuthServiceAccount | splitList "@" }}
    {{- $dbServiceAccount := $gsaParts | first }}
    {{- $projectPart := index $gsaParts 1 | splitList "." | first }}
    DB_HOST: 127.0.0.1
    DB_USER: {{ printf "%s@%s.iam" $dbServiceAccount $projectPart }}
    {{- else }}
    DB_HOST: {{ index .Values "database" "host" }}
    {{- end }}
    DB_NAME: {{ index .Values "database" "name"  }}
    SETUP_NW_HEARTBEAT_TIMEOUT_SEC: {{ index .Values "temporal" "timeouts" "heartbeat" "setupNwSecond"}}
