{{- if not .Values.secretManagerEnabled }}
apiVersion: v1
kind: Secret
metadata:
  name: google-proxy-service-env-secret
  labels:
    app: google-proxy-service
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-10"
    {{- include "google_proxy.kubernetes.annotations" . | nindent 4 }}
    {{- include "google_proxy.helmchart.annotations" . | nindent 4 }}
type: Opaque
stringData:
  {{- if .Values.global.cloudSqlIamAuthEnabled }}
  {{- $gsaParts := .Values.gcpHydrateAuthServiceAccount | splitList "@" }}
  {{- $dbServiceAccount := $gsaParts | first }}
  {{- $projectPart := index $gsaParts 1 | splitList "." | first }}
  # IAM authentication mode - no DB password needed
  DB_USER: {{ printf "%s@%s.iam" $dbServiceAccount $projectPart | quote }}
  DB_ADMIN_USER: {{ printf "%s@%s.iam" $dbServiceAccount $projectPart | quote }}
  {{- else }}
  # Password authentication mode
  DB_USER: {{ .Values.database.user | quote }}
  DB_PASSWORD: {{ .Values.database.password | quote }}
  DB_ADMIN_USER: {{ .Values.database.adminUser | quote }}
  DB_ADMIN_PASSWORD: {{ .Values.database.adminPassword | quote }}
  {{- end }}
  VSA_NODE_USERNAME: {{ .Values.vsaNodeUsername | quote }}
  VSA_NODE_PASSWORD: {{ .Values.vsaNodePassword | quote }}
{{- end }}

{{- if .Values.secretManagerEnabled }}
---
# Use ExternalSecret for both IAM and password authentication
# IAM mode: Fetch VSA credentials, override DB credentials in template
# Password mode: Fetch all credentials from GCP Secret Manager
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: google-proxy-service-env-secret
  labels:
    app: google-proxy-service
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-10"
    {{- include "google_proxy.kubernetes.annotations" . | nindent 4 }}
    {{- include "google_proxy.helmchart.annotations" . | nindent 4 }}
spec:
  refreshInterval: "1h"
  secretStoreRef:
    name: main-cluster-secret-store
    kind: ClusterSecretStore
  target:
    name: google-proxy-service-env-secret
    creationPolicy: Owner
    template:
      type: Opaque
      {{- if .Values.global.cloudSqlIamAuthEnabled }}
      # Merge fetched VSA credentials with template DB credentials (default Replace would drop fetched keys)
      mergePolicy: Merge
      # IAM mode: Override DB credentials with IAM-formatted users (template.data takes precedence)
      data:
        {{- $gsaParts := .Values.gcpHydrateAuthServiceAccount | splitList "@" }}
        {{- $dbServiceAccount := $gsaParts | first }}
        {{- $projectPart := index $gsaParts 1 | splitList "." | first }}
        DB_USER: {{ printf "%s@%s.iam" $dbServiceAccount $projectPart | quote }}
        DB_ADMIN_USER: {{ printf "%s@%s.iam" $dbServiceAccount $projectPart | quote }}
      {{- end }}
  # Always fetch from GCP Secret Manager (required for webhook validation)
  data:
    {{- if .Values.global.cloudSqlIamAuthEnabled }}
    # IAM mode: Only fetch VSA credentials (DB credentials overridden in template.data above)
    - secretKey: VSA_NODE_USERNAME
      remoteRef:
        key: {{ .Values.externalSecrets.vsaNodeUsername.secretName | quote }}
    - secretKey: VSA_NODE_PASSWORD
      remoteRef:
        key: {{ .Values.externalSecrets.vsaNodePassword.secretName | quote }}
    {{- else }}
    # Password mode: Fetch all credentials from GCP Secret Manager
    - secretKey: DB_USER
      remoteRef:
        key: {{ .Values.externalSecrets.dbUsername.secretName | quote }}
    - secretKey: DB_PASSWORD
      remoteRef:
        key: {{ .Values.externalSecrets.dbPassword.secretName | quote }}
    - secretKey: DB_ADMIN_USER
      remoteRef:
        key: {{ .Values.externalSecrets.dbAdminUsername.secretName | quote }}
    - secretKey: DB_ADMIN_PASSWORD
      remoteRef:
        key: {{ .Values.externalSecrets.dbAdminPassword.secretName | quote }}
    - secretKey: VSA_NODE_USERNAME
      remoteRef:
        key: {{ .Values.externalSecrets.vsaNodeUsername.secretName | quote }}
    - secretKey: VSA_NODE_PASSWORD
      remoteRef:
        key: {{ .Values.externalSecrets.vsaNodePassword.secretName | quote }}
    {{- end }}
{{- end }}
