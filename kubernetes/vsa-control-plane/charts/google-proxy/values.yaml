# Global configuration
environment: gcp

# Pod affinity configuration
podAffinity:
  enabled: true

enabled: true
serviceAccountName: google-proxy
replicaCount: 1

acceptedSAs: "" # Comma-separated list of service account emails that are allowed to access the Google Proxy APIs.
gcpConsumerMgmtEndpointUrl: ""
gcpServiceNetworkingEndpointUrl: ""
gcpServiceUrl: "https://cloudvolumesgcp-api.netapp.com"
localRegion: ""
otelGoogleProjectId: ""
# Must be false — non-owner inline migrations fail when Cloud SQL IAM auth is enabled.
runMigrationOnStart: false
temporalAddress: "temporal-frontend.temporal.svc.cluster.local:7233"
vsaNodeUsername: ""
vsaNodePassword: ""
vsaAuthType: 0 # 0 : username/password, 1 : username/password in secret manager and 2 : certificate authentication
smcProjectId: ""
gcpSmcSecretName: ""
gcpSmcSecretVersionName: ""
gcpHydrateEnabled: true
gcpHydrateAuthServiceAccount: ""
gcpAuthServiceAccount: ""
jwtTtlMinutes: "60"
gcpHydrateBaseUrl: ""
proxyClientTransportSchema: "https"
vcpPairedRegions: ""
loggerLevel: "info"
cvpHost: ""
maxBatchVolumeUUIDs: "1000"
# Temporary test-only override: forces VCP path even when CVP_HOST is set.
forceVcpKmsPathForTesting: false
coreApi:
  host: "core-service.vcp.svc.cluster.local:8080"
crrEnabled: false
cpcrrEnabled: false
czcrrEnabled: false
enableQuotaRule: true # Enable quota rule API (create/update/delete/get multiple)
refreshAdminJobSpecs: true
flexCacheEnabled: false
hybridReplicationEnabled: false
bidiReplicationEnabled: false
autoTieringEnabled: false
blockUpdatePoolToATPool: false # Block updating existing pools to Auto-Tiering pools
enableLargeCapacityPools: true # Feature flag: allow creating largeCapacity pools
regionalSupportEnabled: true
# When true, core/worker use registered address ranges for pool subnet creation; set to match global.coreConfig.addressSpaceMgmtEnabled in deployments.
addressSpaceMgmtEnabled: "false"
filesProtocolSupport: true
ontapVersionDetails: "9.18.1P2"
ontapVersionDetailsExperimental: ""
# "" implies only block support is enabled. #"*" implies all accounts are allowlisted for files protocol support
# "Comma-separated list of account IDs" implies only those accounts are allowlisted for files protocol support
experimentalVersionAllowlistedAccounts: ""
backupEnabled: false
gcbdrVaultEnabled: false
expertModeBackupEnabled: false
sfrEnabled: false
qaEnabled: false
immutableBackupEnabled: false
crossRegionBackupEnabled: false
enableBackupVaultSwitching: false
restoreVolumeBufferEnabled: false
minQuotaInBytesPool: "1099511627776" # 1TiB in bytes
maxQuotaInBytesPool: "467292441804800" # 425TiB in bytes
minQuotaInBytesVolume: "1073741824" # 1GiB in bytes
maxQuotaInBytesVolume: "140737488355328" # 128TiB in bytes
maxQuotaInBytesFileVolume: "329853488332800" # 300TiB in bytes
minQuotaInBytesLargeVolume: "5277655813325" # 4.8TiB in bytes
minQuotaInBytesLargeVolumeWithCV: "2638827906662" # 2.4TiB in bytes
maxQuotaInBytesLargeVolume: "22517998136852480" # 20PiB in bytes
maxConstituentsPerAggregate: "1000" # 1000 constituents per aggregate
defaultConstituentsPerAggregate: "8" # Default CVs per aggregate for large volume creation
maxConstituentsPerVolumePerAggregate: "200" # 200 constituents per aggregate per volume
minSizeGranularity: "1073741824" # 1GiB in bytes
jwkKidsUrl: "https://www.googleapis.com/service_accounts/v1/metadata/x509/"
workflowGlobalTimeoutMinutes: "60" # Global timeout for workflows in minutes
maxHostsPerHostgroup: "128"
maxBatchPoolUUIDs: "1000"
maxBatchSnapshotUUIDs: "1000"
maxBatchActiveDirectoryUUIDs: "1000"
maxBatchBackupVaultUUIDs: "1000"
maxBatchBackupPolicyUUIDs: "1000"
maxBatchBackupUUIDs: "1000"
maxBatchReplicationURIs: "700"
maxBatchKmsConfigUUIDs: "1000"
cmekWorkflowGlobalTimeoutMinutes: "14" # Global timeout for CMEK workflows in minutes
cmekGlobalProjectId: ""
createPoolWorkflowTimeoutMinutes: "150" # Create pool workflow run timeout (standard pools) in minutes
createPoolWorkflowTimeoutMinutesLV: "150" # Create pool workflow run timeout (LV pools) in minutes
updatePoolWorkflowTimeoutMinutes: "150" # Update pool workflow run timeout (standard pools) in minutes
updatePoolWorkflowTimeoutMinutesLV: "150" # Update pool workflow run timeout (LV pools) in minutes
createBackupWorkflowTimeoutMinutes: "8640"
deleteBackupWorkflowTimeoutMinutes: "6480"
sfrWorkflowTimeoutMinutes: "13680"
cmekBackupEnabled: false
workflowGlobalTimeoutForReplicationMinutes: 10
gcpKmsKeyRotationEnabled: "false" # Flag to enable GCP KMS key rotation
minCustomIops: "1024"
minCustomThroughput: "64"
maxCustomIops: "160000"
maxCustomThroughput: "5120"
iopsPerMibps: "16"
deleteResourcesCronExpression: "0 0 * * *" # DELETE_RESOURCES job configuration
certificateRotationCronExpression: "0 0 * * *" # ROTATE_VSA_CERTIFICATE_AND_PASSWORD job configuration (default: daily at midnight)
waitForTemporalEnabled: false
metricsDbCleanupEnabled: false
enablePollerRebalancing: false
volumeRefreshIntervalMinutes: "5"
flexCacheCreateVolumeSupervisorGracePeriod: "60" # Grace period for flexcache create volume supervisor in minutes
thinCloneGASupport: false
splitWaitForTemporalEnabled: true
validateCloneATPolicyMatchParent: false
enableCloneInfoRefresh: true
maxThinClonesPerPool: 100
enableAutoPoolScaling: true
snapshotApiSyncMode: false
enableJobResourceUuidIndex: true
syncSnapshotOntapJobPollTimeoutMilliseconds: 40000
syncSnapshotOntapJobPollIntervalMilliseconds: 2000
maxAppConsistentSnapshotCount: "10"
caName: "20250718-pn6-boa"
caPoolName: "vsa-pool-ca"
caPoolDeployedProjectId: "266893635349"
vsaDeployedDnsName: "au-se1.vsa"
vsaManagedZone: "au-se1-vsa"
privateKeyBits: 4096
vsaSecretCacheCleanupIntervalHours: 24
vsaSecretAuthCacheExpirationHours: 24
hardDeleteResources: true
scheduleHardDelete: false
createCommonResourcesInVCP: true
useVCPRegion: false
adCreateSyncFlow: true
numberOfHaPairsLargeCapacity: 6
minConstituentVolumeSizeInBytes: 107374182400
maxConstituentVolumeSizeInBytes: 329853488332800
secretManagerProjectId: "402007546452"
enableLdap: false
enableSmb: false
enableKerberos: false
enableUnixPermissions: true
enableSmbCaShare: true
enableMultiAd: true
maxNumberOfAdPerAccount: 5
enableMqos: true
enableInferredIops: true
enableVpgEndpoints: false
enableVolumePerformanceGroupAssignment: false
exportPolicyRulesLimit: 20
autoPoolScalingLimits:
  c3-standard-4-lssd:
    min_volume_count: 0
    max_volume_count: 245
  c3-standard-8-lssd:
    min_volume_count: 0
    max_volume_count: 495
  c3-standard-22-lssd:
    min_volume_count: 0
    max_volume_count: 995

# Mock gcp access token for testing purposes
mockAccessToken: ""
integrationTest: false
nkdevTest: false

# Add values here in overrideCoreConfig to override the common configuration
overrideCoreConfig: {}

images:
  googleProxy:
    name: google-proxy
    tag: 0.0.0
    digest: ""
    secondary: true
    pullPolicy: IfNotPresent

resources:
  limits:
    cpu: "1"
    memory: 1Gi
  requests:
    cpu: 250m
    memory: 150Mi

service:
  type: ClusterIP
  appPort: 8080

istio:
  enabled: true

startupProbe:
  path: /healthz/ready
  port: 15021
  scheme: HTTP
  periodSeconds: 2
  failureThreshold: 30

livenessProbe:
  initialDelaySeconds: 60
  periodSeconds: 15
  timeoutSeconds: 1
  failureThreshold: 3

# Readiness probe configuration for graceful shutdown
readinessProbe:
  initialDelaySeconds: 10
  timeoutSeconds: 1
  failureThreshold: 1  # Number of consecutive failures before marking pod as not ready
  periodSeconds: 5     # Interval between probe checks

database:
  host: postgres
  user: postgres
  password: testpass
  name: vcp
  adminUser: postgres
  adminPassword: testpass
  sslMode: "disable"

# Cloud SQL instance connection name for IAM authentication
# Format: project:region:instance
# Example: "my-project:us-central1:my-instance"
# Used when cloudSqlIamAuthEnabled=true
cloudSqlConnector: ""

# Annotations
serviceAccountAnnotations:
  "iam.gke.io/gcp-service-account": vcp-ci@gcnv-artifact-registry-nonprod.iam.gserviceaccount.com

temporal:
  timeouts:
    heartbeat:
      setupNwSecond: 300
#Enabling for secrets manager
#flag for enabling/disabling secret manager
secretManagerEnabled: false # Default is false
externalSecrets:
  dbUsername:
    secretName: "vcp-worker-autopush-sqa-us-e4-db-username-key"
    secretKey: "dbUsername"
  dbPassword:
    secretName: "vcp-worker-autopush-sqa-us-e4-db-password-key"
    secretKey: "dbPassword"
  dbAdminUsername:
    secretName: "vcp-worker-autopush-sqa-us-e4-db-adminUsername-key"
    secretKey: "dbAdminUsername"
  dbAdminPassword:
    secretName: "vcp-worker-autopush-sqa-us-e4-db-adminPassword-key"
    secretKey: "dbAdminPassword"
  vsaNodeUsername:
    secretName: "vcp-worker-autopush-sqa-us-e4-db-node-username"
    secretKey: "vsaNodeUsername"
  vsaNodePassword:
    secretName: "vcp-worker-autopush-sqa-us-e4-db-node-password"
    secretKey: "vsaNodePassword"

proberProjectList: ""
enableUniqueSerialNumberGeneration: false
clusterSerialNumberPrefix: "935"
