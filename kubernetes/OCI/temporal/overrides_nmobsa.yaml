# OCI environment overrides: tenancy, OCIR image paths, Postgres endpoints.
# Merge with defaults:
#   helm upgrade --install temporal . -n <ns> -f values.yaml -f overrides.yaml

global:
  primaryImageRegistry: iad.ocir.io
  primaryImageRegistryPath: "nmobsa"

# Full repository paths include OCIR host + tenancy namespace + repo path.
server:
  image:
    repository: iad.ocir.io/nmobsa/temporalio/server
    tag: "1.29.1"
  config:
    persistence:
      default:
        sql:
          host: primary.kce5jry3ybj7h5x2ddd5iymauq6vqq.postgresql.us-ashburn-1.oci.oraclecloud.com
      visibility:
        sql:
          host: primary.kce5jry3ybj7h5x2ddd5iymauq6vqq.postgresql.us-ashburn-1.oci.oraclecloud.com

admintools:
  image:
    repository: iad.ocir.io/nmobsa/temporalio/admin-tools
    tag: "1.29"

web:
  image:
    repository: iad.ocir.io/nmobsa/temporalio/ui
    tag: "2.44.0"
