{{- if .Values.secretManagerEnabled }}
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: temporal-default-store
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-10"
    {{- include "temporal.resourceAnnotations" (list $ "" "annotations") | nindent 4 }}
spec:
  refreshInterval: "1h"
  secretStoreRef:
    name: main-cluster-secret-store     # Configured same everywhere
    kind: ClusterSecretStore
  target:
    name: temporal-default-store
    creationPolicy: Owner
    template:
      type: Opaque
  data:
    - secretKey: password
      remoteRef:
        key: {{ .Values.externalSecrets.defaultStore.temporalDBPassword | quote }}
{{- end }}
---
{{- if .Values.secretManagerEnabled }}
apiVersion: external-secrets.io/v1beta1
