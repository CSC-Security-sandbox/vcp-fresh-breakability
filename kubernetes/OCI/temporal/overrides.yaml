# OCI environment overrides: tenancy, OCIR image paths, Postgres endpoints.
# Merge with defaults:
#   helm upgrade --install temporal . -n <ns> -f values.yaml -f overrides.yaml

global:
  primaryImageRegistry: iad.ocir.io
  primaryImageRegistryPath: "REPLACE_WITH_TENANCY_NAMESPACE"

# Full repository paths include OCIR host + tenancy namespace + repo path.
server:
  image:
    repository: iad.ocir.io/REPLACE_WITH_TENANCY_NAMESPACE/temporalio/server
    tag: "1.29.1"
  config:
    persistence:
      default:
        sql:
          host: REPLACE_WITH_POSTGRES_PRIMARY_FQDN
      visibility:
        sql:
          host: REPLACE_WITH_POSTGRES_PRIMARY_FQDN

admintools:
  image:
    repository: iad.ocir.io/REPLACE_WITH_TENANCY_NAMESPACE/temporalio/admin-tools
    tag: "1.29"

web:
  image:
    repository: iad.ocir.io/REPLACE_WITH_TENANCY_NAMESPACE/temporalio/ui
    tag: "2.44.0"
