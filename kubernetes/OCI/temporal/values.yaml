schema:
  createDatabase:
    enabled: true
  setup:
    enabled: true
    backoffLimit: 100
  update:
    enabled: true
    backoffLimit: 100
  podAnnotations: {}
  podLabels: {}
  resources: {}
  containerSecurityContext: {}
  securityContext: {}
  istio:
    enabled: false

# Postgres external Service + Endpoints. When enabled, creates postgres-db.<release-namespace>.svc.cluster.local
# pointing to endpointIP. Set enabled: false when using FQDN directly (see persistence sql host above).
postgresExternal:
  enabled: false
  endpointIP: "10.0.1.132"   # Primary endpoint (private IP) from DB System
  port: 5432
