# Example Secret for vcp-worker credentials. The Helm chart does not create this Secret —
# apply this (or equivalent kubectl create secret generic ...) in the release namespace before helm install/upgrade.
#
#   kubectl apply -f secret.yaml -n <namespace>
#
# Replace placeholder values; do not commit real credentials.
apiVersion: v1
kind: Secret
metadata:
  name: vcp-db-secret
  # Set to your Helm release namespace (e.g. vcp)
  namespace: vcp
type: Opaque
stringData:
  DB_PASSWORD: "REPLACE_ME"
  METRICS_DB_PASSWORD: "REPLACE_ME"
  DB_ADMIN_PASSWORD: "REPLACE_ME"
  DB_USER: "postgres"
  METRICS_DB_USER: "metrics"
  DB_ADMIN_USER: "postgres"
  DB_USERNAME: "postgres"
  METRICS_DB_USERNAME: "metrics"
  DB_ADMIN_USERNAME: "postgres"
  VSA_NODE_PASSWORD: "REPLACE_ME"
  VSA_NODE_USERNAME: "admin"
  ONTAP_CREDENTIAL_ENCRYPT_KEY: "REPLACE_ME"
