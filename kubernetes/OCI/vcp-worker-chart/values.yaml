global:
  primaryImageRegistry: iad.ocir.io
  primaryImageRegistryPath: "idqogasfjw45"
  primaryImageRegistryPasswordAuth: true
  primaryImagePullSecretName: ocir-secret
  secondaryImageRegistry: "iad.ocir.io"
  secondaryImageRegistryPath: "nmobsa"
  secondaryImageRegistryPasswordAuth: false
  useSecondaryImageRegistry: false
  useTags: true
  chartPrimaryImageRegistry: ""
  chartSecondaryImageRegistry: ""
  environment: oci
  # HYPERSCALER env var for worker (utils/env.GetHyperscaler()). Use "oci" for OCI.
  hyperscaler: oci

# Application configuration (single customer worker for OCI/OKE)
app:
  - name: "vcp-customer-worker"
    replicas: 1
    workerAdditionalConfig:
      workerTaskQueue: "customer-workflows"

serviceAccount:
  name: "vcp-worker-ksa"

# Pod affinity configuration
podAffinity:
  enabled: true

# Image configuration (OCIR)
images:
  vcpWorker:
    image: ""  # Use name+tag with registry helpers (supports primary/secondary switch)
    name: vcp-worker
    tag: "23032026"
    digest: ""
    secondary: false
    pullPolicy: IfNotPresent

resources:
  limits:
    cpu: "1"
    memory: 1Gi
  requests:
    cpu: 500m
    memory: 250Mi

# Worker configuration (OCI/OKE)
workerConfig:
  temporalAddress: "temporal-frontend.temporal.svc.cluster.local:7233"
  localRegion: "us-ashburn-1"
  objectStoreProvider: "oci"
  proxyClientTransportSchema: "https"
  vlmWorkflowRetryMaxAttempts: "1"
  vsaOperationTimeout: "45m"
  loggerLevel: "info"
  vlmConfigFilePath: "/common/vsa_config/vlm-config.json"
  vmrsConfigPath: "/config/vmrs_oci.yaml"
  certificateLifetime: "94608000s"
  caName: ""
  enableVsaCertificateRotation: "false"
  enableVsaExpiredCertificatesRotation: "false"
  vsaLifecycleManagerQueuePrefix: "vsa-lifecycle-manager"
  # Encryption key must be a 32-byte (256-bit) string for AES-256.
  vsaVlmEncryptionKey: "" # Should be the same as in the vlm-worker values.yaml.
  vlmCreateVSAClusterDeploymentWorkflowTimeoutMinutes: 30
  vlmCreateVSASVMWorkflowTimeoutMinutes: 10
  vlmDeleteVSAClusterDeploymentWorkflowTimeoutMinutes: 20
  vlmUpdateVSAClusterDeploymentWorkflowTimeoutMinutes: 120
  vlmValidateClusterHealthWorkflowTimeoutMinutes: 15
  vlmClusterPowerOpWorkflowTimeoutMinutes: 30
  # Comma-separated list of error patterns that trigger delete and retry operations
  vlmRetryErrorPatterns: ""
  ontapVersionDetails: "9.19.1X29"
  localCell: "00"
  ociVSASerialAllocationEnabled: true

  ociNodeCapacityMaxTib: 425
  ociThroughputThresholdGbps: 5
  ociVsaUseSecondaryIpsForLifs: true

  # ONTAP Image Version Match Configuration
  skipOntapImageVersionMatch: false

  # Mediator VM Configuration
  vsaMediatorInstanceType: "VM.DenseIO.E5.Flex"
  ociCreator: "vcp"
  ociVsaFlexOcpus: 8
  ociVsaFlexMemoryInGBs: 96
  ociVsaUserBootargs: ""
  ociVmrsEnabled: false
  ociMediatorInstanceType: "VM.Standard3.Flex"
  vsaMediatorImageName: "ocid1.image.oc1.iad.aaaaaaaa7jahxa2up4364shyrd6x3tv3ijmip2umefrvoh754k3lorhmchva"
  vsaImageName: "ocid1.image.oc1.iad.aaaaaaaad3cucfy5q2lek6bljgnaosvaaijusdmxwe7hsewwgvloabwx6jrq"
  secretUri: "ocid1.vaultsecret.oc1.iad.amaaaaaarxzkjlqajgrscsxpkbduu4rcocmwi4wh57okquxkqibzwl6vyjxa"
  ociResourcePrincipalRegion: "us-ashburn-1"
  ociResourcePrincipalVersion: "2.2"
  ociExpertModePassword: ""
  ociExpertModeRbacFileUrl: ""
  ociExpertModeRbacFileChecksum: ""
  ociExpertModeUsername: "ociadmin"
  ociOntapAdminPassword: ""
  ociVaultOcid: ""
  ociMasterKeyOcid: ""
  ociCompartmentOcid: ""
  ociIssuerCaOcid: ""
  vsaDeployedDnsName: ""
  ociVsaDnsZoneOcid: ""
  ociUseTlsSniOverride: true

  metricsPort: "9090"

  enableUniqueSerialNumberGeneration: false
  clusterSerialNumberPrefix: "935"
  startToCloseWorkflowTimeoutLv: "60m"
  startToCloseWorkflowTimeoutUpgrade: "300m"
  startToCloseWorkflowTimeoutUpgradeLv: "360m"
  ociParallelNumberOfNodesForItc: 4
  vsaSignedUrlDurationHours: 12
  ontapTransientErrorRetryMinutes: 20

  workflowGlobalTimeoutMinutes: "60" # Global timeout for workflows in minutes
  createPoolWorkflowTimeoutMinutes: "150" # Create pool workflow run timeout (standard pools) in minutes
  createPoolWorkflowTimeoutMinutesLV: "150" # Create pool workflow run timeout (LV pools) in minutes
  updatePoolWorkflowTimeoutMinutes: "150" # Update pool workflow run timeout (standard pools) in minutes
  updatePoolWorkflowTimeoutMinutesLV: "150" # Update pool workflow run timeout (LV pools) in minutes
  # Default cancellation timeouts
  workflowCancellationTimeout: 5 # Default timeout (in minutes) for cancellation acknowledgment
  workflowForceCancelWaitTimeout: 30 # Default timeout (in seconds) for force termination acknowledgment
  poolWorkflowCancellationAckTimeout: 5 # Timeout (in minutes)
  poolWorkflowForceTerminationAckTimeout: 30 # Timeout (in seconds)

  # Default Workflow Retry configuration
  startToCloseTimeout: "55m"
  # Hyperscaler retry configuration
  hyperscalerHeartbeatTimeout: "300s"
  hyperscalerRetryInitialInterval: "30s"
  hyperscalerLRORetryInitialInterval: "30s"
  hyperscalerRetryMaximumAttempts: "10"
  hyperscalerRetryBackoffCoefficient: "1"
  hyperscalerRetryMaximumInterval: "30s"
  retryInterval: "5s"
  retryMaxAttempts: "3"
  retryMaxInterval: "5m"
  retryBackoffCoefficient: "2.0"
  startToCloseTimeoutForReplicationActivities: 300
  backoffCoefficientForReplicationActivities: 1.5
  startToCloseTimeoutForHyperscaler: "5m"

  # Pool workflow timeout configuration
  poolActivityHeartbeatTimeout: "5m"  # Pool activity heartbeat timeout
  databaseHeartbeatTimeoutSec: "10"   # Database operations heartbeat timeout in seconds
  setupNwHeartbeatTimeoutSec: "300"   # Setup network heartbeat timeout in seconds

  # NLF License configuration
  nlfLicenseSecretPath: "" # Format to be followed: <secret-name>/versions/<secret-version>

  database:
    type: "postgres"
    # OCI Database for PostgreSQL requires TLS. Use "require" (or "verify-full" with CA cert).
    sslMode: "require"
    timezone: "UTC"
    runMigrationOnStart: "true"
    host: primary.djzfvolyanswjizl6jz5bkqucnfeha.postgresql.us-ashburn-1.oci.oraclecloud.com  # Primary endpoint FQDN from OCI DB connection details
    port: 5432
    user: postgres
    adminUser: postgres
    dbname: vcp
    # Kubernetes Secret (create before install; Helm does not manage it). Required keys:
    # DB_USER, DB_PASSWORD, DB_ADMIN_USER, DB_ADMIN_PASSWORD
    existingSecretName: "vcp-db-secret"
    maxConns: 20
    maxIdleConns: 20
    maxConnLifetime: "1h"

# OKE (Oracle Kubernetes Engine) - optional settings for OCI installation
oke:
  # Optional node selector for OKE node pools (e.g. worker shape or pool label)
  nodeSelector: {}
  # Set to true if OKE cluster does not expose zone/hostname labels and topology spread causes scheduling issues
  disableTopologySpread: false

# Image pull secrets for OCIR. Create with:
# kubectl create secret docker-registry ocir-secret -n vcp --docker-server=<region>.ocir.io --docker-username='<tenancy>/<user>' --docker-password='<auth-token>'
imagePullSecrets:
  - name: ocir-secret

service:
  type: ClusterIP

