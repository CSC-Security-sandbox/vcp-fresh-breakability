{{- if and (not .Values.secretManagerEnabled) (not .Values.workerConfig.useExistingSecret) (not .Values.oke.workloadIdentityEnabled) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "vlm-worker.secretName" . }}
  namespace: {{ .Release.Namespace }}
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
type: Opaque
stringData:
  ONTAP_CREDENTIAL_ENCRYPT_KEY: {{ .Values.workerConfig.vsaVlmEncryptionKey | quote }}
{{- end }}
---
{{- if and (not .Values.secretManagerEnabled) .Values.workerConfig.ociAuth.createSecret (not .Values.oke.workloadIdentityEnabled) }}
# OCI API credentials secret (do not commit privateKey; use --set-file or external secrets)
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "vlm-worker.ociAuthSecretName" . }}
  namespace: {{ .Release.Namespace }}
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
type: Opaque
stringData:
  OCI_TENANCY: {{ .Values.workerConfig.ociAuth.tenancy | quote }}
  OCI_USER: {{ .Values.workerConfig.ociAuth.user | quote }}
  OCI_FINGERPRINT: {{ .Values.workerConfig.ociAuth.fingerprint | quote }}
  OCI_PRIVATE_KEY: {{ .Values.workerConfig.ociAuth.privateKey | quote }}
  OCI_PASSPHRASE: {{ .Values.workerConfig.ociAuth.passphrase | default "" | quote }}
{{- end }}
