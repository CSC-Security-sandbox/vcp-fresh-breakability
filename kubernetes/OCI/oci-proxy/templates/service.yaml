apiVersion: v1
kind: Service
metadata:
  name: oci-proxy-service
  annotations:
    {{- include "oci_proxy.kubernetes.annotations" . | nindent 4 }}
    {{- include "oci_proxy.helmchart.annotations" . | nindent 4 }}
  labels:
    app: {{ .Chart.Name }}
    {{- include "oci_proxy.kubernetes.labels" . | nindent 4 }}
    {{- include "oci_proxy.helmchart.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: 80
      targetPort: {{ .Values.service.appPort }}
      name: http
    - name: metrics
      port: 8080
      targetPort: 8080
  selector:
    app: {{ .Chart.Name }}
