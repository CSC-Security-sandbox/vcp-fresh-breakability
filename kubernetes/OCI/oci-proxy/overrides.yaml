# OCI environment overrides: tenancy, compartment, region, OCIR, shared DB.
# Merge with defaults:
#   helm upgrade --install oci-proxy . -n <ns> -f values.yaml -f overrides.yaml


# OCI region identifier (must match OCIR hostname prefix and DB host region).
localRegion: "REPLACE_WITH_REGION"

global:
  primaryImageRegistry: iad.ocir.io
  primaryImageRegistryPath: "REPLACE_WITH_TENANCY_NAMESPACE"


# Shared OCI PostgreSQL (primary connection string host from OCI console).
database:
  host: REPLACE_WITH_POSTGRES_PRIMARY_FQDN

images:
  ociProxy:
    name: oci-proxy
    tag: "REPLACE_WITH_TAG"
    digest: ""
