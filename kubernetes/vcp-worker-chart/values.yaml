# Harvest port range configuration
global:
  primaryImageRegistry: ghcr.io
  primaryImageRegistryPath: vcp-vsa-control-plane
  primaryImageRegistryPasswordAuth: true
  primaryImagePullSecretName: ghcr.io
  secondaryImageRegistry: "europe-north1-docker.pkg.dev/gcnv-artifact-registry-nonprod"
  secondaryImageRegistryPath: "vcp-container-images-us"
  secondaryImageRegistryPasswordAuth: false
  useTags: false
  chartPrimaryImageRegistry: ""
  chartSecondaryImageRegistry: ""
  environment: gcp
  # Cloud SQL IAM Authentication via Workload Identity
  # When enabled: Uses IAM authentication with Cloud SQL Proxy sidecar
  # When disabled: Uses traditional username/password authentication
  cloudSqlIamAuthEnabled: false
  # Central Cloud SQL Proxy image used across charts when IAM DB auth is enabled
  cloudSqlProxy:
    image: "gcr.io/cloud-sql-connectors/cloud-sql-proxy:2.15.1"

cloudSql:
  # Format: PROJECT_ID:REGION:INSTANCE_NAME
  # Example: "netapp-au-se1-autopush-sde-tst:australia-southeast1:netapp-au-se1-autopush-sde-tst-db-postgres"
  instanceConnectionName: "netapp-au-se1-autopush-sde-tst:australia-southeast1:netapp-au-se1-autopush-sde-tst-db-postgres"

# This will be overridden automatically in deployment repo with build versions.
versionsSupported:
  - name: v0.0.1
    sha: "abc"

# Application configuration
app:
  - name: "vcp-customer-worker"
    replicas: 1
    workerAdditionalConfig:
      workerTaskQueue: "customer-workflows"
  - name: "vcp-background-worker"
    replicas: 1
    workerAdditionalConfig:
      workerTaskQueue: "background-workflows"

serviceAccount:
  name: "vcp-worker-ksa"

# Pod affinity configuration
podAffinity:
  enabled: true

# Image configuration
images:
  vcpWorker:
    name: vcp-worker
    tag: 0.0.0
    digest: ""
    secondary: true
    pullPolicy: IfNotPresent

