apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: harvest-farm-lease-create
  namespace: {{ .Release.Namespace }}
rules:
  - apiGroups: [ "coordination.k8s.io" ]
    resources: [ "leases" ]
    verbs: [ "get", "list", "create", "update", "patch", "delete" ]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: harvest-farm-lease-create-binding
  namespace: {{ .Release.Namespace }}
subjects:
  - kind: ServiceAccount
    name: {{ .Values.serviceAccount.name }}
    namespace: {{ .Release.Namespace }}
roleRef:
  kind: Role
  name: harvest-farm-lease-create
  apiGroup: rbac.authorization.k8s.io
---
# KMS rotation lock uses leases in vcp namespace when VCP_KUBERNETES_NAMESPACE is unset
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: vcp-kms-lease-role
  namespace:  {{ .Release.Namespace }}
rules:
  - apiGroups: [ "coordination.k8s.io" ]
    resources: [ "leases" ]
    verbs: [ "get", "list", "watch", "create", "update", "patch", "delete" ]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: vcp-kms-lease-binding
  namespace:  {{ .Release.Namespace }}
subjects:
  - kind: ServiceAccount
    name: {{ .Values.serviceAccount.name }}
    namespace: {{ .Release.Namespace }}
roleRef:
  kind: Role
  name: vcp-kms-lease-role
  apiGroup: rbac.authorization.k8s.io
---
# Poller rebalance verify: read pod status for metrics on harvest-farm lease holder.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: vcp-harvest-poller-verify-pod-reader
  namespace: {{ .Release.Namespace }}
rules:
  - apiGroups: [ "" ]
    resources: [ "pods" ]
    verbs: [ "get" ]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: vcp-harvest-poller-verify-pod-reader-binding
  namespace: {{ .Release.Namespace }}
subjects:
  - kind: ServiceAccount
    name: {{ .Values.serviceAccount.name }}
    namespace: {{ .Release.Namespace }}
roleRef:
  kind: Role
  name: vcp-harvest-poller-verify-pod-reader
  apiGroup: rbac.authorization.k8s.io
{{- if .Values.configMapCleanup.rbac.enabled }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: configmap-cleanup-role
  namespace: {{ .Release.Namespace }}
rules:
- apiGroups: [""]
  resources: ["configmaps"]
  verbs: ["get", "list", "delete"]
- apiGroups: [""]
  resources: ["pods"]
  verbs: ["get", "list"]
- apiGroups: ["apps"]
  resources: ["deployments", "statefulsets", "daemonsets"]
  verbs: ["get", "list"]
- apiGroups: ["batch"]
  resources: ["jobs", "cronjobs"]
  verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: configmap-cleanup-rolebinding
  namespace: {{ .Release.Namespace }}
subjects:
- kind: ServiceAccount
  name: {{ .Values.serviceAccount.name }}
  namespace: {{ .Release.Namespace }}
roleRef:
  kind: Role
  name: configmap-cleanup-role
  apiGroup: rbac.authorization.k8s.io
{{- end }}