{{- range .Values.app }}
  {{- $name := .name }}
  {{- $workerAdditionalConfig := .workerAdditionalConfig }}
  {{- range $ver := $.Values.versionsSupported }}
    {{ $versionName := $.Chart.Version -}}
    {{ if not $.Values.workerConfig.nkdevTest -}}
      {{ $versionName = $ver.name -}}
    {{ end -}}
    {{ $version := ($versionName | lower | replace "." "-") -}}

apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "vcp-worker.configMapName" (printf "%s-%s" $name $version) }}
  namespace: {{ $.Release.Namespace }}
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
  labels:
    app: {{ $name }}-{{ $version }}
data:
  {{- range $key, $value := $workerAdditionalConfig }}
  {{ include "toUpperSnakeCase" $key }}: {{ $value | quote }}
  {{- end }}
  TEMPORAL_ADDRESS: {{$.Values.workerConfig.temporalAddress | quote }}
  GCP_PROXY_PORT: {{$.Values.workerConfig.gcpProxyPort | quote }}
