{{- range .Values.app }}
apiVersion: v1
kind: Service
metadata:
  name: {{ .name }}-service
  namespace: vcp
  labels:
    app: {{ .name }}
spec:
  type: {{ $.Values.service.type }}
  ports:
    - name: metrics
      port: {{ $.Values.workerConfig.metricsPort }}
      targetPort: {{ $.Values.workerConfig.metricsPort }}
  selector:
    {{- /* Get last version object and use its name field */}}
    {{- $lastVer := (last $.Values.versionsSupported) }}
    {{- $lastVersionName := $lastVer.name }}
    app: {{ .name }}-{{ $lastVersionName | lower | replace "." "-" }}
---
{{- end }}