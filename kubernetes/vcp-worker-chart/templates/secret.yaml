{{- range .Values.app }}
{{- if not $.Values.secretManagerEnabled }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "vcp-worker.secretName" .name }}
  namespace: {{ $.Release.Namespace }}
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
type: Opaque
stringData:
  {{- if not $.Values.global.cloudSqlIamAuthEnabled }}
  DB_PASSWORD: {{ $.Values.workerConfig.database.password | quote }}
  METRICS_DB_PASSWORD: {{ $.Values.workerConfig.database.metricsDbPassword | quote }}
  DB_ADMIN_PASSWORD: {{ $.Values.workerConfig.database.adminPassword | quote }}
  # NOTE: Application reads DB_USER / METRICS_DB_USER (see common/config.go).
  # We also keep DB_USERNAME / METRICS_DB_USERNAME for backward compatibility.
  DB_USER: {{ $.Values.workerConfig.database.user | quote }}
  METRICS_DB_USER: {{ $.Values.workerConfig.database.metricsDbUser | quote }}
  DB_ADMIN_USER: {{ $.Values.workerConfig.database.adminUser | quote }}
  DB_USERNAME: {{ $.Values.workerConfig.database.user | quote }}
  METRICS_DB_USERNAME: {{ $.Values.workerConfig.database.metricsDbUser | quote }}
  DB_ADMIN_USERNAME: {{ $.Values.workerConfig.database.adminUser | quote }}
  {{- end }}
  VSA_NODE_PASSWORD: {{ $.Values.workerConfig.vsaNodePassword | quote }}
  VSA_NODE_USERNAME: {{ $.Values.workerConfig.vsaNodeUsername | quote }}
  ONTAP_CREDENTIAL_ENCRYPT_KEY: {{ $.Values.workerConfig.vsaVlmEncryptionKey | quote }}
{{- else }}
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: {{ include "vcp-worker.secretName" .name }}
  namespace: {{ $.Release.Namespace }}
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: main-cluster-secret-store
    kind: ClusterSecretStore
  target:
    name: {{ include "vcp-worker.secretName" .name }}
    creationPolicy: Owner
    template:
      type: Opaque
      {{- if $.Values.global.cloudSqlIamAuthEnabled }}
      # Merge fetched VSA/encryption credentials with template DB credentials (default Replace would drop fetched keys)
      mergePolicy: Merge
      # IAM mode: All DB credentials hardcoded in template (no external fetch needed)
      data:
        {{- $projectId := $.Values.workerConfig.smcProjectId }}
        {{- if $.Values.global.coreConfig }}
        {{- if $.Values.global.coreConfig.gcp }}
        {{- if $.Values.global.coreConfig.gcp.projectId }}
        {{- $projectId = $.Values.global.coreConfig.gcp.projectId }}
        {{- end }}
        {{- end }}
        {{- end }}
        DB_USER: {{ printf "%s@%s.iam" $.Values.serviceAccount.name $projectId | quote }}
        DB_USERNAME: {{ printf "%s@%s.iam" $.Values.serviceAccount.name $projectId | quote }}
        METRICS_DB_USER: {{ printf "%s@%s.iam" $.Values.serviceAccount.name $projectId | quote }}
        METRICS_DB_USERNAME: {{ printf "%s@%s.iam" $.Values.serviceAccount.name $projectId | quote }}
        DB_ADMIN_USER: {{ printf "%s@%s.iam" $.Values.serviceAccount.name $projectId | quote }}
        DB_ADMIN_USERNAME: {{ printf "%s@%s.iam" $.Values.serviceAccount.name $projectId | quote }}
      {{- end }}
  # Always fetch VSA Node and encryption credentials from GCP (both modes)
  # In password mode, also fetch DB credentials
  data:
    {{- if not $.Values.global.cloudSqlIamAuthEnabled }}
    # Password mode: Fetch DB credentials from GCP Secret Manager
    - secretKey: DB_PASSWORD
      remoteRef:
        key: {{ $.Values.workerConfig.database.smDbPassword | quote }}
    - secretKey: METRICS_DB_PASSWORD
      remoteRef:
        key: {{ $.Values.workerConfig.database.smMetricsDbPassword | quote }}
    - secretKey: DB_ADMIN_PASSWORD
      remoteRef:
        key: {{ $.Values.workerConfig.database.smDbAdminPassword | quote }}
    - secretKey: DB_USER
      remoteRef:
        key: {{ $.Values.workerConfig.database.smDbUser | quote }}
    - secretKey: METRICS_DB_USER
      remoteRef:
        key: {{ $.Values.workerConfig.database.smMetricsDbUser | quote }}
    - secretKey: DB_ADMIN_USER
      remoteRef:
        key: {{ $.Values.workerConfig.database.smDbAdminUser | quote }}
    - secretKey: DB_USERNAME
      remoteRef:
        key: {{ $.Values.workerConfig.database.smDbUser | quote }}
    - secretKey: METRICS_DB_USERNAME
      remoteRef:
        key: {{ $.Values.workerConfig.database.smMetricsDbUser | quote }}
    - secretKey: DB_ADMIN_USERNAME
      remoteRef:
        key: {{ $.Values.workerConfig.database.smDbAdminUser | quote }}
    {{- end }}
    # VSA Node and encryption credentials always fetched from GCP (both modes)
    - secretKey: VSA_NODE_PASSWORD
      remoteRef:
        key: {{ $.Values.workerConfig.smVsaNodePassword | quote }}
    - secretKey: VSA_NODE_USERNAME
      remoteRef:
        key: {{ $.Values.workerConfig.smVsaNodeUsername | quote }}
    - secretKey: ONTAP_CREDENTIAL_ENCRYPT_KEY
      remoteRef:
        key: {{ $.Values.workerConfig.smVsaVlmEncryptionKey | quote }}
{{- end }}
---
{{- end }}
