{{- if .Values.serviceAccount.create -}}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "temporal.serviceAccountName" $ }}
  labels:
    {{- include "temporal.resourceLabels" (list $ "" "") | nindent 4 }}
  annotations:
    helm.sh/hook: pre-install, pre-upgrade
    helm.sh/hook-weight: "-10"
    {{- if include "temporal.cloudSqlIamAuthEnabled" (list $) | toString | eq "true" }}
    {{- $projectId := "" }}
    {{- if hasKey $.Values "global" -}}
    {{- if hasKey $.Values.global "gcpProjectId" -}}
    {{- $projectId = $.Values.global.gcpProjectId -}}
    {{- end -}}
    {{- end -}}
    {{- if eq $projectId "" -}}
    {{- if hasKey $.Values "gcpProjectId" -}}
    {{- $projectId = $.Values.gcpProjectId -}}
    {{- end -}}
    {{- end -}}
    {{- if ne $projectId "" }}
    iam.gke.io/gcp-service-account: temporal-ksa@{{ $projectId }}.iam.gserviceaccount.com
    {{- end }}
    {{- end }}
    {{- with .Values.serviceAccount.extraAnnotations }}
      {{- toYaml . | nindent 4 }}
    {{- end }}
{{- end -}}
