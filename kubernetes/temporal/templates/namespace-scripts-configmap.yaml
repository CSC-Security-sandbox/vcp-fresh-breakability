{{- if $.Values.server.config.namespaces.create }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: "{{ include "temporal.fullname" $ }}-namespace-scripts"
  labels:
    {{- include "temporal.resourceLabels" (list $ "database" "") | nindent 4 }}
data:
  setup-namespaces.sh: |
    #!/bin/sh
    set -e

    POLL_INTERVAL=10
    MAX_WAIT=900
    START_TIME=$(date +%s)

    log() { echo "[namespace-setup] $*"; }

    check_timeout() {
      if [ $(( $(date +%s) - START_TIME )) -ge $MAX_WAIT ]; then
        log "ERROR: Timed out after ${MAX_WAIT}s — $1"
        exit 1
      fi
    }

    # --- Istio helpers ---

    wait_for_istio() {
      log "Waiting for istio-proxy..."
      until wget -q -O /dev/null http://localhost:15021/healthz/ready 2>/dev/null; do
        sleep 2
      done
      log "istio-proxy is ready."
    }

    stop_istio() {
      log "Stopping istio-proxy..."
      wget -q -O /dev/null --post-data='' http://localhost:15000/quitquitquit || true
    }

    # --- Frontend readiness ---

    wait_for_frontend() {
      log "Waiting for Temporal frontend..."
      until temporal operator cluster health > /dev/null 2>&1; do
        check_timeout "Frontend not reachable."
        log "  Frontend not ready. Retrying in ${POLL_INTERVAL}s..."
        sleep "$POLL_INTERVAL"
      done
      log "Frontend is reachable."
    }

    # --- Archival helpers ---

    archival_state() {
      temporal operator namespace describe -n "$1" 2>&1 \
        | awk -v key="$2" '
            BEGIN {
              key_l = tolower(key)
            }
            {
              line_l = tolower($0)
              if (index(line_l, key_l) > 0) {
                print tolower($NF)
              }
            }
          '
    }

    # Runs update command, then verifies archival state(s) match what was
    # requested. Accepts one or two field/expected pairs before a "--" separator.
    # Usage: verify_archival <ns> <field> <expected> [<field2> <expected2>] -- <cmd...>
    verify_archival() {
      ns="$1"; field1="$2"; expected1="$3"; shift 3
      field2=""; expected2=""
      if [ "$1" != "--" ]; then
        field2="$1"; expected2="$2"; shift 2
      fi
      shift
      while true; do
        if "$@"; then
          sleep 2
          actual1=$(archival_state "$ns" "$field1")
          actual2=""
          [ -n "$field2" ] && actual2=$(archival_state "$ns" "$field2")
          if [ "$actual1" = "$expected1" ] && { [ -z "$field2" ] || [ "$actual2" = "$expected2" ]; }; then
            log "  Verified: $field1=$expected1"
            [ -n "$field2" ] && log "  Verified: $field2=$expected2"
            return 0
          fi
          [ "$actual1" != "$expected1" ] && log "  $field1='$actual1' (expected '$expected1'). Server config may not be loaded yet. Retrying in ${POLL_INTERVAL}s..."
          [ -n "$field2" ] && [ "$actual2" != "$expected2" ] && log "  $field2='$actual2' (expected '$expected2'). Retrying in ${POLL_INTERVAL}s..."
        else
          log "  Update command failed (server may be restarting). Retrying in ${POLL_INTERVAL}s..."
        fi
        check_timeout "$field1 on $ns is not '$expected1'. Cluster-level archival may not be enabled."
        sleep "$POLL_INTERVAL"
      done
    }

    # ==============================
    #  Main
    # ==============================

    {{- if $.Values.schema.istio.enabled }}
    wait_for_istio
    {{- end }}

    wait_for_frontend

    {{- range $namespace := $.Values.server.config.namespaces.namespace }}

    # ---------- {{ $namespace.name }} ----------

    log "=== Namespace: {{ $namespace.name }} ==="

    # Step 1: Create namespace if it does not exist
    if ! temporal operator namespace describe -n {{ $namespace.name }} > /dev/null 2>&1; then
      log "Creating namespace {{ $namespace.name }}..."
      temporal operator namespace create -n {{ $namespace.name }}{{- if hasKey $namespace "retention" }} --retention {{ $namespace.retention }}{{- end }}

      sleep 5
    fi

    # Step 2: Build the update command
    set -- temporal operator namespace update -n {{ $namespace.name }}

    {{- if hasKey $namespace "retention" }}
    set -- "$@" --retention {{ $namespace.retention }}
    {{- end }}

    {{- if $namespace.archival }}

    # Step 3: History archival
    {{- with $namespace.archival.history }}
    {{- if .state }}
    set -- "$@" --history-archival-state {{ .state }}
    {{- end }}
    {{- if .URI }}
    if [ "$(archival_state {{ $namespace.name }} HistoryArchivalState)" != "enabled" ]; then
      set -- "$@" --history-uri "{{ .URI }}"
    else
      log "  WARNING: history URI skipped (already enabled; URIs are immutable)"
    fi
    {{- end }}
    {{- end }}

    # Step 4: Visibility archival
    {{- with $namespace.archival.visibility }}
    {{- if .state }}
    set -- "$@" --visibility-archival-state {{ .state }}
    {{- end }}
    {{- if .URI }}
    if [ "$(archival_state {{ $namespace.name }} VisibilityArchivalState)" != "enabled" ]; then
      set -- "$@" --visibility-uri "{{ .URI }}"
    else
      log "  WARNING: visibility URI skipped (already enabled; URIs are immutable)"
    fi
    {{- end }}
    {{- end }}

    {{- end }}

    # Step 5: Run the update (with archival verification if applicable)
    log "Updating: $*"
    {{- $hasHistory := and $namespace.archival $namespace.archival.history $namespace.archival.history.state -}}
    {{- $hasVisibility := and $namespace.archival $namespace.archival.visibility $namespace.archival.visibility.state -}}
    {{- if or $hasHistory $hasVisibility }}
    verify_archival {{ $namespace.name }}
    {{- if $hasHistory }} HistoryArchivalState {{ $namespace.archival.history.state }}{{ end }}
    {{- if $hasVisibility }} VisibilityArchivalState {{ $namespace.archival.visibility.state }}{{ end }} -- "$@"
    {{- else }}
    "$@"
    {{- end }}

    log "{{ $namespace.name }} done."
    {{- end }}
    {{- if $.Values.schema.istio.enabled }}
    stop_istio
    {{- end }}

    log "Namespace setup completed."
{{- end }}
