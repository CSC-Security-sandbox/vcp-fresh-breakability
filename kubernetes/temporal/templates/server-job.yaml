{{- if or $.Values.schema.createDatabase.enabled $.Values.schema.setup.enabled $.Values.schema.update.enabled }}
{{- range $store := (list "default" "visibility") }}
---
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "temporal.componentname" (list $ (printf "schema-%s-%d" $store $.Release.Revision | replace "." "-")) }}
  labels:
    {{- include "temporal.resourceLabels" (list $ "database" "") | nindent 4 }}
spec:
  backoffLimit: {{ $.Values.schema.setup.backoffLimit }}
  ttlSecondsAfterFinished: 86400
  template:
    metadata:
      name: {{ include "temporal.componentname" (list $ (printf "schema-%s-%d" $store $.Release.Revision | replace "." "-")) }}
      labels:
        {{- include "temporal.resourceLabels" (list $ "database" "") | nindent 8 }}
        {{- with $.Values.schema.podLabels }}
          {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- with $.Values.schema.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      {{ include "temporal.serviceAccount" $ }}
      restartPolicy: OnFailure
      containers:
        {{- include "temporal.databaseProxyContainer" $ | nindent 8 }}
        - name: temporal-setup-{{ $store }}
          image: "{{ $.Values.admintools.image.repository }}:{{ $.Values.admintools.image.tag }}"
          imagePullPolicy: {{ $.Values.admintools.image.pullPolicy }}
          command:
            - /bin/sh
            - -c
            - |
              set -e
              echo "Starting Temporal {{ $store }} store setup..."

              {{- if $.Values.schema.istio.enabled }}
              # Wait for istio-proxy to be ready
              until curl -fsI http://localhost:15021/healthz/ready; do
                echo "Waiting for istio-proxy to be ready..."
                sleep 2
              done
              echo "istio-proxy is ready!"
              {{- end }}

              {{- if include "temporal.cloudSqlIamAuthEnabled" (list $) | toString | eq "true" }}
              # Wait for cloud-sql-proxy to be ready (accepting connections on 5432)
              echo "Waiting for cloud-sql-proxy to be ready..."
              until nc -z localhost 5432 2>/dev/null; do
                echo "Waiting for cloud-sql-proxy..."
                sleep 2
              done
              echo "cloud-sql-proxy is ready!"
              {{- end }}

              {{- if $.Values.schema.createDatabase.enabled }}
              # Create database for {{ $store }} store
              echo "Creating {{ $store }} store database..."
              temporal-sql-tool create-database
              {{- end }}

              {{- if $.Values.schema.setup.enabled }}
              # Setup schema for {{ $store }} store
              echo "Setting up {{ $store }} store schema..."
              temporal-sql-tool setup-schema -v 0.0
              {{- end }}

              {{- if $.Values.schema.update.enabled }}
              # Update schema for {{ $store }} store
              {{- $schema := include "temporal.persistence.schema" $store }}
              {{- $plugin := include "temporal.persistence.sql.driver" (list $ $store) }}
              {{- if or (eq $plugin "postgres12") (eq $plugin "postgres12_pgx") }}
              echo "Updating {{ $store }} store schema..."
              temporal-sql-tool update-schema --schema-dir /etc/temporal/schema/postgresql/v12/{{ $schema }}/versioned
              {{- end }}
              {{- end }}

              {{- if $.Values.schema.istio.enabled }}
              # Stop istio-proxy container
              echo "Stopping istio-proxy for {{ $store }} store..."
              curl -X POST http://localhost:15000/quitquitquit
              {{- end }}

              {{- if include "temporal.cloudSqlIamAuthEnabled" (list $) | toString | eq "true" }}
              # Stop cloud-sql-proxy container
              echo "Stopping cloud-sql-proxy for {{ $store }} store..."
              curl -X POST http://localhost:9091/quitquitquit || true
              {{- end }}

              echo "{{ $store }} store setup completed successfully!"
          env:
            {{- include "temporal.admintools-env" (list $ $store) | nindent 12 }}
            {{- with $.Values.admintools.additionalEnv }}
              {{- toYaml . | nindent 12 }}
            {{- end }}
            {{- with $.Values.admintools.additionalVolumeMounts }}
          volumeMounts:
              {{- toYaml . | nindent 12 }}
            {{- end }}
            {{- with $.Values.schema.resources }}
          resources:
              {{- toYaml . | nindent 12 }}
            {{- end }}
            {{- with $.Values.schema.containerSecurityContext }}
          securityContext:
              {{- toYaml . | nindent 12 }}
            {{- end }}
      {{- with $.Values.schema.securityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with $.Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- $baseNodeSelector := $.Values.admintools.nodeSelector }}
      {{- if include "temporal.cloudSqlIamAuthEnabled" (list $) | toString | eq "true" }}
      {{- $iamNodeSelector := dict "iam.gke.io/gke-metadata-server-enabled" "true" }}
      {{- $mergedNodeSelector := merge $iamNodeSelector $baseNodeSelector }}
      nodeSelector:
        {{- toYaml $mergedNodeSelector | nindent 8 }}
      {{- else }}
      {{- with $baseNodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- end }}
      {{- with $.Values.admintools.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with $.Values.admintools.additionalVolumes }}
      volumes:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
{{- if $.Values.server.config.namespaces.create }}
---
# ------------------------------------------------------------------
#  Namespace setup Job
#  Runs setup-namespaces.sh (from ConfigMap) on every helm install/upgrade.
#  Failures are retried by K8s (restartPolicy: OnFailure).
# ------------------------------------------------------------------
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "temporal.componentname" (list $ (printf "namespace-%d" .Release.Revision | replace "." "-")) }}
  labels:
    {{- include "temporal.resourceLabels" (list $ "database" "") | nindent 4 }}
spec:
  backoffLimit: {{ $.Values.schema.setup.backoffLimit }}
  ttlSecondsAfterFinished: 86400
  template:
    metadata:
      name: {{ include "temporal.componentname" (list $ (printf "namespace-%d" .Release.Revision | replace "." "-")) }}
      labels:
        {{- include "temporal.resourceLabels" (list $ "database" "") | nindent 8 }}
        {{- with $.Values.schema.podLabels }}
          {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- with $.Values.schema.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      {{ include "temporal.serviceAccount" $ }}
      restartPolicy: OnFailure

      containers:
        - name: temporal-setup-namespaces
          image: "{{ $.Values.admintools.image.repository }}:{{ $.Values.admintools.image.tag }}"
          imagePullPolicy: {{ $.Values.admintools.image.pullPolicy }}
          command: ['/bin/sh', '/scripts/setup-namespaces.sh']

          env:
            - name: TEMPORAL_ADDRESS
              {{- if and (hasKey $.Values.server "internalFrontend") $.Values.server.internalFrontend.enabled }}
              value: {{ include "temporal.fullname" $ }}-internal-frontend.{{ $.Release.Namespace }}.svc:{{ $.Values.server.internalFrontend.service.port }}
              {{- else if $.Values.server.frontend.ingress.enabled }}
              value: "{{ index $.Values.server.frontend.ingress.hosts 0 }}"
              {{- else }}
              value: "{{ include "temporal.fullname" $ }}-frontend.{{ $.Release.Namespace }}.svc:{{ $.Values.server.frontend.service.port }}"
              {{- end }}
            {{- with $.Values.admintools.additionalEnv }}
              {{- toYaml . | nindent 12 }}
            {{- end }}

          volumeMounts:
            - name: namespace-scripts
              mountPath: /scripts
              readOnly: true
            {{- with $.Values.admintools.additionalVolumeMounts }}
              {{- toYaml . | nindent 12 }}
            {{- end }}

          {{- with $.Values.schema.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with $.Values.schema.containerSecurityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}

      {{- with $.Values.schema.securityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with $.Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with $.Values.admintools.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with $.Values.admintools.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}

      volumes:
        - name: namespace-scripts
          configMap:
            name: "{{ include "temporal.fullname" $ }}-namespace-scripts"
            defaultMode: 0555
        {{- with $.Values.admintools.additionalVolumes }}
          {{- toYaml . | nindent 8 }}
        {{- end }}
{{- end }}
{{- end -}}
