nameOverride: ""
fullnameOverride: ""
# Chart debug mode
# (eg. disable helm hook delete policy)
debug: false
imagePullSecrets: {}
# Custom Service account management
serviceAccount:
  # Whether to create service account or not
  create: false
  # Name of the service account.
  # Uses `name` if set.
  # If `create: true` defaults to temporal.fullname, otherwise uses the namespace's default serviceAccount.
  name:
  # extraAnnotations would let users add additional annotations
  extraAnnotations:
additionalAnnotations: {}
additionalLabels: {}

secretManagerEnabled: false
externalSecrets:
  defaultStore:
    temporalDBPassword: ""
  visibilityStore:
    temporalDBPassword: ""

# Cloud SQL IAM Authentication via Workload Identity
# When enabled: Uses IAM authentication with Cloud SQL Proxy sidecar
# When disabled: Uses traditional username/password authentication
# Default: false - override in deployment-specific values files to enable
cloudSqlIamAuthEnabled: false
# GCP project ID for IAM user format (required when cloudSqlIamAuthEnabled is true)
# Can be set in .Values.gcpProjectId or .Values.global.gcpProjectId
gcpProjectId: ""
# Cloud SQL instance connection name (required when cloudSqlIamAuthEnabled is true)
# Format: PROJECT:REGION:INSTANCE
# If not provided, will be auto-generated from gcpProjectId
cloudSqlInstanceConnectionName: ""

cloudSqlProxy:
  # Central Cloud SQL Proxy image used when cloudSqlIamAuthEnabled is true
  image: "gcr.io/cloud-sql-connectors/cloud-sql-proxy:2.21.1"

server:
  enabled: true
  # Runtime tuning for Go TLS/FIPS behavior in temporal server components.
  # Applied to frontend, internal-frontend, history, matching, and worker deployments.
  goDebug: "fips140=on,tlsmlkem=0"
  image:
    repository: ghcr.io/vcp-vsa-control-plane/temporalio-server
    tag: 1.29.1
    pullPolicy: IfNotPresent

  # ---------------------------------------------------------------------------
  # Cluster-level archival configuration (GCS)
  # ---------------------------------------------------------------------------
  # Must be enabled for any namespace-level archival to work.
  # Doc: https://netapp.atlassian.net/wiki/spaces/VSCP/pages/485321035/VCP+Temporal+Archival+Draft
  #
  # To enable archival:
  #   1. Set history.state and visibility.state to "enabled" below (or via env-specific overrides)
  #   2. Set server.namespaceDefaults.archival URIs below (REQUIRED — see note)
  #   3. Uncomment and set per-namespace archival URIs in server.config.namespaces
  #
  # credentialsPath: "" → uses ADC (Workload Identity on GKE).
  #
  # IMPORTANT: Temporal server validation REQUIRES server.namespaceDefaults.archival
  # with non-empty URIs when archival state is "enabled". Without it the server fails
  # at startup with: "config validation error: invalid history archival config"
  archival:
    history:
      state: "disabled"     # set to "enabled" to activate archival writes
      enableRead: true
      provider:
        gstorage:
          # Leave empty ("") to use Application Default Credentials (ADC) via
          # Workload Identity on GKE — no key file needed.
          # For non-GKE environments, mount a SA key JSON file and set the path
          # here, e.g. "/etc/temporal/sa/temporal-archival-sa.json".
          credentialsPath: ""
    visibility:
      state: "disabled"     # set to "enabled" to activate archival writes
      enableRead: true
      provider:
        gstorage:
          # Leave empty ("") to use Application Default Credentials (ADC) via
          # Workload Identity on GKE — no key file needed.
          # For non-GKE environments, mount a SA key JSON file and set the path
          # here, e.g. "/etc/temporal/sa/temporal-archival-sa.json".
          credentialsPath: ""

  # ---------------------------------------------------------------------------
  # Namespace defaults — applied to newly created namespaces
  # ---------------------------------------------------------------------------
  # REQUIRED when server.archival is enabled. Temporal validates that default archival
  # URIs are present at startup. Without this, the server crashes with:
  #   "config validation error: invalid history archival config"
  #
  # When enabling archival, set URIs here to match the GCS bucket for the environment.
  namespaceDefaults:
    archival:
      history:
        state: "disabled"    # set to "enabled" when archival is active
        URI: ""              # e.g. "gs://<env>-temporal-archival/history"
      visibility:
        state: "disabled"    # set to "enabled" when archival is active
        URI: ""              # e.g. "gs://<env>-temporal-archival/visibility"

  # dynamicConfig:
  #   # Delay before the archival processor archives a workflow execution after completion.
  #   # Lower values archive sooner; higher values reduce GCS write frequency.
  #   history.archivalProcessorArchiveDelay:
  #     - value: "24h"

  # Global default settings (can be overridden per service)
  replicaCount: 1
  metrics:
    # Annotate pods directly with Prometheus annotations.
    # Use this if you installed Prometheus from a Helm chart.
    annotations:
      enabled: true
    # Additional tags to be added to Prometheus metrics
    tags: {}
    # Tags to be excluded in Prometheus metrics
    excludeTags: {}
    prefix:
    # Enable Prometheus ServiceMonitor
    # Use this if you installed the Prometheus Operator (https://github.com/coreos/prometheus-operator).
    serviceMonitor:
      enabled: false
      interval: 30s
      # Set additional lables to all the ServiceMonitor resources
      additionalLabels: {}
      #  label1: value1
      #  label2: value2
      # Set Prometheus metric_relabel_configs via ServiceMonitor
      # Use metricRelabelings to adjust metric and label names as needed
      metricRelabelings: []
      # - action: replace
      #   sourceLabels:
      #   - exported_namespace
      #   targetLabel: temporal_namespace
      # - action: replace
      #   regex: service_errors_(.+)
      #   replacement: ${1}
      #   sourceLabels:
      #   - __name__
      #   targetLabel: temporal_error_kind
      # - action: replace
      #   regex: service_errors_.+
      #   replacement: temporal_service_errors
      #   sourceLabels:
      #   - __name__
      #   targetLabel: __name__
    prometheus:
      timerType: histogram
  deploymentLabels: {}
  deploymentAnnotations: {}
  podAnnotations: {}
  podLabels: {}
  secretLabels: {}
  secretAnnotations: {}
  resources: {}
  # We usually recommend not to specify default resources and to leave this as a conscious
  # choice for the user. This also increases chances charts run on environments with little
  # resources, such as Minikube. If you do want to specify resources, uncomment the following
  # lines, adjust them as necessary, and remove the curly braces after 'resources:'.
  # limits:
  #  cpu: 100m
  #  memory: 128Mi
  # requests:
  #  cpu: 100m
  #  memory: 128Mi
  # Container lifecycle hooks (preStop/postStart) for graceful shutdown.
  # Set at server level to apply to all services, or per-service to override.
  # 15s sleep gives Temporal time to transfer shards before SIGTERM.
  lifecycle:
    preStop:
      exec:
        command: ["sh", "-c", "sleep 15"]
  nodeSelector: {}
  tolerations: []
  affinity: {}
  additionalVolumes: []
  additionalVolumeMounts: []
  additionalEnv: []
  # for sidecar containers, add containers here with restartPolicy: Always
  additionalInitContainers: []
  securityContext:
    fsGroup: 1000
    runAsUser: 1000
  config:
    logLevel: "debug,info"
    # IMPORTANT: This value cannot be changed, once it's set.
    numHistoryShards: 512
    persistence:
      defaultStore: default
      additionalStores: {}
      # existingSecret per store (required for in-cluster secrets; for External Secrets set existingSecret to the ESO-created secret name).
      default:
        driver: "sql"
        sql:
          driver: "postgres12"
          host: postgres
          port: 5432
          database: temporal
          user: postgres
          password: ""
          existingSecret: ""
          secretName: ""
          maxConns: 20
          maxIdleConns: 20
          maxConnLifetime: "1h"
      visibility:
        driver: sql
        sql:
          driver: "postgres12"
          host: "postgres"
          port: 5432
          database: temporal_visibility
          user: postgres
          password: ""
          existingSecret: ""
          secretName: ""
          maxConns: 20
          maxIdleConns: 20
          maxConnLifetime: "1h"
    namespaces:
      # Enable this to create namespaces
      create: true
      namespace:
        - name: default
          retention: 30d
          # Per-namespace archival config — applied by the namespace Kubernetes Job via temporal CLI.
          # The Job checks current archival state and only updates when drift is detected.
          #
          # To enable archival for this namespace:
          #   1. Enable cluster-level archival above (server.archival.history/visibility.state: "enabled")
          #   2. Set server.namespaceDefaults.archival URIs above (required by Temporal at startup)
          #   3. Uncomment the archival block below and set the GCS bucket URIs
          #
          # IMPORTANT:
          #   - URIs are IMMUTABLE after the first enable — do not change them once set.
          #   - credentialsPath: "" in server.archival uses ADC (Workload Identity on GKE).
          #     For non-GKE environments, mount a SA key and set credentialsPath accordingly.
          #
          # archival:
          #   history:
          #     state: "enabled"
          #     URI: "gs://<env>-temporal-archival/history"
          #   visibility:
          #     state: "enabled"
          #     URI: "gs://<env>-temporal-archival/visibility"
  frontend:
    replicaCount: 3
    service:
      # Evaluated as template
      annotations: {}
      type: ClusterIP
      port: 7233
      membershipPort: 6933
      httpPort: 7243
    ingress:
      enabled: false
      # className:
      annotations: {}
      # kubernetes.io/ingress.class: traefik
      # ingress.kubernetes.io/ssl-redirect: "false"
      # traefik.frontend.rule.type: PathPrefix
      hosts:
        - "/"
        # - "domain.com/xyz"
        # - "domain.com"
      tls: []
      #  - secretName: chart-example-tls
      #    hosts:
      #      - chart-example.local
    metrics:
      annotations:
        enabled: true
      serviceMonitor: {}
      # enabled: false
      prometheus: {}
      # timerType: histogram
    deploymentLabels: {}
    deploymentAnnotations: {}
    podAnnotations: {}
    podLabels: {}
    resources: {}
    nodeSelector: {}
    tolerations: []
    affinity: {}
    additionalEnv: []
    containerSecurityContext: {}
    topologySpreadConstraints:
      - maxSkew: 1
        minDomains: 3
        topologyKey: topology.kubernetes.io/zone
        whenUnsatisfiable: DoNotSchedule
        labelSelector:
          matchLabels:
            app.kubernetes.io/name: temporal
            app.kubernetes.io/component: frontend
      - maxSkew: 1
        topologyKey: kubernetes.io/hostname
        whenUnsatisfiable: DoNotSchedule
        labelSelector:
          matchLabels:
            app.kubernetes.io/name: temporal
            app.kubernetes.io/component: frontend
    podDisruptionBudget:
      minAvailable: "66%"
  internalFrontend:
    # Enable this to create internal-frontend
    enabled: false
    service:
      # Evaluated as template
      annotations: {}
      type: ClusterIP
      port: 7236
      membershipPort: 6936
      httpPort: 7246
    metrics:
      annotations:
        enabled: true
      serviceMonitor: {}
      # enabled: false
      prometheus: {}
      # timerType: histogram
    deploymentLabels: {}
    deploymentAnnotations: {}
    podAnnotations: {}
    podLabels: {}
    resources: {}
    nodeSelector: {}
    tolerations: []
    affinity: {}
    additionalEnv: []
    containerSecurityContext: {}
    topologySpreadConstraints:
      - maxSkew: 1
        minDomains: 3
        topologyKey: topology.kubernetes.io/zone
        whenUnsatisfiable: DoNotSchedule
        labelSelector:
          matchLabels:
            app.kubernetes.io/name: temporal
            app.kubernetes.io/component: internal-frontend
      - maxSkew: 1
        topologyKey: kubernetes.io/hostname
        whenUnsatisfiable: DoNotSchedule
        labelSelector:
          matchLabels:
            app.kubernetes.io/name: temporal
            app.kubernetes.io/component: internal-frontend
    podDisruptionBudget: {}
  history:
    replicaCount: 3
    service:
      # type: ClusterIP
      port: 7234
      membershipPort: 6934
    metrics:
      annotations:
        enabled: true
      serviceMonitor: {}
      # enabled: false
      prometheus: {}
      # timerType: histogram
    deploymentLabels: {}
    deploymentAnnotations: {}
    podAnnotations: {}
    podLabels: {}
    resources: {}
    nodeSelector: {}
    tolerations: []
    affinity: {}
    additionalEnv: []
    additionalEnvSecretName: ""
    containerSecurityContext: {}
    topologySpreadConstraints:
      - maxSkew: 1
        minDomains: 3
        topologyKey: topology.kubernetes.io/zone
        whenUnsatisfiable: DoNotSchedule
        labelSelector:
          matchLabels:
            app.kubernetes.io/name: temporal
            app.kubernetes.io/component: history
      - maxSkew: 1
        topologyKey: kubernetes.io/hostname
        whenUnsatisfiable: DoNotSchedule
        labelSelector:
          matchLabels:
            app.kubernetes.io/name: temporal
            app.kubernetes.io/component: history
    podDisruptionBudget:
      minAvailable: "66%"
  matching:
    replicaCount: 3
    service:
      # type: ClusterIP
      port: 7235
      membershipPort: 6935
    metrics:
      annotations:
        enabled: false
      serviceMonitor: {}
      # enabled: false
      prometheus: {}
      # timerType: histogram
    deploymentLabels: {}
    deploymentAnnotations: {}
    podAnnotations: {}
    podLabels: {}
    resources: {}
    nodeSelector: {}
    tolerations: []
    affinity: {}
    additionalEnv: []
    containerSecurityContext: {}
    topologySpreadConstraints:
      - maxSkew: 1
        minDomains: 3
        topologyKey: topology.kubernetes.io/zone
        whenUnsatisfiable: DoNotSchedule
        labelSelector:
          matchLabels:
            app.kubernetes.io/name: temporal
            app.kubernetes.io/component: matching
      - maxSkew: 1
        topologyKey: kubernetes.io/hostname
        whenUnsatisfiable: DoNotSchedule
        labelSelector:
          matchLabels:
            app.kubernetes.io/name: temporal
            app.kubernetes.io/component: matching
    podDisruptionBudget:
      minAvailable: "66%"
  worker:
    replicaCount: 3
    service:
      # type: ClusterIP
      port: 7239
      membershipPort: 6939
    metrics:
      annotations:
        enabled: true
      serviceMonitor: {}
      # enabled: false
      prometheus: {}
      # timerType: histogram
    deploymentLabels: {}
    deploymentAnnotations: {}
    podAnnotations: {}
    podLabels: {}
    resources: {}
    nodeSelector: {}
    tolerations: []
    affinity: {}
    additionalEnv: []
    containerSecurityContext: {}
    topologySpreadConstraints:
      - maxSkew: 1
        minDomains: 3
        topologyKey: topology.kubernetes.io/zone
        whenUnsatisfiable: DoNotSchedule
        labelSelector:
          matchLabels:
            app.kubernetes.io/name: temporal
            app.kubernetes.io/component: worker
      - maxSkew: 1
        topologyKey: kubernetes.io/hostname
        whenUnsatisfiable: DoNotSchedule
        labelSelector:
          matchLabels:
            app.kubernetes.io/name: temporal
            app.kubernetes.io/component: worker
    podDisruptionBudget:
      minAvailable: "66%"
