global:
  environment: gcp

enabled: true
replicaCount: 1

images:
  ontapProxy:
    name: ontap-proxy
    tag: 0.0.0
    digest: ""
    secondary: false
    pullPolicy: IfNotPresent

service:
  type: ClusterIP
  appPort: 8080

coreApi:
  host: ""

cache:
  authData:
    cleanupIntervalMinutes: 30
    expirationMinutes: 30

# Pod affinity configuration
podAffinity:
  enabled: true

# Environment configuration
config:
  env: "production"
  port: "8080"

gcp:
  projectId: ""
  region: ""
  caPool:
    name: ""
    deployedProjectId: ""
  secretManager:
    projectId: ""
  auth:
    acceptedServiceAccounts: ""
  serviceUrl: ""
  jwkUrl: "https://www.googleapis.com/service_accounts/v1/metadata/x509/"
  jwkTimeoutSeconds: 10
  certCache:
    expirationMinutes: 120
    sleepRetryIntervalSeconds: 5

resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 250m
    memory: 256Mi
