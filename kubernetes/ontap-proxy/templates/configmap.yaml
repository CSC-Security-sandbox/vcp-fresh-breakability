apiVersion: v1
kind: ConfigMap
metadata:
  name: ontap-proxy-service-env-config
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
  labels:
    app: {{ .Chart.Name }}
data:
  # Logging configuration
  LOGGER_LEVEL: {{ .Values.loggerLevel | quote }}
  
  # Environment Configuration
  PORT: {{ .Values.config.port | quote }}
  ENV: {{ .Values.config.env | default "production" | quote }}
  CORE_API_HOST: {{ .Values.coreApi.host | quote }}
  AUTH_DATA_CACHE_CLEANUP_INTERVAL_MINUTES: {{ .Values.cache.authData.cleanupIntervalMinutes | default "10080" | quote }}
  AUTH_DATA_CACHE_EXPIRATION_MINUTES: {{ .Values.cache.authData.expirationMinutes | default "10080" | quote }}
  CA_POOL_DEPLOYED_PROJECT_ID: {{ .Values.gcp.caPool.deployedProjectId | quote }}
  SECRET_MANAGER_PROJECT_ID: {{ .Values.gcp.secretManager.projectId | quote }}
  LOCAL_REGION: {{ .Values.gcp.region | quote }}
  CA_POOL_NAME: {{ .Values.gcp.caPool.name | quote }}
  OTEL_GOOGLE_PROJECT_ID: {{ .Values.gcp.otelGoogleProjectId | quote }}

  # GCP Authentication Configuration
  GCP_AUTH_ACCEPTED_SERVICE_ACCOUNTS: {{ .Values.gcp.auth.acceptedServiceAccounts | quote }}
  GCP_SERVICE_URL: {{ .Values.gcp.serviceUrl | quote }}
  JWK_KIDS_URL: {{ .Values.gcp.jwkUrl | default "https://www.googleapis.com/service_accounts/v1/metadata/x509/" | quote }}

  # Certificate Cache Configuration
  CERT_CACHE_EXPIRATION_MINUTES: {{ .Values.gcp.certCache.expirationMinutes | default "120" | quote }}
  CERT_CACHE_SLEEP_RETRY_INTERVAL_SECONDS: {{ .Values.gcp.certCache.sleepRetryIntervalSeconds | default "5" | quote }}
  JWK_TIMEOUT_SECONDS: {{ .Values.gcp.jwkTimeoutSeconds | default "10" | quote }}

  # Connection Pool Configuration
  ONTAP_MAX_IDLE_CONNS: {{ .Values.connectionPool.maxIdleConns | default "200" | quote }}
  ONTAP_MAX_IDLE_CONNS_PER_HOST: {{ .Values.connectionPool.maxIdleConnsPerHost | default "50" | quote }}
  ONTAP_MAX_CONNS_PER_HOST: {{ .Values.connectionPool.maxConnsPerHost | default "100" | quote }}
  ONTAP_IDLE_CONN_TIMEOUT_SECONDS: {{ .Values.connectionPool.idleConnTimeoutSeconds | default "120" | quote }}
  ONTAP_TLS_HANDSHAKE_TIMEOUT_SECONDS: {{ .Values.connectionPool.tlsHandshakeTimeoutSeconds | default "15" | quote }}
  ONTAP_RESPONSE_HEADER_TIMEOUT_SECONDS: {{ .Values.connectionPool.responseHeaderTimeoutSeconds | default "30" | quote }}
  ONTAP_EXPECT_CONTINUE_TIMEOUT_SECONDS: {{ .Values.connectionPool.expectContinueTimeoutSeconds | default "1" | quote }}
  ONTAP_CLIENT_TIMEOUT_SECONDS: {{ .Values.connectionPool.clientTimeoutSeconds | default "60" | quote }}
  ONTAP_CLEANUP_INTERVAL_SECONDS: {{ .Values.connectionPool.cleanupIntervalSeconds | default "60" | quote }}
  ONTAP_CLEANUP_THRESHOLD_SECONDS: {{ .Values.connectionPool.cleanupThresholdSeconds | default "300" | quote }}
  ONTAP_MAX_TOTAL_CONNECTIONS: {{ .Values.connectionPool.maxTotalConnections | default "1000" | quote }}

  # IAM Role to RBAC User Mapping Configuration
  IAM_ROLE_TO_USER_MAPPING_CONFIG: {{ .Values.iamRoleToUserMapping.config | quote }} # JSON format: {"ontap": "gcnvadmin", "privOntap": "admin"}
  IAM_ROLE_TO_USER_VALIDATION_ENABLED: {{ .Values.iamRoleToUserMapping.enabled | default false | quote }}
  SNAPLOCK_OPERATION_ENABLED: {{ .Values.snaplockOperationEnabled | default false | quote }}
  PRIVATE_CLI_OPERATION_ENABLED: {{ .Values.privateCliOperationEnabled | default false | quote }}
  SMC_OPERATION_ENABLED: {{ .Values.smcOperationEnabled | default false | quote }}

  # ONTAP error codes (comma-separated) that are client validation failures
  # incorrectly returned as HTTP 500 by ONTAP. The proxy rewrites these to 400.
  ONTAP_CLIENT_ERROR_CODES: {{ .Values.ontapClientErrorCodes | default list | join "," | quote }}

