apiVersion: apps/v1
kind: Deployment
metadata:
  name: ontap-proxy
  labels:
    app: {{ .Chart.Name }}
spec:
  replicas: {{ .Values.replicaCount }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 25%
      maxUnavailable: 25%
  selector:
    matchLabels:
      app: {{ .Chart.Name }}
  template:
    metadata:
      labels:
        app: {{ .Chart.Name }}
    spec:
      {{- if and .Values.podAffinity.enabled (eq .Values.global.environment "gcp") }}
      topologySpreadConstraints:
        - maxSkew: 1
          minDomains: 3
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              {{- include "ontap-proxy.podSelectorLabels" . | nindent 14 }}
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              {{- include "ontap-proxy.podSelectorLabels" . | nindent 14 }}
      {{- end }}
      containers:
        - name: ontap-proxy
          {{- if .Values.images.ontapProxy.secondary }}
          image: "{{- include "containerImage" (list . (dict "name" "ontapProxy" "secondary" true)) | trim -}}"
          {{- else }}
          image: "{{- include "containerImage" (list . (dict "name" "ontapProxy" "secondary" false)) | trim -}}"
          {{- end }}
          imagePullPolicy: {{ .Values.images.ontapProxy.pullPolicy }}
          ports:
            - containerPort: {{ .Values.service.appPort }}
              name: http
          envFrom:
            - configMapRef:
                name: ontap-proxy-config
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
