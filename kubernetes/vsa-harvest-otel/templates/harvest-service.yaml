apiVersion: v1
kind: Service
metadata:
  name: {{$.Values.service.name}}
  namespace: {{ $.Values.global.namespace }}
  labels:
    app: {{ .Chart.Name }}
  annotations:
    {{ include "harvest.kubernetes.annotations" $ | nindent 8 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.service.targetPort }}
      name: http
  selector:
    app: {{ .Chart.Name }}