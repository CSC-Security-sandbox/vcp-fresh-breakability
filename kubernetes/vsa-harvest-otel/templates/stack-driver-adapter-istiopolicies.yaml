apiVersion: security.istio.io/v1beta1
kind: PeerAuthentication
metadata:
  name: custom-metrics-stackdriver-adapter-peerauth
  namespace: {{ $.Values.global.namespace }}
spec:
  selector:
    matchLabels:
      k8s-app: custom-metrics-stackdriver-adapter
  mtls:
    mode: PERMISSIVE
---
apiVersion: security.istio.io/v1beta1
kind: AuthorizationPolicy
metadata:
  name: allow-apiserver-to-custom-metrics
  namespace: {{ $.Values.global.namespace }}
spec:
  selector:
    matchLabels:
      k8s-app: custom-metrics-stackdriver-adapter
  action: ALLOW
  rules:
  - to:
    - operation:
        ports: ["443"]