apiVersion: apps/v1
kind: Deployment
metadata:
  name: custom-metrics-stackdriver-adapter
  namespace: {{ $.Values.global.namespace }}
  labels:
    run: custom-metrics-stackdriver-adapter
    k8s-app: custom-metrics-stackdriver-adapter
spec:
  replicas: 1
  selector:
    matchLabels:
      run: custom-metrics-stackdriver-adapter
      k8s-app: custom-metrics-stackdriver-adapter
  template:
    metadata:
      labels:
        run: custom-metrics-stackdriver-adapter
        k8s-app: custom-metrics-stackdriver-adapter
        kubernetes.io/cluster-service: "true"
    spec:
      serviceAccountName: custom-metrics-stackdriver-adapter
      containers:
      - name: {{ $.Values.containers.metricsAdapter }}
        {{- if .Values.images.metricsAdapter.secondary }} 
        image: "{{- include "containerImage" (list . (dict "name" "metricsAdapter" "primary" true)) | trim -}}"
        {{- else }}
        image: "{{- include "containerImage" (list . (dict "name" "metricsAdapter" "secondary" false)) | trim -}}"
        {{- end }}
        imagePullPolicy: {{ $.Values.imagePullPolicy }}
        command:
        - /adapter
        - --use-new-resource-model=true
        - --fallback-for-container-metrics=true
        resources:
          limits:
            cpu: 250m
            memory: 200Mi
          requests:
            cpu: 250m
            memory: 200Mi
        readinessProbe:
          httpGet:
            path: /healthz
            port: 443
            scheme: HTTPS
          initialDelaySeconds: 40
          periodSeconds: 10
          timeoutSeconds: 5