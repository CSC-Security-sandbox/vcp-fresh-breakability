global:
  primaryImageRegistry: ghcr.io
  primaryImageRegistryPath: vcp-vsa-control-plane
  primaryImageRegistryPasswordAuth: true
  primaryImagePullSecretName: ghcr.io
  secondaryImageRegistry: "us-docker.pkg.dev/gcnv-artifact-registry-nonprod"
  secondaryImageRegistryPath: "vcp-container-images-us"
  secondaryImageRegistryPasswordAuth: false
  useTags: false
  chartPrimaryImageRegistry: ""
  chartSecondaryImageRegistry: ""
  environment: gcp

# Application configuration
app:
  name: "vlm-worker"
  replicas: 1

serviceAccount:
  name: "vlm-worker-ksa"

resources:
  limits:
    cpu: "2"
    memory: 4Gi
  requests:
    cpu: "1"
    memory: 2Gi

# Ontap Version mapping with VLM. To support more ontap versions, similar block needs to be added below.
# We should support previous versions as well, for backward compatibility.
ontapVersionVlmImageMappings:
    # VLM worker to support ONTAP patch version 9.17.1P2
  - ontapVersion: "9.17.1P2"
    vlmImageName: "vlm-worker"
    vlmImageTag: "R9.17.1x_7882520"
    vlmImageDigest: "sha256:0b0a7f4063ba4e848af6f5d43c120c830ab1bcadf4f13e11710a3f15f066bf27"
    secondary: true
    pullPolicy: IfNotPresent
  # VLM worker to support ONTAP patch version 9.17.1P1
  - ontapVersion: "9.17.1P1"
    vlmImageName: "vlm-worker"
    vlmImageTag: "R9.17.1x_7855269"
    vlmImageDigest: "sha256:07d042905f40dfc4c566919ebc539b617d9a1fc38773ab9a26e7749fd85c8405"
    secondary: true
    pullPolicy: IfNotPresent
    # VLM worker to support ONTAP test patch versions like 9.17.1X50 or any other test patch version
  - ontapVersion: "9.17.1"
    vlmImageName: "vlm-worker"
    vlmImageTag: "R9.17.1x_7882520"
    vlmImageDigest: "sha256:0b0a7f4063ba4e848af6f5d43c120c830ab1bcadf4f13e11710a3f15f066bf27"
    secondary: true
    pullPolicy: IfNotPresent
  - ontapVersion: "9.18.1"
    vlmImageName: "vlm-worker"
    vlmImageTag: "R9.18.1x_7984401"
    vlmImageDigest: "sha256:5e3ec2191da5bfa53029acfb483c61365f74373d5dbe811f6cc9c0fe88f8ba0b"
    secondary: true
    pullPolicy: IfNotPresent
  - ontapVersion: "9.18.1P1"
    vlmImageName: "vlm-worker"
    vlmImageTag: "R9.18.1Px_8028694"
    vlmImageDigest: "sha256:b43b5ae0d471ab668458070235d8a021b9e5cc5cbca7f8274bade66f88a49201"
    secondary: true
    pullPolicy: IfNotPresent
  - ontapVersion: "9.18.1P2"
    vlmImageName: "vlm-worker"
    vlmImageTag: "R9.18.1x_8083481"
    vlmImageDigest: "sha256:35ed962d3209593086b29403dc158e36d3a84bc21eecd8c835ee2b6a17e37f02"
    secondary: true
    pullPolicy: IfNotPresent
  - ontapVersion: "9.18.1P3"
    vlmImageName: "vlm-worker"
    vlmImageTag: "R9.18.1x_8141647"
    vlmImageDigest: "sha256:2fdeb9e5828a74e047313178300fc6f8eb11a1a710bf04efa3115eb70daa860c"
    secondary: true
    pullPolicy: IfNotPresent

podAnnotations: {}

initContainers: []

# Worker configuration
workerConfig:
  provider: "gcp"
  temporalHost: "temporal-frontend.temporal.svc.cluster.local"
  temporalPort: "7233"
  taskQueuePrefix: "vsa-lifecycle-manager"
  debug: "false"
  maxConcurrentActivities: "300"
  maxConcurrentWorkflows: "200"
  maxConcurrentWorkflowTaskPollers: "3"
  maxConcurrentActivityTaskPollers: "6"
  # Encryption key must be a 32-byte (256-bit) string for AES-256.
  vsaVlmEncryptionKey: "" # Should be the same as in the vcp-worker values.yaml.
  gceMetadataHost: ""
  # When "true", VLM may reuse singleton GCP API clients; access tokens expire (~30–60m) and
  # Compute calls can fail with ACCESS_TOKEN_EXPIRED until pods restart. Prefer "false" so
  # credentials refresh for long-running workers (see vlm-worker ConfigMap ENABLE_GLOBAL_GCP_CLIENTS).
  enableGlobalGcpClients: "true"
  useVmReservations: "true"

#Enabling or Disabling Secret Manager for Microservice Secrets
secretManagerEnabled: false

# Pod affinity configuration
podAffinity:
  enabled: true

# VLM Worker Reconciler — post-upgrade/post-install hook Job that scales inactive
# vlm-worker Deployments to 0 based on active ONTAP versions in the VCP database.
vlmWorkerReconciler:
  # Master feature flag. Set to true in staging before enabling in production.
  enabled: false
  # When true the Job logs intended scale actions but makes no changes to replicas.
  # Enable first in each environment to validate logic before going live.
  dryRun: true

  image:
    name: "vlm-worker-reconciler"
    tag: "v1.2.0"
    digest: "sha256:857206c79798d7891aca808ba1a4a983ff781d620fa427db85b7e66e849fde4b"
    # secondary: true — image lives in the secondary (GAR) registry, not ghcr.io
    secondary: true
    pullPolicy: IfNotPresent

  database:
    host: ""
    port: "5432"
    name: "vcp"
    user: ""
    password: ""
    sslMode: "disable"
    secretName: "vlm-worker-reconciler-db-secret"

  externalSecrets:
    dbUsername:
      secretName: ""
      property: ""
    dbPassword:
      secretName: ""
      property: ""

  resources:
    limits:
      cpu: "500m"
      memory: "256Mi"
    requests:
      cpu: "100m"
      memory: "128Mi"

  # Maximum time the Job is allowed to run before Kubernetes terminates it.
  activeDeadlineSeconds: 300
  # No retries — a failed reconcile leaves workers at replicas=1 (safe default).
  # The next helm upgrade will trigger a fresh attempt.
  backoffLimit: 0
