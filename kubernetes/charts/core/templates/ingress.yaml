apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: core-service-ingress
  annotations:
    kubernetes.io/ingress.class: "gce-internal"
    {{- include "core.kubernetes.annotations" . | nindent 4 }}
    {{- include "core.helmchart.annotations" . | nindent 4 }}
  labels:
    {{- include "core.kubernetes.labels" . | nindent 4 }}
    {{- include "core.helmchart.labels" . | nindent 4 }}
spec:
  rules:
    - host: coreservice.svc.cluster.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: core-service
                port:
                  number: 80
status:
  loadBalancer: {}