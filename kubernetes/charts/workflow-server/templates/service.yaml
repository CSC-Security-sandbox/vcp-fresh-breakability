apiVersion: v1
kind: Service
metadata:
  name: workflow-server-service
  labels:
    app: {{ .Chart.Name }}
    annotations:
      {{- include "workflow_server.kubernetes.annotations" . | nindent 4 }}
      {{- include "workflow_server.helmchart.annotations" . | nindent 4 }}
    labels:
      {{- include "workflow_server.kubernetes.labels" . | nindent 4 }}
      {{- include "workflow_server.helmchart.labels" . | nindent 4 }}
spec:
  clusterIP: None
  ports:
    - port: 80
      targetPort: {{ .Values.service.appPort }}
      name: workflow-server
    - name: metrics
      port: 8080
      targetPort: 8080
  selector:
    app: {{ .Chart.Name }}