apiVersion: skaffold/v4beta12
kind: Config
build:
  local:
    push: false
    concurrency: 0
  tagPolicy:
    envTemplate:
      template: "{{.IMAGES_TAG}}"
  artifacts:
    - image: base
      context: .
      docker:
        dockerfile: common/Dockerfile
        buildArgs:
          noCache: true
    - image: google-proxy
      context: .
      docker:
        dockerfile: google-proxy/Dockerfile
        buildArgs:
          GHVSA_PAT: "{{.GHVSA_PAT}}"
          noCache: true
      requires:
        - image: core
          alias: BASE
    - image: core
      context: .
      docker:
        dockerfile: core/Dockerfile
        buildArgs:
          noCache: true
          GHVSA_PAT: "{{.GHVSA_PAT}}"
      requires:
        - image: base
          alias: BASE
    - image: vcp-worker
      context: .
      docker:
        dockerfile: worker/Dockerfile
        buildArgs:
          GHVSA_PAT: "{{.GHVSA_PAT}}"
      requires:
        - image: base
          alias: BASE
    - image: telemetry
      context: .
      docker:
        dockerfile: telemetry/Dockerfile
        buildArgs:
          GHVSA_PAT: "{{.GHVSA_PAT}}"
      requires:
        - image: base
          alias: BASE
manifests:
  rawYaml:
    - google-proxy/kubernetes/*
    - core/kubernetes/*
    - postgres/kubernetes/*
    - worker/kubernetes/*
    - telemetry/kubernetes/*
  helm:
    releases:
      - name: local-temporal
        remoteChart: temporal
        version: 0.62.0
        namespace: default
        repo: https://temporalio.github.io/helm-charts
        valuesFiles:
          - ./tools/temporal-deployment/local/values.yaml
portForward:
  - resourceType: service
    resourceName: google-proxy-service
    namespace: vcp
    port: 8080
    localPort: 9000
  - resourceType: service
    resourceName: core-service
    namespace: vcp
    port: 50051
    localPort: 9001
  - resourceType: service
    resourceName: postgres
    namespace: default
    port: 5432
    localPort: 5432
  - resourceType: service
    resourceName: local-temporal-web
    namespace: default
    port: 8080
    localPort: 8080
  - resourceType: service
    resourceName: metrics-processer-service
    namespace: vcp
    port: 8080
    localPort: 9090
profiles:
  - name: gcb
    build:
      googleCloudBuild: {}
