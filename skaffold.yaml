apiVersion: skaffold/v4beta12
kind: Config
build:
  artifacts:
    - image: google-proxy
      context: .
      docker:
        dockerfile: google-proxy/Dockerfile
      requires:
        - image: base
          alias: BASE
    - image: core
      context: .
      docker:
        dockerfile: core/Dockerfile
      requires:
        - image: base
          alias: BASE
#    - image: firestore-emulator
#      context: .
    - image: workflow-server
      context: .
      docker:
        dockerfile: workflow-server/Dockerfile
      requires:
        - image: base
          alias: BASE
    - image: base
      context: ./common
manifests:
  rawYaml:
    - google-proxy/kubernetes/*
    - core/kubernetes/*
    - firestore-emulator/kubernetes/*
    - workflow-server/kubernetes/*
    - spanner-emulator/kubernetes/*
portForward:
  - resourceType: deployment
    resourceName: google-proxy
    port: 8080
    localPort: 9000
  - resourceType: deployment
    resourceName: core
    port: http
    localPort: 9001
  - resourceType: deployment
    resourceName: spanner-emulator
    port: 9020
    localPort: 9002
  - resourceType: deployment
    resourceName: workflow-server
    port: 50051
    localPort: 9003
profiles:
  - name: gcb
    build:
      googleCloudBuild: {}
