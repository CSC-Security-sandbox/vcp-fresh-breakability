apiVersion: skaffold/v4beta12
kind: Config
build:
  artifacts:
    - image: google-proxy
      context: .
      docker:
        dockerfile: google-proxy/Dockerfile
      requires:
        - image: base
          alias: BASE
    - image: core-api
      context: .
      docker:
        dockerfile: core-api/Dockerfile
      requires:
        - image: base
          alias: BASE
#    - image: firestore-emulator
#      context: .
    - image: workflow-server
      context: .
      docker:
        dockerfile: workflow-server/Dockerfile
      requires:
        - image: base
          alias: BASE
    - image: base
      context: ./common
manifests:
  rawYaml:
    - google-proxy/kubernetes/*
    - core-api/kubernetes/*
    - firestore-emulator/kubernetes/*
    - workflow-server/kubernetes/*
portForward:
  - resourceType: deployment
    resourceName: google-proxy
    port: 8080
    localPort: 9000
  - resourceType: deployment
    resourceName: core-api
    port: http
    localPort: 9001
profiles:
  - name: gcb
    build:
      googleCloudBuild: {}
