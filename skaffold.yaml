apiVersion: skaffold/v4beta12
kind: Config
build:
  artifacts:
    - image: google-proxy
      context: .
      docker:
        dockerfile: google-proxy/Dockerfile
      requires:
        - image: core
          alias: BASE
    - image: core
      context: .
      docker:
        dockerfile: core/Dockerfile
      requires:
        - image: base
          alias: BASE
#    - image: firestore-emulator
#      context: .
    - image: workflow-server
      context: .
      docker:
        dockerfile: workflow-server/Dockerfile
      requires:
        - image: base
          alias: BASE
    - image: base
      context: .
      docker:
        dockerfile: common/Dockerfile
manifests:
  rawYaml:
    - google-proxy/kubernetes/*
    - core/kubernetes/*
    - postgres/kubernetes/*
    - workflow-server/kubernetes/*
portForward:
  - resourceType: deployment
    resourceName: google-proxy
    port: 8080
    localPort: 9000
  - resourceType: deployment
    resourceName: core-service
    port: 8080
    localPort: 9001
  - resourceType: deployment
    resourceName: postgres
    port: 5432
    localPort: 5432
  - resourceType: deployment
    resourceName: workflow-server
    port: 50051
    localPort: 9003
profiles:
  - name: gcb
    build:
      googleCloudBuild: {}
