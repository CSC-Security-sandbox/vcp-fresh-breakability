  /cluster/peers:
    #TODO mtomas 2023-05-05 JIRA https://jira.ngage.netapp.com/browse/NFSAAS-54918
    post:
      description: 'Creates a peering relationship and, optionally, the IP interfaces
          it will use. There are two methods used to create a peering relationship:
          * Provide a remote IP address - Used when creating a new cluster peer relationship
          with a specific remote cluster. This requires at least one remote intercluster
          IP address from the remote cluster.
          * Do not provide a remote IP address - Used when the remote IP address is
          not provided and when the storage system is ready to accept peering requests
          from foreign clusters.
          ### Required properties
          * `remote.ip_addresses` - Addresses of the remote peers. The local peer must
          be able to reach and connect to these addresses for the request to succeed
          in creating a peer. Only required when creating a peering relationship by
          providing a remote IP address.
          * Either set `generate_passphrase` to "true" or provide a passphrase in the
          body of the request. Only one of these options is required.
          ### Recommended optional properties
          * `name` - Name of the peering relationship or name of the remote peer.
          * `passphrase` - User generated passphrase for use in authentication.
          * `generate_passphrase` (true/false) - When "true", ONTAP automatically generates
          a passphrase to authenticate cluster peers.
          * `ipspace` - IPspace of the local intercluster LIFs. Assumes Default IPspace
          if not provided.
          * `initial_allowed_svms` - Local SVMs allowed to peer with the peer cluster''s
          SVMs. Can be modified until the remote cluster accepts this cluster peering
          relationship.
          * `local_network` - Fields to create a local intercluster LIF.
          * `expiry_time` - Duration in ISO 8601 format for which the user-supplied
          or auto-generated passphrase is valid. Expiration time must not be greater
          than seven days into the future. ISO 8601 duration format is "PnDTnHnMnS"
          or "PnW" where n is a positive integer. The "nD", "nH", "nM" and "nS" fields
          can be dropped if zero. "P" must always be present and "T" must be present
          if there are any hours, minutes, or seconds fields.
          * `encryption_proposed` (none/tls-psk) - Encryption mechanism of the communication
          channel between the two peers.
          * `peer_applications` - SVM peering applications (SnapMirror, FlexCache or
          both) for which the SVM peering relationship is set up.
          ### Additional information
          As with creating a cluster peer through the CLI, the combinations of options
          must be valid in order for the create operation to succeed. The following
          list shows the combinations that will succeed and those that will fail:
          * A passphrase only (fail)
          * A peer IP address (fail)
          * A passphrase with an expiration time > 7 days into the future (fail)
          * A peer IP address and a passphrase (OK)
          * generate_passphrase=true (OK)
          * Any proposed encryption protocol (OK)
          * An IPspace name or UUID (OK)
          * A passphrase, peer IP address, and any proposed encryption protocol (OK)
          * A non empty list of initial allowed SVM peer names or UUIDs. (OK)
          '
      operationId: cluster_peer_create
      parameters:
        - description: Info specification
          in: body
          name: info
          schema:
            $ref: '#/definitions/cluster_peer'
          x-ntap-introduced: DO_NOT_DISPLAY
        - default: false
          description: The default is false.  If set to true, the records are returned.
          in: query
          name: return_records
          type: boolean
          x-ntap-introduced: DO_NOT_DISPLAY
      responses:
        '201':
          description: Created
          headers:
            Location:
              description: Useful for tracking the resource location
              type: string
          schema:
            $ref: '#/definitions/cluster_peer_setup_response'
        default:
          description: 'ONTAP Error Response Codes

            | Error Code | Description |

            | ---------- | ----------- |

            | 1966366 | The system SVM of the cluster IPspace hosts cluster LIFs only.
            |

            | 4653365 | IPspaces are unavailable with cluster peering: {ipspace}.
