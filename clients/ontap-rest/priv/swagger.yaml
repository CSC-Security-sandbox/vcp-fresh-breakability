swagger: '2.0'
info:
  title: ONTAP PRIVATE REST
  version: v1
  description: Swagger for private ONTAP REST API
basePath: /api
consumes:
  - application/json
  - application/hal+json
produces:
  - application/json
  - application/hal+json
schemes:
  - https
paths:
  /private/cli/security/key-manager/external/azure/update-config:
    patch:
      operationId: azure_update_config
      parameters:
        - name: vserver
          in: query
          required: true
          type: string
        - name: body
          in: body
          required: true
          schema:
            type: object
            title: Azure config
            required:
              - oauth-host
            properties:
              oauth-host:
                type: string
                description: OAuth host to use when fetching JWT token to authenticate to Azure Key Vault
                example: login.microsoftonline.com
      responses:
        '200':
          description: OK
  /private/cli/cifs/check:
    get:
      operationId: cifs_check
      parameters:
        - name: vserver
          in: query
          required: true
          type: string
        - $ref: '../swagger.yaml#/parameters/fields_param'
      responses:
        200:
          description: OK
          schema:
            $ref: "#/definitions/cifs_check_response"
        default:
          description: Error
          schema:
            $ref: "../swagger.yaml#/definitions/error_response"
  /private/cli/diag/secd/dns/srv-lookup:
    # TODO dhruvg 2023-06-13 JIRA https://jira.ngage.netapp.com/browse/NFSAAS-57363
    post:
      description: "get the list of domain controllers"
      operationId: srv_lookup
      parameters:
        - name: body
          in: body
          description: "get the list of domain controllers"
          schema:
            $ref: "#/definitions/srvLookup"
          required: true
      responses:
        '200':
          description: Ok
          schema:
            $ref: "#/definitions/srvLookupResponse"
        default:
          description: Error
          schema:
            $ref: "../swagger.yaml#/definitions/error_response"
  /private/cli/network/ping:
    post:
      description: |-
        The network ping command displays whether a remote address is reachable and responsive, the (if specified) number of transmitted and received packets,
        and their round-trip time. The command requires a source node or logical interface from where the ping will be run, and a destination IP address.
        You can specify the source node by name, or a logical interface and its Vserver.
        ### Related ONTAP commands
        * `network ping`
      operationId: network_ping
      parameters:
        - name: body
          in: body
          description: Ping body
          schema:
            $ref: "#/definitions/ping"
          required: true
      responses:
        200:
          description: OK
          schema:
            $ref: "#/definitions/ping_response"
        202:
          description: Accepted
        default:
          description: Error
          schema:
            $ref: "../swagger.yaml#/definitions/error_response"
  /private/cli/services/name-service/getxxbyyy/getgrlist:
    post:
      description: "get the group id list for a user"
      operationId: GetGroupIDsList
      parameters:
        - name: body
          in: body
          description: "get the group id list for a user"
          schema:
            $ref: "#/definitions/getGroupIDList"
          required: true
      responses:
        '200':
          description: Ok
          schema:
            $ref: "#/definitions/getGroupListResponse"
        default:
          description: Error
          schema:
            $ref: "../swagger.yaml#/definitions/error_response"
  ## TODO darri - JIRA https://jira.ngage.netapp.com/browse/NFSAAS-69157 -- JIRA issue to track BURT
  /security/azure-key-vaults:
    post:
      description: 'Configures the AKV configuration for all clusters and SVMs.

          ### Required properties:

          * `svm.uuid` or `svm.name` - Existing SVM in which to create a AKV.

          * `client_id` - Application (client) ID of the deployed Azure application
          with appropriate access to an AKV.

          * `tenant_id` - Directory (tenant) ID of the deployed Azure application with
          appropriate access to an AKV.

          * `client_secret` or `client_certificate` - Secret or PKCS12 Certificate used
          by the application to prove its identity to AKV.

          * `key_id`- Key Identifier of AKV encryption key.

          * `name` - Name of the deployed AKV used by ONTAP for storing keys.

          ### Optional properties:

          * `port` - Authorization server and vault port number.

          * `oauth_host` - Open authorization server host name.

          * `vault_host` - AKV host subdomain.

          * `proxy_type` - Type of proxy (http, https etc.) if proxy configuration is
          used.

          * `proxy_host` - Proxy hostname if proxy configuration is used.

          * `proxy_port` - Proxy port number if proxy configuration is used.

          * `proxy_username` - Proxy username if proxy configuration is used.

          * `proxy_password` - Proxy password if proxy configuration is used.

          * `configuration.name` - The configuration name to use when also setting the
          `create_inactive` flag.

          ### Optional parameters:

          * `create_inactive` - Create an AKV configuration without enabling it. This
          flag is set to "false" by default.

          ### Related ONTAP commands

          * `security key-manager external azure enable`

          * `security key-manager external azure create-config`

          * `security key-manager external azure update-config`

  '
      operationId: azure_key_vault_create
      parameters:
        - description: Info specification
          in: body
          name: info
          schema:
            $ref: '../swagger.yaml#/definitions/azure_key_vault'
          x-ntap-introduced: DO_NOT_DISPLAY
          x-nullable: true
        - default: false
          description: The default is false.  If set to true, the records are returned.
          in: query
          name: return_records
          type: boolean
          x-ntap-introduced: DO_NOT_DISPLAY
          x-nullable: true
        - name: create_inactive
          in: query
          description: Create an AKV configuration without enabling it. This flag is set to "false" by default.
          type: boolean
          x-nullable: true
      responses:
        '201':
          description: Created
          headers:
            Location:
              description: Useful for tracking the resource location
              type: string
          schema:
            $ref: '../swagger.yaml#/definitions/azure_key_vault_response'
        default:
          description: 'ONTAP Error Response Codes

              | Error Code | Description |

              | ---------- | ----------- |

              | 3735553 | Failed to create self-signed certificate. |

              | 3735664 | The specified key size is not supported in FIPS mode. |

              | 3735665 | The specified hash function is not supported in FIPS mode.
              |

              | 3735700 | The specified key size is not supported. |

              | 52559972 | The certificates start date is later than the current date.
              |

              | 65537500 | A key manager has already been configured for this SVM. |

              | 65537504 | Internal error. Failed to store configuration in internal
              database. |

              | 65537505 | One or more volume encryption keys of the given SVM are stored
              on a key manager configured for the admin SVM. |

              | 65537506 | AKV is not supported in MetroCluster configurations. |

              | 65537512 | AKV cannot be configured for the given SVM as not all nodes
              in the cluster can enable the Azure Key Vault feature. |

              | 65537514 | Failed to check if the Azure Key Vault feature is enabled.
              |

              | 65537518 | Failed to find an interface with Cluster role. |

              | 65537523 | Invalid key ID format. Example key ID format\":" "https://mykeyvault.vault.azure.net/keys/key1/a8e619fd8f234db3b0b95c59540e2a74".
              |

              | 65537526 | Failed to enable Azure Key Vault feature. |

              | 65537567 | No authentication method provided. |

              | 65537573 | Invalid client certificate. |

              | 65537589 | The specified configuration.name already exists on the given
              SVM. |

              | 65537592 | The configuration.name field requires an ECV of 9.14.0 or
              greater. |

              | 65537593 | The create_inactive flag requires an effective cluster version
              of 9.14.0 or greater. |

              | 65537594 | The configuration.name field is required when the create_inactive
              flag is set to true. |

              | 65537595 | The configuration.name field can only be specified when the
              create_inactive flag is set to true. |

              | 65538902 | The configuration.name is reserved for use by the system.
              |

              | 65538903 | The configuration.name field cannot be an empty string. |

              Also see the table of common errors in the <a href="#Response_body">Response
              body</a> overview section of this documentation.

  '
          schema:
            $ref: '../swagger.yaml#/definitions/error_response'
      x-ntap-introduced: '9.8'
    x-ntap-long-description:
      description: "## Overview\nAzure Key Vault (AKV) is a cloud key management service
          (KMS) that provides a secure store for secrets. This feature\nallows ONTAP
          to securely store its encryption keys using AKV.\nIn order to use AKV with
          ONTAP, you must first deploy an Azure application with the appropriate access
          to an AKV and then provide\nONTAP with the necessary details, such as key
          vault name, application ID so that ONTAP can communicate with the deployed
          Azure application.\nThe properties \"state\", \"azure_reachability\" and \"ekmip_reachability\"
          are considered advanced properties and are populated only when explicitly
          requested.\n## Examples\n### Enabling an AKV configuration for an SVM using
          the certificate authentication method\nThe example AKV configuration is enabled
          for a specific SVM. Note the <i>return_records=true</i> query parameter is
          used to obtain the newly created key-manager keystore configuration.<br/>\n```\n#
          The API:\nPOST /api/security/azure-key-vaults\n# The call:\ncurl -X POST 'https://<mgmt-ip>/api/security/azure-key-vaults?return_records=true'
          -H 'accept: application/hal+json' -d \"{ \\\"svm\\\": { \\\"uuid\\\": \\\"4f7abf4c-9a07-11ea-8d52-005056bbeba5\\\"
          }, \\\"client_id\\\": \\\"client1\\\", \\\"tenant_id\\\": \\\"tenant1\\\",
          \\\"name\\\": \\\"https:://mykeyvault.azure.vault.net/\\\", \\\"key_id\\\":
          \\\"https://keyvault-test.vault.azure.net/keys/key1/a8e619fd8f234db3b0b95c59540e2a74\\\",
          \\\"client_certificate\\\" : \\\"\\\"
          }\"\n# The response:\n{\n  \"num_records\": 1,\n  \"records\": [\n    {\n
          \     \"uuid\": \"024cd3cf-9a08-11ea-8d52-005056bbeba5\",\n      \"svm\":
          {\n        \"uuid\": \"4f7abf4c-9a07-11ea-8d52-005056bbeba5\",\n        \"name\":
          \"vs0\"\n      },\n      \"client_id\": \"client1\",\n      \"tenant_id\":
          \"tenant1\",\n      \"name\": \"https:://mykeyvault.azure.vault.net/\",\n
          \     \"key_id\": \"https://keyvault-test.vault.azure.net/keys/key1/a8e619fd8f234db3b0b95c59540e2a74\",\n
          \     \"_links\": {\n        \"self\": {\n          \"href\": \"/api/security/azure-key-vaults/024cd3cf-9a08-11ea-8d52-005056bbeba5\"\n
          \       }\n      }\n    }\n  ]\n}\n```\n---\n### Creating an inactive AKV
          configuration for an SVM using the client secret authentication method\nThe
          example AKV configuration is created for a specific SVM but is not enabled.\nNote
          the <i>create_inactive=true</i> paramater that is used to indicate that the
          configuration should be created but not enabled.\nNote the <i>return_records=true</i>
          query parameter is used to obtain the newly created key-manager keystore configuration.<br/>\n```\n#
          The API:\nPOST /api/security/azure-key-vaults\n# The call:\ncurl -X POST 'https://<mgmt-ip>/api/security/azure-key-vaults?create_inactive=true&return_records=true'
          -H 'accept: application/hal+json' -d \"{ \\\"svm\\\": { \\\"uuid\\\": \\\"4f7abf4c-9a07-11ea-8d52-005056bbeba5\\\"
          }, \\\"configuration\\\": {\\\"name\\\": \\\"myConfiguration\\\"}, \\\"client_id\\\":
          \\\"client1\\\", \\\"tenant_id\\\": \\\"tenant1\\\", \\\"name\\\": \\\"https:://mykeyvault.azure.vault.net/\\\",
          \\\"key_id\\\": \\\"https://keyvault-test.vault.azure.net/keys/key1/a8e619fd8f234db3b0b95c59540e2a74\\\",
          \\\"client_secret\\\" : \\\"myclientPwd\\\" }\"\n# The response:\n{\n  \"num_records\":
          1,\n  \"records\": [\n    {\n      \"uuid\": \"85619643-9a06-11ea-8d52-005056bbeba5\",\n
          \     \"configuration\": {\"name\": \"myConfiguration\"},\n      \"client_id\":
          \"client1\",\n      \"tenant_id\": \"tenant1\",\n      \"name\": \"https:://mykeyvault.azure.vault.net/\",\n
          \     \"key_id\": \"https://keyvault-test.vault.azure.net/keys/key1/a8e619fd8f234db3b0b95c59540e2a74\",\n
          \     \"_links\": {\n        \"self\": {\n          \"href\": \"/api/security/azure-key-vaults/85619643-9a06-11ea-8d52-005056bbeba5\"\n
          \       }\n      }\n    }\n  ]\n}\n```\n---\n### Retrieving the AKVs configured
          for all clusters and SVMs\nThe following example shows how to retrieve all
          configured AKVs along with their configurations.\n```\n# The API:\nGET /api/security/azure-key-vaults\n#
          The call:\ncurl -X GET 'https://<mgmt-ip>/api/security/azure-key-vaults?fields=*'\n#
          The response:\n{\n  \"records\": [\n    {\n      \"configuration\": {\n        \"uuid\":
          \"024cd3cf-9a08-11ea-8d52-005056bbeba5\",\n        \"name\" : \"default\"\n
          \     },\n      \"uuid\": \"024cd3cf-9a08-11ea-8d52-005056bbeba5\",\n      \"scope\":
          \"svm\",\n      \"svm\": {\n        \"uuid\": \"4f7abf4c-9a07-11ea-8d52-005056bbeba5\",\n
          \       \"name\": \"vs0\"\n      },\n      \"client_id\": \"client1\",\n      \"tenant_id\":
          \"tenant1\",\n      \"name\": \"https:://mykeyvault.azure.vault.net/\",\n
          \     \"key_id\": \"https://keyvault-test.vault.azure.net/keys/key1/a8e619fd8f234db3b0b95c59540e2a74\",\n
          \     \"authentication_method\": \"client_secret\",\n      \"enabled\": true,\n
          \     \"_links\": {\n        \"self\": {\n          \"href\": \"/api/security/azure-key-vaults/024cd3cf-9a08-11ea-8d52-005056bbeba5\"\n
          \       }\n      }\n    },\n    {\n      \"configuration\": {\n        \"uuid\":
          \"85619643-9a06-11ea-8d52-005056bbeba5\",\n        \"name\" : \"new-config\"\n
          \     },\n      \"uuid\": \"85619643-9a06-11ea-8d52-005056bbeba5\",\n      \"scope\":
          \"cluster\",\n      \"client_id\": \"client1\",\n      \"tenant_id\": \"tenant1\",\n
          \     \"name\": \"https:://mykeyvault.azure.vault.net/\",\n      \"key_id\":
          \"https://keyvault-test.vault.azure.net/keys/key1/a8e619fd8f234db3b0b95c59540e2a74\",\n
          \     \"authentication_method\": \"certificate\",\n      \"enabled\": false,\n
          \     \"_links\": {\n        \"self\": {\n          \"href\": \"/api/security/azure-key-vaults/85619643-9a06-11ea-8d52-005056bbeba5\"\n
          \       }\n      }\n    }\n  ],\n  \"num_records\": 2,\n  \"_links\": {\n
          \   \"self\": {\n      \"href\": \"/api/security/azure-key-vaults?fields=*\"\n
          \   }\n  }\n}\n```\n---\n### Retrieving a specific AKV configuration\nThe
          following example retrieves a specific AKV configuration.\n```\n# The API:\nGET
          /api/security/azure-key-vaults\n# The call:\ncurl -X GET 'https://<mgmt-ip>/api/security/azure-key-vaults/85619643-9a06-11ea-8d52-005056bbeba5?fields=*'\n#
          The response:\n{\n  \"configuration\": {\n    \"uuid\": \"85619643-9a06-11ea-8d52-005056bbeba5\",\n
          \   \"name\" : \"default\"\n  },\n  \"uuid\": \"85619643-9a06-11ea-8d52-005056bbeba5\",\n
          \ \"scope\": \"cluster\",\n  \"client_id\": \"client1\",\n  \"tenant_id\":
          \"tenant1\",\n  \"name\": \"https:://mykeyvault.azure.vault.net/\",\n  \"key_id\":
          \"https://keyvault-test.vault.azure.net/keys/key1/a8e619fd8f234db3b0b95c59540e2a74\",\n
          \ \"authentication_method\": \"client_secret\",\n  \"enabled\": true,\n  \"_links\":
          {\n    \"self\": {\n      \"href\": \"/api/security/azure-key-vaults/85619643-9a06-11ea-8d52-005056bbeba5\"\n
          \   }\n  }\n}\n```\n---\n### Retrieving the advanced properties of a specific,
          enabled AKV configuration\nThe following example retrieves the advanced properties
          of a specific enabled AKV configuration (inactive AKV configurations do not
          have these advanced properties).\n```\n# The API:\nGET /api/security/azure-key-vaults\n#
          The call:\ncurl -X GET 'https://<mgmt-ip>/api/security/azure-key-vaults/85619643-9a06-11ea-8d52-005056bbeba5?fields=state,azure_reachability,ekmip_reachability\"'\n{\n
          \ \"configuration\": {\n    \"uuid\": \"85619643-9a06-11ea-8d52-005056bbeba5\",\n
          \   \"name\" : \"default\"\n  },\n  \"uuid\": \"85619643-9a06-11ea-8d52-005056bbeba5\",\n
          \ \"name\": \"https://10.234.237.18\",\n  \"state\": {\n    \"cluster_state\":
          true,\n    \"message\": \"\",\n    \"code\": \"0\"\n  },\n  \"azure_reachability\":
          {\n    \"reachable\": true,\n    \"message\": \"\",\n    \"code\": \"0\"\n
          \ },\n  \"ekmip_reachability\": [\n    {\n      \"node\": {\n          \"uuid\":
          \"d208115f-7721-11eb-bf83-005056bb150e\",\n          \"name\": \"node1\",\n
          \         \"_links\": {\n              \"self\": {\n              \"href\":
          \"/api/cluster/nodes/d208115f-7721-11eb-bf83-005056bb150e\"\n              }\n
          \         }\n      },\n      \"reachable\": true,\n      \"message\": \"\",\n
          \     \"code\": \"0\"\n    },\n    {\n      \"node\": {\n          \"uuid\":
          \"e208115f-7721-11eb-bf83-005056bb150e\",\n          \"name\": \"node2\",\n
          \         \"_links\": {\n              \"self\": {\n              \"href\":
          \"/api/cluster/nodes/e208115f-7721-11eb-bf83-005056bb150e\"\n              }\n
          \         }\n      },\n      \"reachable\": true,\n      \"message\": \"\",\n
          \     \"code\": \"0\"\n    }\n  ],\n  \"_links\": {\n    \"self\": {\n      \"href\":
          \"/api/security/azure-key-vaults/85619643-9a06-11ea-8d52-005056bbeba5\"\n
          \   }\n  }\n}\n```\n---\n### Updating the client secret of a specific AKV
          configuration\nThe following example updates the client secret of a specific
          AKV configuration.\n```\n# The API:\nPATCH /api/security/azure-key-vaults\n#
          The call:\ncurl -X PATCH 'https://<mgmt-ip>/api/security/azure-key-vaults/85619643-9a06-11ea-8d52-005056bbeba5'
          -d \"{ \\\"client_secret\\\": \\\"newSecret\\\" }\"\n```\n---\n### Updating
          the client certificate and key of a specific AKV configuration\nThe following
          example updates the client certificate and key of a configured AKV for a specific
          AKV configuration.\n```\n# The API:\nPATCH /api/security/azure-key-vaults\n#
          The call:\ncurl -X PATCH 'https://<mgmt-ip>/api/security/azure-key-vaults/85619643-9a06-11ea-8d52-005056bbeba5'
          -d \"{ \\\"client_certificate\\\": \\\"\\\"
          }\"\n```\n---\n### Deleting a specific AKV configuration\nThe following example
          deletes a specific, enabled AKV.\n```\n# The API:\nDELETE /api/security/azure-key-vaults\n#
          The call:\ncurl -X DELETE 'https://<mgmt-ip>/api/security/azure-key-vaults/85619643-9a06-11ea-8d52-005056bbeba5'\n```\n---\n###
          Restoring the keys for a specific AKV configuration\nThe following example
          restores all the keys of a specific AKV configuration.\n```\n# The API:\nPOST
          security/azure-key-vaults/{uuid}/restore\n# The call:\ncurl -X POST 'https://<mgmt-ip>/api/security/azure-key-vaults/85619643-9a06-11ea-8d52-005056bbeba5/restore'\n#
          The response:\n{\n  \"job\": {\n    \"uuid\": \"6ab6946f-9a0c-11ea-8d52-005056bbeba5\",\n
          \   \"_links\": {\n      \"self\": {\n        \"href\": \"/api/cluster/jobs/6ab6946f-9a0c-11ea-8d52-005056bbeba5\"\n
          \     }\n    }\n  }\n}\n```\n---\n### Rekeying the internal key for a specific
          AKV configuration\nThe following example rekeys the internal key of a specific
          AKV configuration.\n```\n# The API:\nPOST security/azure-key-vaults/{uuid}/rekey-internal\n#
          The call:\ncurl -X POST 'https://<mgmt-ip>/api/security/azure-key-vaults/85619643-9a06-11ea-8d52-005056bbeba5/rekey-internal'\n#
          The response:\n{\n  \"job\": {\n    \"uuid\": \"6ab6946f-9a0c-11ea-8d52-005056bbeba5\",\n
          \   \"_links\": {\n      \"self\": {\n        \"href\": \"/api/cluster/jobs/6ab6946f-9a0c-11ea-8d52-005056bbeba5\"\n
          \     }\n    }\n  }\n}\n```\n---\n"
  /security/azure-key-vaults/{uuid}:
    delete:
      description: 'Deletes an AKV configuration.

          ### Related ONTAP commands

          * `security key-manager external azure disable`

  '
      operationId: azure_key_vault_delete
      parameters:
        - description: AKV UUID
          in: path
          name: uuid
          required: true
          type: string
          x-ntap-introduced: DO_NOT_DISPLAY
          x-nullable: false
      responses:
        '200':
          description: OK
        default:
          description: 'ONTAP Error Response Codes

              | Error Code | Description |

              | ---------- | ----------- |

              | 65536242 | One or more self-encrypting drives are assigned an authentication
              key. |

              | 65536243 | Cannot determine authentication key presence on one or more
              self-encrypting drives. |

              | 65536817 | Internal error. Failed to determine if key manager is safe
              to disable. |

              | 65536827 | Internal error. Failed to determine if the given SVM has
              any encrypted volumes. |

              | 65536834 | Internal error. Failed to get existing key-server details
              for the given SVM. |

              | 65536867 | Volume encryption keys (VEK) for one or more encrypted volumes
              are stored on the key manager configured for the given SVM. |

              | 65536883 | Internal error. Volume encryption key is missing for a volume.
              |

              | 65536884 | Internal error. Volume encryption key is invalid for a volume.
              |

              | 65536924 | Cannot remove key manager that still contains one or more
              NSE authentication keys. |

              | 65537120 | Azure Key Vault is not configured for the given SVM. |

              | 196608080 | One or more nodes in the cluster have the root volume encrypted
              using NVE (NetApp Volume Encryption). |

              | 196608301 | Internal error. Failed to get encryption type. |

              | 196608305 | NAE aggregates found in the cluster. |

              Also see the table of common errors in the <a href="#Response_body">Response
              body</a> overview section of this documentation.

  '
          schema:
            $ref: '../swagger.yaml#/definitions/error_response'
      x-ntap-introduced: '9.8'
    get:
      description: 'Retrieves the AKV configuration for the SVM specified by the UUID.

          ### Related ONTAP commands

          * `security key-manager external azure show`

          * `security key-manager external azure check`

  '
      operationId: azure_key_vault_get
      parameters:
        - description: AKV UUID
          in: path
          name: uuid
          required: true
          type: string
          x-ntap-introduced: DO_NOT_DISPLAY
          x-nullable: false
        - collectionFormat: csv
          description: Specify the fields to return.
          in: query
          items:
            type: string
          name: fields
          type: array
          x-ntap-introduced: DO_NOT_DISPLAY
          x-nullable: true
      responses:
        '200':
          description: OK
          schema:
            $ref: '../swagger.yaml#/definitions/azure_key_vault'
        default:
          description: Error
          schema:
            $ref: '../swagger.yaml#/definitions/error_response'
      x-ntap-introduced: '9.8'
    patch:
      description: 'Updates the AKV configuration.

          ### Optional properties

          * `client_secret` - New secret used to prove the application''s identity to
          the AKV.

          * `client_certificate` - New PKCS12 certificate used to prove the application''s
          identity to the AKV.

          * `proxy_type` - Type of proxy (http, https etc.) if proxy configuration is
          used.

          * `proxy_host` - Proxy hostname if proxy configuration is used.

          * `proxy_port` - Proxy port number if proxy configuration is used.

          * `proxy_username` - Proxy username if proxy configuration is used.

          * `proxy_password` - Proxy password if proxy configuration is used.

