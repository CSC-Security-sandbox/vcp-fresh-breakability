            | 4656069 | Specifying a passphrase without remote IP addresses is not
            supported. |

            | 4656070 | The encryption protocol is meaningful only with authenticated
            cluster peer relationships. |

            | 4656071 | Cannot peer with a cluster bearing the same name as the local
