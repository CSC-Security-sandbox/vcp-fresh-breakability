    properties:
      pathList:
        type: array
        items:
          type: string
          example: /dir1
        x-nullable: true
        description: List of directory-paths to be pre-populated for the FlexCache
          volume.
      excludePathList:
        type: array
        items:
          type: string
          example: /dir2
        x-nullable: true
        description: List of directory-paths to be excluded from pre-population for
