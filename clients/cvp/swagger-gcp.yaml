        - $ref: '#/parameters/locationIdPathParameter'
        - $ref: '#/parameters/xCorrelationIdHeader'
        - in: query
          name: includeDeleted
          type: boolean
          required: false
          allowEmptyValue: true
          default: false
          description: If true, response will include deleted BackupVaults
      responses:
        '200':
          description: OK
          schema:
            type: object
            allOf:
              - properties:
                  backupVaults:
                    type: array
                    items:
                      $ref: '#/definitions/BackupVault_v1beta'
          examples:
            application/json:
              backupVaults:
                - backupVaultId: 9760acf5-4638-11e7-9bdb-020073ca3333
                  resourceId: backupvault1
                  description: Dummy description
                  region: us-east4
                  state: READY
                  stateDetails: Available for use
                - backupVaultId: 9760acf5-4638-11e7-9bdb-020073ca3334
                  resourceId: backupvault2
                  region: us-east4
                  state: READY
