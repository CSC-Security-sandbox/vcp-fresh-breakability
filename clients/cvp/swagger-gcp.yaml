          - CONTINUOUS_REPLICATION
          - HYBRID_REPLICATION_TYPE_UNSPECIFIED
          - ONPREM_REPLICATION
          - REVERSE_ONPREM_REPLICATION
      peerVolumeName:
        title: peerVolumeName
        type: string
        description: Name of local source volume to be migrated
      peerClusterName:
        title: peerClusterName
        type: string
        description: Name of local source cluster to be peered with destination cluster
      peerSvmName:
        title: peerSvmName
        type: string
        description: Name of local source vserver SVM to be peered with destination
          vserver SVM
      peerIpAddresses:
        title: peerIpAddresses
        type: array
        minItems: 1
        items:
          type: string
          description: String list of node IP addresses to be peered with
          pattern: ^[0-9]{1,3}\.[0-9]{1,3}\.[0-9]{1,3}\.[0-9]{1,3}$
          example: 105.106.16.1
      labels:
        title: labels
        type: object
