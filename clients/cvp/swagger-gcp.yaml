        title: hotTierBypassModeEnabled
        type: boolean
        description: Flag indicating if the volume has hot tier bypass mode enabled
          or not
        x-nullable: true
        example: false
  SimpleExportPolicyRule_v1beta:
    title: SimpleExportPolicyRule
    type: object
    description: A simple export-policy rule that defines who can access the volume
      and how. Only 5 rules are allowed but each rule can serve many clients and subnets.
    required:
      - allowedClients
      - accessType
    properties:
      allowedClients:
        type: string
        description: Defines the client ingress specification (allowed clients) as
          a comma separated string with IPv4 CIDRs and IPv4 host addresses.
        minLength: 1
        maxLength: 4096
        default: 0.0.0.0/0
        example: 0.0.0.0/0
      hasRootAccess:
        type: string
        description: If enabled (true or on) the rule defines that no_root_squash
          is set, else if it is disabled (false or off) root_squash is set and user
          ID mapped to anonymous user 65534. The response will always be true or false
          and never on/off. If the value is set to null the response will always be
          set to the default of true.
        enum:
          - 'true'
          - 'false'
          - 'on'
          - 'off'
        default: 'true'
        example: 'true'
        x-nullable: true
      accessType:
        type: string
        description: Defines the access type for clients matching the 'allowedClients'
          specification.
        enum:
          - ACCESS_TYPE_UNSPECIFIED
          - READ_NONE
          - READ_ONLY
          - READ_WRITE
        example: READ_ONLY
      nfsv3:
        type: boolean
        description: If enabled (true) the rule allows NFSv3 protocol for clients
          matching the 'allowedClients' specification.
        default: true
        example: true
        x-nullable: true
      nfsv4:
        type: boolean
        description: If enabled (true) the rule allows NFSv4 protocol for clients
          matching the 'allowedClients' specification.
        default: false
        example: false
        x-nullable: true
      kerberos5ReadOnly:
        type: boolean
        description: If enabled (true) the rule defines a read only access for clients
          matching the 'allowedClients' specification. It enables NFS clients to mount
          using 'authentication' kerberos security mode.
        default: false
        example: false
        x-nullable: true
      kerberos5ReadWrite:
        type: boolean
        description: If enabled (true) the rule defines read and write access for
          clients matching the 'allowedClients' specification. It enables NFS clients
          to mount using 'authentication' kerberos security mode. The 'kerberos5ReadOnly'
          value  be ignored if this is enabled.
        default: false
        example: true
        x-nullable: true
      kerberos5iReadOnly:
        type: boolean
        description: If enabled (true) the rule defines a read only access for clients
          matching the 'allowedClients' specification. It enables NFS clients to mount
          using 'integrity' kerberos security mode.
        default: false
        example: false
        x-nullable: true
      kerberos5iReadWrite:
        type: boolean
        description: If enabled (true) the rule defines read and write access for
          clients matching the 'allowedClients' specification. It enables NFS clients
          to mount using 'integrity' kerberos security mode. The 'kerberos5iReadOnly'
          value shall be ignored if this is enabled.
        default: false
        example: true
        x-nullable: true
      kerberos5pReadOnly:
        type: boolean
        description: If enabled (true) the rule defines a read only access for clients
          matching the 'allowedClients' specification. It enables NFS clients to mount
          using 'privacy' kerberos security mode.
        default: false
        example: false
        x-nullable: true
      kerberos5pReadWrite:
        type: boolean
        description: If enabled (true) the rule defines read and write access for
          clients matching the 'allowedClients' specification. It enables NFS clients
          to mount using 'privacy' kerberos security mode. The 'kerberos5pReadOnly'
          value shall be ignored if this is enabled.
        default: false
        example: true
        x-nullable: true
  MountPoint_v1beta:
