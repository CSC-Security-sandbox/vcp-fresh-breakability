      writebackEnabled:
        type: boolean
        x-nullable: true
        description: Flag indicating whether writeback is enabled for the FlexCache
          volume.
      atimeScrubEnabled:
        type: boolean
        x-nullable: true
        description: Flag indicating whether the atime based scrub is enabled for
          the FlexCache volume.
      atimeScrubDays:
        type: integer
        format: int16
        x-nullable: true
        description: Duration in days after which inactive files can be scrubbed from
