      recursion:
        type: boolean
        x-nullable: true
        description: Flag indicating whether the directories listed with the pathList
          need to be recursively pre-populated.
  SnapshotPolicy_v1beta:
    title: SnapshotPolicy
    type: object
    description: Snapshot policy for a volume
    properties:
      enabled:
        type: boolean
        description: If enabled, make snapshots automatically according to the schedules.
          Default is false.
        example: true
        default: false
        x-nullable: true
      hourlySchedule:
        $ref: '#/definitions/HourlySchedule_v1beta'
      dailySchedule:
        $ref: '#/definitions/DailySchedule_v1beta'
      weeklySchedule:
        $ref: '#/definitions/WeeklySchedule_v1beta'
      monthlySchedule:
        $ref: '#/definitions/MonthlySchedule_v1beta'
  HourlySchedule_v1beta:
    type: object
    description: If enabled (snapshotsToKeep > 0), make a snapshot every hour e.g.
      at 04:00, 05:00, 06:00
    properties:
      snapshotsToKeep:
        description: The maximum number of snapshots to keep for the hourly schedule
        type: number
        format: double
        minimum: 0.0
        maximum: 255.0
        default: 0.0
        example: 24.0
      minute:
        title: minute
        description: Set the minute of the hour to start the snapshot (0-59), defaults
          to the top of the hour (0).
        type: number
        format: double
        minimum: 0.0
        maximum: 59.0
        default: 0.0
        example: 10.0
  DailySchedule_v1beta:
    type: object
    description: If enabled (snapshotsToKeep > 0), make a snapshot every day. Defaults
      to midnight.
    properties:
      snapshotsToKeep:
        description: The maximum number of snapshots to keep for the daily schedule
        type: number
        format: double
        minimum: 0.0
        maximum: 255.0
        default: 0.0
        example: 7.0
      hour:
        title: hour
        description: Set the hour to start the snapshot (0-23), defaults to midnight
          (0).
        type: number
        format: double
        minimum: 0.0
        maximum: 23.0
        default: 0.0
        example: 23.0
      minute:
        title: minute
        description: Set the minute of the hour to start the snapshot (0-59), defaults
          to the top of the hour (0).
        type: number
        format: double
        minimum: 0.0
        maximum: 59.0
        default: 0.0
        example: 10.0
  WeeklySchedule_v1beta:
    type: object
    description: If enabled (snapshotsToKeep > 0), make a snapshot every week at a
      specific day or days, defaults to Sunday at midnight
    properties:
      snapshotsToKeep:
        description: The maximum number of snapshots to keep for the weekly schedule
        type: number
        format: double
        minimum: 0.0
        maximum: 255.0
        default: 0.0
        example: 52.0
      day:
        title: day
        description: Set the day or days of the week to make a snapshot. Accepts a
          comma delimited string of week day names in english. Defaults to 'Sunday'
        type: string
        maxLength: 62
        minLength: 6
        default: Sunday
      hour:
        title: hour
        description: Set the hour to start the snapshot (0-23), defaults to midnight
          (0).
        type: number
        format: double
        minimum: 0.0
        maximum: 23.0
        default: 0.0
        example: 23.0
      minute:
        title: minute
        description: Set the minute of the hour to start the snapshot (0-59), defaults
          to the top of the hour (0).
        type: number
        format: double
        minimum: 0.0
        maximum: 59.0
        default: 0.0
        example: 10.0
  MonthlySchedule_v1beta:
    type: object
    description: If enabled (snapshotsToKeep > 0), make a snapshot every month at
      a specific day or days, defaults to the first day of the month at midnight
    properties:
      snapshotsToKeep:
        description: The maximum number of snapshots to keep for the monthly schedule
        type: number
        format: double
        minimum: 0.0
        maximum: 255.0
        default: 0.0
        example: 12.0
      daysOfMonth:
        title: daysOfMonth
        description: Set the day or days of the month to make a snapshot (1-31). Accepts
          a comma delimited string of the day of the month e.g. '1,15,31'. Defaults
          to '1'
        type: string
        maxLength: 113
        minLength: 1
        default: '1'
      hour:
        title: hour
        description: Set the hour to start the snapshot (0-23), defaults to midnight
          (0).
        type: number
        format: double
        minimum: 0.0
        maximum: 23.0
        default: 0.0
        example: 23.0
      minute:
        title: minute
        description: Set the minute of the hour to start the snapshot (0-59), defaults
          to the top of the hour (0).
        type: number
        format: double
        minimum: 0.0
        maximum: 59.0
        default: 0.0
        example: 10.0
