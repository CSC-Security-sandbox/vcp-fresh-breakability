          - CREATING
          - READY
          - DELETING
          - DISABLED
          - ERROR
          - PENDING_CLUSTER_PEERING
          - PENDING_SVM_PEERING
          - PENDING_REMOTE_RESYNC
          - EXTERNALLY_MANAGED_REPLICATION
        example: READY
      stateDetails:
        title: stateDetails
        type: string
        readOnly: true
        description: Details about the current lifecycle state
        example: Available for use
      stateDetailsCode:
        title: stateDetailsCode
        type: integer
        format: int32
        readOnly: true
        x-omitempty: false
        description: Numeric representation of current state details.
        example: 100001
      role:
        title: role
        type: string
        readOnly: false
        description: Indicates whether the local volume is the source or destination
          for the volume replication
        enum:
