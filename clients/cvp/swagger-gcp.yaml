          - SOURCE
          - DESTINATION
        example: DESTINATION
      replicationSchedule:
        title: replicationSchedule
        type: string
        enum:
          - REPLICATION_SCHEDULE_UNSPECIFIED
          - EVERY_10_MINUTES
          - HOURLY
          - DAILY
        example: HOURLY
      mirrorState:
        title: mirrorState
        type: string
        description: The mirror state of the volume replication
        enum:
          - MIRROR_STATE_UNSPECIFIED
          - PREPARING
          - UNINITIALIZED
          - MIRRORED
          - STOPPED
          - ABORTED
          - TRANSFERRING
          - BASELINE_TRANSFERRING
          - EXTERNALLY_MANAGED
        readOnly: true
        example: MIRRORED
      healthy:
        title: healthy
        type: boolean
        description: "Condition of the relationship. Can be one of the following:\
          \ - true: The replication relationship is\n  healthy. It has not missed\
          \ a\n  scheduled transfer, or experienced\n  a manual update failure.\n\
          - false: The replication relationship is not\n  healthy. It has missed a\
          \ scheduled\n  transfer, or has experienced a manual\n  update failure."
        example: true
        readOnly: true
      transferStats:
        $ref: '#/definitions/TransferStats_v1beta'
      created:
        title: created
        type: string
        format: date-time
        readOnly: true
        description: Creation date of the resource
        example: '2016-11-28T19:30:23.123Z'
      labels:
        title: labels
        type: object
        additionalProperties:
