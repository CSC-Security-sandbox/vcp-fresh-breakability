          or extreme, the performance will be that of the service level, not the performance
          equivalent of the backwards compatibility.
        example: medium.
      capacityGib:
        type: integer
        format: uint64
        description: Capacity in GiB of the pool
        default: 2000000000000
        example: 100000000000000
      volumeCapacityGib:
        type: integer
        format: uint64
        description: Allocated size of all volumes in GiB in the storage pool
        example: 100000000000000
        x-nullable: true
      volumeCount:
        type: number
        format: int
        description: Number of volumes in a pool
        example: 20
      volumeDetails:
        description: Details of volumes allocated to this pool.
        type: array
        items:
