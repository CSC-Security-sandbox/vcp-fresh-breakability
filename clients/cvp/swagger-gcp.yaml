        '403':
          $ref: '#/responses/StandardError-403'
        '404':
          $ref: '#/responses/StandardError-404'
        '429':
          $ref: '#/responses/StandardError-429'
        '500':
          $ref: '#/responses/StandardError-500'
        '501':
          $ref: '#/responses/StandardError-501'
        default:
          description: Unexpected error
          schema:
            $ref: '#/definitions/Error'
    post:
      operationId: v1beta_createBackupVault
      summary: Create a new backup vault
      description: Creates a new backup vault
      tags:
        - backup-vault
      parameters:
        - $ref: '#/parameters/projectNumberPathParameter'
        - $ref: '#/parameters/locationIdPathParameter'
        - $ref: '#/parameters/xCorrelationIdHeader'
        - name: body
          in: body
          required: true
          description: The required parameters to create a new backup.
          schema:
            $ref: '#/definitions/BackupVaultCreate_v1beta'
      responses:
        '202':
          description: Creating backup vault
          schema:
            $ref: '#/definitions/Operation_v1beta'
        '400':
          $ref: '#/responses/StandardError-400'
        '401':
