swagger: '2.0'
info:
  title: Google Cloud NetApp Files API
  description: '## Google Cloud NetApp Files This is the documentation and examples
    for the "Google Cloud NetApp Files" or GNF for short'
  version: 2.153.0
  x-logo:
    url: nfsaas-logo.png
    backgroundColor: '#FFFFFF'
host: netapp.googleapis.com
schemes:
  - http
  - https
consumes:
  - application/json
produces:
  - application/json
tags:
  - name: pools
    description: Pool operations
  - name: volumes
    description: Volume operations
  - name: volumes_beta
    description: Volume beta operations
  - name: snapshots
    description: Snapshot operations
  - name: active-directories
    description: Active Directory operations
  - name: replications
    description: Replication operations
  - name: kms-configurations
    description: Key management operations
  - name: storage
    description: Lookup a subset of the storage information
  - name: health
    description: Server health
  - name: version
    description: The current API/SDE version
  - name: async
    description: Long running operations
  - name: resourceEvents
    description: Handle resource events for project state update
  - name: v1Beta_internal
    description: All the internal endpoints for CVP - CVP communications
  - name: migration_internal
    description: All the internal endpoints for 3P to 1P migration
  - name: backups
    description: Backup operations
  - name: backup-policy
    description: Backup policy operations
  - name: batch
    description: Batch operations
  - name: quota-rules
    description: Quota rule operations for the volume
paths:
  /v1beta/projects/{projectNumber}/locations/{locationId}/backupVaults:
