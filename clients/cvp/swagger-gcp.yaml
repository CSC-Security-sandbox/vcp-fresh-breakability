        description: Identifier for the vendor subnet
        example: /subscriptions/e38be830-aea1-439f-abbf-6ed05dba1a53/resourceGroups/ms.nfs.testrg/providers/Microsoft/Subnets/subnet1
      activeDirectory:
        title: activeDirectoryId
