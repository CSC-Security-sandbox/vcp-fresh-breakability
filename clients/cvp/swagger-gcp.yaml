      description:
        title: description
        type: string
        description: A description about this hybrid replication relationship
        example: My description about this hybrid replication relationship
        x-nullable: true
        maxLength: 2048
      clusterLocation:
        title: clusterLocation
        type: string
        description: Name of source cluster associated with the hybrid replication,
          display purposes only
        example: source-cluster-name
        x-nullable: true
        maxLength: 2048
      peeringCommandExpiryTime:
        title: peeringCommandExpiryTime
        format: date-time
        type: string
        x-nullable: true
        description: DateTime value for when cluster peering command should expire.
        example: '2024-04-20T16:21:01+01:00'
