        minimum: 1
        maximum: 1000
      cifsChangeNotifyEnabled:
        type: boolean
        x-nullable: true
        description: Flag indicating whether a CIFS change notification is enabled
          for the FlexCache volume.
      cachePrePopulateState:
        type: string
        readOnly: true
        description: Current state of FlexCache prepopulation (read-only).
        enum:
          - CACHE_PRE_POPULATE_STATE_UNSPECIFIED
          - NOT_NEEDED
          - IN_PROGRESS
          - COMPLETE
          - ERROR
  FlexCachePrePopulate_v1beta:
    title: FlexCache PrePopulate request
    type: object
