    properties:
      name:
        type: string
        description: The human readable name of the pool
        example: Some-pool-name
      serviceLevel:
        type: string
        description: The service level of the pool. Can be specified either by name
          or performance but will always be specified by name in responses. For backwards
          compatibility, can also be specified as basic, standard, or extreme, which
          will be equivalent to having specified performance low, medium, or high,
