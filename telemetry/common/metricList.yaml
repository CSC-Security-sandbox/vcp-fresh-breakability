# List of telemetry metrics collected by the VSA Control Plane for Google Cloud monitoring.
# Each entry defines a metric name, its resource type, and its classification (usage or performance).
#
# Fields:
#   metric:        The unique metric identifier (string)
#   resourceType:  The GCP resource type (usually custom.googleapis.com)
#   metricType:    The metric's category (usage or performance)
#
# Add new metrics as needed, following the structure below.
# NOTE: Ensure that any new metrics added here are also added to prometheus/tenant section in kubernetes/vsa-harvest-otel/templates/otel-configmap.yaml.
metrics:
  - metric: volume_space_logical_used
    resourceType: custom.googleapis.com
    metricType: usage
  - metric: volume_capacity
    resourceType: custom.googleapis.com
    metricType: usage
  - metric: snapmirror_total_transfer_bytes
    resourceType: custom.googleapis.com
    metricType: usage
  - metric: volume_read_latency
    resourceType: custom.googleapis.com
    metricType: performance
  - metric: volume_write_latency
    resourceType: custom.googleapis.com
    metricType: performance
  - metric: volume_other_latency
    resourceType: custom.googleapis.com
    metricType: performance
  - metric: volume_read_data
    resourceType: custom.googleapis.com
    metricType: performance
  - metric: volume_write_data
    resourceType: custom.googleapis.com
    metricType: performance
  - metric: volume_other_data
    resourceType: custom.googleapis.com
    metricType: performance
  - metric: wafl_volume_client_protocol_reads
    resourceType: custom.googleapis.com
    metricType: performance
  - metric: wafl_volume_cloud_bin_operation_size
    resourceType: custom.googleapis.com
    metricType: performance
  - metric: pool_client_protocol_reads
    resourceType: custom.googleapis.com
    metricType: performance
  - metric: pool_cloud_bin_operation_size
    resourceType: custom.googleapis.com
    metricType: performance
  - metric: pool_client_protocol_reads_raw
    resourceType: custom.googleapis.com
    metricType: usage
  - metric: pool_cloud_bin_operation_size_raw
    resourceType: custom.googleapis.com
    metricType: usage
  - metric: wafl_volume_client_protocol_reads_raw
    resourceType: custom.googleapis.com
    metricType: usage
  - metric: wafl_volume_cloud_bin_operation_size_raw
    resourceType: custom.googleapis.com
    metricType: usage
  - metric: pool_capacity_tier_logical_footprint
    resourceType: custom.googleapis.com
    metricType: usage