version: 2
linters:
  enable:
    - govet
    - staticcheck
    - ineffassign
    - errcheck
    - importas
    - depguard
    # - revive

  disable:
    - gocyclo
    - dupl
    - gosec
  #    - revive
  #    - depguard

  settings:
    staticcheck:
      checks: ["-S1021"]
    depguard:
      rules:
        hyperscaler-restrictions:
          files:
            - "!**/hyperscaler/google/**/*.go"
            - "!**/hyperscaler/google/*.go"
            - "!**/hyperscaler/google/*.go"
            - "!**/tools/**/*.go"
            - "!**/utils/**/*.go"
            - "../../../common/resource_deployer.go"
            - "../../../core/orchestrator/activities/kms_activities/kms_common_activities_test.go"
            - "../../../core/orchestrator/activities/pool_activities.go"
            - "../../../core/orchestrator/activities/pool_activities_test.go"
            - "../../../core/orchestrator/workflows/pool_workflows.go"
          deny:
            - pkg: "cloud.google.com/go"
              desc: "Google Cloud SDK imports are not allowed in hyperscaler folder"
            - pkg: "google.golang.org/api"
              desc: "Google Cloud API imports are not allowed in hyperscaler folder"
            - pkg: "google.golang.org/genproto"
              desc: "Google Cloud genproto imports are not allowed in hyperscaler folder"
        core-restrictions:
          files:
            - "**/core/**/*.go"
            - "**/vcp-core/**/*.go"
            - "!../../../common/resource_deployer.go"
            - "!**/core/orchestrator/activities/kms_activities/kms_common_activities_test.go"
            - "!**/core/orchestrator/activities/pool_activities.go"
            - "!**/core/orchestrator/activities/pool_activities_test.go"
            - "!**/core/orchestrator/workflows/pool_workflows.go"
          deny:
            - pkg: "cloud.google.com/go"
              desc: "Google Cloud SDK imports are not allowed in core folder"
            - pkg: "google.golang.org/api"
              desc: "Google Cloud API imports are not allowed in core folder"
            - pkg: "google.golang.org/genproto"
              desc: "Google Cloud genproto imports are not allowed in core folder"
            - pkg: "github.com/vcp-vsa-control-Plane/vsa-control-plane/clients/hyperscaler/google"
              desc: "Google Cloud imports are not allowed in core folder"
        database-leaf-restrictions:
          files:
            - "**/database/**/*.go"
          deny:
            - pkg: "github.com/vcp-vsa-control-Plane/vsa-control-plane/core"
              desc: "database/** must not import core/**. Persisted enums / shared state live in database/datamodel."
            - pkg: "github.com/vcp-vsa-control-Plane/vsa-control-plane/hyperscaler"
              desc: "database/** must not import hyperscaler/**."
        hyperscaler-leaf-restrictions:
          files:
            - "**/hyperscaler/**/*.go"
          deny:
            - pkg: "github.com/vcp-vsa-control-Plane/vsa-control-plane/core"
              desc: "hyperscaler/** must not import core/**. Expose interfaces in hyperscaler and let core depend on them."
            - pkg: "github.com/vcp-vsa-control-Plane/vsa-control-plane/database"
              desc: "hyperscaler/** must not import database/**."
        lib-leaf-restrictions:
          files:
            - "**/lib/**/*.go"
          deny:
            - pkg: "github.com/vcp-vsa-control-Plane/vsa-control-plane/core"
              desc: "lib/** must not import core/**."
            - pkg: "github.com/vcp-vsa-control-Plane/vsa-control-plane/database"
              desc: "lib/** must not import database/**."
            - pkg: "github.com/vcp-vsa-control-Plane/vsa-control-plane/hyperscaler"
              desc: "lib/** must not import hyperscaler/**."
    gci:
      sections:
        - standard # Standard library imports (e.g., "fmt", "net/http")
        - default  # All other imports (third-party, local)
    revive:
      severity: warning
      rules:
        - name: context-as-argument
  exclusions:
    rules:
      - path: '(.+)generate_mocks\.go'
        linters:
          - unused
      - path: 'tools/safesql/.*'
        linters:
          - errcheck
          - unused

# formatters:
#   enable:
#     - gci

#   settings:
#     gci:
#       sections:
#         - standard # Standard library imports (e.g., "fmt", "net/http")
#         - default  # All other imports (third-party, local)
#       skip-generated: true
#       custom-order: true

run:
  timeout: 10m
  skip-patterns:
    - .*_mock\.go
  skip-dirs:
    - vendor
    - clients/core-api
    - clients/cvp
    - clients/ontap-rest
    - clients/cvp
    - vcp-core/servergen
    - google-proxy/api/gcp-servergen
    # ogen output: import grouping and brace spacing do not match custom checkGoFormat() rules
    - oci-proxy/api/oci-servergen
    - telemetry/api/telemetry-servergen
    - ontap-proxy/api/ontap-proxy-servergen
    - vcm-proxy/api/vcm-servergen
    - cicd/cmd/lint
    - tools/safesql
  skip-files:
    - workflow_engine/workflow_engine_mock.go
    - workflow_engine/client_config_mock.go
    - workflow_engine/temporal_test_client_mock.go
    - database/storage_mock.go
    - core/orchestrator/orchestrator_factory_mock.go
    - clients/hyperscaler/google_services_mock.go
    - hyperscaler/google_services_mock.go
    - clients/google-proxy-client/oas_json_gen.go
    - clients/google-proxy-client/oas_request_encoders_gen.go
    - clients/google-proxy-client/oas_response_decoders_gen.go
    - clients/google-proxy-client/oas_validators_gen.go
    - database/data_store_mock.go
    - clients/google-proxy-client/oas_client_gen.go
    - clients/google-proxy-client/oas_test_examples_gen_test.go
    - core/ontap-rest/cluster_client_mock.go
    - core/vsa/provider_mock.go
    - telemetry/performance/sink_mock.go
    - core/vsa/provider_mock.go
    - database/vcp/data_store_mock.go
    - database/vcp/storage_mock.go
    - database/metrics/data_store_mock.go
    - database/metrics/storage_mock.go
    - clients/vlm/config.go
    - telemetry/bizops/biz_ops_provider_mock.go