version: 2
linters:
  enable:
    - govet
    - staticcheck
    - ineffassign
    - errcheck
    - importas

  disable:
    - gocyclo
    - dupl
    - depguard
    - gosec

run:
  timeout: 5m
  skip-dirs:
    - vendor
    - clients/core-api
    - clients/cvp
    - clients/ontap-rest
    - clients/cvp
    - core/core-api/core-servergen
    - google-proxy/api/gcp-servergen
    - telemetry/api/telemetry-servergen
    - cicd/cmd/lint
  skip-files:
    - workflow_engine/workflow_engine_mock.go
    - workflow_engine/client_config_mock.go
    - workflow_engine/temporal_test_client_mock.go
    - database/storage_mock.go
    - core/orchestrator/orchestrator_factory_mock.go
    - clients/hyperscaler/google_services_mock.go
    - clients/google-proxy-client/oas_json_gen.go
    - clients/google-proxy-client/oas_request_encoders_gen.go
    - clients/google-proxy-client/oas_response_decoders_gen.go
    - clients/google-proxy-client/oas_validators_gen.go
    - database/data_store_mock.go
    - clients/google-proxy-client/oas_client_gen.go
    - clients/google-proxy-client/oas_test_examples_gen_test.go
    - core/ontap-rest/cluster_client_mock.go
    - core/vsa/provider_mock.go
    - telemetry/performance/sink_mock.go
    - core/vsa/provider_mock.go
    - database/vcp/data_store_mock.go
    - database/vcp/storage_mock.go