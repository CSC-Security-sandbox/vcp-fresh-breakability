apiVersion: skaffold/v4beta12
kind: Config
build:
  local:
    push: false
  artifacts:
    - image: base
      context: .
      docker:
        dockerfile: common/Dockerfile
---
apiVersion: skaffold/v4beta12
kind: Config
build:
  local:
    push: true
  artifacts:
    - image: ghcr.io/vcp-vsa-control-plane/google-proxy
      context: .
      docker:
        dockerfile: google-proxy/Dockerfile
      requires:
        - image: base
          alias: BASE
    - image: ghcr.io/vcp-vsa-control-plane/core
      context: .
      docker:
        dockerfile: core/Dockerfile
      requires:
        - image: base
          alias: BASE
    - image: ghcr.io/vcp-vsa-control-plane/workflow-server
      context: .
      docker:
        dockerfile: workflow-server/Dockerfile
      requires:
        - image: base
          alias: BASE
manifests:
  rawYaml:
    - google-proxy/kubernetes/*
    - core/kubernetes/*
    - workflow-server/kubernetes/*
portForward:
  - resourceType: deployment
    resourceName: google-proxy
    port: 8080
    localPort: 9000
  - resourceType: deployment
    resourceName: core-service
    port: 8080    
    localPort: 9001
  - resourceType: deployment
    resourceName: workflow-server
    port: 50051
    localPort: 9003
profiles:
  - name: gcb
    build:
      googleCloudBuild: {}
