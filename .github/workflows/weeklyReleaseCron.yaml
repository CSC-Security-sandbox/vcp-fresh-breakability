name: Release Workflow

on:
  schedule:
    - cron: '30 9 * * 2'

  workflow_dispatch:

jobs:
  release_branch:
    permissions:
      contents: write
      actions: read
      packages: write

    runs-on: [ cvs-u24-sunilt-01 ,linux ]
    container:
      image: ghcr.io/vcp-vsa-control-plane/vsacictl:v20
      options: --user root

    steps:
      - name: Checkout codes
        uses: actions/checkout@v2
        with:
          token: ${{ secrets.GHVSA_PAT }}

      - name: Set up Go
        uses: actions/setup-go@v3
        with:
          go-version-file: go.mod

      - name: Configure Git
        run: |
          USERNAME=${{ github.actor }}
          echo "Fetching email for $USERNAME"
          EMAIL=$(curl -s -H "Authorization: token ${{ secrets.GHVSA_PAT }}" https://api.github.com/users/$USERNAME | jq -r '.email')
          if [ "$EMAIL" == "null" ]; then
            EMAIL="$USERNAME@users.noreply.github.com"
          fi
          echo "Using email: $EMAIL"
          echo "Using username: $USERNAME"
          git config --global user.email "$EMAIL"
          git config --global user.name "$USERNAME"

      - name: Run release logic
        id: release_logic_binary
        run: vsacictl tag release
        env:
          GH_PAT: ${{ secrets.GHVSA_PAT }}
          GITHUB_OUTPUT: $GITHUB_ENV

      - name: Output printout
        run: |
          echo "RC_TAG=${{ steps.release_logic_binary.outputs.RC_TAG }}" 
          echo "DEV_TAG=${{ steps.release_logic_binary.outputs.DEV_TAG }}" 

    outputs:
      rcTAG: ${{ steps.release_logic_binary.outputs.RC_TAG }}
      devTAG: ${{ steps.release_logic_binary.outputs.DEV_TAG }}

  create_release_vsa_rc:
    needs: [release_branch]
    uses: ./.github/workflows/release_resources.yaml
    secrets: inherit
    with:
      pre_release: true
      tag: ${{ needs.release_branch.outputs.rcTAG }}

  create_release_vsa_dev:
    needs: [release_branch]
    uses: ./.github/workflows/release_resources.yaml
    secrets: inherit
    with:
      pre_release: true
      tag: ${{ needs.release_branch.outputs.devTAG }}
