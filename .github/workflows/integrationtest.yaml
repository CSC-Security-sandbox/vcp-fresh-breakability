name: Pull Request - Integration test workflow
on:
  workflow_call:
    inputs:
      integration_test_branch:
        description: 'Branch to use for vsa-integration-test-poc'
        required: false
        type: string
        default: 'main'

permissions:
  packages: write
  contents: read
  id-token: write
  security-events: write
  actions: write

env:
  REGISTRY: ghcr.io
  ORGANIZATION: ${{ github.repository_owner }}

jobs:
  build:
    name:  Build and Test Integration
    runs-on: [self-hosted, linux]
    timeout-minutes: 15
    container:
      image: ghcr.io/vcp-vsa-control-plane/vsacictl:v22
      options: --user root
    env:
      GH_PAT: ${{ secrets.GITHUB_TOKEN }}
      DOCKER_BUILDKIT: 1
      BUILDKIT_PROGRESS: plain
    steps:
      
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Checkout vsa-integration-test-poc
        uses: actions/checkout@v4
        with:
          repository: VCP-VSA-control-Plane/vsa-integration-test-poc
          path: tests/vsa-integration-test-poc
          ref: main
          token: ${{ secrets.GHVSA_PAT }}
      
      - name: Checkout vsa-control-plane
        uses: actions/checkout@v4
        with:
          repository: VCP-VSA-control-Plane/vsa-control-plane
          path: tests/vsa-control-plane
          ref: main
          token: ${{ secrets.GHVSA_PAT }}
          sparse-checkout: |
            google-proxy/
            worker/
            tools/migrate/
          sparse-checkout-cone-mode: false


      - name: Install Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ vars.GO_VERSION }}
          cache: true
          cache-dependency-path: |
            tests/vsa-control-plane/go.sum

      - name: Fetch token
        uses: actions/create-github-app-token@v1
        id: token
        with:
          owner: ${{ github.repository_owner }}
          app-id: ${{ secrets.VCP_CI_GH_APP_ID }}
          private-key: ${{ secrets.VCP_CI_GH_PRIVATE_KEY }}
          repositories: |
            vsa-control-plane
            temp-vsa-pkg

      - name: Install Docker
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Configure Git for private modules
        run: |
          git config --global url."https://${{ secrets.GHVSA_PAT }}@github.com/".insteadOf "https://github.com/"

      - name: Download Temporal CLI
        run: |
          if command -v temporal &> /dev/null; then
            echo "Temporal CLI already installed"
          else
            curl -L 'https://temporal.download/cli/archive/latest?platform=linux&arch=amd64' -o temporal.tar.gz
            tar -xzf temporal.tar.gz
            chmod +x temporal
            sudo mv temporal /usr/local/bin/
          fi
          
      - name: Build google-proxy, temporal and Copy
        run: |
          test_dir="tests"
          # Build applications
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -trimpath google-proxy/app.go && chmod +x app && \
          cp app ${test_dir}/vsa-integration-test-poc/docker_services/infra/google-proxy/ && \
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -o temporal-worker -trimpath worker/main.go && \
          chmod +x temporal-worker && \
          cp temporal-worker ${test_dir}/vsa-integration-test-poc/docker_services/infra/temporal-worker/ && \
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -o vsa-db-setup -trimpath tools/migrate/main.go && \
          chmod +x vsa-db-setup && \
          cp vsa-db-setup ${test_dir}/vsa-integration-test-poc/docker_services/infra/vsa-db-setup/vsa-db-setup

      - name: Set PROJECT_ROOT
        run: |
          echo "PROJECT_ROOT=$(pwd)/tests/vsa-integration-test-poc" >> $GITHUB_ENV

      - name: Pre-pull base images
        run: |
          {
            docker pull ubuntu:22.04 &
            docker pull alpine:latest &
            docker pull golang:1.21-alpine &
            docker pull postgres:13 &
            wait
          }

      - name: Build All Docker Containers
        timeout-minutes: 8
        run: |
          chmod +x $PROJECT_ROOT/docker_services/*/*/build.sh
          cd $PROJECT_ROOT/docker_services/infra/google-proxy && ./build.sh google-proxy
          cd $PROJECT_ROOT/docker_services/infra/temporal && ./build.sh temporal
          cd $PROJECT_ROOT/docker_services/infra/temporal-worker && ./build.sh temporal-worker
          cd $PROJECT_ROOT/docker_services/infra/vsa-db-setup && ./build.sh vsa-db-setup
          cd $PROJECT_ROOT/docker_services/infra/vsa-migrator && ./build.sh vsa-migrator
          cd $PROJECT_ROOT/docker_services/infra/vsa-mock-server && ./build.sh vsa-mock-server
          cd $PROJECT_ROOT/docker_services/tests/vsa-testcases && ./build.sh vsa-testcases

      - name: Starting Test
        env:
          UNIT_TEST_THRESHOLD: ${{vars.UNIT_TEST_THRESHOLD}}
        run: |
          go env
          cd $PROJECT_ROOT/src/main && go run .