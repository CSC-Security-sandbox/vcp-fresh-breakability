name: Main Workflow
on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read
  packages: read
  actions: read

concurrency:
  group: ${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Set up Go
        uses: actions/setup-go@v3
        with:
          go-version: '1.24.1'

      - name: Install dependencies
        run: go mod tidy

      - name: Cache Go modules
        uses: actions/cache/save@v4
        with:
          path: |
            ~/go/pkg/mod
            ~/.cache/go-build
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}

  ut-and-coverage:
    name: Unit Tests and Coverage
    uses: ./.github/workflows/tests-coverage.yaml
    secrets: inherit
    with:
      coverage-threshold: 80


  lint:
    runs-on: [self-hosted,linux]
    container:
      image: ghcr.io/vcp-vsa-control-plane/vsa-builder:v1
      options: --user root

    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Set up Go
        uses: actions/setup-go@v3
        with:
          go-version-file: go.mod

      - name: Run golangci-lint script
        run: |
          .github/scripts/lint.sh