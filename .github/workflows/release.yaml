name: Create Pre-Release and Publish Docker images

on:
  push:
    branches:
      - main

permissions:
  packages: write
  contents: read

jobs:
  create_pre_release_vsa_control_plane:
    name: Create Pre-Release and Publish Docker images
    runs-on: [self-hosted,linux]
    container:
      image: ghcr.io/vcp-vsa-control-plane/vsa-builder:v2
      options: --user root

    steps:
      - name: Check out the repo
        uses: actions/checkout@v2

      - name: Set up Go
        uses: actions/setup-go@v3
        with:
          go-version-file: go.mod

      - name: Log in to the Container registry
        run: |
          echo "${{ secrets.GHVSA_PAT }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Fetch new tag
        id: fetch_new_tag
        run: |
          echo "newTag=$(go run .github/scripts/fetchLatestBuild.go 2>&1)" >> $GITHUB_OUTPUT



      - name: Build and push Docker images
        run: skaffold build --filename=.github/scripts/skaffold_ci.yaml -t ${{ env.newTag }}
        env:
          newTag: ${{ steps.fetch_new_tag.outputs.newTag }}
          GHVSA_PAT: ${{ secrets.GHVSA_PAT }}  # TODO: use Github bot account here


      - name: Create a release
        run: gh release create -R https://github.com/${{ github.repository }} --generate-notes --prerelease ${{env.newTag}}
        env:
          GITHUB_TOKEN: ${{ secrets.GHVSA_PAT }}  # TODO: use Github bot account here
          GITHUB_REPOSITORY: ${{ github.event.repository.name }}
          newTag: ${{ steps.fetch_new_tag.outputs.newTag }}

    outputs:
      newTag: ${{ steps.fetch_new_tag.outputs.newTag }}

  update_jira_component_version:
    name: Update JIRA component version
    needs: create_pre_release_vsa_control_plane
    runs-on: [ ubuntu-22.04 ]
    container:
      image: ghcr.io/vcp-vsa-control-plane/vsacictl:v9
      options: -v /var/run/docker.sock:/var/run/docker.sock --user root

    steps:
      - name: Check out the repo
        uses: actions/checkout@v2

      - name: Set up Go
        uses: actions/setup-go@v3
        with:
          go-version-file: go.mod

      - name: Fetch token
        uses: actions/create-github-app-token@v1
        id: token
        with:
          owner: ${{ github.repository_owner }}
          app-id: ${{ secrets.VCP_CI_GH_APP_ID }}
          private-key: ${{ secrets.VCP_CI_GH_PRIVATE_KEY }}
          repositories: |
            vsa-control-plane

      - name: Fetch PR user and details
        id: fetch_pr_user_and_details
        run: |
          PR_DETAILS=$(gh api repos/${{ github.repository }}/commits/${{ github.sha }}/pulls --jq '.[0]')
          PR_USER=$(echo "$PR_DETAILS" | jq -r '.user.login')
          PR_TITLE=$(echo "$PR_DETAILS" | jq -r '.title')
          echo "PR_USER=$PR_USER" >> $GITHUB_ENV
          echo "PR_TITLE=$PR_TITLE" >> $GITHUB_ENV
          echo "PR User: $PR_USER"
          echo "PR Title: $PR_TITLE"
        env:
          GITHUB_TOKEN: ${{ secrets.GHVSA_PAT }}

      - name: Run jira tag_component_version
        env:
          PR_TITLE: ${{ env.PR_TITLE }}
          JIRA_API_TOKEN: ${{ secrets.VCP_CI_JIRA_BOT_PAT }}
          GITHUB_TOKEN: ${{ steps.token.outputs.token }}
          PR_USER: ${{ env.PR_USER }}
          REPOSITORY: ${{ github.repository }}
          GITHUB_SHA: ${{ github.sha }}
          NEW_TAG: ${{ needs.create_pre_release_vsa_control_plane.outputs.newTag }}
        run: vsacictl jira tag_component_version