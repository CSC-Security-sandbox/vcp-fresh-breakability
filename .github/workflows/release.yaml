name: Create Pre-Release and Publish Docker images

on:
  push:
    branches:
      - main
permissions:
  packages: write
  contents: read
  id-token: write

jobs:
  create_pre_release_vsa_control_plane:
    name: Create Pre-Release and Publish Docker images
    runs-on: [self-hosted,linux]
    container:
      image: ghcr.io/vcp-vsa-control-plane/vsacictl:v14
      options: --user root
    permissions:
      contents: read
      packages: write
      id-token: write


    steps:
      - name: Check out the repo
        uses: actions/checkout@v2

      - name: Set up Go
        uses: actions/setup-go@v3
        with:
          go-version-file: go.mod


      - name: Fetch new tag
        id: fetch_new_tag
        run: |
          echo "newTag=$(go run .github/scripts/fetchLatestBuild.go 2>&1)" >> $GITHUB_OUTPUT

      - name: Build images
        env:
          IMAGES_TAG: ${{ steps.fetch_new_tag.outputs.newTag }}
          GHVSA_PAT: ${{ secrets.GHVSA_PAT }}
        run: |
          skaffold config set default-repo ""
          skaffold build 
          make vcp-db-migrate-image imageVersion=${{ steps.fetch_new_tag.outputs.newTag }}

      - name: Check if digest exists in the gcloud or not
        shell: bash -e {0}
        run: |
          ALL_DIGESTS_EXIST=1
          IMAGES=("core" "google-proxy" "vcp-db-migrate")
          for IMAGE in "${IMAGES[@]}"; do
              gcpDigest=$(docker inspect "$IMAGE:${{ steps.fetch_new_tag.outputs.newTag }}" | jq -r '.[] | .RepoDigests[] | select(contains("-docker.pkg.dev"))')
              echo "gcp digest is $gcpDigest"
              if [[ -n "$gcpDigest" ]]; then
               echo "Digest for image ${IMAGE} exists in Google Artifact Registry."
               echo "${IMAGE}_DIGEST_EXISTS=1" >> $GITHUB_ENV 
              else
                echo "Digest for image ${IMAGE} does not exist in Google Artifact Registry."
                echo "${IMAGE}_DIGEST_EXISTS=0" >> $GITHUB_ENV 
                ALL_DIGESTS_EXIST=0
              fi
          done
          echo "ALL_DIGESTS_EXIST=$ALL_DIGESTS_EXIST" >> $GITHUB_ENV             


      - name: Log in to the Container registry
        run: |
          echo "${{ secrets.GHVSA_PAT }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Trim OIDC Requester ENVs
        uses: actions/github-script@v7
        id: script
        timeout-minutes: 10
        with:
          script: |
            const token = process.env['ACTIONS_RUNTIME_TOKEN']
            const runtimeUrl = process.env['ACTIONS_ID_TOKEN_REQUEST_URL']
            core.setOutput('TOKEN', token.trim())
            core.setOutput('IDTOKENURL', runtimeUrl.trim())

      - name: Get Github OIDC Token
        id: tokenid
        shell: bash
        run: |
          IDTOKEN=$(curl -H "Authorization: Bearer ${{steps.script.outputs.TOKEN}}" ${{steps.script.outputs.IDTOKENURL}}  -H "Accept: application/json; api-version=2.0" -H "Content-Type: application/json" -d "{}" | jq -r '.value')
          jwtd() {
              if [[ -x $(command -v jq) ]]; then
                  jq -R 'split(".") | .[0],.[1] | @base64d | fromjson' <<< "${1}"
                  echo "Signature: $(echo "${1}" | awk -F'.' '{print $3}')"
              fi
          }
          echo "idToken=${IDTOKEN}" >> $GITHUB_OUTPUT


      - name: Authenticate to gcloud
        run: |
          echo "${{ steps.tokenid.outputs.idToken }}" > /tmp/github-token.txt
          gcloud iam workload-identity-pools create-cred-config "projects/${{secrets.AR_GCP_PROJ_NUM}}/locations/global/workloadIdentityPools/${{secrets.AR_WLI_POOL}}/providers/${{secrets.AR_WLI_PROV}}" \
            --service-account="${{secrets.AR_GCP_SA}}@${{ secrets.AR_GCP_PROJ }}.iam.gserviceaccount.com" \
            --output-file="/tmp/gcloud-creds.json" \
            --credential-source-file="/tmp/github-token.txt"
          gcloud auth login --cred-file="/tmp/gcloud-creds.json" --quiet

      - name: Configure Docker
        run: |
          gcloud config set project ${{ secrets.AR_GCP_PROJ }} --quiet
          gcloud auth configure-docker ${{secrets.AR_GCP_REGION}}-docker.pkg.dev --quiet
          gcloud secrets versions access latest --secret="${{secrets.AR_PRIVATE_KEY}}" > /tmp/ec_private.pem

      - name: Push images
        env:
          GCP_PROJECT: ${{ secrets.AR_GCP_PROJ }}
          GHCR_REPO: ${{ secrets.GHCR_REPO }}
          GCP_REPO: ${{ secrets.AR_GCP_REPO }}
          IMAGES_TAG: ${{ steps.fetch_new_tag.outputs.newTag }}
          GCP_REGION: ${{ secrets.AR_GCP_REGION }}
        run: vsacictl images push

      - name: Get image digest via GitHub API
        id: get-digest
        run: |
          repo="${1:-VCP-VSA-control-Plane/vsa-control-plane}"  
          token=$(curl -s "https://ghcr.io/token?service=ghcr.io&scope=repository:${repo}:pull" \
          -u "${{github.actor}}:${{secrets.GHVSA_PAT}}") 
          
          token_value=$(echo "$token" | jq -r '.token')
          
          IMAGES=("core" "google-proxy" "vcp-db-migrate")
          for IMAGE in "${IMAGES[@]}"; do
            digest=$(curl -s -H "Authorization: Bearer $token_value" \
            -H "Accept: application/vnd.oci.image.manifest.v1+json" \
            https://ghcr.io/v2/VCP-VSA-control-Plane/${IMAGE}/manifests/${{ steps.fetch_new_tag.outputs.newTag }} | jq -r '.config.digest')
            echo "${IMAGE}-digest=$digest" >> $GITHUB_ENV
          done
        shell: bash -e {0}

      - name: Sign the GHCR Image using cosign
        run: |
          gcloud secrets versions access latest --secret="${{vars.GH_COSIGN_PUB_KEY}}" > /tmp/cosign.pub
          gcloud secrets versions access latest --secret="${{vars.GH_COSIGN_PVT_KEY}}" > /tmp/cosign.key
          IMAGES=("core" "google-proxy" "vcp-db-migrate")
          for IMAGE in "${IMAGES[@]}"; do
            digest=$(printenv "${IMAGE}-digest")
            COSIGN_PASSWORD="" cosign sign --key /tmp/cosign.key  ghcr.io/vcp-vsa-control-plane/${IMAGE}@$digest --tlog-upload=false
            cosign verify --key /tmp/cosign.pub  ghcr.io/vcp-vsa-control-plane/${IMAGE}@$digest --insecure-ignore-tlog=true
          done
        shell: bash -e {0}
      - name: Access Private Key
        if: ${{ env.ALL_DIGESTS_EXIST == '0' }}
        run: |
          gcloud secrets versions access latest --secret="${{secrets.AR_PRIVATE_KEY}}" > /tmp/ec_private.pem

      - name: Retrieve Public Key ID
        if: ${{ env.ALL_DIGESTS_EXIST == '0' }}
        id: retrieve_public_key_id
        run: |
          PUBLIC_KEY_ID=$(gcloud container binauthz attestors describe ${{secrets.AR_ATTESTOR_NAME}} --format='value(userOwnedGrafeasNote.publicKeys[0].id)')
          echo "PUBLIC_KEY_ID=${PUBLIC_KEY_ID}" >> $GITHUB_ENV

      - name: Generate Artifact URLs
        if: ${{ env.ALL_DIGESTS_EXIST == '0' }}
        id: generate_artifact_urls
        shell: bash -e {0}
        run: |
          IMAGES=("core" "google-proxy" "vcp-db-migrate")
          for IMAGE in "${IMAGES[@]}"; do
            ARTIFACT_URL=$(gcloud artifacts docker images list ${{secrets.AR_GCP_REGION}}-docker.pkg.dev/${{secrets.AR_GCP_PROJ}}/${{secrets.AR_GCP_REPO}}/${IMAGE} \
            --include-tags \
            --format="value(DIGEST)" \
            --filter="TAGS:${{ steps.fetch_new_tag.outputs.newTag }}" | awk '{print "${{secrets.AR_GCP_REGION}}-docker.pkg.dev/${{secrets.AR_GCP_PROJ}}/${{secrets.AR_GCP_REPO}}/'${IMAGE}'@" $1}')
            echo "${IMAGE}_ARTIFACT_URL=${ARTIFACT_URL}" >> $GITHUB_ENV
          done

      - name: Generate and Sign Payloads
        if: ${{ env.ALL_DIGESTS_EXIST == '0' }}
        shell: bash -e {0}
        run: |
          IMAGES=("core" "google-proxy" "vcp-db-migrate")
          for IMAGE in "${IMAGES[@]}"; do
            ARTIFACT_URL=$(printenv "${IMAGE}_ARTIFACT_URL")
            gcloud container binauthz create-signature-payload \
            --artifact-url=${ARTIFACT_URL} > /tmp/${IMAGE}_payload.json
            openssl dgst -sha256 -sign /tmp/ec_private.pem /tmp/${IMAGE}_payload.json > /tmp/${IMAGE}_signature
          done

      - name: Create Attestations
        if: ${{ env.ALL_DIGESTS_EXIST == '0' }}
        shell: bash -e {0}
        run: |
          IMAGES=("core" "google-proxy" "vcp-db-migrate")
          for IMAGE in "${IMAGES[@]}"; do
            if [[ "$(printenv "${IMAGE}_DIGEST_EXISTS")" == "0" ]]; then
              ARTIFACT_URL=$(printenv "${IMAGE}_ARTIFACT_URL")
              gcloud container binauthz attestations create \
              --project="${{secrets.AR_GCP_PROJ}}" \
              --artifact-url="${ARTIFACT_URL}" \
              --attestor="projects/${{secrets.AR_GCP_PROJ}}/attestors/${{secrets.AR_ATTESTOR_NAME}}" \
              --signature-file=/tmp/${IMAGE}_signature \
              --public-key-id="${{ env.PUBLIC_KEY_ID }}" \
              --validate
              echo "Attestation created for image ${IMAGE}."
            else
              echo "Signed Digest for image ${IMAGE} already exists in Google Artifact Registry. Skipping attestation."
            fi
          done

      - name: Helm Login to Artifact Registry
        run: |
          gcloud auth print-access-token | helm registry login -u oauth2accesstoken --password-stdin https://${{secrets.AR_GCP_REGION}}-docker.pkg.dev
          helm registry login ghcr.io -u ${{github.actor}} --password ${{ secrets.GHVSA_PAT }}

      - name: Update Versions of helm charts
        run: |
          ./.github/scripts/updateHelmVersion.sh ${{ steps.fetch_new_tag.outputs.newTag }}

      - name: Package Helm Charts
        run: |
          helm package kubernetes/vsa-control-plane --destination ./helm-packages

      - name: Push Helm Charts to GHCR
        run: |
          for CHART in ./helm-packages/*.tgz; do
            helm push $CHART oci://ghcr.io/vcp-vsa-control-plane
          done

      - name: Push Helm Charts to Artifact Registry
        run: |
          for CHART in ./helm-packages/*.tgz; do
            helm push $CHART oci://${{ secrets.AR_GCP_REGION }}-docker.pkg.dev/${{ secrets.AR_GCP_PROJ }}/${{secrets.AR_HELM_REPO}}
          done           

      - name: Create a release
        run: gh release create -R https://github.com/${{ github.repository }} --generate-notes --prerelease ${{steps.fetch_new_tag.outputs.newTag}}
        env:
          GH_TOKEN: ${{ secrets.GHVSA_PAT }}
          GITHUB_REPOSITORY: ${{ github.event.repository.name }}
          newTag: ${{ steps.fetch_new_tag.outputs.newTag }}

    outputs:
      newTag: ${{ steps.fetch_new_tag.outputs.newTag }}

  update_jira_component_version:
    name: Update JIRA component version
    needs: create_pre_release_vsa_control_plane
    runs-on: [ ubuntu-22.04 ]
    container:
      image: ghcr.io/vcp-vsa-control-plane/vsacictl:v14
      options: -v /var/run/docker.sock:/var/run/docker.sock --user root

    steps:
      - name: Check out the repo
        uses: actions/checkout@v2

      - name: Set up Go
        uses: actions/setup-go@v3
        with:
          go-version-file: go.mod

      - name: Log in to the Container registry
        run: |
          echo "${{ secrets.GHVSA_PAT }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Configure Git for private modules
        run: |
          git config --global url."https://${{ secrets.GHVSA_PAT }}@github.com/".insteadOf "https://github.com/"

      - name: Fetch PR user and details
        id: fetch_pr_user_and_details
        run: |
          PR_DETAILS=$(curl -sf -H "Authorization: Bearer ${{ secrets.GHVSA_PAT }}" \
          -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/VCP-VSA-control-Plane/vsa-control-plane/commits/${{ github.sha }}/pulls")
          
          echo "PR_DETAILS FETCHED"
            
            # Check if the curl command succeeded
            if [[ $? -ne 0 || -z "$PR_DETAILS" ]]; then
          echo "Error: Failed to fetch PR details or response is empty."
            exit 1
            fi
            
            # Parse the first PR object
            PR_DETAILS=$(echo "$PR_DETAILS" | tr -d '\000-\037' | jq '.[0]')
            
            # Validate the parsed JSON
            if [[ "$PR_DETAILS" == "null" || -z "$PR_DETAILS" ]]; then
          echo "Error: No pull request found for the given commit."
            exit 1
            fi
            
            # Extract PR user and title
            PR_USER=$(echo "$PR_DETAILS" | jq -r '.user.login // empty')
            PR_TITLE=$(echo "$PR_DETAILS" | jq -r '.title // empty')
            
            # Validate extracted values
            if [[ -z "$PR_USER" || -z "$PR_TITLE" ]]; then
          echo "Error: PR user or title is empty."
            exit 1
            fi
            
            # Write to GITHUB_ENV
            echo "PR_USER=$PR_USER" >> $GITHUB_ENV
            echo "PR_TITLE=$PR_TITLE" >> $GITHUB_ENV
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GHVSA_PAT }}

      - name: Run jira tag_component_version
        env:
          PR_TITLE: ${{ env.PR_TITLE }}
          JIRA_API_TOKEN: ${{ secrets.VCP_CI_JIRA_BOT_PAT }}
          GITHUB_TOKEN: ${{ steps.token.outputs.token }}
          PR_USER: ${{ env.PR_USER }}
          REPOSITORY: VCP-VSA-control-Plane/vsa-control-plane
          GITHUB_SHA: ${{ github.sha }}
          NEW_TAG: ${{ needs.create_pre_release_vsa_control_plane.outputs.newTag }}
        run: vsacictl jira tag_component_version