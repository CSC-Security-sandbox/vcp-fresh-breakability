name: Validate Error Framework

on:
  pull_request:
    types: [opened, synchronize]  # Trigger when PR is opened or updated

permissions:
  contents: read
  packages: read
  actions: read

jobs:
  validate-errors:
    runs-on: [self-hosted]
    container:
      image: ghcr.io/vcp-vsa-control-plane/vsa-builder:v8
      options: --user root

    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Install jq
        run: |
          sudo apt-get update
          sudo apt-get install -y jq

      - name: Validate Error Framework
        run: |
          cd core/errors
          chmod +x validate.sh
          ./validate.sh