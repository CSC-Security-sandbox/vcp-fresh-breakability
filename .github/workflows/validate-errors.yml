name: Validate Error Framework

on:
  pull_request:
    types: [opened, synchronize]  # Trigger when PR is opened or updated

permissions:
  contents: read
  packages: read
  actions: read

jobs:
  validate-errors:
    runs-on: [self-hosted]
    container:
      image: ghcr.io/vcp-vsa-control-plane/vsa-builder:v9
      options: --user root

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install jq
        run: |
          set -u
          if command -v jq >/dev/null 2>&1; then
            echo "jq already installed: $(jq --version)"
            exit 0
          fi
          # The self-hosted runner's NetApp apt mirror periodically serves a
          # stale jammy-backports/universe index, and the git-core PPA is not
          # reachable from this network. jq lives in jammy/main, so drop both
          # sources before updating to avoid hard-failing on unrelated repos.
          sudo rm -f /etc/apt/sources.list.d/git-core-*.list || true
          if [ -f /etc/apt/sources.list ]; then
            sudo sed -i.bak '/jammy-backports/d' /etc/apt/sources.list || true
          fi
          sudo apt-get update -o Acquire::Retries=3 || true
          sudo apt-get install -y --no-install-recommends jq
          jq --version

      - name: Validate Error Framework
        run: |
          cd lib/errors
          chmod +x validate.sh
          ./validate.sh
