name: VSA and Mediator Compute Image Copy

# This workflow copies VSA or Mediator compute images to autopush, staging, or prod.
# All run parameters (version, image_name, bundle_name, upgrade paths) are read from a config file in config/VSA-Image/. VLM worker copy is not in this workflow; use separate steps when ready.
# Manual trigger: provide Config file name (e.g. 9.18.1X26.json), Run mode, Image type, and Environment. See config/VSA-Image/README.md.

permissions:
  contents: read

on:
  workflow_dispatch:
    inputs:
      config_file_name:
        description: 'Config file name in config/VSA-Image/ (e.g. 9.18.1X26.json). All version, image, bundle, and upgrade parameters are read from this file.'
        required: true
        type: string
      run_mode:
        description: 'Run mode'
        required: true
        type: choice
        options:
          - single_environment
          - all_environments
      image_type:
        description: 'Image type: vsa (VSA image only), mediator (Mediator image only), or both (VSA + Mediator + upgrade + RBAC + VLM when in config)'
        required: true
        type: choice
        options:
          - vsa
          - mediator
          - both
      environment:
        description: 'Target environment (used only when Run mode is Single environment)'
        required: true
        type: choice
        options:
          - autopush
          - staging
          - prod

env:
  GCP_REGION: 'us-central1'
  GCP_ZONE: 'us-central1-a'
  PULL_VM_PROJECT: 'gcnv-vsa-prod'
  PULL_VM_NAME: 'vsa-pull-image-instance'

jobs:
  resolve-dispatch-inputs:
    name: Resolve Parameters (from config file)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      run_mode: ${{ steps.resolve.outputs.run_mode }}
      image_type: ${{ steps.resolve.outputs.image_type }}
      image_types: ${{ steps.resolve.outputs.image_types }}
      environment: ${{ steps.resolve.outputs.environment }}
      version: ${{ steps.resolve.outputs.version }}
      image_name: ${{ steps.resolve.outputs.image_name }}
      mediator_image_name: ${{ steps.resolve.outputs.mediator_image_name }}
      bundle_name: ${{ steps.resolve.outputs.bundle_name }}
      upgrade_release_bundle_path: ${{ steps.resolve.outputs.upgrade_release_bundle_path }}
      upgrade_file_path: ${{ steps.resolve.outputs.upgrade_file_path }}
      destination_bucket: ${{ steps.resolve.outputs.destination_bucket }}
      source_bucket: ${{ steps.resolve.outputs.source_bucket }}
      is_autopush: ${{ steps.resolve.outputs.is_autopush }}
      vlm_worker_tar_gz_path: ${{ steps.resolve.outputs.vlm_worker_tar_gz_path }}
      vlm_worker_tag: ${{ steps.resolve.outputs.vlm_worker_tag }}
      rbac_folder_path: ${{ steps.resolve.outputs.rbac_folder_path }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Resolve from config file
        id: resolve
        env:
          CONFIG_FILE_NAME: ${{ inputs.config_file_name }}
          IMAGE_TYPE_INPUT: ${{ inputs.image_type }}
        run: |
          set -euo pipefail
          VSA_IMAGE_DIR="config/VSA-Image"
          CONFIG_FILE="$VSA_IMAGE_DIR/$CONFIG_FILE_NAME"
          [ -z "$CONFIG_FILE_NAME" ] && { echo "❌ Config file name is required"; exit 1; }
          [ ! -f "$CONFIG_FILE" ] && { echo "❌ Config file not found: $CONFIG_FILE"; exit 1; }
          RUN_MODE="${{ inputs.run_mode }}"
          IMAGE_TYPE="$IMAGE_TYPE_INPUT"
          ENVIRONMENT="${{ inputs.environment }}"
          if [ "$IMAGE_TYPE" = "both" ] && [ "$RUN_MODE" = "all_environments" ]; then
            echo "❌ Image type 'Both' is only supported with Run mode 'Single environment'. For all environments, run twice (VSA then Mediator) or use single environment with Both."
            exit 1
          fi
          echo "📄 Reading from $CONFIG_FILE"
          # Image types array for matrix: both -> [vsa, mediator], else single
          if [ "$IMAGE_TYPE" = "both" ]; then
            IMAGE_TYPES_JSON='["vsa","mediator"]'
          else
            IMAGE_TYPES_JSON="[\"$IMAGE_TYPE\"]"
          fi
          # Support two formats: (1) release-bundle (email-style) or (2) flat
          if jq -e '.release_bucket_prefix != null and (.release_bucket_prefix | type == "string") and (.release_bucket_prefix | length > 0)' "$CONFIG_FILE" >/dev/null 2>&1; then
            RELEASE_PREFIX=$(jq -r '.release_bucket_prefix // empty' "$CONFIG_FILE")
            RELEASE_VER=$(jq -r '.release_version // empty' "$CONFIG_FILE")
            [ -z "$RELEASE_PREFIX" ] && { echo "❌ Missing release_bucket_prefix in $CONFIG_FILE"; exit 1; }
            [ -z "$RELEASE_VER" ] && { echo "❌ Missing release_version in $CONFIG_FILE"; exit 1; }
            BUNDLE_NAME="${RELEASE_PREFIX##*/}"
            VERSION="$RELEASE_VER"
            VSA_IMAGE_NAME=$(jq -r '[.images[]? | select(.name | startswith("x-"))] | .[0].name // empty' "$CONFIG_FILE")
            MEDIATOR_IMAGE_NAME=$(jq -r '[.images[]? | select(.name | startswith("cvo-mediator"))] | .[0].name // empty' "$CONFIG_FILE")
            if [ "$IMAGE_TYPE" = "both" ]; then
              [ -z "$VSA_IMAGE_NAME" ] && { echo "❌ No VSA image in .images[] in $CONFIG_FILE"; exit 1; }
              [ -z "$MEDIATOR_IMAGE_NAME" ] && { echo "❌ No Mediator image in .images[] in $CONFIG_FILE"; exit 1; }
              IMAGE_NAME="$VSA_IMAGE_NAME"
            elif [ "$IMAGE_TYPE" = "vsa" ]; then
              IMAGE_NAME="${VSA_IMAGE_NAME}"
              [ -z "$IMAGE_NAME" ] && { echo "❌ No image found in .images[] for type=$IMAGE_TYPE"; exit 1; }
            else
              IMAGE_NAME="${MEDIATOR_IMAGE_NAME}"
              [ -z "$IMAGE_NAME" ] && { echo "❌ No image found in .images[] for type=$IMAGE_TYPE"; exit 1; }
            fi
            UPGRADE_BUNDLE="$RELEASE_PREFIX"
            UPGRADE_FILE=$(jq -r '.upgrade_file_path // .gc_nv_image_path // empty' "$CONFIG_FILE")
          else
            VERSION=$(jq -r '.version // empty' "$CONFIG_FILE")
            VSA_IMAGE_NAME=$(jq -r '.image_name // empty' "$CONFIG_FILE")
            MEDIATOR_IMAGE_NAME=$(jq -r '.mediator_image_name // empty' "$CONFIG_FILE")
            if [ "$IMAGE_TYPE" = "both" ]; then
              [ -z "$VSA_IMAGE_NAME" ] && { echo "❌ Config must have image_name (VSA) for copy both"; exit 1; }
              [ -z "$MEDIATOR_IMAGE_NAME" ] && { echo "❌ Config must have mediator_image_name for copy both"; exit 1; }
              IMAGE_NAME="$VSA_IMAGE_NAME"
              echo "📌 Copy both: VSA=$VSA_IMAGE_NAME Mediator=$MEDIATOR_IMAGE_NAME"
            elif [ "$IMAGE_TYPE" = "mediator" ]; then
              [ -z "$MEDIATOR_IMAGE_NAME" ] && { echo "❌ For Mediator, config must have mediator_image_name"; exit 1; }
              IMAGE_NAME="$MEDIATOR_IMAGE_NAME"
              echo "📌 Using Mediator image: $IMAGE_NAME"
            else
              IMAGE_NAME="$VSA_IMAGE_NAME"
              echo "📌 Using VSA image: $IMAGE_NAME"
            fi
            BUNDLE_NAME=$(jq -r '.bundle_name // empty' "$CONFIG_FILE")
            UPGRADE_BUNDLE=$(jq -r '.upgrade_release_bundle_path // empty' "$CONFIG_FILE")
            UPGRADE_FILE=$(jq -r '.upgrade_file_path // empty' "$CONFIG_FILE")
            [ -z "$VERSION" ] && { echo "❌ Missing required key in $CONFIG_FILE: version"; exit 1; }
            [ -z "$IMAGE_NAME" ] && { echo "❌ Missing required key in $CONFIG_FILE: image_name (VSA) or mediator_image_name (Mediator)"; exit 1; }
            [ -z "$BUNDLE_NAME" ] && { echo "❌ Missing required key in $CONFIG_FILE: bundle_name"; exit 1; }
          fi
          [ -z "$UPGRADE_BUNDLE" ] && { echo "❌ Missing upgrade_release_bundle_path (or release_bucket_prefix) in $CONFIG_FILE"; exit 1; }
          [ -z "$UPGRADE_FILE" ] && { echo "❌ Missing upgrade_file_path (or gc_nv_image_path) in $CONFIG_FILE"; exit 1; }
          # Optional VLM worker (for push-vlm-worker-image job)
          VLM_PATH=$(jq -r '.vlm_worker_path // empty' "$CONFIG_FILE")
          VLM_TAG=$(jq -r '.vlm_worker_tag // empty' "$CONFIG_FILE")
          if [ -n "$VLM_PATH" ] && [ -n "$VLM_TAG" ]; then
            VLM_FULL_PATH="gs://cot-releases-public/$UPGRADE_BUNDLE/$VLM_PATH"
            echo "vlm_worker_tar_gz_path=$VLM_FULL_PATH" >> $GITHUB_OUTPUT
            echo "vlm_worker_tag=$VLM_TAG" >> $GITHUB_OUTPUT
          fi
          # Optional RBAC folder path (relative to upgrade_release_bundle_path); copies gcnvadmin_create_cli + gcnvadmin_create_cli.sha256.b64
          RBAC_FOLDER=$(jq -r '.rbac_folder_path // empty' "$CONFIG_FILE")
          if [ -n "$RBAC_FOLDER" ]; then
            echo "rbac_folder_path=$RBAC_FOLDER" >> $GITHUB_OUTPUT
          fi
          # Destination/source bucket and is_autopush for copy-upgrade and downstream
          case "$ENVIRONMENT" in
            autopush) DESTINATION_BUCKET="gcnv-autopush-images-bucket"; SOURCE_BUCKET="vsa-compute-images"; IS_AUTOPUSH="true" ;;
            staging)  DESTINATION_BUCKET="gcnv-staging-images-bucket"; SOURCE_BUCKET="gcnv-autopush-images-bucket"; IS_AUTOPUSH="false" ;;
            prod)     DESTINATION_BUCKET="gcnv-prod-images-bucket"; SOURCE_BUCKET="gcnv-autopush-images-bucket"; IS_AUTOPUSH="false" ;;
            *)       DESTINATION_BUCKET=""; SOURCE_BUCKET=""; IS_AUTOPUSH="false" ;;
          esac
          echo "run_mode=$RUN_MODE" >> $GITHUB_OUTPUT
          echo "image_type=$IMAGE_TYPE" >> $GITHUB_OUTPUT
          echo "image_types=$IMAGE_TYPES_JSON" >> $GITHUB_OUTPUT
          echo "environment=$ENVIRONMENT" >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "image_name=$VSA_IMAGE_NAME" >> $GITHUB_OUTPUT
          echo "mediator_image_name=$MEDIATOR_IMAGE_NAME" >> $GITHUB_OUTPUT
          echo "bundle_name=$BUNDLE_NAME" >> $GITHUB_OUTPUT
          echo "upgrade_release_bundle_path=$UPGRADE_BUNDLE" >> $GITHUB_OUTPUT
          echo "upgrade_file_path=$UPGRADE_FILE" >> $GITHUB_OUTPUT
          echo "destination_bucket=$DESTINATION_BUCKET" >> $GITHUB_OUTPUT
          echo "source_bucket=$SOURCE_BUCKET" >> $GITHUB_OUTPUT
          echo "is_autopush=$IS_AUTOPUSH" >> $GITHUB_OUTPUT

      - name: What will be copied (summary)
        run: |
          echo "## 📋 Files / images that will be copied" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          IMAGE_TYPE="${{ inputs.image_type }}"
          VSA_NAME="${{ steps.resolve.outputs.image_name }}"
          MED_NAME="${{ steps.resolve.outputs.mediator_image_name }}"
          UPGRADE="${{ steps.resolve.outputs.upgrade_file_path }}"
          RBAC_FOLDER="${{ steps.resolve.outputs.rbac_folder_path }}"
          echo "| Type | Name / path |" >> $GITHUB_STEP_SUMMARY
          echo "|------|-------------|" >> $GITHUB_STEP_SUMMARY
          if [ "$IMAGE_TYPE" = "both" ]; then
            echo "| **VSA image** | \`$VSA_NAME\` |" >> $GITHUB_STEP_SUMMARY
            echo "| **Mediator image** | \`$MED_NAME\` |" >> $GITHUB_STEP_SUMMARY
          elif [ "$IMAGE_TYPE" = "mediator" ]; then
            echo "| **Mediator image** | \`$MED_NAME\` |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| **VSA image** | \`$VSA_NAME\` |" >> $GITHUB_STEP_SUMMARY
          fi
          echo "| **Upgrade file** | \`$UPGRADE\` |" >> $GITHUB_STEP_SUMMARY
          if [ -n "$RBAC_FOLDER" ]; then
            echo "| **RBAC files** | \`gcnvadmin_create_cli\`, \`gcnvadmin_create_cli.sha256.b64\` (from \`$RBAC_FOLDER\`) |" >> $GITHUB_STEP_SUMMARY
          fi
          if [ -n "${{ steps.resolve.outputs.vlm_worker_tar_gz_path }}" ]; then
            echo "| **VLM worker image** | \`${{ steps.resolve.outputs.vlm_worker_tar_gz_path }}\` → tag \`${{ steps.resolve.outputs.vlm_worker_tag }}\` |" >> $GITHUB_STEP_SUMMARY
          fi

  push-vlm-worker-image:
    name: Push VLM Worker Image (when in config)
    runs-on: ubuntu-latest
    needs: resolve-dispatch-inputs
    if: needs.resolve-dispatch-inputs.outputs.run_mode == 'single_environment' && needs.resolve-dispatch-inputs.outputs.vlm_worker_tar_gz_path != '' && needs.resolve-dispatch-inputs.outputs.vlm_worker_tag != ''
    permissions:
      contents: read
      id-token: write
    env:
      VLM_REGISTRY: us-docker.pkg.dev
      VLM_PROJECT: gcnv-artifact-registry-nonprod
      VLM_REPO: vcp-container-images-us
      VLM_IMAGE: vlm-worker
      # Use pull VM + impersonation to read from cot-releases-public (org policy / VPC SC)
      VLM_IMPERSONATE_SA: gcnv-vsa-image-sa@gcnv-vsa-prod.iam.gserviceaccount.com
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WORKLOAD_IDENTITY_PROVIDER_VSA }}
          service_account: ${{ secrets.WORKLOAD_IDENTITY_SERVICE_ACCOUNT_VSA }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          export_default_credentials: true

      - name: Set GCP project and configure SSH
        run: |
          gcloud config set project ${PULL_VM_PROJECT}
          gcloud config set compute/region ${GCP_REGION}
          gcloud config set core/disable_prompts true

      - name: Copy vlm-worker tar.gz via Pull VM (impersonate SA)
        id: copy
        run: |
          set -euo pipefail
          SRC="${{ needs.resolve-dispatch-inputs.outputs.vlm_worker_tar_gz_path }}"
          VM_PATH="/tmp/vlm-worker.tar.gz"
          RUNNER_DEST="/tmp/vlm-worker.tar.gz"
          echo "📋 Copying from GCS via Pull VM (impersonate ${{ env.VLM_IMPERSONATE_SA }})"
          echo "   Source: $SRC"
          # 1) On VM: set impersonation and gsutil cp from GCS to VM
          gcloud compute ssh ${PULL_VM_NAME} \
            --zone=${GCP_ZONE} \
            --project=${PULL_VM_PROJECT} \
            --quiet \
            --command="gcloud config set auth/impersonate_service_account ${{ env.VLM_IMPERSONATE_SA }} && gsutil cp '$SRC' '$VM_PATH'"
          # 2) SCP from VM to runner
          gcloud compute scp \
            --zone=${GCP_ZONE} \
            --project=${PULL_VM_PROJECT} \
            ${PULL_VM_NAME}:${VM_PATH} \
            "$RUNNER_DEST"
          echo "✅ Copied to $RUNNER_DEST"
          echo "dest=$RUNNER_DEST" >> $GITHUB_OUTPUT

      - name: Configure Docker for Artifact Registry
        run: |
          gcloud auth configure-docker ${{ env.VLM_REGISTRY }} --quiet

      - name: Unzip (extract) tar.gz to tar
        id: unzip
        run: |
          set -euo pipefail
          GZ="${{ steps.copy.outputs.dest }}"
          TAR="/tmp/vlm-worker.tar"
          echo "📂 Extracting $GZ -> $TAR"
          gzip -dc "$GZ" > "$TAR"
          echo "✅ Extracted"
          echo "tar_file=$TAR" >> $GITHUB_OUTPUT

      - name: Load Docker image from tar file
        id: load
        run: |
          set -euo pipefail
          TAR_FILE="${{ steps.unzip.outputs.tar_file }}"
          echo "📦 Loading Docker image from $TAR_FILE"
          LOAD_OUTPUT=$(docker load -i "$TAR_FILE" 2>&1)
          echo "$LOAD_OUTPUT"
          if echo "$LOAD_OUTPUT" | grep -q "Loaded image:"; then
            LOADED_IMAGE=$(echo "$LOAD_OUTPUT" | grep "Loaded image:" | sed 's/^Loaded image: *//' | head -1)
          elif echo "$LOAD_OUTPUT" | grep -q "Loaded image ID:"; then
            LOADED_IMAGE=$(echo "$LOAD_OUTPUT" | grep "Loaded image ID:" | sed 's/^Loaded image ID: *//' | head -1)
          else
            LOADED_IMAGE=$(docker images --format "{{.Repository}}:{{.Tag}}" | head -1)
          fi
          if [ -z "$LOADED_IMAGE" ]; then
            echo "❌ Could not determine loaded image"
            exit 1
          fi
          echo "loaded_image=$LOADED_IMAGE" >> $GITHUB_OUTPUT
          echo "✅ Loaded image: $LOADED_IMAGE"

      - name: Check if VLM worker image already exists in registry
        id: check
        run: |
          set -euo pipefail
          TAG="${{ needs.resolve-dispatch-inputs.outputs.vlm_worker_tag }}"
          IMAGE_URI="${{ env.VLM_REGISTRY }}/${{ env.VLM_PROJECT }}/${{ env.VLM_REPO }}/${{ env.VLM_IMAGE }}:$TAG"
          echo "🔍 Checking if image exists: $IMAGE_URI"
          if gcloud artifacts docker images describe "$IMAGE_URI" --project="${{ env.VLM_PROJECT }}" 2>/dev/null; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "✅ VLM worker image already exists in registry: $IMAGE_URI"
            echo "   Skipping tag and push; continuing with pipeline."
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "ℹ️ Image not found in registry; will tag and push."
          fi

      - name: Tag and push VLM worker image
        if: steps.check.outputs.exists != 'true'
        run: |
          set -euo pipefail
          TAG="${{ needs.resolve-dispatch-inputs.outputs.vlm_worker_tag }}"
          TARGET="${{ env.VLM_REGISTRY }}/${{ env.VLM_PROJECT }}/${{ env.VLM_REPO }}/${{ env.VLM_IMAGE }}:$TAG"
          LOADED="${{ steps.load.outputs.loaded_image }}"
          echo "🏷️ Tagging: $LOADED -> $TARGET"
          docker tag "$LOADED" "$TARGET"
          echo "📤 Pushing to Artifact Registry..."
          docker push "$TARGET"
          echo "✅ Pushed $TARGET"

      - name: VLM push summary
        if: always()
        run: |
          echo "## VLM Worker Image Push" >> $GITHUB_STEP_SUMMARY
          echo "- **Source path**: ${{ needs.resolve-dispatch-inputs.outputs.vlm_worker_tar_gz_path }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Tag**: ${{ needs.resolve-dispatch-inputs.outputs.vlm_worker_tag }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Registry image**: ${{ env.VLM_REGISTRY }}/${{ env.VLM_PROJECT }}/${{ env.VLM_REPO }}/${{ env.VLM_IMAGE }}:${{ needs.resolve-dispatch-inputs.outputs.vlm_worker_tag }}" >> $GITHUB_STEP_SUMMARY
          if [ "${{ steps.check.outputs.exists }}" = "true" ]; then
            echo "- **Result**: Image already existed; skip push." >> $GITHUB_STEP_SUMMARY
          else
            echo "- **Result**: Image loaded, tagged and pushed." >> $GITHUB_STEP_SUMMARY
          fi

  parse-version-file:
    name: Resolve Parameters (${{ matrix.image_type }})
    runs-on: ubuntu-latest
    needs: resolve-dispatch-inputs
    if: needs.resolve-dispatch-inputs.outputs.run_mode == 'single_environment'
    strategy:
      matrix:
        image_type: ${{ fromJson(needs.resolve-dispatch-inputs.outputs.image_types) }}
    
    permissions:
      contents: read
    
    outputs:
      image_name: ${{ steps.parse.outputs.image_name }}
      sig_file_path: ${{ steps.parse.outputs.sig_file_path }}
      source_image_project: ${{ steps.parse.outputs.source_image_project }}
      source_project: ${{ steps.parse.outputs.source_project }}
      source_bucket: ${{ steps.parse.outputs.source_bucket }}
      destination_project: ${{ steps.parse.outputs.destination_project }}
      destination_bucket: ${{ steps.parse.outputs.destination_bucket }}
      storage_location: ${{ steps.parse.outputs.storage_location }}
      guest_os_features: ${{ steps.parse.outputs.guest_os_features }}
      is_autopush: ${{ steps.parse.outputs.is_autopush }}
      version: ${{ steps.parse.outputs.version }}
      image_type_path: ${{ steps.parse.outputs.image_type_path }}
      image_type: ${{ steps.parse.outputs.image_type }}
    
    steps:
      - name: Resolve parameters and derive source/destination
        id: parse
        run: |
          set -euo pipefail
          
          IMAGE_TYPE="${{ matrix.image_type }}"
          ENVIRONMENT="${{ needs.resolve-dispatch-inputs.outputs.environment }}"
          VSA_IMAGE_NAME="${{ needs.resolve-dispatch-inputs.outputs.image_name }}"
          MEDIATOR_IMAGE_NAME="${{ needs.resolve-dispatch-inputs.outputs.mediator_image_name }}"
          if [ "$IMAGE_TYPE" = "mediator" ]; then
            IMAGE_NAME="$MEDIATOR_IMAGE_NAME"
          else
            IMAGE_NAME="$VSA_IMAGE_NAME"
          fi
          VERSION="${{ needs.resolve-dispatch-inputs.outputs.version }}"
          BUNDLE_NAME="${{ needs.resolve-dispatch-inputs.outputs.bundle_name }}"
          
          # Validate required inputs
          if [ -z "$IMAGE_NAME" ] || [ -z "$VERSION" ] || [ -z "$BUNDLE_NAME" ]; then
            echo "❌ Missing required parameters for $IMAGE_TYPE: IMAGE_NAME, VERSION, and BUNDLE_NAME must be provided"
            exit 1
          fi
          
          echo "📄 Resolving for image_type=$IMAGE_TYPE image_name=$IMAGE_NAME"
          
          # Map image type to GCS path segment (vsa -> VSA, mediator -> Mediator per bucket convention)
          case "$IMAGE_TYPE" in
            vsa) IMAGE_TYPE_PATH_SEGMENT="VSA" ;;
            mediator) IMAGE_TYPE_PATH_SEGMENT="Mediator" ;;
            *) echo "❌ Invalid image_type: $IMAGE_TYPE"; exit 1 ;;
          esac
          IMAGE_TYPE_PATH="GCNV/${VERSION}/${IMAGE_TYPE_PATH_SEGMENT}"
          
          # Build SIG_FILE_PATH: gs://cot-releases-public/GCNV_released_bundle/<bundle_name>/<GCNV|Mediator>/<VERSION>/IMAGE_SIG_TGZ
          if [ "$IMAGE_TYPE" = "mediator" ]; then
            SIG_PATH_TYPE="Mediator"
          else
            SIG_PATH_TYPE="GCNV"
          fi
          SIG_FILE_PATH="gs://cot-releases-public/GCNV_released_bundle/${BUNDLE_NAME}/${SIG_PATH_TYPE}/${VERSION}/IMAGE_SIG_TGZ"
          
          # Validate environment once, then derive SOURCE_* and DESTINATION_*
          case "$ENVIRONMENT" in
            autopush)
              SOURCE_IMAGE_PROJECT="sssbu-seclab"
              SOURCE_PROJECT="gcnv-vsa-prod"
              SOURCE_BUCKET="vsa-compute-images"
              DESTINATION_PROJECT="gcnv-autopush-images"
              DESTINATION_BUCKET="gcnv-autopush-images-bucket"
              ;;
            staging)
              SOURCE_IMAGE_PROJECT="gcnv-autopush-images"
              SOURCE_PROJECT="gcnv-autopush-images"
              SOURCE_BUCKET="gcnv-autopush-images-bucket"
              DESTINATION_PROJECT="gcnv-staging-images"
              DESTINATION_BUCKET="gcnv-staging-images-bucket"
              ;;
            prod)
              SOURCE_IMAGE_PROJECT="gcnv-autopush-images"
              SOURCE_PROJECT="gcnv-autopush-images"
              SOURCE_BUCKET="gcnv-autopush-images-bucket"
              DESTINATION_PROJECT="gcnv-prod-images"
              DESTINATION_BUCKET="gcnv-prod-images-bucket"
              ;;
            *)
              echo "❌ Invalid environment: $ENVIRONMENT"
              exit 1
              ;;
          esac
          
          STORAGE_LOCATION="us"
          if [ "$IMAGE_TYPE" = "mediator" ]; then
            GUEST_OS_FEATURES="UEFI_COMPATIBLE,VIRTIO_SCSI_MULTIQUEUE,GVNIC,SEV_CAPABLE,SEV_LIVE_MIGRATABLE_V2"
          else
            GUEST_OS_FEATURES="UEFI_COMPATIBLE,GVNIC"
          fi
          
          if [ "$ENVIRONMENT" = "autopush" ]; then
            IS_AUTOPUSH="true"
          else
            IS_AUTOPUSH="false"
          fi
          
          echo "✅ Parameters resolved successfully"
          echo "IMAGE_NAME: $IMAGE_NAME"
          echo "VERSION: $VERSION"
          echo "SIG_FILE_PATH: $SIG_FILE_PATH"
          echo "IMAGE_TYPE_PATH: $IMAGE_TYPE_PATH"
          echo "SOURCE_IMAGE_PROJECT: $SOURCE_IMAGE_PROJECT"
          echo "SOURCE_PROJECT: $SOURCE_PROJECT"
          echo "SOURCE_BUCKET: $SOURCE_BUCKET"
          echo "DESTINATION_PROJECT: $DESTINATION_PROJECT"
          echo "DESTINATION_BUCKET: $DESTINATION_BUCKET"
          echo "STORAGE_LOCATION: $STORAGE_LOCATION"
          echo "GUEST_OS_FEATURES: $GUEST_OS_FEATURES"
          echo "IS_AUTOPUSH: $IS_AUTOPUSH"
          
          echo "image_name=$IMAGE_NAME" >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "image_type_path=$IMAGE_TYPE_PATH" >> $GITHUB_OUTPUT
          echo "image_type=$IMAGE_TYPE" >> $GITHUB_OUTPUT
          echo "sig_file_path=$SIG_FILE_PATH" >> $GITHUB_OUTPUT
          echo "source_image_project=$SOURCE_IMAGE_PROJECT" >> $GITHUB_OUTPUT
          echo "source_project=$SOURCE_PROJECT" >> $GITHUB_OUTPUT
          echo "source_bucket=$SOURCE_BUCKET" >> $GITHUB_OUTPUT
          echo "destination_project=$DESTINATION_PROJECT" >> $GITHUB_OUTPUT
          echo "destination_bucket=$DESTINATION_BUCKET" >> $GITHUB_OUTPUT
          echo "storage_location=$STORAGE_LOCATION" >> $GITHUB_OUTPUT
          echo "guest_os_features=$GUEST_OS_FEATURES" >> $GITHUB_OUTPUT
          echo "is_autopush=$IS_AUTOPUSH" >> $GITHUB_OUTPUT

  pre-check-image:
    name: Pre-check Image Existence (${{ matrix.image_type }})
    runs-on: ubuntu-latest
    needs: [resolve-dispatch-inputs, parse-version-file]
    strategy:
      matrix:
        image_type: ${{ fromJson(needs.resolve-dispatch-inputs.outputs.image_types) }}
    
    permissions:
      contents: read
      id-token: write
    
    outputs:
      image_exists: ${{ steps.check.outputs.image_exists }}
    
    steps:
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ needs.parse-version-file.outputs.destination_bucket == 'gcnv-prod-images-bucket' && secrets.WORKLOAD_IDENTITY_PROVIDER_VSA_PROD || secrets.WORKLOAD_IDENTITY_PROVIDER_VSA }}
          service_account: ${{ needs.parse-version-file.outputs.destination_bucket == 'gcnv-prod-images-bucket' && secrets.WORKLOAD_IDENTITY_SERVICE_ACCOUNT_VSA_PROD || secrets.WORKLOAD_IDENTITY_SERVICE_ACCOUNT_VSA }}
      
      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
      
      - name: Configure gcloud
        run: |
          gcloud config set compute/region ${GCP_REGION}
          gcloud config set core/disable_prompts true
      
      - name: Check if image exists in destination project
        id: check
        run: |
          set -euo pipefail
          
          IMAGE_NAME="${{ needs.parse-version-file.outputs.image_name }}"
          DEST_PROJECT="${{ needs.parse-version-file.outputs.destination_project }}"
          
          echo "🔍 Pre-checking if image exists in destination project (${{ matrix.image_type }})"
          echo "Image: $IMAGE_NAME"
          echo "Project: $DEST_PROJECT"
          echo ""
          
          # Check if image already exists
          IMAGE_EXISTS=false
          set +e
          gcloud compute images describe "$IMAGE_NAME" \
            --project="$DEST_PROJECT" \
            --quiet 2>/dev/null
          EXIT_CODE=$?
          set -e
          
          if [ $EXIT_CODE -eq 0 ]; then
            IMAGE_EXISTS=true
          fi
          
          if [ "$IMAGE_EXISTS" = "true" ]; then
            echo "✅ Image $IMAGE_NAME already exists in $DEST_PROJECT - will skip copy for this image"
            echo "image_exists=true" >> $GITHUB_OUTPUT
          else
            echo "ℹ️ Image $IMAGE_NAME does not exist in $DEST_PROJECT - will copy"
            echo "image_exists=false" >> $GITHUB_OUTPUT
          fi

  create-and-export-image:
    name: Create and Export Image (${{ matrix.image_type }}, Autopush Only)
    runs-on: ubuntu-latest
    needs: [resolve-dispatch-inputs, parse-version-file, pre-check-image]
    strategy:
      matrix:
        image_type: ${{ fromJson(needs.resolve-dispatch-inputs.outputs.image_types) }}
    if: |
      needs.parse-version-file.outputs.is_autopush == 'true' &&
      needs.pre-check-image.outputs.image_exists == 'false'
    
    permissions:
      contents: read
      id-token: write
    
    outputs:
      export_status: ${{ steps.export.outputs.status }}
      image_uri: ${{ steps.export.outputs.image_uri }}
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
            
      - name: Authenticate to Google Cloud (Source Project)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WORKLOAD_IDENTITY_PROVIDER_VSA_SECLAB }}
          service_account: ${{ secrets.WORKLOAD_IDENTITY_SERVICE_ACCOUNT_VSA_SECLAB }}
      
      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ needs.parse-version-file.outputs.source_project }}

      - name: Verify Service Account Permissions
        run: |
          set +e
          SERVICE_ACCOUNT="${{ secrets.WORKLOAD_IDENTITY_SERVICE_ACCOUNT_VSA_SECLAB }}"
          PROJECT="gcnv-vsa-prod"
          
          echo "=== Verifying Service Account Permissions ==="
          echo "Service Account: $SERVICE_ACCOUNT"
          echo ""
          
          # Check for serviceAccountTokenCreator role
          TOKEN_CREATOR=$(gcloud iam service-accounts get-iam-policy "$SERVICE_ACCOUNT" \
            --project="$PROJECT" \
            --flatten="bindings[].members" \
            --filter="bindings.role:roles/iam.serviceAccountTokenCreator AND bindings.members:serviceAccount:$SERVICE_ACCOUNT" \
            --format="value(bindings.role)" 2>/dev/null || echo "")
          
          if [ -z "$TOKEN_CREATOR" ]; then
            echo "❌ CRITICAL: serviceAccountTokenCreator role NOT FOUND!"
            echo ""
            echo "This permission is REQUIRED for workload identity to work."
            echo ""
            echo "=== REQUIRED FIX ==="
            echo "Run this command:"
            echo ""
            echo "gcloud iam service-accounts add-iam-policy-binding \"$SERVICE_ACCOUNT\" \\"
            echo "  --project=\"$PROJECT\" \\"
            echo "  --role=\"roles/iam.serviceAccountTokenCreator\" \\"
            echo "  --member=\"serviceAccount:$SERVICE_ACCOUNT\""
            echo ""
            echo "After running, wait 10-30 seconds for IAM propagation."
            exit 1
          else
            echo "✅ serviceAccountTokenCreator role found"
          fi
          set -e
      
      - name: Configure gcloud
        run: |
          gcloud config set compute/region ${GCP_REGION}
          gcloud config set core/disable_prompts true
          echo ""
          echo "=== Authentication Status ==="
          gcloud auth list
          echo ""
          echo "=== Current Project ==="
          gcloud config get-value project
          echo ""
          echo "=== Testing Token Generation ==="
          if gcloud auth print-access-token > /dev/null 2>&1; then
            echo "✅ Access token generated successfully"
          else
            echo "❌ Failed to generate access token"
            echo ""
            echo "This indicates an authentication issue. Check:"
            echo "1. Workload identity pool attribute condition matches repository"
            echo "2. Service account has workloadIdentityUser binding"
            echo "3. Service account has serviceAccountTokenCreator on itself"
            exit 1
          fi
        
      - name: Create compute image from source
        id: create
        run: |
          set -euo pipefail
          
          IMAGE_NAME="${{ needs.parse-version-file.outputs.image_name }}"
          SOURCE_IMAGE_PROJECT="${{ needs.parse-version-file.outputs.source_image_project }}"
          SOURCE_PROJECT="${{ needs.parse-version-file.outputs.source_project }}"
          
          echo "📦 Creating compute image: $IMAGE_NAME"
          echo "Source image: $IMAGE_NAME"
          echo "Source image project: $SOURCE_IMAGE_PROJECT"
          echo "Target project: $SOURCE_PROJECT"
          echo ""
          
          # Check if image already exists
          IMAGE_EXISTS=false
          if gcloud compute images describe "$IMAGE_NAME" \
            --project="$SOURCE_PROJECT" \
            --quiet 2>/dev/null; then
            IMAGE_EXISTS=true
          fi
          
          if [ "$IMAGE_EXISTS" = "true" ]; then
            echo "⚠️ Image $IMAGE_NAME already exists in $SOURCE_PROJECT"
            echo "status=exists" >> $GITHUB_OUTPUT
          else
            # Create image from source
            gcloud compute images create "$IMAGE_NAME" \
              --source-image="$IMAGE_NAME" \
              --source-image-project="$SOURCE_IMAGE_PROJECT" \
              --project="$SOURCE_PROJECT" \
              --quiet
            
            EXIT_CODE=$?
            if [ $EXIT_CODE -eq 0 ]; then
              echo "✅ Image created successfully"
              echo "status=created" >> $GITHUB_OUTPUT
            else
              echo "❌ Failed to create image"
              echo "status=failed" >> $GITHUB_OUTPUT
              exit 1
            fi
          fi
      
      - name: Export image to GCS
        id: export
        run: |
          set -euo pipefail
          
          IMAGE_NAME="${{ needs.parse-version-file.outputs.image_name }}"
          SOURCE_BUCKET="${{ needs.parse-version-file.outputs.source_bucket }}"
          SOURCE_PROJECT="${{ needs.parse-version-file.outputs.source_project }}"
          IMAGE_TYPE_PATH="${{ needs.parse-version-file.outputs.image_type_path }}"
          
          echo "📤 Exporting image to GCS bucket"
          echo "Image: $IMAGE_NAME"
          echo "Bucket: $SOURCE_BUCKET"
          echo "Project: $SOURCE_PROJECT"
          echo "Path: $IMAGE_TYPE_PATH"
          echo ""
          
          IMAGE_URI="gs://$SOURCE_BUCKET/$IMAGE_TYPE_PATH/$IMAGE_NAME.tar.gz"
          
          # Check if export already exists
          EXPORT_EXISTS=false
          if gsutil -q stat "$IMAGE_URI" 2>/dev/null; then
            EXPORT_EXISTS=true
          fi
          
          if [ "$EXPORT_EXISTS" = "true" ]; then
            echo "⚠️ Export already exists: $IMAGE_URI"
            echo "status=exists" >> $GITHUB_OUTPUT
            echo "image_uri=$IMAGE_URI" >> $GITHUB_OUTPUT
          else
            # Export image
            gcloud compute images export \
              --destination-uri="$IMAGE_URI" \
              --image="$IMAGE_NAME" \
              --project="$SOURCE_PROJECT" \
              --quiet
            
            EXIT_CODE=$?
            if [ $EXIT_CODE -eq 0 ]; then
              echo "✅ Image exported successfully to $IMAGE_URI"
              echo "status=success" >> $GITHUB_OUTPUT
              echo "image_uri=$IMAGE_URI" >> $GITHUB_OUTPUT
            else
              echo "❌ Failed to export image"
              echo "status=failed" >> $GITHUB_OUTPUT
              exit 1
            fi
          fi
      
      - name: Show create/export summary
        if: always()
        run: |
          echo "## Create and Export Summary (Autopush)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Image Name**: ${{ needs.parse-version-file.outputs.image_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Image Type**: ${{ needs.resolve-dispatch-inputs.outputs.image_type }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Source Image Project**: ${{ needs.parse-version-file.outputs.source_image_project }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Target Project**: ${{ needs.parse-version-file.outputs.source_project }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Export Bucket**: ${{ needs.parse-version-file.outputs.source_bucket }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Export URI**: ${{ steps.export.outputs.image_uri }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Status**: ${{ steps.export.outputs.status }}" >> $GITHUB_STEP_SUMMARY

  copy-signature-file-to-vsa-compute-images:
    name: Copy Signature File (${{ matrix.image_type }})
    runs-on: ubuntu-latest
    needs: [resolve-dispatch-inputs, parse-version-file, pre-check-image, create-and-export-image]
    strategy:
      matrix:
        image_type: ${{ fromJson(needs.resolve-dispatch-inputs.outputs.image_types) }}
    if: |
      needs.parse-version-file.outputs.is_autopush == 'true' &&
      (needs.create-and-export-image.result == 'success' || needs.create-and-export-image.result == 'skipped') &&
      needs.parse-version-file.outputs.sig_file_path != '' &&
      needs.parse-version-file.outputs.sig_file_path != 'null'
    
    permissions:
      contents: read
      id-token: write
    
    outputs:
      pull_status: ${{ steps.pull.outputs.status }}
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ needs.parse-version-file.outputs.destination_bucket == 'gcnv-prod-images-bucket' && secrets.WORKLOAD_IDENTITY_PROVIDER_VSA_PROD || secrets.WORKLOAD_IDENTITY_PROVIDER_VSA }}
          service_account: ${{ needs.parse-version-file.outputs.destination_bucket == 'gcnv-prod-images-bucket' && secrets.WORKLOAD_IDENTITY_SERVICE_ACCOUNT_VSA_PROD || secrets.WORKLOAD_IDENTITY_SERVICE_ACCOUNT_VSA }}
      
      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          export_default_credentials: true

      - name: Set GCP project
        run: |
          gcloud config set project ${PULL_VM_PROJECT}
      
      - name: Configure SSH for non-interactive mode
        run: |
          # Configure gcloud to skip SSH key prompts
          gcloud config set compute/region ${GCP_REGION}
          gcloud config set core/disable_prompts true
          # gcloud will automatically manage SSH keys when using compute ssh/scp commands

      - name: Copy script files to Pull VM
        run: |
          # First, create the directory on the VM if it doesn't exist
          gcloud compute ssh ${PULL_VM_NAME} \
            --zone=${GCP_ZONE} \
            --project=${PULL_VM_PROJECT} \
            --quiet \
            --command="sudo mkdir -p /opt/vsa-pull-image && sudo chmod 755 /opt/vsa-pull-image" || true
          
          # Copy script to a temporary location first
          gcloud compute scp \
            --zone=${GCP_ZONE} \
            --project=${PULL_VM_PROJECT} \
            .github/scripts/signature-file-copy.sh ${PULL_VM_NAME}:~/signature-file-copy.sh
          
          if [ $? -ne 0 ]; then
            echo "❌ Failed to copy script files to Pull VM"
            exit 1
          fi
          
          # Verify file was copied to home directory, then move to final location
          gcloud compute ssh ${PULL_VM_NAME} \
            --zone=${GCP_ZONE} \
            --project=${PULL_VM_PROJECT} \
            --quiet \
            --command="ls -la ~/signature-file-copy.sh && echo 'File exists in home directory'"
          
          if [ $? -ne 0 ]; then
            echo "❌ Script file not found in home directory after copy"
            exit 1
          fi
          
          # Move the script to the final location with sudo and verify it exists
          gcloud compute ssh ${PULL_VM_NAME} \
            --zone=${GCP_ZONE} \
            --project=${PULL_VM_PROJECT} \
            --quiet \
            --command="sudo mv ~/signature-file-copy.sh /opt/vsa-pull-image/signature-file-copy.sh && sudo chmod +x /opt/vsa-pull-image/signature-file-copy.sh && sudo ls -la /opt/vsa-pull-image/signature-file-copy.sh"
          
          if [ $? -ne 0 ]; then
            echo "❌ Failed to move script to final location or verify file"
            exit 1
          fi
          echo "✅ Script files copied to Pull VM and verified"
      
      - name: Execute signature file copy on Pull VM
        id: pull
        run: |
          set -euo pipefail
          
          VERSION="${{ needs.parse-version-file.outputs.version }}"
          IMAGE_TYPE="${{ needs.parse-version-file.outputs.image_type }}"
          IMAGE_TYPE_PATH_SEGMENT="${{ needs.parse-version-file.outputs.image_type_path }}"
          IMAGE_TYPE_PATH_SEGMENT=$(echo "$IMAGE_TYPE_PATH_SEGMENT" | rev | cut -d'/' -f1 | rev)
          SIG_FILE_PATH="${{ needs.parse-version-file.outputs.sig_file_path }}"
          SOURCE_BUCKET="${{ needs.parse-version-file.outputs.source_bucket }}"
          
          echo "🔽 Copying signature file to source bucket"
          echo "Signature File Path: $SIG_FILE_PATH"
          echo "Version: $VERSION"
          echo "Image Type: $IMAGE_TYPE_PATH_SEGMENT"
          echo "Source Bucket: $SOURCE_BUCKET"
          echo "Project: ${PULL_VM_PROJECT}"
          echo "VM: ${PULL_VM_NAME}"
          echo ""
          
          # Execute the copy command on the Pull VM
          # First verify the script exists before executing
          SCRIPT_EXISTS=false
          gcloud compute ssh ${PULL_VM_NAME} \
            --zone=${GCP_ZONE} \
            --project=${PULL_VM_PROJECT} \
            --quiet \
            --command="sudo test -f /opt/vsa-pull-image/signature-file-copy.sh && echo 'Script file exists'" 2>/dev/null || true
          
          EXIT_CODE=${PIPESTATUS[0]}
          if [ $EXIT_CODE -eq 0 ]; then
            SCRIPT_EXISTS=true
          fi
          
          if [ "$SCRIPT_EXISTS" != "true" ]; then
            echo "❌ Script file not found on VM before execution"
            exit 1
          fi
          
          # Execute signature file copy script
          # Parameters: version, image_type, sig_file_path, source_bucket
          gcloud compute ssh ${PULL_VM_NAME} \
            --zone=${GCP_ZONE} \
            --project=${PULL_VM_PROJECT} \
            --quiet \
            --command="sudo bash /opt/vsa-pull-image/signature-file-copy.sh '$VERSION' '$IMAGE_TYPE_PATH_SEGMENT' '$SIG_FILE_PATH' '$SOURCE_BUCKET'" \
            2>&1 | tee pull-execution.log
          
          EXIT_CODE=${PIPESTATUS[0]}
          
          # Check if execution was successful
          if [ ${EXIT_CODE} -eq 0 ]; then
            echo "✅ Signature file copy completed successfully"
            echo "status=success" >> $GITHUB_OUTPUT
          else
            echo "❌ Signature file copy failed with exit code ${EXIT_CODE}"
            echo "status=failure" >> $GITHUB_OUTPUT
            exit 1
          fi


  copy-to-destination:
    name: Copy to Destination Bucket (${{ matrix.image_type }})
    runs-on: ubuntu-latest
    needs: [resolve-dispatch-inputs, parse-version-file, pre-check-image, create-and-export-image, copy-signature-file-to-vsa-compute-images]
    strategy:
      matrix:
        image_type: ${{ fromJson(needs.resolve-dispatch-inputs.outputs.image_types) }}
    if: |
      always() &&
      needs.pre-check-image.outputs.image_exists == 'false' &&
      (
        (needs.parse-version-file.outputs.is_autopush == 'true' && needs.create-and-export-image.result != 'failure') ||
        (needs.parse-version-file.outputs.is_autopush == 'false')
      ) &&
      (
        (needs.parse-version-file.outputs.sig_file_path == '' || needs.parse-version-file.outputs.sig_file_path == 'null') ||
        (needs.copy-signature-file-to-vsa-compute-images.result == 'success' || needs.copy-signature-file-to-vsa-compute-images.result == 'skipped')
      )
    
    permissions:
      contents: read
      id-token: write
    
    outputs:
      copy_status: ${{ steps.copy.outputs.status }}
      source_uri: ${{ steps.copy.outputs.source_uri }}
      sig_copy_status: ${{ steps.copy-sig.outputs.status }}
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ needs.parse-version-file.outputs.destination_bucket == 'gcnv-prod-images-bucket' && secrets.WORKLOAD_IDENTITY_PROVIDER_VSA_PROD || secrets.WORKLOAD_IDENTITY_PROVIDER_VSA }}
          service_account: ${{ needs.parse-version-file.outputs.destination_bucket == 'gcnv-prod-images-bucket' && secrets.WORKLOAD_IDENTITY_SERVICE_ACCOUNT_VSA_PROD || secrets.WORKLOAD_IDENTITY_SERVICE_ACCOUNT_VSA }}
      
      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
      
      - name: Configure gcloud
        run: |
          gcloud config set compute/region ${GCP_REGION}
          gcloud config set core/disable_prompts true
      
      - name: Determine source URI
        id: determine-source
        run: |
          set -euo pipefail
          
          IMAGE_NAME="${{ needs.parse-version-file.outputs.image_name }}"
          IS_AUTOPUSH="${{ needs.parse-version-file.outputs.is_autopush }}"
          IMAGE_TYPE_PATH="${{ needs.parse-version-file.outputs.image_type_path }}"
          
          if [ "$IS_AUTOPUSH" == "true" ]; then
            # For autopush, use the exported image URI
            SOURCE_URI="${{ needs.create-and-export-image.outputs.image_uri }}"
          else
            # For staging/prod, use the source bucket directly with version/image_type path
            SOURCE_BUCKET="${{ needs.parse-version-file.outputs.source_bucket }}"
            SOURCE_URI="gs://$SOURCE_BUCKET/$IMAGE_TYPE_PATH/$IMAGE_NAME.tar.gz"
          fi
          
          echo "source_uri=$SOURCE_URI" >> $GITHUB_OUTPUT
          echo "Source URI: $SOURCE_URI"
      
      - name: Copy image to destination bucket
        id: copy
        run: |
          set -euo pipefail
          
          IMAGE_NAME="${{ needs.parse-version-file.outputs.image_name }}"
          SOURCE_URI="${{ steps.determine-source.outputs.source_uri }}"
          DEST_BUCKET="${{ needs.parse-version-file.outputs.destination_bucket }}"
          IMAGE_TYPE_PATH="${{ needs.parse-version-file.outputs.image_type_path }}"
          DEST_URI="gs://$DEST_BUCKET/$IMAGE_TYPE_PATH/$IMAGE_NAME.tar.gz"
          
          echo "📋 Copying image to destination bucket"
          echo "Source: $SOURCE_URI"
          echo "Destination: $DEST_URI"
          echo ""
          
          # Check if already exists in destination
          DEST_EXISTS=false
          if gsutil -q stat "$DEST_URI" 2>/dev/null; then
            DEST_EXISTS=true
          fi
          
          if [ "$DEST_EXISTS" = "true" ]; then
            echo "⚠️ Image already exists in destination bucket: $DEST_URI"
            echo "status=exists" >> $GITHUB_OUTPUT
            echo "source_uri=$SOURCE_URI" >> $GITHUB_OUTPUT
          else
            # Copy image
            gsutil cp "$SOURCE_URI" "$DEST_URI"
            
            EXIT_CODE=$?
            if [ $EXIT_CODE -eq 0 ]; then
              echo "✅ Image copied successfully to $DEST_URI"
              echo "status=success" >> $GITHUB_OUTPUT
              echo "source_uri=$SOURCE_URI" >> $GITHUB_OUTPUT
            else
              echo "❌ Failed to copy image"
              echo "status=failed" >> $GITHUB_OUTPUT
              exit 1
            fi
          fi
      
      - name: Copy signature file to destination bucket
        id: copy-sig
        if: needs.parse-version-file.outputs.sig_file_path != '' && needs.parse-version-file.outputs.sig_file_path != 'null'
        run: |
          set -euo pipefail
          
          SOURCE_BUCKET="${{ needs.parse-version-file.outputs.source_bucket }}"
          DEST_BUCKET="${{ needs.parse-version-file.outputs.destination_bucket }}"
          IMAGE_TYPE_PATH="${{ needs.parse-version-file.outputs.image_type_path }}"
          VERSION="${{ needs.parse-version-file.outputs.version }}"
          
          # Extract signature file name from SIG_FILE_PATH
          SIG_FILE_NAME="IMAGE_SIG_TGZ"
          
          # Construct source and destination paths
          SOURCE_SIG_URI="gs://$SOURCE_BUCKET/$IMAGE_TYPE_PATH/$SIG_FILE_NAME"
          DEST_SIG_URI="gs://$DEST_BUCKET/$IMAGE_TYPE_PATH/$SIG_FILE_NAME"
          
          echo "📋 Copying signature file to destination bucket"
          echo "Source: $SOURCE_SIG_URI"
          echo "Destination: $DEST_SIG_URI"
          echo ""
          
          # Wait a bit for eventual consistency (GCS can have slight delays after copy)
          echo "⏳ Checking if signature file exists in source bucket..."
          echo "  Expected location: $SOURCE_SIG_URI"
          echo ""
          
          MAX_RETRIES=10
          RETRY_COUNT=0
          SOURCE_EXISTS=false
          
          while [ $RETRY_COUNT -lt $MAX_RETRIES ]; do
            if gsutil -q stat "$SOURCE_SIG_URI" 2>/dev/null; then
              SOURCE_EXISTS=true
              echo "✅ Signature file found on attempt $((RETRY_COUNT + 1))"
              break
            fi
            RETRY_COUNT=$((RETRY_COUNT + 1))
            if [ $RETRY_COUNT -lt $MAX_RETRIES ]; then
              echo "  Retry $RETRY_COUNT/$MAX_RETRIES: File not found yet, waiting 5 seconds..."
              sleep 5
            fi
          done
          
          if [ "$SOURCE_EXISTS" != "true" ]; then
            echo "❌ Error: Signature file not found in source bucket after $MAX_RETRIES attempts: $SOURCE_SIG_URI"
            echo ""
            echo "Debug information:"
            echo "  - copy-signature-file-to-vsa-compute-images result: ${{ needs.copy-signature-file-to-vsa-compute-images.result }}"
            echo "  - Source bucket: $SOURCE_BUCKET"
            echo "  - Expected path: $IMAGE_TYPE_PATH/$SIG_FILE_NAME"
            echo "  - Full URI: $SOURCE_SIG_URI"
            echo ""
            echo "Listing files in source bucket path:"
            gsutil ls "gs://$SOURCE_BUCKET/$IMAGE_TYPE_PATH/" 2>&1 || echo "Could not list bucket contents"
            echo ""
            echo "Listing all files in GCNV directory:"
            gsutil ls "gs://$SOURCE_BUCKET/GCNV/" 2>&1 | head -20 || echo "Could not list GCNV directory"
            echo ""
            echo "status=not_found" >> $GITHUB_OUTPUT
            exit 1
          fi
          
          # Check if destination signature file already exists
          DEST_EXISTS=false
          if gsutil -q stat "$DEST_SIG_URI" 2>/dev/null; then
            DEST_EXISTS=true
          fi
          
          if [ "$DEST_EXISTS" = "true" ]; then
            echo "⚠️ Signature file already exists in destination bucket: $DEST_SIG_URI"
            echo "status=exists" >> $GITHUB_OUTPUT
            echo "dest_sig_uri=$DEST_SIG_URI" >> $GITHUB_OUTPUT
          else
            # Copy signature file
            gsutil cp "$SOURCE_SIG_URI" "$DEST_SIG_URI"
            
            EXIT_CODE=$?
            if [ $EXIT_CODE -eq 0 ]; then
              echo "✅ Signature file copied successfully to $DEST_SIG_URI"
              echo "status=success" >> $GITHUB_OUTPUT
              echo "dest_sig_uri=$DEST_SIG_URI" >> $GITHUB_OUTPUT
            else
              echo "❌ Failed to copy signature file"
              echo "status=failed" >> $GITHUB_OUTPUT
              exit 1
            fi
          fi
      
      - name: Show copy summary
        if: always()
        run: |
          echo "## Copy to Destination Summary (${{ matrix.image_type }})" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Image Name**: ${{ needs.parse-version-file.outputs.image_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Environment**: ${{ needs.resolve-dispatch-inputs.outputs.environment }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Source URI**: ${{ steps.copy.outputs.source_uri }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Destination Bucket**: ${{ needs.parse-version-file.outputs.destination_bucket }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Image Copy Status**: ${{ steps.copy.outputs.status }}" >> $GITHUB_STEP_SUMMARY
          if [ "${{ needs.parse-version-file.outputs.sig_file_path }}" != "" ] && [ "${{ needs.parse-version-file.outputs.sig_file_path }}" != "null" ]; then
            echo "- **Signature File Copy Status**: ${{ steps.copy-sig.outputs.status || 'N/A' }}" >> $GITHUB_STEP_SUMMARY
            echo "- **Signature File URI**: ${{ steps.copy-sig.outputs.dest_sig_uri || 'N/A' }}" >> $GITHUB_STEP_SUMMARY
          fi

  copy-upgrade-to-destination:
    name: Copy Upgrade File to Destination
    runs-on: ubuntu-latest
    needs: [resolve-dispatch-inputs, copy-to-destination]
    if: |
      always() &&
      needs.resolve-dispatch-inputs.outputs.run_mode == 'single_environment' &&
      needs.resolve-dispatch-inputs.outputs.upgrade_release_bundle_path != '' &&
      needs.resolve-dispatch-inputs.outputs.upgrade_file_path != '' &&
      needs.copy-to-destination.result != 'failure'
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ needs.resolve-dispatch-inputs.outputs.destination_bucket == 'gcnv-prod-images-bucket' && secrets.WORKLOAD_IDENTITY_PROVIDER_VSA_PROD || secrets.WORKLOAD_IDENTITY_PROVIDER_VSA }}
          service_account: ${{ needs.resolve-dispatch-inputs.outputs.destination_bucket == 'gcnv-prod-images-bucket' && secrets.WORKLOAD_IDENTITY_SERVICE_ACCOUNT_VSA_PROD || secrets.WORKLOAD_IDENTITY_SERVICE_ACCOUNT_VSA }}
      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
      - name: Configure gcloud
        run: |
          gcloud config set compute/region ${GCP_REGION}
          gcloud config set core/disable_prompts true
      - name: Copy upgrade file to destination bucket
        id: copy-upgrade
        run: |
          set -uo pipefail
          VERSION="${{ needs.resolve-dispatch-inputs.outputs.version }}"
          DEST_BUCKET="${{ needs.resolve-dispatch-inputs.outputs.destination_bucket }}"
          SOURCE_BUCKET="${{ needs.resolve-dispatch-inputs.outputs.source_bucket }}"
          IS_AUTOPUSH="${{ needs.resolve-dispatch-inputs.outputs.is_autopush }}"
          UPGRADE_RELEASE_BUNDLE="${{ needs.resolve-dispatch-inputs.outputs.upgrade_release_bundle_path }}"
          UPGRADE_FILE_PATH="${{ needs.resolve-dispatch-inputs.outputs.upgrade_file_path }}"
          ENVIRONMENT="${{ needs.resolve-dispatch-inputs.outputs.environment }}"
          FILENAME="${UPGRADE_FILE_PATH##*/}"
          UPGRADE_DIR="${UPGRADE_FILE_PATH%/*}"
          DEST_UPGRADE_PREFIX="gs://$DEST_BUCKET/GCNV/$VERSION/upgrade"
          DEST_URI="$DEST_UPGRADE_PREFIX/$FILENAME"
          COT_URI="gs://cot-releases-public/$UPGRADE_RELEASE_BUNDLE/$UPGRADE_FILE_PATH"
          COT_CHECKSUM_URI="gs://cot-releases-public/$UPGRADE_RELEASE_BUNDLE/$UPGRADE_DIR/cot.checksum.ONTAP-$VERSION.txt"
          if [ "$IS_AUTOPUSH" = "true" ]; then SOURCE_URI="$COT_URI"; else SOURCE_URI="gs://$SOURCE_BUCKET/GCNV/$VERSION/upgrade/$FILENAME"; fi
          echo "📋 Copying upgrade file to destination (once per run)"
          if gsutil -q stat "$DEST_URI" 2>/dev/null; then
            echo "✅ Upgrade file already exists: $DEST_URI"
            echo "status=exists" >> $GITHUB_OUTPUT
            exit 0
          fi
          if ! gsutil ls "$DEST_UPGRADE_PREFIX/" 2>/dev/null | head -1 | grep -q .; then
            echo -n | gsutil cp - "$DEST_UPGRADE_PREFIX/.keep" 2>/dev/null || true
          fi
          copy_success=false
          if gsutil -q stat "$SOURCE_URI" 2>/dev/null; then copy_success=true; fi
          if [ "$copy_success" != "true" ] && [ "$IS_AUTOPUSH" != "true" ]; then
            SOURCE_UPGRADE_PREFIX="gs://$SOURCE_BUCKET/GCNV/$VERSION/upgrade"
            if ! gsutil ls "$SOURCE_UPGRADE_PREFIX/" 2>/dev/null | head -1 | grep -q .; then echo -n | gsutil cp - "$SOURCE_UPGRADE_PREFIX/.keep" 2>/dev/null || true; fi
            if gsutil -q stat "$COT_URI" 2>/dev/null; then gsutil cp "$COT_URI" "gs://$SOURCE_BUCKET/GCNV/$VERSION/upgrade/$FILENAME" && echo "✅ Populated source from COT"; fi
            if gsutil -q stat "$SOURCE_URI" 2>/dev/null; then copy_success=true; fi
          fi
          if [ "$copy_success" != "true" ]; then echo "status=skipped" >> $GITHUB_OUTPUT; exit 0; fi
          gsutil cp "$SOURCE_URI" /tmp/upgrade_verify.tgz
          verify_ok=false
          gsutil cat "$COT_CHECKSUM_URI" 2>/dev/null > /tmp/expected_checksum.txt || true
          if [ -s /tmp/expected_checksum.txt ]; then
            EXPECTED=$(grep -oE '[a-fA-F0-9]{64}|[a-fA-F0-9]{32}' /tmp/expected_checksum.txt | head -1)
            if [ -n "$EXPECTED" ]; then
              LEN=${#EXPECTED}
              if [ "$LEN" -eq 64 ]; then ACTUAL=$(sha256sum /tmp/upgrade_verify.tgz | awk '{print $1}'); else ACTUAL=$(md5sum /tmp/upgrade_verify.tgz | awk '{print $1}'); fi
              if [ "$EXPECTED" = "$ACTUAL" ]; then verify_ok=true; else echo "status=checksum_mismatch" >> $GITHUB_OUTPUT; exit 0; fi
            fi
          fi
          gsutil cp /tmp/upgrade_verify.tgz "$DEST_URI"
          echo "✅ Upgrade file copied to $DEST_URI"
          echo "status=success" >> $GITHUB_OUTPUT

  copy-rbac-to-destination:
    name: Copy RBAC Files to Destination
    runs-on: ubuntu-latest
    needs: [resolve-dispatch-inputs, copy-to-destination]
    if: |
      always() &&
      needs.resolve-dispatch-inputs.outputs.run_mode == 'single_environment' &&
      needs.resolve-dispatch-inputs.outputs.rbac_folder_path != '' &&
      needs.copy-to-destination.result != 'failure'
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ needs.resolve-dispatch-inputs.outputs.destination_bucket == 'gcnv-prod-images-bucket' && secrets.WORKLOAD_IDENTITY_PROVIDER_VSA_PROD || secrets.WORKLOAD_IDENTITY_PROVIDER_VSA }}
          service_account: ${{ needs.resolve-dispatch-inputs.outputs.destination_bucket == 'gcnv-prod-images-bucket' && secrets.WORKLOAD_IDENTITY_SERVICE_ACCOUNT_VSA_PROD || secrets.WORKLOAD_IDENTITY_SERVICE_ACCOUNT_VSA }}
      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
      - name: Configure gcloud
        run: |
          gcloud config set compute/region ${GCP_REGION}
          gcloud config set core/disable_prompts true
      - name: Copy RBAC files to destination bucket
        id: copy-rbac
        run: |
          set -uo pipefail
          VERSION="${{ needs.resolve-dispatch-inputs.outputs.version }}"
          DEST_BUCKET="${{ needs.resolve-dispatch-inputs.outputs.destination_bucket }}"
          SOURCE_BUCKET="${{ needs.resolve-dispatch-inputs.outputs.source_bucket }}"
          IS_AUTOPUSH="${{ needs.resolve-dispatch-inputs.outputs.is_autopush }}"
          UPGRADE_BUNDLE="${{ needs.resolve-dispatch-inputs.outputs.upgrade_release_bundle_path }}"
          RBAC_FOLDER="${{ needs.resolve-dispatch-inputs.outputs.rbac_folder_path }}"
          RBAC_CLI="gcnvadmin_create_cli"
          RBAC_SHA="gcnvadmin_create_cli.sha256.b64"
          DEST_RBAC_PREFIX="gs://$DEST_BUCKET/GCNV/$VERSION/RBAC"
          DEST_CLI_URI="$DEST_RBAC_PREFIX/$RBAC_CLI"
          DEST_SHA_URI="$DEST_RBAC_PREFIX/$RBAC_SHA"
          COT_CLI_URI="gs://cot-releases-public/$UPGRADE_BUNDLE/$RBAC_FOLDER/$RBAC_CLI"
          COT_SHA_URI="gs://cot-releases-public/$UPGRADE_BUNDLE/$RBAC_FOLDER/$RBAC_SHA"
          SOURCE_CLI_URI="gs://$SOURCE_BUCKET/GCNV/$VERSION/RBAC/$RBAC_CLI"
          SOURCE_SHA_URI="gs://$SOURCE_BUCKET/GCNV/$VERSION/RBAC/$RBAC_SHA"
          echo "📋 Copying RBAC files to destination (once per run)"
          if gsutil -q stat "$DEST_CLI_URI" 2>/dev/null && gsutil -q stat "$DEST_SHA_URI" 2>/dev/null; then
            echo "✅ RBAC files already exist: $DEST_RBAC_PREFIX/"
            echo "status=exists" >> $GITHUB_OUTPUT
            exit 0
          fi
          if ! gsutil ls "$DEST_RBAC_PREFIX/" 2>/dev/null | head -1 | grep -q .; then
            echo -n | gsutil cp - "$DEST_RBAC_PREFIX/.keep" 2>/dev/null || true
          fi
          copy_cli=false
          copy_sha=false
          if [ "$IS_AUTOPUSH" = "true" ]; then
            if gsutil -q stat "$COT_CLI_URI" 2>/dev/null; then copy_cli=true; fi
            if gsutil -q stat "$COT_SHA_URI" 2>/dev/null; then copy_sha=true; fi
          else
            if gsutil -q stat "$SOURCE_CLI_URI" 2>/dev/null; then copy_cli=true; fi
            if gsutil -q stat "$SOURCE_SHA_URI" 2>/dev/null; then copy_sha=true; fi
            if [ "$copy_cli" != "true" ] && gsutil -q stat "$COT_CLI_URI" 2>/dev/null; then
              gsutil cp "$COT_CLI_URI" "$SOURCE_CLI_URI" 2>/dev/null && copy_cli=true || true
            fi
            if [ "$copy_sha" != "true" ] && gsutil -q stat "$COT_SHA_URI" 2>/dev/null; then
              gsutil cp "$COT_SHA_URI" "$SOURCE_SHA_URI" 2>/dev/null && copy_sha=true || true
            fi
          fi
          if [ "$copy_cli" != "true" ] || [ "$copy_sha" != "true" ]; then
            echo "⚠️ RBAC files not available at source/COT; skipping"
            echo "status=skipped" >> $GITHUB_OUTPUT
            exit 0
          fi
          SRC_CLI="$COT_CLI_URI"; SRC_SHA="$COT_SHA_URI"
          if [ "$IS_AUTOPUSH" != "true" ]; then SRC_CLI="$SOURCE_CLI_URI"; SRC_SHA="$SOURCE_SHA_URI"; fi
          gsutil cp "$SRC_CLI" "$DEST_CLI_URI"
          gsutil cp "$SRC_SHA" "$DEST_SHA_URI"
          echo "✅ RBAC files copied to $DEST_RBAC_PREFIX/"
          echo "status=success" >> $GITHUB_OUTPUT

  ensure-upgrade-when-vsa-image-present:
    name: Ensure Upgrade Folder (VSA Image Already Present)
    runs-on: ubuntu-latest
    needs: [resolve-dispatch-inputs, parse-version-file, pre-check-image]
    if: |
      needs.resolve-dispatch-inputs.outputs.run_mode == 'single_environment' &&
      needs.resolve-dispatch-inputs.outputs.image_type == 'vsa' &&
      needs.pre-check-image.outputs.image_exists == 'true' &&
      needs.resolve-dispatch-inputs.outputs.upgrade_release_bundle_path != '' &&
      needs.resolve-dispatch-inputs.outputs.upgrade_file_path != ''
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ needs.parse-version-file.outputs.destination_bucket == 'gcnv-prod-images-bucket' && secrets.WORKLOAD_IDENTITY_PROVIDER_VSA_PROD || secrets.WORKLOAD_IDENTITY_PROVIDER_VSA }}
          service_account: ${{ needs.parse-version-file.outputs.destination_bucket == 'gcnv-prod-images-bucket' && secrets.WORKLOAD_IDENTITY_SERVICE_ACCOUNT_VSA_PROD || secrets.WORKLOAD_IDENTITY_SERVICE_ACCOUNT_VSA }}
      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
      - name: Configure gcloud
        run: |
          gcloud config set compute/region ${GCP_REGION}
          gcloud config set core/disable_prompts true
      - name: Check upgrade folder and copy if missing
        id: ensure-upgrade
        run: |
          set -uo pipefail
          VERSION="${{ needs.parse-version-file.outputs.version }}"
          DEST_BUCKET="${{ needs.parse-version-file.outputs.destination_bucket }}"
          SOURCE_BUCKET="${{ needs.parse-version-file.outputs.source_bucket }}"
          IS_AUTOPUSH="${{ needs.parse-version-file.outputs.is_autopush }}"
          UPGRADE_RELEASE_BUNDLE="${{ needs.resolve-dispatch-inputs.outputs.upgrade_release_bundle_path }}"
          UPGRADE_FILE_PATH="${{ needs.resolve-dispatch-inputs.outputs.upgrade_file_path }}"
          ENVIRONMENT="${{ needs.resolve-dispatch-inputs.outputs.environment }}"
          FILENAME="${UPGRADE_FILE_PATH##*/}"
          UPGRADE_DIR="${UPGRADE_FILE_PATH%/*}"
          DEST_UPGRADE_PREFIX="gs://$DEST_BUCKET/GCNV/$VERSION/upgrade"
          DEST_URI="$DEST_UPGRADE_PREFIX/$FILENAME"
          COT_URI="gs://cot-releases-public/$UPGRADE_RELEASE_BUNDLE/$UPGRADE_FILE_PATH"
          COT_CHECKSUM_URI="gs://cot-releases-public/$UPGRADE_RELEASE_BUNDLE/$UPGRADE_DIR/cot.checksum.ONTAP-$VERSION.txt"
          if [ "$IS_AUTOPUSH" = "true" ]; then
            SOURCE_URI="$COT_URI"
          else
            SOURCE_URI="gs://$SOURCE_BUCKET/GCNV/$VERSION/upgrade/$FILENAME"
          fi
          echo "🔍 VSA image already present in destination; checking upgrade folder"
          echo "Destination upgrade path: $DEST_URI"
          if gsutil -q stat "$DEST_URI" 2>/dev/null; then
            echo "✅ Upgrade file already exists in destination (nothing to do): $DEST_URI"
            echo "status=exists" >> $GITHUB_OUTPUT
            exit 0
          fi
          echo "📁 Upgrade folder/file missing; creating folder and copying upgrade file"
          if ! gsutil ls "$DEST_UPGRADE_PREFIX/" 2>/dev/null | head -1 | grep -q .; then
            echo -n | gsutil cp - "$DEST_UPGRADE_PREFIX/.keep" 2>/dev/null || true
          fi
          copy_success=false
          if gsutil -q stat "$SOURCE_URI" 2>/dev/null; then
            copy_success=true
          fi
          if [ "$copy_success" != "true" ] && [ "$IS_AUTOPUSH" != "true" ]; then
            SOURCE_UPGRADE_PREFIX="gs://$SOURCE_BUCKET/GCNV/$VERSION/upgrade"
            if ! gsutil ls "$SOURCE_UPGRADE_PREFIX/" 2>/dev/null | head -1 | grep -q .; then
              echo -n | gsutil cp - "$SOURCE_UPGRADE_PREFIX/.keep" 2>/dev/null || true
            fi
            if gsutil -q stat "$COT_URI" 2>/dev/null; then
              gsutil cp "$COT_URI" "gs://$SOURCE_BUCKET/GCNV/$VERSION/upgrade/$FILENAME" && echo "✅ Populated source bucket from COT"
            fi
            if gsutil -q stat "$SOURCE_URI" 2>/dev/null; then
              copy_success=true
            fi
          fi
          if [ "$copy_success" != "true" ]; then
            echo "⚠️ Upgrade file not available at source/COT; skipping copy"
            echo "status=skipped" >> $GITHUB_OUTPUT
            exit 0
          fi
          gsutil cp "$SOURCE_URI" /tmp/upgrade_verify.tgz
          verify_ok=false
          gsutil cat "$COT_CHECKSUM_URI" 2>/dev/null > /tmp/expected_checksum.txt || true
          if [ -s /tmp/expected_checksum.txt ]; then
            EXPECTED=$(grep -oE '[a-fA-F0-9]{64}|[a-fA-F0-9]{32}' /tmp/expected_checksum.txt | head -1)
            if [ -n "$EXPECTED" ]; then
              LEN=${#EXPECTED}
              if [ "$LEN" -eq 64 ]; then
                ACTUAL=$(sha256sum /tmp/upgrade_verify.tgz | awk '{print $1}')
              else
                ACTUAL=$(md5sum /tmp/upgrade_verify.tgz | awk '{print $1}')
              fi
              if [ "$EXPECTED" = "$ACTUAL" ]; then
                verify_ok=true
              else
                echo "❌ Checksum mismatch; skipping copy"
                echo "status=checksum_mismatch" >> $GITHUB_OUTPUT
                exit 0
              fi
            fi
          fi
          gsutil cp /tmp/upgrade_verify.tgz "$DEST_URI"
          echo "✅ Upgrade file copied to $DEST_URI"
          echo "status=success" >> $GITHUB_OUTPUT

