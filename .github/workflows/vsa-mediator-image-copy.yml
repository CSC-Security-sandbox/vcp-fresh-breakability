  create-in-destination:
    name: Create Image in Destination (${{ matrix.image_type }})
    runs-on: ubuntu-latest
    needs: [resolve-dispatch-inputs, parse-version-file, pre-check-image, create-and-export-image, copy-signature-file-to-vsa-compute-images, copy-to-destination]
    strategy:
      matrix:
        image_type: ${{ fromJson(needs.resolve-dispatch-inputs.outputs.image_types) }}
    if: |
      always() &&
      needs.copy-to-destination.result != 'failure' &&
      (
        (needs.parse-version-file.outputs.is_autopush == 'true' && 
         needs.create-and-export-image.result != 'failure' &&
         needs.copy-to-destination.result != 'failure' &&
         (needs.copy-to-destination.outputs.copy_status == 'success' || needs.copy-to-destination.outputs.copy_status == 'exists') &&
         (
           (needs.parse-version-file.outputs.sig_file_path == '' || needs.parse-version-file.outputs.sig_file_path == 'null') ||
           (
             (needs.copy-signature-file-to-vsa-compute-images.result == 'success' || needs.copy-signature-file-to-vsa-compute-images.result == 'skipped') &&
             (needs.copy-to-destination.outputs.sig_copy_status == '' || needs.copy-to-destination.outputs.sig_copy_status == 'success' || needs.copy-to-destination.outputs.sig_copy_status == 'exists' || needs.copy-to-destination.outputs.sig_copy_status == 'not_found')
           )
         )) ||
        (needs.parse-version-file.outputs.is_autopush == 'false')
      )
    
    permissions:
      contents: read
      id-token: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ needs.parse-version-file.outputs.destination_bucket == 'gcnv-prod-images-bucket' && secrets.WORKLOAD_IDENTITY_PROVIDER_VSA_PROD || secrets.WORKLOAD_IDENTITY_PROVIDER_VSA }}
          service_account: ${{ needs.parse-version-file.outputs.destination_bucket == 'gcnv-prod-images-bucket' && secrets.WORKLOAD_IDENTITY_SERVICE_ACCOUNT_VSA_PROD || secrets.WORKLOAD_IDENTITY_SERVICE_ACCOUNT_VSA }}
      
      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
      
      - name: Configure gcloud
        run: |
          gcloud config set compute/region ${GCP_REGION}
          gcloud config set core/disable_prompts true
      
      - name: Verify image digest signature
        id: verify-digest
        if: needs.parse-version-file.outputs.sig_file_path != '' && needs.parse-version-file.outputs.sig_file_path != 'null'
        run: |
          set -euo pipefail
          
          DEST_BUCKET="${{ needs.parse-version-file.outputs.destination_bucket }}"
          IMAGE_TYPE_PATH="${{ needs.parse-version-file.outputs.image_type_path }}"
          IMAGE_NAME="${{ needs.parse-version-file.outputs.image_name }}"
          IMAGE_TYPE="${{ needs.parse-version-file.outputs.image_type }}"
          IMAGE_URI="gs://$DEST_BUCKET/$IMAGE_TYPE_PATH/$IMAGE_NAME.tar.gz"
          SIG_FILE_NAME="IMAGE_SIG_TGZ"
          SIG_FILE_URI="gs://$DEST_BUCKET/$IMAGE_TYPE_PATH/$SIG_FILE_NAME"
          
          echo "🔐 Verifying image digest signature"
          echo "Image URI: $IMAGE_URI"
          echo "Signature File URI: $SIG_FILE_URI"
          echo ""
          
          # Create working directory
          WORK_DIR="/tmp/digest-verify"
          mkdir -p "$WORK_DIR"
          cd "$WORK_DIR"
          
          # Step 1: Download image tar.gz file from GCS bucket
          echo "📥 Step 1: Downloading image tar.gz file..."
          gsutil cp "$IMAGE_URI" "./$IMAGE_NAME.tar.gz"
          
          if [ ! -f "$IMAGE_NAME.tar.gz" ]; then
            echo "❌ Error: Failed to download image file"
            exit 1
          fi
          echo "✅ Image file downloaded"
          
          # Step 2: Extract the tar.gz file to get disk.raw
          echo "📦 Step 2: Extracting tar.gz file..."
          tar -zxvf "$IMAGE_NAME.tar.gz"
          
          if [ ! -f "disk.raw" ]; then
            echo "❌ Error: disk.raw not found after extraction"
            exit 1
          fi
          echo "✅ disk.raw extracted"
          
          # Step 3: Generate SHA256 digest for disk.raw
          echo "🔍 Step 3: Generating SHA256 digest for disk.raw..."
          shasum -a 256 disk.raw | awk '{ print $1 }' > disk_raw.dig
          DIGEST=$(cat disk_raw.dig)
          echo "✅ Digest generated: $DIGEST"
          
          # Step 4: Download IMAGE_SIG_TGZ from destination bucket and extract signature file
          echo "📥 Step 4: Downloading signature file from destination bucket..."
          
          gsutil cp "$SIG_FILE_URI" ./IMAGE_SIG_TGZ
          
          if [ ! -f "IMAGE_SIG_TGZ" ]; then
            echo "❌ Error: Failed to download signature file from destination bucket: $SIG_FILE_URI"
            exit 1
          fi
          echo "✅ Signature file downloaded from destination bucket"
          
          # Extract IMAGE_SIG_TGZ to get signature file only
          echo "📦 Extracting signature file from IMAGE_SIG_TGZ..."
          tar -xzvf IMAGE_SIG_TGZ
          
          # Find signature file (digest signature)
          SIG_FILE=$(ls -1 *_digest.sig 2>/dev/null | head -n 1)
          
          if [ -z "$SIG_FILE" ]; then
            echo "❌ Error: Signature file not found after extraction"
            ls -la
            exit 1
          fi
          echo "✅ Signature file extracted: $SIG_FILE"
          
          # Step 5: Use certificate from repository
          echo "🔑 Step 5: Using certificate from repository..."
          
          # Certificate files are in config/certificates directory
          # Get the repository root path (where workflow is running from)
          REPO_ROOT="${{ github.workspace }}"
          REPO_CERT_DIR="$REPO_ROOT/config/certificates"
          CERT_FILE="$REPO_CERT_DIR/certificate.pem"
          
          echo "Repository root: $REPO_ROOT"
          echo "Certificate directory: $REPO_CERT_DIR"
          echo "Certificate file: $CERT_FILE"
          
          if [ ! -f "$CERT_FILE" ]; then
            echo "❌ Error: Certificate file not found in repository"
            echo "Expected path: $CERT_FILE"
            echo ""
            echo "Available files in $REPO_CERT_DIR:"
            ls -la "$REPO_CERT_DIR" 2>/dev/null || echo "Directory does not exist"
            exit 1
          fi
          
          echo "✅ Certificate found: $CERT_FILE"
          
          # Copy certificate to working directory using full path
          cp "$CERT_FILE" "$WORK_DIR/certificate.pem"
          
          # Generate public key file from certificate
          openssl x509 -pubkey -noout -in ./certificate.pem > vsa_public_key.pem
          
          if [ ! -f "vsa_public_key.pem" ]; then
            echo "❌ Error: Failed to generate public key"
            exit 1
          fi
          echo "✅ Public key generated from repository certificate"
          
          # Step 6: Verify digest signature
          echo "🔐 Step 6: Verifying digest signature..."
          # For mediator, verify against disk_raw.dig; for others, verify against disk.raw
          if [ "$IMAGE_TYPE" = "mediator" ]; then
            VERIFY_RESULT=$(openssl dgst -verify vsa_public_key.pem -keyform PEM -sha256 -signature "$SIG_FILE" disk_raw.dig 2>&1)
          else
            VERIFY_RESULT=$(openssl dgst -verify vsa_public_key.pem -keyform PEM -sha256 -signature "$SIG_FILE" -binary disk.raw 2>&1)
          fi
          VERIFY_EXIT_CODE=$?
          
          if [ $VERIFY_EXIT_CODE -ne 0 ]; then
            echo "❌ Error: Digest signature verification FAILED"
            echo "$VERIFY_RESULT"
            exit 1
          fi
          
          echo "✅ Digest signature verification PASSED"
          echo "Verified OK"
          
          # Calculate SHA256 checksum for labels (from tar.gz file)
          SHA256SUM=$(sha256sum "$IMAGE_NAME.tar.gz" | awk '{print $1}')
          CHECKSUM1="${SHA256SUM:0:32}"
          CHECKSUM2="${SHA256SUM:32:32}"
          
          echo "SHA256 (for labels): $SHA256SUM"
          echo "CHECKSUM1: $CHECKSUM1"
          echo "CHECKSUM2: $CHECKSUM2"
          
          # Cleanup
          cd /
          rm -rf "$WORK_DIR"
          
          echo "checksum1=$CHECKSUM1" >> $GITHUB_OUTPUT
          echo "checksum2=$CHECKSUM2" >> $GITHUB_OUTPUT
          echo "verification_status=success" >> $GITHUB_OUTPUT
      
      - name: Create compute image in destination project
        id: create-dest
        run: |
          set -euo pipefail
          
          IMAGE_NAME="${{ needs.parse-version-file.outputs.image_name }}"
          DEST_PROJECT="${{ needs.parse-version-file.outputs.destination_project }}"
          DEST_BUCKET="${{ needs.parse-version-file.outputs.destination_bucket }}"
          STORAGE_LOCATION="${{ needs.parse-version-file.outputs.storage_location }}"
          GUEST_OS_FEATURES="${{ needs.parse-version-file.outputs.guest_os_features }}"
          IMAGE_TYPE_PATH="${{ needs.parse-version-file.outputs.image_type_path }}"
          SOURCE_URI="gs://$DEST_BUCKET/$IMAGE_TYPE_PATH/$IMAGE_NAME.tar.gz"
          
          # Use checksum from verification - REQUIRED
          CHECKSUM1="${{ steps.verify-digest.outputs.checksum1 }}"
          CHECKSUM2="${{ steps.verify-digest.outputs.checksum2 }}"
          
          # Checksum is required - fail if not available
          if [ -z "$CHECKSUM1" ] || [ "$CHECKSUM1" == "" ]; then
            echo "❌ Error: Checksum not available from verification step"
            echo "Signature verification must succeed to get checksum for labels"
            echo "Image creation requires checksum labels and cannot proceed without them"
            exit 1
          fi
          
          # Build labels: checksum labels + verification status
          CHECKSUM_LABELS="checksum1=$CHECKSUM1,checksum2=$CHECKSUM2,image_digest_verified=true"
          
          echo "🖼️ Creating compute image in destination project"
          echo "Image: $IMAGE_NAME"
          echo "Project: $DEST_PROJECT"
          echo "Bucket: $DEST_BUCKET"
          echo "Storage Location: $STORAGE_LOCATION"
          echo "Guest OS Features: $GUEST_OS_FEATURES"
          echo "Checksum Labels: $CHECKSUM_LABELS"
          echo ""
          
          # Check if image already exists
          IMAGE_EXISTS=false
          if gcloud compute images describe "$IMAGE_NAME" \
            --project="$DEST_PROJECT" \
            --quiet 2>/dev/null; then
            IMAGE_EXISTS=true
          fi
          
          if [ "$IMAGE_EXISTS" = "true" ]; then
            echo "⚠️ Image $IMAGE_NAME already exists in $DEST_PROJECT"
            echo "status=exists" >> $GITHUB_OUTPUT
          else
            # Create image from GCS with checksum labels (required)
            gcloud compute images create "$IMAGE_NAME" \
              --source-uri="$SOURCE_URI" \
              --guest-os-features="$GUEST_OS_FEATURES" \
              --storage-location="$STORAGE_LOCATION" \
              --labels="$CHECKSUM_LABELS" \
              --project="$DEST_PROJECT" \
              --quiet
            
            EXIT_CODE=$?
            if [ $EXIT_CODE -eq 0 ]; then
              echo "✅ Image created successfully in $DEST_PROJECT with checksum labels"
              echo "status=success" >> $GITHUB_OUTPUT
            else
              echo "❌ Failed to create image in $DEST_PROJECT"
              echo "status=failed" >> $GITHUB_OUTPUT
              exit 1
            fi
          fi
      
      - name: Show create destination summary
        if: always()
        run: |
          echo "## Create Image in Destination Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Image Name**: ${{ needs.parse-version-file.outputs.image_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Image Type**: ${{ needs.resolve-dispatch-inputs.outputs.image_type }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Environment**: ${{ needs.resolve-dispatch-inputs.outputs.environment }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Destination Project**: ${{ needs.parse-version-file.outputs.destination_project }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Source URI**: gs://${{ needs.parse-version-file.outputs.destination_bucket }}/${{ needs.parse-version-file.outputs.image_type_path }}/${{ needs.parse-version-file.outputs.image_name }}.tar.gz" >> $GITHUB_STEP_SUMMARY
          echo "- **Storage Location**: ${{ needs.parse-version-file.outputs.storage_location }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Guest OS Features**: ${{ needs.parse-version-file.outputs.guest_os_features }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Digest Verification**: ${{ steps.verify-digest.outputs.verification_status || 'N/A' }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Checksum1 Label**: ${{ steps.verify-digest.outputs.checksum1 }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Checksum2 Label**: ${{ steps.verify-digest.outputs.checksum2 }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Status**: ${{ steps.create-dest.outputs.status }}" >> $GITHUB_STEP_SUMMARY

  run-autopush:
    name: All environments – Autopush
    needs: resolve-dispatch-inputs
    if: needs.resolve-dispatch-inputs.outputs.run_mode == 'all_environments'
    permissions:
      contents: read
      id-token: write
    uses: ./.github/workflows/vsa-mediator-image-copy-one-env.yml
    with:
      environment: autopush
      image_type: ${{ needs.resolve-dispatch-inputs.outputs.image_type }}
      version: ${{ needs.resolve-dispatch-inputs.outputs.version }}
      image_name: ${{ needs.resolve-dispatch-inputs.outputs.image_name }}
      bundle_name: ${{ needs.resolve-dispatch-inputs.outputs.bundle_name }}
      upgrade_release_bundle_path: ${{ needs.resolve-dispatch-inputs.outputs.upgrade_release_bundle_path }}
      upgrade_file_path: ${{ needs.resolve-dispatch-inputs.outputs.upgrade_file_path }}
    secrets: inherit

  run-staging:
    name: All environments – Staging
    needs: [resolve-dispatch-inputs, run-autopush]
    if: needs.resolve-dispatch-inputs.outputs.run_mode == 'all_environments'
    permissions:
      contents: read
      id-token: write
    uses: ./.github/workflows/vsa-mediator-image-copy-one-env.yml
    with:
      environment: staging
      image_type: ${{ needs.resolve-dispatch-inputs.outputs.image_type }}
      version: ${{ needs.resolve-dispatch-inputs.outputs.version }}
      image_name: ${{ needs.resolve-dispatch-inputs.outputs.image_name }}
      bundle_name: ${{ needs.resolve-dispatch-inputs.outputs.bundle_name }}
      upgrade_release_bundle_path: ${{ needs.resolve-dispatch-inputs.outputs.upgrade_release_bundle_path }}
      upgrade_file_path: ${{ needs.resolve-dispatch-inputs.outputs.upgrade_file_path }}
    secrets: inherit

  run-prod:
    name: All environments – Production
    needs: [resolve-dispatch-inputs, run-staging]
    if: needs.resolve-dispatch-inputs.outputs.run_mode == 'all_environments'
    permissions:
      contents: read
      id-token: write
    uses: ./.github/workflows/vsa-mediator-image-copy-one-env.yml
    with:
      environment: prod
      image_type: ${{ needs.resolve-dispatch-inputs.outputs.image_type }}
      version: ${{ needs.resolve-dispatch-inputs.outputs.version }}
      image_name: ${{ needs.resolve-dispatch-inputs.outputs.image_name }}
      bundle_name: ${{ needs.resolve-dispatch-inputs.outputs.bundle_name }}
      upgrade_release_bundle_path: ${{ needs.resolve-dispatch-inputs.outputs.upgrade_release_bundle_path }}
      upgrade_file_path: ${{ needs.resolve-dispatch-inputs.outputs.upgrade_file_path }}
    secrets: inherit

  workflow-summary:
    name: Workflow Summary
    runs-on: ubuntu-latest
    needs: [resolve-dispatch-inputs, parse-version-file, pre-check-image, create-and-export-image, copy-to-destination, copy-upgrade-to-destination, create-in-destination]
    if: always() && needs.resolve-dispatch-inputs.outputs.run_mode == 'single_environment'
    
    permissions:
      contents: read
    
    steps:
      - name: Generate final summary
        run: |
          echo "## 🎯 Compute Image Copy Workflow Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Configuration" >> $GITHUB_STEP_SUMMARY
          echo "- **Image Type**: ${{ needs.resolve-dispatch-inputs.outputs.image_type }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Environment**: ${{ needs.resolve-dispatch-inputs.outputs.environment }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Image Name**: ${{ needs.parse-version-file.outputs.image_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Destination Project**: ${{ needs.parse-version-file.outputs.destination_project }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          IMAGE_EXISTS="${{ needs.pre-check-image.outputs.image_exists }}"
          
          if [ "$IMAGE_EXISTS" == "true" ]; then
            echo "### ⚠️ Image Already Exists" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "✅ **Pre-check Result**: Image **${{ needs.parse-version-file.outputs.image_name }}** already exists in **${{ needs.parse-version-file.outputs.destination_project }}**" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "All subsequent workflow steps were skipped as the image is already present in the destination project." >> $GITHUB_STEP_SUMMARY
          else
            echo "### Results" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "✅ **Pre-check Result**: Image does not exist - proceeding with workflow" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "- **Source Image Project**: ${{ needs.parse-version-file.outputs.source_image_project }}" >> $GITHUB_STEP_SUMMARY
            echo "- **Source Project**: ${{ needs.parse-version-file.outputs.source_project }}" >> $GITHUB_STEP_SUMMARY
            echo "- **Source Bucket**: ${{ needs.parse-version-file.outputs.source_bucket }}" >> $GITHUB_STEP_SUMMARY
            echo "- **Destination Bucket**: ${{ needs.parse-version-file.outputs.destination_bucket }}" >> $GITHUB_STEP_SUMMARY
            echo "- **Storage Location**: ${{ needs.parse-version-file.outputs.storage_location }}" >> $GITHUB_STEP_SUMMARY
            echo "- **Guest OS Features**: ${{ needs.parse-version-file.outputs.guest_os_features }}" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            
            IS_AUTOPUSH="${{ needs.parse-version-file.outputs.is_autopush }}"
            
            if [ "$IS_AUTOPUSH" == "true" ]; then
              EXPORT_RESULT="${{ needs.create-and-export-image.result }}"
              if [ "$EXPORT_RESULT" == "success" ] || [ "$EXPORT_RESULT" == "skipped" ]; then
                echo "✅ **Create & Export**: Success" >> $GITHUB_STEP_SUMMARY
                if [ "$EXPORT_RESULT" == "success" ]; then
                  echo "   - Image URI: ${{ needs.create-and-export-image.outputs.image_uri }}" >> $GITHUB_STEP_SUMMARY
                fi
              else
                echo "❌ **Create & Export**: Failed" >> $GITHUB_STEP_SUMMARY
              fi
            else
              echo "⏭️ **Create & Export**: Skipped (not required for ${{ needs.resolve-dispatch-inputs.outputs.environment }})" >> $GITHUB_STEP_SUMMARY
            fi
            
            COPY_RESULT="${{ needs.copy-to-destination.result }}"
            if [ "$COPY_RESULT" == "success" ] || [ "$COPY_RESULT" == "skipped" ]; then
              echo "✅ **Copy to Bucket**: Success" >> $GITHUB_STEP_SUMMARY
            elif [ "$COPY_RESULT" == "" ]; then
              echo "⏭️ **Copy to Bucket**: Skipped" >> $GITHUB_STEP_SUMMARY
            else
              echo "❌ **Copy to Bucket**: Failed" >> $GITHUB_STEP_SUMMARY
            fi
            
            CREATE_RESULT="${{ needs.create-in-destination.result }}"
            if [ "$CREATE_RESULT" == "success" ] || [ "$CREATE_RESULT" == "skipped" ]; then
              echo "✅ **Create in Destination**: Success" >> $GITHUB_STEP_SUMMARY
            elif [ "$CREATE_RESULT" == "" ]; then
              echo "⏭️ **Create in Destination**: Skipped" >> $GITHUB_STEP_SUMMARY
            else
              echo "❌ **Create in Destination**: Failed" >> $GITHUB_STEP_SUMMARY
            fi
            
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "### Workflow Steps" >> $GITHUB_STEP_SUMMARY
            if [ "$IS_AUTOPUSH" == "true" ]; then
              echo "1. ✅ Resolve parameters (version, image_name, bundle_name → sig_file_path)" >> $GITHUB_STEP_SUMMARY
              echo "2. ✅ Pre-check image existence" >> $GITHUB_STEP_SUMMARY
              echo "3. ✅ Create image in ${{ needs.parse-version-file.outputs.source_project }} from ${{ needs.parse-version-file.outputs.source_image_project }}" >> $GITHUB_STEP_SUMMARY
              echo "4. ✅ Export image to ${{ needs.parse-version-file.outputs.source_bucket }}" >> $GITHUB_STEP_SUMMARY
              echo "5. ✅ Copy image to destination bucket" >> $GITHUB_STEP_SUMMARY
              echo "6. ✅ Create image in destination project" >> $GITHUB_STEP_SUMMARY
            else
              echo "1. ✅ Resolve parameters (version, image_name, bundle_name → sig_file_path)" >> $GITHUB_STEP_SUMMARY
              echo "2. ✅ Pre-check image existence" >> $GITHUB_STEP_SUMMARY
              echo "3. ✅ Copy image from source bucket to destination bucket" >> $GITHUB_STEP_SUMMARY
              echo "4. ✅ Create image in destination project" >> $GITHUB_STEP_SUMMARY
            fi
          fi
