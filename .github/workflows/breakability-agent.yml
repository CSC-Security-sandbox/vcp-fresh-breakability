name: Breakability Agent (Hybrid)

on:
  # schedule:
  #   # Weekdays at 6 AM UTC — disabled to save CI costs
  #   - cron: '0 6 * * 1-5'
  workflow_dispatch:
    inputs:
      pr_filter:
        description: 'Comma-separated PR numbers to analyze (empty = all)'
        required: false
        default: ''
      skip_agent:
        description: 'Skip agent step (deterministic only)'
        required: false
        default: 'false'
        type: boolean
      batch_count:
        description: 'Number of parallel batches (1 = sequential, 4 = default)'
        required: false
        default: '4'
        type: choice
        options:
          - '1'
          - '2'
          - '4'
          - '6'

concurrency:
  group: breakability-agent
  cancel-in-progress: false

permissions:
  contents: read
  pull-requests: write
  issues: write

env:
  NODE_VERSION: '20'
  GO_VERSION: '1.22'
  PYTHON_VERSION: '3.12'

jobs:
  # ═══════════════════════════════════════════════════════════════════
  # Job 1: Discover PRs and split into batches
  # ═══════════════════════════════════════════════════════════════════
  discover:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      matrix: ${{ steps.split.outputs.matrix }}
      pr_count: ${{ steps.split.outputs.pr_count }}
    steps:
      - name: Discover and split PRs into batches
        id: split
        run: |
          BATCH_COUNT="${{ inputs.batch_count || '4' }}"
          PR_FILTER="${{ inputs.pr_filter }}"

          # Fetch all open Dependabot PRs
          PR_NUMS=$(gh pr list --repo "$GITHUB_REPOSITORY" \
            --label "dependencies" --state open \
            --json number --jq '.[].number' --limit 500 | sort -n)

          # Apply filter if set
          if [[ -n "$PR_FILTER" ]]; then
            ALLOWED=$(echo "$PR_FILTER" | tr ',' '\n' | tr -d ' ')
            PR_NUMS=$(comm -12 <(echo "$PR_NUMS" | sort) <(echo "$ALLOWED" | sort))
          fi

          TOTAL=$(echo "$PR_NUMS" | grep -c . || echo 0)
          echo "Total PRs to analyze: $TOTAL"
          echo "pr_count=$TOTAL" >> "$GITHUB_OUTPUT"

          # For very small runs, use 1 batch
          if [[ "$TOTAL" -le 5 ]]; then
            BATCH_COUNT=1
          fi

          # Split into batches
          mapfile -t ALL_PRS < <(echo "$PR_NUMS")
          PER_BATCH=$(( (TOTAL + BATCH_COUNT - 1) / BATCH_COUNT ))

          MATRIX_JSON='{"include":['
          FIRST=true
          for (( b=0; b<BATCH_COUNT; b++ )); do
            START=$(( b * PER_BATCH ))
            BATCH_PRS=""
            for (( j=START; j<START+PER_BATCH && j<TOTAL; j++ )); do
              [[ -n "$BATCH_PRS" ]] && BATCH_PRS="$BATCH_PRS,"
              BATCH_PRS="$BATCH_PRS${ALL_PRS[$j]}"
            done
            [[ -z "$BATCH_PRS" ]] && continue
            [[ "$FIRST" == "true" ]] && FIRST=false || MATRIX_JSON="$MATRIX_JSON,"
            MATRIX_JSON="$MATRIX_JSON{\"batch_id\":\"$((b+1))\",\"pr_filter\":\"$BATCH_PRS\"}"
            echo "  Batch $((b+1)): $BATCH_PRS"
          done
          MATRIX_JSON="$MATRIX_JSON]}"

          echo "Matrix: $MATRIX_JSON"
          echo "matrix=$MATRIX_JSON" >> "$GITHUB_OUTPUT"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ═══════════════════════════════════════════════════════════════════
  # Job 2: Deterministic analysis (parallel matrix)
  # ═══════════════════════════════════════════════════════════════════
  deterministic:
    needs: discover
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      matrix: ${{ fromJson(needs.discover.outputs.matrix) }}
      fail-fast: false

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Setup Maven
        run: |
          if ! command -v mvn &>/dev/null; then
            sudo apt-get update -qq && sudo apt-get install -y -qq maven > /dev/null 2>&1 || echo "Maven install skipped"
          fi

      - name: Run deterministic analysis (batch ${{ matrix.batch_id }})
        run: |
          chmod +x .github/scripts/build-check.sh
          bash .github/scripts/build-check.sh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CLI_PATH: .github/actions/breakability-check/index.js
          PR_FILTER: ${{ matrix.pr_filter }}
          BATCH_ID: ${{ matrix.batch_id }}
          REPO_ROOT: ${{ github.workspace }}
          # ── Private Registry Auth (see docs/PRIVATE_REGISTRIES.md) ──
          # Add your registry auth tokens as GitHub secrets, then
          # pass them here with the same env var names used in
          # .github/breakability-config.yml → private_registries[].auth_token_env
          # Example:
          #   AZURE_ARTIFACTS_TOKEN: ${{ secrets.AZURE_ARTIFACTS_TOKEN }}
          #   GH_PACKAGES_TOKEN: ${{ secrets.GH_PACKAGES_TOKEN }}
          #   ACR_NPM_TOKEN: ${{ secrets.ACR_NPM_TOKEN }}

      - name: Upload batch results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: batch-${{ matrix.batch_id }}
          path: |
            /tmp/build-results-${{ matrix.batch_id }}.json
            /tmp/pr-*.diff
            /tmp/_bc_workspace_graph.json
            /tmp/_bc_peer_groups.json
          retention-days: 30

  # ═══════════════════════════════════════════════════════════════════
  # Job 3: Merge results + Agent analysis (single run)
  # ═══════════════════════════════════════════════════════════════════
  merge-and-analyze:
    needs: [discover, deterministic]
    runs-on: ubuntu-latest
    timeout-minutes: 120
    if: always() && needs.discover.result == 'success'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Download all batch artifacts
        uses: actions/download-artifact@v4
        with:
          path: /tmp/batch-results
          pattern: batch-*

      - name: List downloaded artifacts
        run: |
          echo "=== Downloaded artifacts ==="
          find /tmp/batch-results -type f | sort | head -60
          echo "=== Batch result files ==="
          ls -la /tmp/batch-results/batch-*/build-results-*.json 2>/dev/null || echo "No batch files found"

      - name: Merge results
        run: |
          chmod +x .github/scripts/merge-results.sh
          bash .github/scripts/merge-results.sh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Show build results summary
        if: always()
        run: |
          echo "=== Build Results Summary ==="
          python3 -c "
          import json
          with open('/tmp/build-results.json') as f:
              data = json.load(f)
          prs = data.get('prs', {})
          print(f'PRs analyzed: {len(prs)}')
          methods = {}
          levels = {}
          for num, pr in sorted(prs.items(), key=lambda x: int(x[0])):
              verdict = pr.get('build', {}).get('verdict', '?')
              vl = pr.get('verification_label', '?')
              m = pr.get('build', {}).get('install_method', '?')
              methods[m] = methods.get(m, 0) + 1
              levels[vl] = levels.get(vl, 0) + 1
              emoji = {'pass': '✅', 'fail': '❌', 'skip': '⏭️', 'pre_existing': '⚠️', 'error': '💥'}.get(verdict, '❓')
              print(f'  PR #{num}: {pr[\"package\"]} {pr[\"from\"]}→{pr[\"to\"]} | {emoji} {verdict} | {vl} | {m}')
          print()
          print('Install methods:', dict(sorted(methods.items(), key=lambda x:-x[1])))
          print('Verification levels:', dict(sorted(levels.items(), key=lambda x:-x[1])))
          cross = data.get('cross_pr_deps', [])
          if cross:
              print(f'Cross-PR deps: {len(cross)}')
          " || echo "Failed to parse build-results.json"

      # ── Pipeline Tests ──────────────────────────────────────────────
      - name: Run pipeline unit tests
        continue-on-error: true
        run: |
          echo "════════════ PIPELINE TESTS ════════════"
          pip install pytest --quiet 2>/dev/null || true
          python3 -m pytest .github/scripts/test_*.py -v --tb=short 2>&1 | tail -60 || true
          echo "✅ Pipeline tests complete"

      # ── Verdict Contract ───────────────────────────────────────────
      - name: Generate authoritative verdicts
        run: |
          echo "════════════ VERDICT CONTRACT ════════════"
          python3 .github/scripts/verdict_contract.py /tmp/build-results.json --write
          echo "✅ verdict_v2 populated for all PRs"

      # ── Behavioral Probe ───────────────────────────────────────────
      - name: Run behavioral probe (runtime verification)
        continue-on-error: true
        run: |
          echo "════════════ BEHAVIORAL PROBE ════════════"
          chmod +x .github/scripts/differential-probe.py
          python3 .github/scripts/differential-probe.py
          echo "✅ Probe data enriched"
        env:
          DP_RESULTS: /tmp/build-results.json
          DP_DETERMINISTIC_ONLY: "true"
          DP_MAX_PRS: "20"
        timeout-minutes: 15

      # ── Verdict Reconciliation (post-probe) ───────────────────────
      - name: Reconcile verdicts with probe data
        run: |
          echo "════════════ VERDICT RECONCILIATION ════════════"
          python3 .github/scripts/verdict_contract.py /tmp/build-results.json --write
          echo "✅ Verdicts reconciled with probe findings"

      - name: Upload merged results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-results
          path: |
            /tmp/build-results.json
            /tmp/pr-*.diff
          retention-days: 30

      # ── Agent CLI Setup (with fallback) ────────────────────────────
      - name: Install AI agent CLI
        if: ${{ inputs.skip_agent != true }}
        id: agent_install
        run: |
          echo "Installing Cursor agent CLI..."
          if curl -fsS https://cursor.com/install | bash 2>/dev/null; then
            echo "$HOME/.local/bin" >> $GITHUB_PATH
            echo "agent_available=true" >> $GITHUB_OUTPUT
            echo "✅ Cursor agent CLI installed"
          else
            echo "::warning::Cursor agent CLI install failed — will use ai_backend.py fallback"
            echo "agent_available=false" >> $GITHUB_OUTPUT
          fi

      - name: Verify agent CLI
        if: ${{ inputs.skip_agent != true && steps.agent_install.outputs.agent_available == 'true' }}
        run: |
          if command -v agent &>/dev/null; then
            agent --version
            echo "✅ Cursor agent CLI ready"
          else
            echo "::warning::agent not on PATH after install"
          fi

      - name: Install Anthropic SDK (API fallback)
        if: ${{ inputs.skip_agent != true }}
        run: |
          pip install anthropic --quiet 2>/dev/null || pip install anthropic || true
          python3 -c "import anthropic; print('✅ Anthropic SDK', anthropic.__version__)" 2>/dev/null || echo "::warning::Anthropic SDK install failed"

      - name: Generate AI verdicts for REVIEW PRs
        if: ${{ inputs.skip_agent != true }}
        id: ai_generate
        continue-on-error: true
        run: |
          echo "════════════ AI VERDICT GENERATION ════════════"
          chmod +x .github/scripts/generate_ai_verdicts.py
          python3 .github/scripts/generate_ai_verdicts.py /tmp/build-results.json \
            --output /tmp/ai_verdicts.json \
            --model claude-sonnet-4.5
          echo "✅ AI verdicts generated"
        env:
          BRK_AGENT_MODE: live
          BRK_AGENT_MODEL: claude-sonnet-4.5
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        timeout-minutes: 60

      - name: Reconcile AI verdicts with deterministic signals
        if: ${{ inputs.skip_agent != true && steps.ai_generate.outcome == 'success' }}
        id: agent
        run: |
          echo "════════════ AI RECONCILIATION ════════════"
          chmod +x .github/scripts/reconcile_adjudication.py
          python3 .github/scripts/reconcile_adjudication.py /tmp/build-results.json \
            --verdicts /tmp/ai_verdicts.json \
            --write
          echo "✅ AI reconciliation complete"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        timeout-minutes: 10

      # ── Create Merge Plan Issue (early, for linking in comments) ──
      - name: Create merge plan issue
        if: always()
        id: merge_plan
        run: |
          OLD_ISSUES=$(gh issue list --label breakability-merge-plan --state open --json number --jq '.[].number' 2>/dev/null || true)
          for issue_num in $OLD_ISSUES; do
            gh issue close "$issue_num" --comment "Superseded by new analysis run." || true
          done
          ISSUE_URL=$(gh issue create \
            --title "Breakability Merge Plan — $(date +%Y-%m-%d)" \
            --label "breakability-merge-plan" \
            --body "Merge plan is being generated... This issue will be updated shortly." 2>&1) || true
          if [ -n "$ISSUE_URL" ]; then
            ISSUE_NUM=$(echo "$ISSUE_URL" | grep -oE '[0-9]+$' || true)
            echo "issue_num=$ISSUE_NUM" >> $GITHUB_OUTPUT
            echo "✅ Merge plan issue created: $ISSUE_URL (#$ISSUE_NUM)"
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ── AI-Powered Rich Comment Generation ─────────────────────────
      - name: Generate rich PR comments (AI-powered)
        if: always()
        id: ai_comments
        run: |
          echo "════════════ AI COMMENT GENERATION ════════════"
          ANALYSIS_RUN_URL="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          export ANALYSIS_RUN_URL

          MERGE_PLAN_ISSUE="${{ steps.merge_plan.outputs.issue_num }}"
          MERGE_PLAN_ARG=""
          if [ -n "$MERGE_PLAN_ISSUE" ]; then
            MERGE_PLAN_ARG="--merge-plan-issue $MERGE_PLAN_ISSUE"
          fi

          chmod +x .github/scripts/generate_ai_comments.py
          if python3 .github/scripts/generate_ai_comments.py /tmp/build-results.json \
              --prompt .github/breakability-prompt.md \
              --model claude-sonnet-4.5 \
              --run-url "$ANALYSIS_RUN_URL" \
              $MERGE_PLAN_ARG; then
            echo "ai_comments=true" >> $GITHUB_OUTPUT
            echo "✅ AI comments generated"
          else
            echo "::warning::AI comment generation failed (exit $?) — falling back to template renderer"
            echo "ai_comments=false" >> $GITHUB_OUTPUT
          fi
        env:
          BRK_AGENT_MODE: live
          BRK_AGENT_MODEL: claude-sonnet-4.5
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        timeout-minutes: 30

      - name: Fallback to template renderer
        if: always() && steps.ai_comments.outputs.ai_comments != 'true'
        run: |
          echo "════════════ TEMPLATE FALLBACK ════════════"
          chmod +x .github/scripts/breakability_analyst.py
          python3 .github/scripts/breakability_analyst.py /tmp/build-results.json
          echo "✅ Template comments generated (fallback)"
        env:
          MERGE_PLAN_ISSUE: ${{ steps.merge_plan.outputs.issue_num }}
          ANALYSIS_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

      # ── Post PR Comments ───────────────────────────────────────────
      - name: Post comments to PRs
        if: always()
        run: |
          POSTED=0
          FAILED=0
          for comment_file in /tmp/pr-*-comment.md; do
            if [ -f "$comment_file" ]; then
              pr_num=$(basename "$comment_file" | sed 's/pr-\([0-9]*\)-comment.md/\1/')
              echo "📤 Posting comment to PR #$pr_num"
              if gh pr comment "$pr_num" --body-file "$comment_file"; then
                POSTED=$((POSTED + 1))
              else
                echo "⚠️ Failed to post to PR #$pr_num"
                FAILED=$((FAILED + 1))
              fi
            fi
          done
          echo "✅ Posted $POSTED comments ($FAILED failed)"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ── Merge Plan Issue (update body) ─────────────────────────────
      - name: Update merge plan issue body
        if: always()
        run: |
          echo "════════════ MERGE PLAN BODY ════════════"
          MERGE_PLAN_ISSUE="${{ steps.merge_plan.outputs.issue_num }}"

          # Build merge plan from build-results.json
          PLAN_BODY=$(python3 -c "
          import json, sys
          from datetime import date

          with open('/tmp/build-results.json') as f:
              data = json.load(f)

          prs = data.get('prs', {})
          meta = data.get('metadata', {})
          cross_deps = data.get('cross_pr_deps', [])
          mode = meta.get('mode', 'advisory')
          repo = meta.get('repo', 'unknown')

          lines = []
          lines.append('# Breakability Merge Plan')
          lines.append('')
          if mode == 'advisory':
              lines.append('> ⚠️ **Advisory mode** — All verdicts are recommendations. Merges are not blocked.')
              lines.append('')
          lines.append(f'**Repository:** {repo}')
          lines.append(f'**Analyzed:** {date.today().isoformat()}')
          lines.append(f'**PRs analyzed:** {len(prs)}')
          run_url = '${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}'
          lines.append(f'**Analysis run:** [{run_url}]({run_url})')
          lines.append('')

          # Categorize PRs
          safe, review, blocked, unverified, skipped = [], [], [], [], []
          for num, pr in sorted(prs.items(), key=lambda x: int(x[0])):
              v2 = pr.get('verdict_v2', {})
              verdict = v2.get('verdict', pr.get('build', {}).get('verdict', 'REVIEW')).upper()
              if pr.get('build', {}).get('verdict') == 'skipped':
                  skipped.append((num, pr))
              elif verdict == 'SAFE':
                  safe.append((num, pr))
              elif verdict in ('BLOCKED', 'BUILD_FAILS'):
                  blocked.append((num, pr))
              elif verdict == 'UNVERIFIED':
                  unverified.append((num, pr))
              else:
                  review.append((num, pr))

          def pr_row(num, pr):
              pkg = pr.get('package', '?')
              frm = pr.get('from', '?')
              to = pr.get('to', '?')
              bump = pr.get('bump', '?')
              dep = pr.get('dep_type', '?')
              vl = pr.get('verification_label', '?')
              return f'| #{num} | \`{pkg}\` | {frm} → {to} | {bump} | {dep} | {vl} |'

          if cross_deps:
              lines.append('## ⚠️ Coordinated Upgrades')
              lines.append('| PRs | Relationship | Merge Order |')
              lines.append('|-----|-------------|-------------|')
              for dep in cross_deps:
                  a, b = dep.get('pr_a', '?'), dep.get('pr_b', '?')
                  reason = dep.get('reason', '')
                  order = dep.get('merge_order', '')
                  lines.append(f'| #{a}, #{b} | {reason} | {order} |')
              lines.append('')

          if safe:
              lines.append('## ✅ Safe to Merge')
              lines.append('| PR | Package | Version | Bump | Type | Verification |')
              lines.append('|----|---------|---------|------|------|-------------|')
              for num, pr in safe:
                  lines.append(pr_row(num, pr))
              lines.append('')

          if review:
              lines.append('## ⚠️ Review Needed')
              lines.append('| PR | Package | Version | Bump | Type | Verification |')
              lines.append('|----|---------|---------|------|------|-------------|')
              for num, pr in review:
                  lines.append(pr_row(num, pr))
              lines.append('')

          if unverified:
              lines.append('## ⚙️ Unverified')
              lines.append('| PR | Package | Version | Bump | Type | Verification |')
              lines.append('|----|---------|---------|------|------|-------------|')
              for num, pr in unverified:
                  lines.append(pr_row(num, pr))
              lines.append('')

          if blocked:
              lines.append('## ❌ Blocked / Fix Required')
              lines.append('| PR | Package | Version | Bump | Type | Verification |')
              lines.append('|----|---------|---------|------|------|-------------|')
              for num, pr in blocked:
                  lines.append(pr_row(num, pr))
              lines.append('')

          # Security posture
          sec = data.get('security_posture', {})
          govuln = data.get('govulncheck', {})
          if sec or govuln:
              lines.append('## 🔒 Security Posture')
              if sec.get('total_open_alerts'):
                  lines.append(f'- Open Dependabot alerts: {sec[\"total_open_alerts\"]}')
                  sev = sec.get('severity_counts', {})
                  if sev:
                      lines.append(f'  - Critical: {sev.get(\"critical\", 0)}, High: {sev.get(\"high\", 0)}')
              if govuln:
                  baseline = govuln.get('main_baseline', {})
                  if baseline.get('findings'):
                      lines.append(f'- Pre-existing govulncheck findings on main: {len(baseline[\"findings\"])}')
                  if govuln.get('prs_with_new_vulns', 0) > 0:
                      lines.append(f'- 🚨 PRs introducing NEW vulnerabilities: {govuln[\"prs_with_new_vulns\"]}')
              lines.append('')

          lines.append('---')
          lines.append(f'Mode: Deterministic + Behavioral Probe · Model: claude-sonnet-4.5 · Generated: {date.today().isoformat()}')

          print('\\n'.join(lines))
          ")

          # Update merge plan issue with full body (created earlier for linking)
          if [ -n "$MERGE_PLAN_ISSUE" ]; then
            gh issue edit "$MERGE_PLAN_ISSUE" --body "$PLAN_BODY" || true
            echo "✅ Merge plan issue #$MERGE_PLAN_ISSUE updated with full body"
          else
            ISSUE_URL=$(gh issue create \
              --title "Breakability Merge Plan — $(date +%Y-%m-%d)" \
              --label "breakability-merge-plan" \
              --body "$PLAN_BODY" 2>&1) || true
            echo "✅ Merge plan issue created: $ISSUE_URL"
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
