name: Breakability Agent (Hybrid)

on:
  # schedule:
  #   # Weekdays at 6 AM UTC — disabled to save CI costs
  #   - cron: '0 6 * * 1-5'
  pull_request:
    # Scenario 2A: analyze a Dependabot PR immediately when it opens, without
    # waiting for the next batch run.
    # Non-Dependabot PRs are filtered out in the discover job via the 'dependencies' label check.
    types: [opened]
  workflow_dispatch:
    inputs:
      pr_filter:
        description: 'Comma-separated PR numbers to analyze (empty = all)'
        required: false
        default: ''
      skip_agent:
        description: 'Skip agent step (deterministic only)'
        required: false
        default: 'false'
        type: boolean
      skip_deterministic:
        description: 'Skip deterministic steps — re-run AI agent only using previous results from breakability-results branch'
        required: false
        default: 'false'
        type: boolean
      batch_count:
        description: 'Number of parallel batches (1 = sequential, 4 = default)'
        required: false
        default: '4'
        type: choice
        options:
          - '1'
          - '2'
          - '4'
          - '6'

concurrency:
  group: breakability-agent
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write
  issues: write

env:
  NODE_VERSION: '20'
  GO_VERSION: '1.22'
  PYTHON_VERSION: '3.12'

jobs:
  # ═══════════════════════════════════════════════════════════════════
  # Job 1: Discover PRs and split into batches
  # ═══════════════════════════════════════════════════════════════════
  discover:
    if: ${{ inputs.skip_deterministic != true }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      matrix: ${{ steps.split.outputs.matrix }}
      pr_count: ${{ steps.split.outputs.pr_count }}
    steps:
      - name: Discover and split PRs into batches
        id: split
        run: |
          BATCH_COUNT="${{ inputs.batch_count || '4' }}"
          PR_FILTER="${{ inputs.pr_filter }}"

          # Single-PR mode: when triggered by pull_request: opened, analyze only that PR.
          # This handles Scenario 2A — instant analysis for a new Dependabot PR.
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            PR_FILTER="${{ github.event.pull_request.number }}"
            echo "pull_request trigger detected — single-PR mode: PR #${PR_FILTER}"
          fi

          # Fetch all open Dependabot PRs
          PR_NUMS=$(gh pr list --repo "$GITHUB_REPOSITORY" \
            --label "dependencies" --state open \
            --json number --jq '.[].number' --limit 500 | sort -n)

          # Apply filter if set
          if [[ -n "$PR_FILTER" ]]; then
            ALLOWED=$(echo "$PR_FILTER" | tr ',' '\n' | tr -d ' ')
            PR_NUMS=$(comm -12 <(echo "$PR_NUMS" | sort) <(echo "$ALLOWED" | sort))
          fi

          TOTAL=$(echo "$PR_NUMS" | grep -c . || echo 0)
          echo "Total PRs to analyze: $TOTAL"
          echo "pr_count=$TOTAL" >> "$GITHUB_OUTPUT"

          # For very small runs, use 1 batch
          if [[ "$TOTAL" -le 5 ]]; then
            BATCH_COUNT=1
          fi

          # Split into batches
          mapfile -t ALL_PRS < <(echo "$PR_NUMS")
          PER_BATCH=$(( (TOTAL + BATCH_COUNT - 1) / BATCH_COUNT ))

          MATRIX_JSON='{"include":['
          FIRST=true
          for (( b=0; b<BATCH_COUNT; b++ )); do
            START=$(( b * PER_BATCH ))
            BATCH_PRS=""
            for (( j=START; j<START+PER_BATCH && j<TOTAL; j++ )); do
              [[ -n "$BATCH_PRS" ]] && BATCH_PRS="$BATCH_PRS,"
              BATCH_PRS="$BATCH_PRS${ALL_PRS[$j]}"
            done
            [[ -z "$BATCH_PRS" ]] && continue
            [[ "$FIRST" == "true" ]] && FIRST=false || MATRIX_JSON="$MATRIX_JSON,"
            MATRIX_JSON="$MATRIX_JSON{\"batch_id\":\"$((b+1))\",\"pr_filter\":\"$BATCH_PRS\"}"
            echo "  Batch $((b+1)): $BATCH_PRS"
          done
          MATRIX_JSON="$MATRIX_JSON]}"

          echo "Matrix: $MATRIX_JSON"
          echo "matrix=$MATRIX_JSON" >> "$GITHUB_OUTPUT"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ═══════════════════════════════════════════════════════════════════
  # Job 2: Deterministic analysis (parallel matrix)
  # ═══════════════════════════════════════════════════════════════════
  deterministic:
    if: ${{ inputs.skip_deterministic != true }}
    needs: discover
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      matrix: ${{ fromJson(needs.discover.outputs.matrix) }}
      fail-fast: false

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Setup Maven
        run: |
          if ! command -v mvn &>/dev/null; then
            sudo apt-get update -qq && sudo apt-get install -y -qq maven > /dev/null 2>&1 || echo "Maven install skipped"
          fi

      - name: Run deterministic analysis (batch ${{ matrix.batch_id }})
        run: |
          chmod +x .github/scripts/build-check.sh
          bash .github/scripts/build-check.sh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CLI_PATH: .github/actions/breakability-check/index.js
          PR_FILTER: ${{ matrix.pr_filter }}
          BATCH_ID: ${{ matrix.batch_id }}
          REPO_ROOT: ${{ github.workspace }}

      - name: Upload batch results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: batch-${{ matrix.batch_id }}
          path: |
            /tmp/build-results-${{ matrix.batch_id }}.json
            /tmp/pr-*.diff
            /tmp/_bc_workspace_graph.json
            /tmp/_bc_peer_groups.json
          retention-days: 30

  # ═══════════════════════════════════════════════════════════════════
  # Job 3: Merge results + Agent analysis (single run)
  # ═══════════════════════════════════════════════════════════════════
  merge-and-analyze:
    needs: [discover, deterministic]
    runs-on: ubuntu-latest
    timeout-minutes: 120
    if: always() && (needs.discover.result == 'success' || inputs.skip_deterministic == true)

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      # ── When skipping deterministic: load results from breakability-results branch ──
      - name: Load previous results (AI-only mode)
        if: ${{ inputs.skip_deterministic == true }}
        run: |
          echo "═══════════ AI-ONLY MODE ════════════"
          echo "Skipping deterministic analysis — loading results from breakability-results branch"
          git fetch origin breakability-results
          git show origin/breakability-results:build-results.json > /tmp/build-results.json
          PR_COUNT=$(python3 -c "import json; print(len(json.load(open('/tmp/build-results.json')).get('prs', {})))")
          echo "Loaded $PR_COUNT PRs from breakability-results branch"
          if [[ "$PR_COUNT" -eq 0 ]]; then
            echo "::error::breakability-results branch has 0 PRs — run a full deterministic analysis first"
            exit 1
          fi
          # Extract PR diffs if available
          git show origin/breakability-results:pr-diffs.tar.gz > /tmp/pr-diffs.tar.gz 2>/dev/null && \
            tar xzf /tmp/pr-diffs.tar.gz -C /tmp/ || echo "No PR diffs archive on branch — agent will fetch diffs via API"

      # ── When running full pipeline: download and merge batch artifacts ──
      - name: Download all batch artifacts
        if: ${{ inputs.skip_deterministic != true }}
        uses: actions/download-artifact@v4
        with:
          path: /tmp/batch-results
          pattern: batch-*

      - name: List downloaded artifacts
        if: ${{ inputs.skip_deterministic != true }}
        run: |
          echo "=== Downloaded artifacts ==="
          find /tmp/batch-results -type f | sort | head -60
          echo "=== Batch result files ==="
          ls -la /tmp/batch-results/batch-*/build-results-*.json 2>/dev/null || echo "No batch files found"

      - name: Merge results
        if: ${{ inputs.skip_deterministic != true }}
        run: |
          chmod +x .github/scripts/merge-results.sh
          bash .github/scripts/merge-results.sh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ── Push merged results to breakability-results branch ──
      # This ensures BOTH code paths in the prompt (branch + /tmp) have fresh data.
      # Also enables AI-only re-runs via skip_deterministic=true.
      - name: Push results to breakability-results branch
        if: always()
        run: |
          RESULTS="/tmp/build-results.json"
          if [[ ! -f "$RESULTS" ]]; then
            echo "No build-results.json to push — skipping"
            exit 0
          fi
          PR_COUNT=$(python3 -c "import json; print(len(json.load(open('$RESULTS')).get('prs', {})))")
          if [[ "$PR_COUNT" -eq 0 ]]; then
            echo "Results have 0 PRs — skipping branch push to avoid overwriting good data"
            exit 0
          fi
          echo "Pushing $PR_COUNT PRs to breakability-results branch..."

          # Package PR diffs into a tar for the branch
          if ls /tmp/pr-*.diff 1>/dev/null 2>&1; then
            tar czf /tmp/pr-diffs.tar.gz -C /tmp/ $(ls /tmp/pr-*.diff | xargs -n1 basename)
          fi

          # Create or update the breakability-results branch
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Switch to orphan branch (no history bloat)
          git checkout --orphan breakability-results-tmp
          git rm -rf . > /dev/null 2>&1 || true

          cp "$RESULTS" build-results.json
          git add build-results.json
          if [[ -f /tmp/pr-diffs.tar.gz ]]; then
            cp /tmp/pr-diffs.tar.gz pr-diffs.tar.gz
            git add pr-diffs.tar.gz
          fi

          git commit -m "Update breakability results — $PR_COUNT PRs — $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push --force origin HEAD:breakability-results
          echo "✅ breakability-results branch updated with $PR_COUNT PRs"

          # Switch back to main for remaining steps
          git checkout -f main 2>/dev/null || git checkout -f - 2>/dev/null || true

      - name: Upload merged results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-results
          path: |
            /tmp/build-results.json
            /tmp/pr-*.diff
          retention-days: 30

      - name: Show build results summary
        if: always()
        run: |
          echo "=== Build Results Summary ==="
          python3 -c "
          import json
          with open('/tmp/build-results.json') as f:
              data = json.load(f)
          prs = data.get('prs', {})
          print(f'PRs analyzed: {len(prs)}')
          methods = {}
          levels = {}
          for num, pr in sorted(prs.items(), key=lambda x: int(x[0])):
              verdict = pr.get('build', {}).get('verdict', '?')
              vl = pr.get('verification_label', '?')
              m = pr.get('build', {}).get('install_method', '?')
              methods[m] = methods.get(m, 0) + 1
              levels[vl] = levels.get(vl, 0) + 1
              emoji = {'pass': '✅', 'fail': '❌', 'skip': '⏭️', 'pre_existing': '⚠️', 'error': '💥'}.get(verdict, '❓')
              print(f'  PR #{num}: {pr[\"package\"]} {pr[\"from\"]}→{pr[\"to\"]} | {emoji} {verdict} | {vl} | {m}')
          print()
          print('Install methods:', dict(sorted(methods.items(), key=lambda x:-x[1])))
          print('Verification levels:', dict(sorted(levels.items(), key=lambda x:-x[1])))
          cross = data.get('cross_pr_deps', [])
          if cross:
              print(f'Cross-PR deps: {len(cross)}')
          " || echo "Failed to parse build-results.json"

      # ── Agent Analysis (Cursor Agent CLI) ────────────────────────
      - name: Install Cursor Agent CLI
        if: ${{ inputs.skip_agent != true }}
        run: |
          curl -fsS https://cursor.com/install | bash
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Verify agent CLI
        if: ${{ inputs.skip_agent != true }}
        run: |
          agent --version || echo "WARNING: agent CLI not on PATH"

      - name: Run Cursor agent analysis
        if: ${{ inputs.skip_agent != true }}
        id: agent
        continue-on-error: true
        run: |
          agent -p --force --model claude-4-sonnet "$(cat .github/breakability-prompt.md)"
        env:
          CURSOR_API_KEY: ${{ secrets.CURSOR_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        timeout-minutes: 60

      # ── Fallback ───────────────────────────────────────────────────
      - name: Post fallback comments for missed PRs
        if: always()
        run: |
          chmod +x .github/scripts/post-fallback-comments.sh
          bash .github/scripts/post-fallback-comments.sh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
