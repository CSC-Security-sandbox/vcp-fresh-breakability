name: Breakability Agent (Hybrid)

on:
  # schedule:
  #   # Weekdays at 6 AM UTC — disabled to save CI costs
  #   - cron: '0 6 * * 1-5'
  pull_request:
    # Scenario 2A: analyze a Dependabot PR immediately when it opens, without waiting for the next batch run.
    # Non-Dependabot PRs are filtered out in the discover job via the 'dependencies' label check.
    types: [opened]
  workflow_dispatch:
    inputs:
      pr_filter:
        description: 'Comma-separated PR numbers to analyze (empty = all)'
        required: false
        default: ''
      skip_agent:
        description: 'Skip agent step (deterministic only)'
        required: false
        default: 'false'
        type: boolean
      batch_count:
        description: 'Number of parallel batches (1 = sequential, 4 = default)'
        required: false
        default: '4'
        type: choice
        options:
          - '1'
          - '2'
          - '4'
          - '6'

concurrency:
  # Scope concurrency per event type so single-PR analysis (pull_request:opened)
  # doesn't cancel running batch scans (workflow_dispatch) (Finding-1.12).
  group: breakability-agent-${{ github.event_name }}-${{ github.event.pull_request.number || 'batch' }}
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write
  issues: write
  security-events: read

env:
  NODE_VERSION: '20'
  # Go version should match the target repo's go.mod directive to avoid
  # automatic toolchain downloads that trigger GOSUMDB verification (A3-8).
  # Use 1.24 as the default — most repos in greenqloud use 1.24.x.
  GO_VERSION: '1.24'
  PYTHON_VERSION: '3.12'

jobs:
  # ═══════════════════════════════════════════════════════════════════
  # Job 1: Discover PRs and split into batches
  # ═══════════════════════════════════════════════════════════════════
  discover:
    runs-on: [self-hosted, breakability]
    # Skip non-Dependabot PRs to avoid wasting CI time (Finding-2.7).
    # pull_request:opened fires for ALL PRs; filter early to avoid empty runs
    # that could cancel real batch scans via the concurrency group.
    if: github.event_name != 'pull_request' || github.actor == 'dependabot[bot]'
    timeout-minutes: 5
    outputs:
      matrix: ${{ steps.split.outputs.matrix }}
      pr_count: ${{ steps.split.outputs.pr_count }}
    steps:
      - name: Discover and split PRs into batches
        id: split
        run: |
          BATCH_COUNT="${{ inputs.batch_count || '4' }}"
          PR_FILTER="${{ inputs.pr_filter }}"

          # Single-PR mode: when triggered by pull_request: opened, analyze only that PR.
          # This handles Scenario 2A — instant analysis for a new Dependabot PR.
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            PR_FILTER="${{ github.event.pull_request.number }}"
            echo "pull_request trigger detected — single-PR mode: PR #${PR_FILTER}"
          fi

          # Fetch all open Dependabot PRs
          PR_NUMS=$(gh pr list --repo "$GITHUB_REPOSITORY" \
            --label "dependencies" --state open \
            --json number --jq '.[].number' --limit 500 | sort -n)

          # Apply filter if set
          if [[ -n "$PR_FILTER" ]]; then
            ALLOWED=$(echo "$PR_FILTER" | tr ',' '\n' | tr -d ' ')
            PR_NUMS=$(comm -12 <(echo "$PR_NUMS" | sort) <(echo "$ALLOWED" | sort))
          fi

          TOTAL=$(echo "$PR_NUMS" | grep -c . || echo 0)
          echo "Total PRs to analyze: $TOTAL"
          echo "pr_count=$TOTAL" >> "$GITHUB_OUTPUT"

          # For very small runs, use 1 batch
          if [[ "$TOTAL" -le 5 ]]; then
            BATCH_COUNT=1
          fi

          # Split into batches
          mapfile -t ALL_PRS < <(echo "$PR_NUMS")
          PER_BATCH=$(( (TOTAL + BATCH_COUNT - 1) / BATCH_COUNT ))

          MATRIX_JSON='{"include":['
          FIRST=true
          for (( b=0; b<BATCH_COUNT; b++ )); do
            START=$(( b * PER_BATCH ))
            BATCH_PRS=""
            for (( j=START; j<START+PER_BATCH && j<TOTAL; j++ )); do
              [[ -n "$BATCH_PRS" ]] && BATCH_PRS="$BATCH_PRS,"
              BATCH_PRS="$BATCH_PRS${ALL_PRS[$j]}"
            done
            [[ -z "$BATCH_PRS" ]] && continue
            [[ "$FIRST" == "true" ]] && FIRST=false || MATRIX_JSON="$MATRIX_JSON,"
            MATRIX_JSON="$MATRIX_JSON{\"batch_id\":\"$((b+1))\",\"pr_filter\":\"$BATCH_PRS\"}"
            echo "  Batch $((b+1)): $BATCH_PRS"
          done
          MATRIX_JSON="$MATRIX_JSON]}"

          echo "Matrix: $MATRIX_JSON"
          echo "matrix=$MATRIX_JSON" >> "$GITHUB_OUTPUT"
        env:
          GH_TOKEN: ${{ secrets.BREAKABILITY_PAT }}

  # ═══════════════════════════════════════════════════════════════════
  # Job 2: Deterministic analysis (parallel matrix)
  # ═══════════════════════════════════════════════════════════════════
  deterministic:
    needs: discover
    runs-on: [self-hosted, breakability]
    timeout-minutes: 180
    strategy:
      matrix: ${{ fromJson(needs.discover.outputs.matrix) }}
      fail-fast: false

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect toolchains needed
        id: detect
        shell: bash
        run: |
          # Only set up the language toolchains this repo actually uses, so a
          # Go-only repo doesn't pay for Node setup (and vice-versa). Detection
          # is repo-level: if both go.mod and package.json exist, both are set up.
          has_go=false; has_node=false; has_java=false
          [[ -n "$(find . -name go.mod -not -path '*/vendor/*' -not -path '*/.git/*' -print -quit 2>/dev/null)" ]] && has_go=true
          [[ -n "$(find . -name package.json -not -path '*/node_modules/*' -not -path '*/.git/*' -print -quit 2>/dev/null)" ]] && has_node=true
          [[ -n "$(find . \( -name pom.xml -o -name build.gradle \) -not -path '*/.git/*' -print -quit 2>/dev/null)" ]] && has_java=true
          echo "has_go=$has_go"   >> "$GITHUB_OUTPUT"
          echo "has_node=$has_node" >> "$GITHUB_OUTPUT"
          echo "has_java=$has_java" >> "$GITHUB_OUTPUT"
          echo "detected toolchains: go=$has_go node=$has_node java=$has_java"

      - name: Setup Node.js
        if: steps.detect.outputs.has_node == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          # Self-hosted: npm cache + tool-cache SDK already persist on disk
          # between runs. The GHA cache just adds a slow, racy network round-trip.
          cache: ''

      - name: Setup Go
        if: steps.detect.outputs.has_go == 'true'
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          # Self-hosted: GOMODCACHE/GOCACHE (9.8G) already persist on disk between
          # runs. Disable the GHA module cache to avoid the Zscaler-slow,
          # "Unable to reserve cache" race that dominated run time.
          cache: false

      - name: Install Go security tools
        if: steps.detect.outputs.has_go == 'true' && env.BREAKABILITY_GOVULNCHECK == '1'
        run: |
          # govulncheck: scans transitive deps for known CVEs. Opt-in only
          # (default off — Dependabot already supplies the CVE list), so we
          # skip this network 'go install' on every run unless explicitly enabled.
          go install golang.org/x/vuln/cmd/govulncheck@latest 2>/dev/null || echo "govulncheck install failed — vuln scanning will be skipped"

      - name: Setup Python
        shell: bash
        run: |
          # Use the Python pre-seeded in the self-hosted runner tool cache.
          # actions/setup-python downloads an installer hardcoded to the
          # GitHub-hosted path /Users/runner/hostedtoolcache, which fails on
          # this runner (user: hpoornac). Putting the seeded interpreter on
          # PATH avoids that download entirely.
          PYBIN="${RUNNER_TOOL_CACHE:-$HOME/actions-runner/_work/_tool}/Python/${PYTHON_VERSION_FULL}/arm64/bin"
          if [[ ! -x "$PYBIN/python3" ]]; then
            echo "::error::Seeded Python ${PYTHON_VERSION_FULL} not found at $PYBIN"
            exit 1
          fi
          echo "$PYBIN" >> "$GITHUB_PATH"
          "$PYBIN/python3" --version
        env:
          PYTHON_VERSION_FULL: '3.12.13'

      - name: Setup Maven
        if: steps.detect.outputs.has_java == 'true'
        run: |
          # Self-hosted runners here are macOS (no apt-get). Use brew if Maven
          # is missing; only runs for repos that actually have pom.xml/build.gradle.
          if ! command -v mvn &>/dev/null; then
            brew install maven > /dev/null 2>&1 || echo "Maven install skipped (install manually on runner if Java repos are added)"
          fi

      - name: Run deterministic analysis (batch ${{ matrix.batch_id }})
        run: |
          chmod +x .github/scripts/build-check.sh
          bash .github/scripts/build-check.sh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # V9.8 iter6: optional fine-grained PAT for reading Dependabot alerts.
          # If set, the security scan uses this instead of GITHUB_TOKEN.
          # Required permissions: Dependabot alerts (Read), Contents (Read), Metadata (Read).
          BREAKABILITY_PAT: ${{ secrets.BREAKABILITY_PAT }}
          CLI_PATH: .github/actions/breakability-check/index.js
          PR_FILTER: ${{ matrix.pr_filter }}
          BATCH_ID: ${{ matrix.batch_id }}
          REPO_ROOT: ${{ github.workspace }}
          # ── Private Registry Auth (see docs/PRIVATE_REGISTRIES.md) ──
          # Add your registry auth tokens as GitHub secrets, then
          # pass them here with the same env var names used in
          # .github/breakability-config.yml → private_registries[].auth_token_env
          # Example:
          #   AZURE_ARTIFACTS_TOKEN: ${{ secrets.AZURE_ARTIFACTS_TOKEN }}
          #   GH_PACKAGES_TOKEN: ${{ secrets.GH_PACKAGES_TOKEN }}
          #   ACR_NPM_TOKEN: ${{ secrets.ACR_NPM_TOKEN }}

      - name: Upload batch results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: batch-${{ matrix.batch_id }}
          path: |
            /tmp/build-results-${{ matrix.batch_id }}.json
            /tmp/pr-*.diff
            /tmp/_bc_workspace_graph.json
            /tmp/_bc_peer_groups.json
          retention-days: 30

  # ═══════════════════════════════════════════════════════════════════
  # Job 3: Merge results + Agent analysis (single run)
  # ═══════════════════════════════════════════════════════════════════
  merge-and-analyze:
    needs: [discover, deterministic]
    runs-on: [self-hosted, breakability]
    timeout-minutes: 120
    if: always() && needs.discover.result == 'success'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup Python
        shell: bash
        run: |
          # Use the Python pre-seeded in the self-hosted runner tool cache
          # (see deterministic job for rationale).
          PYBIN="${RUNNER_TOOL_CACHE:-$HOME/actions-runner/_work/_tool}/Python/${PYTHON_VERSION_FULL}/arm64/bin"
          if [[ ! -x "$PYBIN/python3" ]]; then
            echo "::error::Seeded Python ${PYTHON_VERSION_FULL} not found at $PYBIN"
            exit 1
          fi
          echo "$PYBIN" >> "$GITHUB_PATH"
          "$PYBIN/python3" --version
        env:
          PYTHON_VERSION_FULL: '3.12.13'

      - name: Download all batch artifacts
        uses: actions/download-artifact@v4
        with:
          path: /tmp/batch-results
          pattern: batch-*

      - name: List downloaded artifacts
        run: |
          echo "=== Downloaded artifacts ==="
          find /tmp/batch-results -type f | sort | head -60
          echo "=== Batch result files ==="
          ls -la /tmp/batch-results/batch-*/build-results-*.json 2>/dev/null || echo "No batch files found"

      - name: Merge results
        run: |
          chmod +x .github/scripts/merge-results.sh
          EXPECTED_PR_COUNT=${{ needs.discover.outputs.pr_count }} bash .github/scripts/merge-results.sh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BREAKABILITY_PAT: ${{ secrets.BREAKABILITY_PAT }}

      - name: Upload merged results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-results
          path: |
            /tmp/build-results.json
            /tmp/pr-*.diff
          retention-days: 30

      - name: Show build results summary
        if: always()
        run: |
          echo "=== Build Results Summary ==="
          python3 -c "
          import json
          with open('/tmp/build-results.json') as f:
              data = json.load(f)
          prs = data.get('prs', {})
          print(f'PRs analyzed: {len(prs)}')
          methods = {}
          levels = {}
          for num, pr in sorted(prs.items(), key=lambda x: int(x[0])):
              verdict = pr.get('build', {}).get('verdict', '?')
              vl = pr.get('verification_label', '?')
              m = pr.get('build', {}).get('install_method', '?')
              methods[m] = methods.get(m, 0) + 1
              levels[vl] = levels.get(vl, 0) + 1
              emoji = {'pass': '✅', 'fail': '❌', 'skip': '⏭️', 'pre_existing': '⚠️', 'error': '💥'}.get(verdict, '❓')
              print(f'  PR #{num}: {pr[\"package\"]} {pr[\"from\"]}→{pr[\"to\"]} | {emoji} {verdict} | {vl} | {m}')
          print()
          print('Install methods:', dict(sorted(methods.items(), key=lambda x:-x[1])))
          print('Verification levels:', dict(sorted(levels.items(), key=lambda x:-x[1])))
          cross = data.get('cross_pr_deps', [])
          if cross:
              print(f'Cross-PR deps: {len(cross)}')
          " || echo "Failed to parse build-results.json"

      # ── Agent Analysis (Cursor Agent CLI) ──────────────────────
      - name: Commit build results to temp branch
        if: ${{ inputs.skip_agent != true }}
        id: commit_results
        run: |
          RESULTS_BRANCH="breakability-results"
          echo "results_branch=$RESULTS_BRANCH" >> "$GITHUB_OUTPUT"

          # Configure git
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # Create or switch to the results branch (orphan — no history needed)
          # On first run, --orphan stages ALL tracked files. git rm -rf removes them
          # so the commit only contains results, not the entire repo (Finding-3.7).
          git checkout --orphan "$RESULTS_BRANCH" 2>/dev/null || git checkout "$RESULTS_BRANCH" 2>/dev/null || true
          git rm -rf . 2>/dev/null || true
          git reset --hard HEAD 2>/dev/null || true

          # Stage build results
          cp /tmp/build-results.json ./build-results.json

          # Bundle PR diffs into a tarball if they exist
          if ls /tmp/pr-*.diff 1>/dev/null 2>&1; then
            tar czf ./pr-diffs.tar.gz -C /tmp/ $(ls /tmp/pr-*.diff | xargs -I{} basename {})
          fi

          git add build-results.json pr-diffs.tar.gz 2>/dev/null || git add build-results.json
          git commit -m "Breakability results $(date -u +%Y-%m-%dT%H:%M:%SZ)" --allow-empty
          git push origin "$RESULTS_BRANCH" --force

          # Switch back to main branch for subsequent steps
          git checkout "${{ github.ref_name }}" 2>/dev/null || git checkout main
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Cursor Agent CLI
        if: ${{ inputs.skip_agent != true }}
        run: |
          curl -fsS https://cursor.com/install | bash
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Verify agent CLI
        if: ${{ inputs.skip_agent != true }}
        run: |
          agent --version || echo "WARNING: agent CLI not on PATH"

      - name: Run Cursor agent analysis
        if: ${{ inputs.skip_agent != true }}
        id: agent
        continue-on-error: true
        run: |
          agent -p --force --model claude-4-sonnet "$(cat .github/breakability-prompt.md)"
        env:
          CURSOR_API_KEY: ${{ secrets.CURSOR_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        timeout-minutes: 120
      # ── Deterministic analysis comments + merge plan ─────────────
      # CR5-1: This is the PRIMARY comment system, not a fallback.
      # Run when: agent was skipped, agent failed, or always in advisory mode.
      # The agent check (line 66-73 of post-fallback-comments.sh) still skips
      # PRs where the AI agent already posted richer comments.
      - name: Post deterministic analysis comments
        if: always()
        run: |
          chmod +x .github/scripts/post-fallback-comments.sh
          bash .github/scripts/post-fallback-comments.sh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
