name: Update vsacictl when changed and bump version
on:
  push:
    branches:
      - main
      - 'release/**'
  workflow_dispatch: 

permissions:
  contents: read
  actions: read

jobs:
  setup-vsacictl:
    name: Setup vsacictl
    uses: ./.github/workflows/setup-vsacictl.yaml
    with:
      is-update-workflow: true
    secrets: inherit

  summary:
    name: Build Summary
    needs: setup-vsacictl
    runs-on: ubuntu-latest
    steps:
      - name: Generate Summary
        run: |
          echo "### vsacictl Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Branch**: ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Artifact Name**: ${{ needs.setup-vsacictl.outputs.vsacictl-artifact-name }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Build Status**: ✅ Success" >> $GITHUB_STEP_SUMMARY
