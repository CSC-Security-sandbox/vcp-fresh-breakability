name: Build and Publish Images, Charts and Release

on:
  workflow_call:
    inputs:
      tag:
        description: "Tag to use for building and publishing images and charts and release"
        required: true
        type: string
      pre_release:
        description: "A flag to indicate if this is a pre-release"
        default: false
        type: boolean
      pr_user:
        description: "User who created the pull request"
        required: false
        type: string
      pr_title:
        description: "Title of the pull request"
        required: false
        type: string
      pr_base_branch:
        description: "Base branch for the pull request"
        required: true
        type: string
      component_update:
        description: "A flag to check if component version update is required"
        default: false
        type: boolean
      send_slack_notification:
        description: "A flag to check if a Slack notification should be sent"
        default: true
        type: boolean
      images_to_build:
        description: "A list of images to build. If not provided, all images will be built"
        required: false
        type: string
        default: "core,google-proxy,vcp-db-migrate,vcp-iam-lifecycle,vcp-worker,telemetry,vcp-cloudrun-deployer,ontap-proxy"
      additional_images_toscan:
        description: "A list of additional images to scan. If not provided, no additional images will be scanned"
        required: false
        type: string
        default: "cloud-backup-adc"
      create_release:
        description: "A flag to indicate if a GitHub release should be created"
        default: true
        type: boolean
      push_charts:
        description: "A flag to indicate if Helm charts should be pushed"
        default: true
        type: boolean
      oci_override_suffix:
        description: "OCI override file suffix to use for manifest metadata (e.g. eng_cp, nmobsa)"
        required: false
        type: string
        default: "eng_cp"
      build_target:
        description: "Which track to publish: gcp, oci, or both. Used during GA promotion to publish track-specific artifacts."
        required: false
        type: string
        default: "both"
    outputs:
      GHCR_core_URL:
        description: "URL of the core image in GHCR"
        value: ${{ jobs.build_and_publish.outputs.GHCR_core_URL }}
      GCP_core_URL:
        description: "URL of the core image in GCP"
        value: ${{ jobs.build_and_publish.outputs.GCP_core_URL }}
      GHCR_google_proxy_URL:
        description: "URL of the google-proxy image in GHCR"
        value: ${{ jobs.build_and_publish.outputs.GHCR_google_proxy_URL }}
      GCP_google_proxy_URL:
        description: "URL of the google-proxy image in GCP"
        value: ${{ jobs.build_and_publish.outputs.GCP_google_proxy_URL }}
      GHCR_vcp_db_migrate_URL:
        description: "URL of the vcp-db-migrate image in GHCR"
        value: ${{ jobs.build_and_publish.outputs.GHCR_vcp_db_migrate_URL }}
      GCP_vcp_db_migrate_URL:
        description: "URL of the vcp-db-migrate image in GCP"
        value: ${{ jobs.build_and_publish.outputs.GCP_vcp_db_migrate_URL }}
      GHCR_vcp_iam_lifecycle_URL:
        description: "URL of the vcp-iam-lifecycle image in GHCR"
        value: ${{ jobs.build_and_publish.outputs.GHCR_vcp_iam_lifecycle_URL }}
      GCP_vcp_iam_lifecycle_URL:
        description: "URL of the vcp-iam-lifecycle image in GCP"
        value: ${{ jobs.build_and_publish.outputs.GCP_vcp_iam_lifecycle_URL }}
      GHCR_vcp_cloudrun_deployer_URL:
        description: "URL of the vcp-cloudrun-deployer image in GHCR"
        value: ${{ jobs.build_and_publish.outputs.GHCR_vcp_cloudrun_deployer_URL }}
      GCP_vcp_cloudrun_deployer_URL:
        description: "URL of the vcp-cloudrun-deployer image in GCP"
        value: ${{ jobs.build_and_publish.outputs.GCP_vcp_cloudrun_deployer_URL }}
      GHCR_vcp_worker_URL:
        description: "URL of the vcp-worker image in GHCR"
        value: ${{ jobs.build_and_publish.outputs.GHCR_vcp_worker_URL }}
      GCP_vcp_worker_URL:
        description: "URL of the vcp-worker image in GCP"
        value: ${{ jobs.build_and_publish.outputs.GCP_vcp_worker_URL }}
      GHCR_ontap_proxy_URL:
        description: "URL of the ontap-proxy image in GHCR"
        value: ${{ jobs.build_and_publish.outputs.GHCR_ontap_proxy_URL }}
      GCP_ontap_proxy_URL:
        description: "URL of the ontap-proxy image in GCP"
        value: ${{ jobs.build_and_publish.outputs.GCP_ontap_proxy_URL }}
      GHCR_vsa_control_plane_HELM_URL:
        description: "URL of the vsa-control-plane chart in GHCR"
        value: ${{ jobs.build_and_publish.outputs.GHCR_vsa_control_plane_HELM_URL }}
      GCP_vsa_control_plane_HELM_URL:
        description: "URL of the vsa-control-plane chart in GCP"
        value: ${{ jobs.build_and_publish.outputs.GCP_vsa_control_plane_HELM_URL }}
      GHCR_vcp_worker_HELM_URL:
        description: "URL of the vcp-worker chart in GHCR"
        value: ${{ jobs.build_and_publish.outputs.GHCR_vcp_worker_HELM_URL }}
      GCP_vcp_worker_HELM_URL:
        description: "URL of the vcp-worker chart in GCP"
        value: ${{ jobs.build_and_publish.outputs.GCP_vcp_worker_HELM_URL }}
      GHCR_vsa_harvest_otel_HELM_URL:
        description: "URL of the vcp-harvest chart in GHCR"
        value: ${{ jobs.build_and_publish.outputs.GHCR_vsa_harvest_otel_HELM_URL }}
      GCP_vsa_harvest_otel_HELM_URL:
        description: "URL of the vcp-harvest chart in GCP"
        value: ${{ jobs.build_and_publish.outputs.GCP_vsa_harvest_otel_HELM_URL }}
      GHCR_ontap_proxy_HELM_URL:
        description: "URL of the ontap-proxy chart in GHCR"
        value: ${{ jobs.build_and_publish.outputs.GHCR_ontap_proxy_HELM_URL }}
      GCP_ontap_proxy_HELM_URL:
        description: "URL of the ontap-proxy chart in GCP"
        value: ${{ jobs.build_and_publish.outputs.GCP_ontap_proxy_HELM_URL }}
      GHCR_oci_proxy_URL:
        description: "URL of the oci-proxy image in GHCR"
        value: ${{ jobs.build_and_publish.outputs.GHCR_oci_proxy_URL }}
      GHCR_oci_proxy_HELM_URL:
        description: "URL of the oci-proxy chart in GHCR"
        value: ${{ jobs.build_and_publish.outputs.GHCR_oci_proxy_HELM_URL }}
      GHCR_oci_vcp_worker_chart_HELM_URL:
        description: "URL of the OCI vcp-worker chart in GHCR"
        value: ${{ jobs.build_and_publish.outputs.GHCR_oci_vcp_worker_chart_HELM_URL }}
      GHCR_oci_vlm_worker_HELM_URL:
        description: "URL of the OCI vlm-worker chart in GHCR"
        value: ${{ jobs.build_and_publish.outputs.GHCR_oci_vlm_worker_HELM_URL }}
      GHCR_vcp_worker_BINARY_URL:
        description: "URL of the vcp-worker binary OCI artifact in GHCR"
        value: ${{ jobs.build_and_publish.outputs.GHCR_vcp_worker_BINARY_URL }}
      GHCR_oci_proxy_BINARY_URL:
        description: "URL of the oci-proxy binary OCI artifact in GHCR"
        value: ${{ jobs.build_and_publish.outputs.GHCR_oci_proxy_BINARY_URL }}
    secrets:
      GHVSA_PAT:
        required: true
      GHCR_REPO:
        required: true

permissions:
  packages: write
  contents: write
  id-token: write
  security-events: write
  actions: read

jobs:
  setup-vsacictl:
    name: Setup vsacictl
    uses: ./.github/workflows/setup-vsacictl.yaml
    secrets: inherit

  build_and_publish:
    name: Build and Publish Docker Images
    needs: setup-vsacictl
    runs-on: [self-hosted, linux]
    container:
      image: ghcr.io/vcp-vsa-control-plane/vsa-builder:v9
      options: --user root
    permissions:
      contents: write
      packages: write
      id-token: write
    outputs:
      GHCR_core_URL: ${{ steps.generate_output_urls.outputs.GHCR_core_URL }}
      GCP_core_URL: ${{ steps.generate_output_urls.outputs.GCP_core_URL }}
      GHCR_google_proxy_URL: ${{ steps.generate_output_urls.outputs.GHCR_google-proxy_URL }}
      GCP_google_proxy_URL: ${{ steps.generate_output_urls.outputs.GCP_google-proxy_URL }}
      GHCR_vcp_db_migrate_URL: ${{ steps.generate_output_urls.outputs.GHCR_vcp-db-migrate_URL }}
      GCP_vcp_db_migrate_URL: ${{ steps.generate_output_urls.outputs.GCP_vcp-db-migrate_URL }}
      GHCR_vcp_iam_lifecycle_URL: ${{ steps.generate_output_urls.outputs.GHCR_vcp-iam-lifecycle_URL }}
      GCP_vcp_iam_lifecycle_URL: ${{ steps.generate_output_urls.outputs.GCP_vcp-iam-lifecycle_URL }}
      GHCR_vcp_cloudrun_deployer_URL: ${{ steps.generate_output_urls.outputs.GHCR_vcp-cloudrun-deployer_URL }}
      GCP_vcp_cloudrun_deployer_URL: ${{ steps.generate_output_urls.outputs.GCP_vcp-cloudrun-deployer_URL }}
      GHCR_vcp_worker_URL: ${{ steps.generate_output_urls.outputs.GHCR_vcp-worker_URL }}
      GCP_vcp_worker_URL: ${{ steps.generate_output_urls.outputs.GCP_vcp-worker_URL }}
      GHCR_ontap_proxy_URL: ${{ steps.generate_output_urls.outputs.GHCR_ontap-proxy_URL }}
      GCP_ontap_proxy_URL: ${{ steps.generate_output_urls.outputs.GCP_ontap-proxy_URL }}
      GHCR_vsa_control_plane_HELM_URL: ${{ steps.generate_output_urls.outputs.GHCR_vsa-control-plane_HELM_URL }}
      GCP_vsa_control_plane_HELM_URL: ${{ steps.generate_output_urls.outputs.GCP_vsa_control_plane_HELM_URL }}
      GHCR_vcp_worker_HELM_URL: ${{ steps.generate_output_urls.outputs.GHCR_vcp-worker-chart_HELM_URL }}
      GCP_vcp_worker_HELM_URL: ${{ steps.generate_output_urls.outputs.GCP_vcp-worker-chart_HELM_URL }}
      GHCR_vsa_harvest_otel_HELM_URL: ${{ steps.generate_output_urls.outputs.GHCR_vsa-harvest-otel-chart_HELM_URL }}
      GCP_vsa_harvest_otel_HELM_URL: ${{ steps.generate_output_urls.outputs.GCP_vsa-harvest-otel-chart_HELM_URL }}
      IMAGES_TO_SCAN: ${{ steps.set_image_list.outputs.IMAGES_TO_SCAN }}
      GHCR_ontap_proxy_HELM_URL: ${{ steps.generate_output_urls.outputs.GHCR_ontap-proxy-chart_HELM_URL }}
      GCP_ontap_proxy_HELM_URL: ${{ steps.generate_output_urls.outputs.GCP_ontap-proxy-chart_HELM_URL }}
      GHCR_vcp_worker_BINARY_URL: ${{ steps.generate_output_urls.outputs.GHCR_vcp-worker_BINARY_URL }}
      GHCR_oci_proxy_BINARY_URL: ${{ steps.generate_output_urls.outputs.GHCR_oci-proxy_BINARY_URL }}
      GHCR_oci_proxy_URL: ${{ steps.generate_output_urls.outputs.GHCR_oci-proxy_URL }}
      GHCR_oci_proxy_HELM_URL: ${{ steps.generate_output_urls.outputs.GHCR_oci-proxy_HELM_URL }}
      GHCR_oci_vcp_worker_chart_HELM_URL: ${{ steps.generate_output_urls.outputs.GHCR_oci-vcp-worker-chart_HELM_URL }}
      GHCR_oci_vlm_worker_HELM_URL: ${{ steps.generate_output_urls.outputs.GHCR_oci-vlm-worker_HELM_URL }}
    env:
      RELEASE_BINARIES: "vcp-worker oci-proxy"
      OCI_CHART_NAMES: "oci-proxy oci-vcp-worker-chart oci-vlm-worker"
    steps:
      - name: Check out the repo
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v3
        with:
          go-version-file: go.mod
      - name: Image list to build
        id: set_image_list
        run: |
          IFS=',' read -ra additional_images_toscan <<< "$additional_images_toscan"
          IFS=',' read -ra IMAGES <<< "${{ inputs.images_to_build }}"
          IMAGES+=("${additional_images_toscan[@]}")
          IMAGES_TO_SCAN='['
          for item in "${IMAGES[@]}"; do
              IMAGES_TO_SCAN+="\"$item\","
          done
          IMAGES_TO_SCAN="${IMAGES_TO_SCAN%,}]"
          echo "IMAGES_TO_SCAN=$IMAGES_TO_SCAN" >> $GITHUB_OUTPUT
          echo "IMAGES_TO_SCAN: ${IMAGES_TO_SCAN}"
          echo "IMAGES_TO_BUILD is set to: ${{ inputs.images_to_build }}"
          
        shell: bash -e {0}
        env:
          images_to_build: ${{ inputs.images_to_build }}
          additional_images_toscan: ${{ inputs.additional_images_toscan }}

      - name: Install vsacictl
        uses: ./.github/actions/install-vsacictl
        with:
          cache-key: ${{ needs.setup-vsacictl.outputs.cache-key }}

      - name: Build images
        env:
          IMAGES_TAG: ${{ inputs.tag }}
          GHVSA_PAT: ${{ secrets.GHVSA_PAT }}
        run: |
          skaffold config set default-repo ""
          make build-all-binaries-prod 
          IFS=',' read -ra IMAGES <<< "${{ inputs.images_to_build }}" 
          skaffold build
          # for image in ${IMAGES[*]}; do
          #     echo "Building image: ${image}"
          #     skaffold build -b ${image} &
          # done
          # wait
          make vcp-db-migrate-image imageVersion=${{ inputs.tag }}
          make vcp-iam-lifecycle-image imageVersion=${{ inputs.tag }}
          make vcp-cloudrun-deployer-linux-image imageVersion=${{ inputs.tag }}
        shell: bash -e {0}

      - name: Generate binary checksums
        run: |
          cd artifacts
          IFS=' ' read -ra BINARIES <<< "$RELEASE_BINARIES"
          for BINARY in "${BINARIES[@]}"; do
            sha256sum "$BINARY" > "${BINARY}.sha256"
            echo "SHA256 (${BINARY}): $(cat "${BINARY}.sha256")"
          done
        shell: bash -e {0}

      - name: Check if digest exists in the gcloud or not
        if: ${{ inputs.build_target != 'oci' }}
        shell: bash -e {0}
        run: |
          ALL_DIGESTS_EXIST=1
          IFS=',' read -ra IMAGES <<< "${{ inputs.images_to_build }}"
          for IMAGE in "${IMAGES[@]}"; do
              [[ "$IMAGE" == "oci-proxy" ]] && continue
              gcpDigest=$(docker inspect "$IMAGE:${{ inputs.tag }}" | jq -r '.[] | .RepoDigests[] | select(contains("-docker.pkg.dev"))')
              echo "gcp digest is $gcpDigest"
              if [[ -n "$gcpDigest" ]]; then
               echo "Digest for image ${IMAGE} exists in Google Artifact Registry."
               echo "${IMAGE}_DIGEST_EXISTS=1" >> $GITHUB_ENV 
              else
                echo "Digest for image ${IMAGE} does not exist in Google Artifact Registry."
                echo "${IMAGE}_DIGEST_EXISTS=0" >> $GITHUB_ENV 
                ALL_DIGESTS_EXIST=0
              fi
          done
          echo "ALL_DIGESTS_EXIST=$ALL_DIGESTS_EXIST" >> $GITHUB_ENV             


      - name: Log in to the Container registry
        run: |
          echo "${{ secrets.GHVSA_PAT }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin          

      - id: auth
        uses: google-github-actions/auth@v1
        with:
          workload_identity_provider: 'projects/${{vars.AR_GCP_PROJ_NUM}}/locations/global/workloadIdentityPools/${{vars.AR_WLI_POOL}}/providers/${{vars.AR_WLI_PROV}}'
          service_account: '${{vars.AR_GCP_SA}}@${{ vars.AR_GCP_PROJ }}.iam.gserviceaccount.com'

      - name: Configure Docker
        run: |
          gcloud config set project ${{ vars.AR_GCP_PROJ }} --quiet
          gcloud auth configure-docker ${{vars.AR_GCP_REGION}}-docker.pkg.dev --quiet

      - name: Push images
        env:
          GCP_PROJECT: ${{ vars.AR_GCP_PROJ }}
          GHCR_ORG: vcp-vsa-control-plane
          IMAGE_PATH: ${{ vars.AR_IMAGE_PATH }}
          IMAGES_TAG: ${{ inputs.tag }}
          GCP_REGION: ${{ vars.AR_GCP_REGION }}
        shell: bash -e {0}
        run: |
          IMAGES_TO_PUSH=$(echo "${{ inputs.images_to_build }}" | tr ',' '\n' | grep -v '^oci-proxy$' | tr '\n' ',' | sed 's/,$//')
          if [[ -n "$IMAGES_TO_PUSH" ]]; then
            if [[ "${{ inputs.build_target }}" == "oci" ]]; then
              vsacictl images push "$IMAGES_TO_PUSH" --registry ghcr
            else
              vsacictl images push "$IMAGES_TO_PUSH"
            fi
          fi

      - name: Push oci-proxy image to GHCR only
        env:
          GHCR_ORG: vcp-vsa-control-plane
          IMAGE_PATH: ${{ vars.AR_IMAGE_PATH }}
          IMAGES_TAG: ${{ inputs.tag }}
        run: vsacictl images push "oci-proxy" --registry ghcr
        shell: bash -e {0}

      - name: Get image digest via GitHub API
        id: get-digest
        run: |
          repo="${1:-VCP-VSA-control-Plane/vsa-control-plane}"  
          token=$(curl -s "https://ghcr.io/token?service=ghcr.io&scope=repository:${repo}:pull" \
          -u "${{github.actor}}:${{secrets.GHVSA_PAT}}") 
          
          token_value=$(echo "$token" | jq -r '.token')
          
          IFS=',' read -ra IMAGES <<< "${{ inputs.images_to_build }}"
          IMAGES+=("oci-proxy")
          for IMAGE in "${IMAGES[@]}"; do
            # Retrieve the manifest digest from Docker-Content-Digest header instead of config digest.
            # Cosign v3 requires the manifest digest for signing operations.
            digest=$(curl -sI -H "Authorization: Bearer $token_value" \
            -H "Accept: application/vnd.oci.image.manifest.v1+json" \
            https://ghcr.io/v2/VCP-VSA-control-Plane/${{ vars.AR_IMAGE_PATH }}/${IMAGE}/manifests/${{ inputs.tag }} | grep -i docker-content-digest | awk '{print $2}' | tr -d '\r')
            
            # Validate that the digest was successfully retrieved
            [[ -n "$digest" ]] || { echo "Error: Failed to retrieve manifest digest for ${IMAGE}"; exit 1; }
            
            echo "${IMAGE}-digest=$digest" >> $GITHUB_ENV
          done
        shell: bash -e {0}

      - name: Generate GCP Artifact URLs
        if: ${{ inputs.build_target != 'oci' }}
        id: generate_artifact_urls
        shell: bash -e {0}
        run: |
          IFS=',' read -ra IMAGES <<< "${{ inputs.images_to_build }}"
          for IMAGE in "${IMAGES[@]}"; do
            [[ "$IMAGE" == "oci-proxy" ]] && continue
            DIGEST=$(gcloud artifacts docker images describe ${{ vars.AR_GCP_REGION }}-docker.pkg.dev/${{ vars.AR_GCP_PROJ }}/${{ vars.AR_IMAGE_PATH }}/${IMAGE}:${{ inputs.tag }} \
              --format="value(image_summary.digest)")
    
            if [[ -n "$DIGEST" ]]; then
              ARTIFACT_URL="${{ vars.AR_GCP_REGION }}-docker.pkg.dev/${{ vars.AR_GCP_PROJ }}/${{ vars.AR_IMAGE_PATH }}/${IMAGE}@${DIGEST}"
              echo "${IMAGE//-/_}_ARTIFACT_URL=${ARTIFACT_URL}" >> $GITHUB_ENV
            else
              echo "Failed to fetch digest for image: ${IMAGE}:${{ inputs.tag }}"
              exit 1
            fi
          done

      - name: Sign Images using cosign (GHCR and GCP)
        run: |
          gcloud secrets versions access latest --secret="${{vars.GH_COSIGN_PUB_KEY}}" > /tmp/cosign.pub
          gcloud secrets versions access latest --secret="${{vars.GH_COSIGN_PVT_KEY}}" > /tmp/cosign.key
          IFS=',' read -ra IMAGES <<< "${{ inputs.images_to_build }}"
          
          for IMAGE in "${IMAGES[@]}"; do
            [[ "$IMAGE" == "oci-proxy" ]] && continue
            # Sign GHCR image
            ghcr_digest=$(printenv "${IMAGE}-digest")
            echo "Signing GHCR image: ${IMAGE}@${ghcr_digest}"
            COSIGN_PASSWORD="" cosign sign --key /tmp/cosign.key ghcr.io/vcp-vsa-control-plane/${{ vars.AR_IMAGE_PATH }}/${IMAGE}@$ghcr_digest --tlog-upload=false
            cosign verify --key /tmp/cosign.pub ghcr.io/vcp-vsa-control-plane/${{ vars.AR_IMAGE_PATH }}/${IMAGE}@$ghcr_digest --insecure-ignore-tlog=true
            
            # Sign GCP Artifact Registry image (skip for OCI-only builds)
            if [[ "${{ inputs.build_target }}" != "oci" ]]; then
              gcp_artifact_url=$(printenv "${IMAGE//-/_}_ARTIFACT_URL")
              if [[ -n "$gcp_artifact_url" ]]; then
                echo "Signing GCP image: ${gcp_artifact_url}"
                COSIGN_PASSWORD="" cosign sign --key /tmp/cosign.key $gcp_artifact_url --tlog-upload=false
                cosign verify --key /tmp/cosign.pub $gcp_artifact_url --insecure-ignore-tlog=true
              else
                echo "Warning: No GCP artifact URL found for ${IMAGE}"
              fi
            fi
          done
        shell: bash -e {0}

      - name: Sign oci-proxy image (GHCR only)
        run: |
          ghcr_digest=$(printenv "oci-proxy-digest")
          echo "Signing GHCR image: oci-proxy@${ghcr_digest}"
          COSIGN_PASSWORD="" cosign sign --key /tmp/cosign.key ghcr.io/vcp-vsa-control-plane/${{ vars.AR_IMAGE_PATH }}/oci-proxy@$ghcr_digest --tlog-upload=false
          cosign verify --key /tmp/cosign.pub ghcr.io/vcp-vsa-control-plane/${{ vars.AR_IMAGE_PATH }}/oci-proxy@$ghcr_digest --insecure-ignore-tlog=true
        shell: bash -e {0}

      - name: Push and sign binary OCI artifacts to GHCR
        if: ${{ inputs.create_release }}
        env:
          GHCR_ORG: vcp-vsa-control-plane
          BINARY_PATH: ${{ vars.AR_BINARY_PATH }}
          IMAGES_TAG: ${{ inputs.tag }}
        run: |
          IFS=' ' read -ra BINARIES <<< "$RELEASE_BINARIES"
          for BINARY in "${BINARIES[@]}"; do
            ARTIFACT_REF="ghcr.io/${GHCR_ORG}/${BINARY_PATH}/${BINARY}:${IMAGES_TAG}"
            echo "Pushing binary: artifacts/${BINARY} -> ${ARTIFACT_REF}"
            oras push "$ARTIFACT_REF" \
              --artifact-type "application/vnd.netapp.vcp.binary.v1" \
              "artifacts/${BINARY}:application/octet-stream" \
              "artifacts/${BINARY}.sha256:text/plain"
            echo "Pushed ${ARTIFACT_REF}"

            DIGEST=$(oras resolve "$ARTIFACT_REF")
            if [ -z "$DIGEST" ]; then
              echo "Error: Failed to resolve digest for ${BINARY} binary OCI artifact"
              exit 1
            fi
            echo "Signing binary artifact: ${BINARY}@${DIGEST}"
            COSIGN_PASSWORD="" cosign sign --key /tmp/cosign.key "ghcr.io/${GHCR_ORG}/${BINARY_PATH}/${BINARY}@${DIGEST}" --tlog-upload=false
            cosign verify --key /tmp/cosign.pub "ghcr.io/${GHCR_ORG}/${BINARY_PATH}/${BINARY}@${DIGEST}" --insecure-ignore-tlog=true
            echo "Signed and verified ${BINARY}"
          done
        shell: bash -e {0}

      - name: Helm Login to Artifact Registry
        if: ${{ inputs.push_charts }}
        run: |
          gcloud auth print-access-token | helm registry login -u oauth2accesstoken --password-stdin https://${{vars.AR_GCP_REGION}}-docker.pkg.dev
          gcloud auth print-access-token | helm registry login -u oauth2accesstoken --password-stdin https://${{vars.AR_TEMPORAL_HELM_REGION}}-docker.pkg.dev
          helm registry login ghcr.io -u ${{github.actor}} --password ${{ secrets.GHVSA_PAT }}

      - name: Update Versions of helm charts
        if: ${{ inputs.push_charts }}
        shell: bash
        env:
          vcp_worker_ARTIFACT_URL: ${{ env.vcp_worker_ARTIFACT_URL }}
          core_ARTIFACT_URL: ${{ env.core_ARTIFACT_URL }}
          google_proxy_ARTIFACT_URL: ${{ env.google_proxy_ARTIFACT_URL }}
          vcp_db_migrate_ARTIFACT_URL: ${{ env.vcp_db_migrate_ARTIFACT_URL }}
          vcp_iam_lifecycle_ARTIFACT_URL: ${{ env.vcp_iam_lifecycle_ARTIFACT_URL }}
          telemetry_deployer_ARTIFACT_URL: ${{ env.vcp_cloudrun_deployer_ARTIFACT_URL }}
          telemetry_digest_gcp_ARTIFACT_URL: ${{ env.telemetry_ARTIFACT_URL }}
          ontap_proxy_ARTIFACT_URL: ${{ env.ontap_proxy_ARTIFACT_URL }}
        run: |
          # Extract digests directly from environment variables
          echo "vcp_worker_digest_gcp=$(echo "${vcp_worker_ARTIFACT_URL}" | awk -F'@' '{print $2}')" >> temp_file.txt
          echo "core_digest_gcp=$(echo "${core_ARTIFACT_URL}" | awk -F'@' '{print $2}')" >> temp_file.txt
          echo "google_proxy_digest_gcp=$(echo "${google_proxy_ARTIFACT_URL}" | awk -F'@' '{print $2}')" >> temp_file.txt
          echo "vcp_db_migrate_digest_gcp=$(echo "${vcp_db_migrate_ARTIFACT_URL}" | awk -F'@' '{print $2}')" >> temp_file.txt
          echo "vcp_iam_lifecycle_digest_gcp=$(echo "${vcp_iam_lifecycle_ARTIFACT_URL}" | awk -F'@' '{print $2}')" >> temp_file.txt
          echo "telemetry_deployer_digest_gcp=$(echo "${telemetry_deployer_ARTIFACT_URL}" | awk -F'@' '{print $2}')" >> temp_file.txt
          echo "telemetry_digest_gcp=$(echo "${telemetry_digest_gcp_ARTIFACT_URL}" | awk -F'@' '{print $2}')" >> temp_file.txt 
          echo "ontap_proxy_digest_gcp=$(echo "${ontap_proxy_ARTIFACT_URL}" | awk -F'@' '{print $2}')" >> temp_file.txt

          # Pass the temp file path to the Go script
          go run ./.github/scripts/updateHelmVersion.go ${{ inputs.tag }} ./.github/scripts/fileToFieldsMapping.json temp_file.txt
          rm -f temp_file.txt

      - name: Package Helm Charts
        if: ${{ inputs.push_charts }}
        run: |
          charts=( vsa-control-plane vcp-worker-chart vsa-harvest-otel vlm-worker ontap-proxy OCI/oci-proxy OCI/vcp-worker-chart OCI/vlm-worker )
          # Only include temporal chart when building from main branch to prevent
          # release branches from overwriting the current temporal tag with older code
          if [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            echo "Building from main branch - including temporal chart"
            charts+=( temporal )
          else
            echo "Building from ref ${{ github.ref }} (${{ github.ref_name }}) - skipping temporal chart"
          fi
          for chart in ${charts[*]}; do
            echo "Package helm Chart for ${chart}"
            helm package kubernetes/${chart} --destination ./helm-packages
          done
        shell: bash -e {0}

      - name: Push Helm Charts to GHCR
        if: ${{ inputs.push_charts }}
        run: |
          is_oci_chart() { local name=$1; [[ " ${OCI_CHART_NAMES} " == *" ${name} "* ]]; }
          for CHART in ./helm-packages/*.tgz; do
            CHART_NAME=$(basename "$CHART" | sed 's/-[0-9][0-9]*\..*$//')
            if [[ "$CHART_NAME" == "temporal" ]]; then
              helm push $CHART oci://ghcr.io/vcp-vsa-control-plane/${{ vars.AR_TEMPORAL_HELM_REPO }}
            elif is_oci_chart "$CHART_NAME"; then
              helm push $CHART oci://ghcr.io/vcp-vsa-control-plane/${{ vars.AR_OCI_HELM_PATH }}
            else
              helm push $CHART oci://ghcr.io/vcp-vsa-control-plane/${{ vars.AR_HELM_PATH }}
            fi
          done
        shell: bash -e {0}

      - name: Push Helm Charts to Artifact Registry
        if: ${{ inputs.push_charts && inputs.build_target != 'oci' }}
        run: |
          is_oci_chart() { local name=$1; [[ " ${OCI_CHART_NAMES} " == *" ${name} "* ]]; }
          for CHART in ./helm-packages/*.tgz; do
            CHART_NAME=$(basename "$CHART" | sed 's/-[0-9][0-9]*\..*$//')
            if [[ "$CHART_NAME" == "temporal" ]]; then
              helm push $CHART oci://${{ vars.AR_TEMPORAL_HELM_REGION }}-docker.pkg.dev/${{ vars.AR_GCP_PROJ }}/${{vars.AR_TEMPORAL_HELM_REPO}}
            elif is_oci_chart "$CHART_NAME"; then
              echo "Skipping GCP AR push for OCI chart ${CHART_NAME} (GHCR only)"
            else
              helm push $CHART oci://${{ vars.AR_GCP_REGION }}-docker.pkg.dev/${{ vars.AR_GCP_PROJ }}/${{vars.AR_HELM_PATH}}
            fi
          done
        shell: bash -e {0}

      - name: Validate manifest prerequisites
        if: ${{ inputs.create_release }}
        env:
          IMAGES_TO_BUILD: ${{ inputs.images_to_build }}
          PUSH_CHARTS: ${{ inputs.push_charts }}
        run: |
          REQUIRED_IMAGES=("vcp-worker")
          IFS=',' read -ra BUILT_IMAGES <<< "$IMAGES_TO_BUILD"

          for REQ in "${REQUIRED_IMAGES[@]}"; do
            FOUND=false
            for BUILT in "${BUILT_IMAGES[@]}"; do
              if [[ "$BUILT" == "$REQ" ]]; then
                FOUND=true
                break
              fi
            done
            if [[ "$FOUND" == "false" ]]; then
              echo "Error: create_release requires image '${REQ}' in images_to_build, but it is missing."
              echo "Current images_to_build: ${IMAGES_TO_BUILD}"
              exit 1
            fi
          done
          echo "All required manifest images are present in images_to_build"

          if [[ "$PUSH_CHARTS" != "true" ]]; then
            echo "Warning: push_charts is false — helmCharts section will be empty in the release manifest"
          fi
        shell: bash -e {0}

      - name: Generate release manifest
        if: ${{ inputs.create_release }}
        env:
          IMAGES_TAG: ${{ inputs.tag }}
          GHCR_ORG: vcp-vsa-control-plane
          BINARY_PATH: ${{ vars.AR_BINARY_PATH }}
          IMAGE_PATH: ${{ vars.AR_IMAGE_PATH }}
          HELM_PATH: ${{ vars.AR_HELM_PATH }}
          OCI_HELM_PATH: ${{ vars.AR_OCI_HELM_PATH }}
          PUSH_CHARTS: ${{ inputs.push_charts }}
        run: |
          MANIFEST="artifacts/release-manifest.json"

          # --- OCI override files (source of truth for OCI/OCIR metadata) ---
          OCI_ENV="${{ inputs.oci_override_suffix }}"
          OCI_ENV="${OCI_ENV:-eng_cp}"
          OCI_VLM_OVERRIDES="kubernetes/OCI/vlm-worker/overrides_${OCI_ENV}.yaml"
          OCI_WORKER_OVERRIDES="kubernetes/OCI/vcp-worker-chart/overrides_${OCI_ENV}.yaml"
          OCI_PROXY_OVERRIDES="kubernetes/OCI/oci-proxy/overrides_${OCI_ENV}.yaml"
          OCI_VLM_VALUES="kubernetes/OCI/vlm-worker/values.yaml"
          OCI_WORKER_VALUES="kubernetes/OCI/vcp-worker-chart/values.yaml"

          for f in "$OCI_VLM_OVERRIDES" "$OCI_WORKER_OVERRIDES" "$OCI_PROXY_OVERRIDES" "$OCI_VLM_VALUES" "$OCI_WORKER_VALUES"; do
            if [ ! -f "$f" ]; then
              echo "Error: Required OCI override file not found: $f"
              exit 1
            fi
          done

          # --- Read OCI metadata from override/values files ---
          ONTAP_VERSIONS_JSON=$(yq -o=json '.ontapVersionVlmImageMappings | [.[].ontapVersion]' "$OCI_VLM_OVERRIDES")

          OCIR_REGISTRY=$(yq '.global.primaryImageRegistry' "$OCI_WORKER_VALUES")
          OCIR_TENANCY_NS=$(yq '.global.primaryImageRegistryPath' "$OCI_WORKER_OVERRIDES")

          VLM_IMAGE_NAME=$(yq '.ontapVersionVlmImageMappings[0].vlmImageName' "$OCI_VLM_OVERRIDES")
          VLM_IMAGE_TAG=$(yq '.ontapVersionVlmImageMappings[0].vlmImageTag' "$OCI_VLM_OVERRIDES")

          VSA_IMAGE_OCID=$(yq '.workerConfig.vsaImageName' "$OCI_WORKER_OVERRIDES")
          MEDIATOR_IMAGE_OCID=$(yq '.workerConfig.vsaMediatorImageName' "$OCI_WORKER_OVERRIDES")

          WORKER_IMAGE_NAME=$(yq '.images.vcpWorker.name' "$OCI_WORKER_OVERRIDES")
          WORKER_IMAGE_TAG=$(yq '.images.vcpWorker.tag' "$OCI_WORKER_OVERRIDES")

          OCI_PROXY_IMAGE_NAME=$(yq '.images.ociProxy.name' "$OCI_PROXY_OVERRIDES")
          OCI_PROXY_IMAGE_TAG=$(yq '.images.ociProxy.tag' "$OCI_PROXY_OVERRIDES")

          # Fail fast if any required OCI metadata resolved to empty or yq's "null"
          for _var in OCIR_REGISTRY OCIR_TENANCY_NS VLM_IMAGE_NAME VLM_IMAGE_TAG \
                      VSA_IMAGE_OCID MEDIATOR_IMAGE_OCID WORKER_IMAGE_NAME \
                      WORKER_IMAGE_TAG OCI_PROXY_IMAGE_NAME OCI_PROXY_IMAGE_TAG; do
            _val=$(eval echo "\$$_var")
            if [ -z "$_val" ] || [ "$_val" = "null" ]; then
              echo "Error: Required OCI metadata variable $_var is empty or null (check override files)"
              exit 1
            fi
          done

          MIN_ONTAP=$(echo "$ONTAP_VERSIONS_JSON" | jq -r 'if length > 0 then first else "" end')
          MAX_ONTAP=$(echo "$ONTAP_VERSIONS_JSON" | jq -r 'if length > 0 then last else "" end')
          if [ -z "$MIN_ONTAP" ] || [ -z "$MAX_ONTAP" ]; then
            echo "Error: No ONTAP versions found in $OCI_VLM_OVERRIDES (ontapVersionVlmImageMappings is empty)"
            exit 1
          fi

          # --- Binaries ---
          IFS=' ' read -ra BINARIES <<< "$RELEASE_BINARIES"
          BINARIES_JSON="[]"
          for BINARY in "${BINARIES[@]}"; do
            SHA=$(awk '{print $1}' "artifacts/${BINARY}.sha256")
            SIZE=$(stat -c%s "artifacts/${BINARY}" 2>/dev/null || stat -f%z "artifacts/${BINARY}")
            GHCR_OCI="ghcr.io/${GHCR_ORG}/${BINARY_PATH}/${BINARY}:${IMAGES_TAG}"
            DIGEST=$(oras resolve "$GHCR_OCI")
            if [ -z "$DIGEST" ]; then
              echo "Error: Failed to resolve digest for ${BINARY} binary OCI artifact"
              exit 1
            fi
            BINARIES_JSON=$(echo "$BINARIES_JSON" | jq \
              --arg name "$BINARY" \
              --arg sha "$SHA" \
              --argjson sizeBytes "$SIZE" \
              --arg platform "linux/amd64" \
              --arg ghcr_oci "$GHCR_OCI" \
              --arg digest "$DIGEST" \
              '. + [{"name":$name,"sha256":$sha,"sizeBytes":$sizeBytes,"platform":$platform,"ghcr_oci":$ghcr_oci,"digest":$digest}]')
          done

          # --- Container images (GHCR) ---
          MANIFEST_IMAGES=("vcp-worker" "oci-proxy")
          IMAGES_JSON="[]"
          for IMAGE in "${MANIFEST_IMAGES[@]}"; do
            GHCR_REF="ghcr.io/${GHCR_ORG}/${IMAGE_PATH}/${IMAGE}:${IMAGES_TAG}"
            GHCR_DIGEST=$(printenv "${IMAGE}-digest" 2>/dev/null || echo "")
            if [ -z "$GHCR_DIGEST" ]; then
              echo "Error: Missing digest for image ${IMAGE} (expected env var '${IMAGE}-digest')"
              exit 1
            fi
            IMAGES_JSON=$(echo "$IMAGES_JSON" | jq \
              --arg name "$IMAGE" \
              --arg ghcr "$GHCR_REF" \
              --arg ghcr_digest "$GHCR_DIGEST" \
              --arg platform "linux/amd64" \
              '. + [{"name":$name,"platform":$platform,"ghcr":$ghcr,"ghcr_digest":$ghcr_digest}]')
          done

          # --- OCIR container registry refs (from OCI override files) ---
          # registry = host only; repository = tenancy-namespace/image-name
          # so consumers can reconstruct: registry + "/" + repository + ":" + tag
          OCIR_IMAGES_JSON=$(jq -n \
            --arg worker_name "$WORKER_IMAGE_NAME" \
            --arg worker_repo "${OCIR_TENANCY_NS}/${WORKER_IMAGE_NAME}" \
            --arg worker_tag "$WORKER_IMAGE_TAG" \
            --arg proxy_name "$OCI_PROXY_IMAGE_NAME" \
            --arg proxy_repo "${OCIR_TENANCY_NS}/${OCI_PROXY_IMAGE_NAME}" \
            --arg proxy_tag "$OCI_PROXY_IMAGE_TAG" \
            --arg vlm_name "$VLM_IMAGE_NAME" \
            --arg vlm_repo "${OCIR_TENANCY_NS}/${VLM_IMAGE_NAME}" \
            --arg vlm_tag "$VLM_IMAGE_TAG" \
            --arg platform "linux/amd64" \
            '[
              {"name":$worker_name,"repository":$worker_repo,"tag":$worker_tag,"platform":$platform},
              {"name":$proxy_name,"repository":$proxy_repo,"tag":$proxy_tag,"platform":$platform},
              {"name":$vlm_name,"repository":$vlm_repo,"tag":$vlm_tag,"platform":$platform}
            ]')

          # --- Helm charts ---
          append_chart() {
            local chart="$1" helm_path="$2"
            local ghcr="oci://ghcr.io/${GHCR_ORG}/${helm_path}/${chart}:${IMAGES_TAG}"
            local chart_files=( ./helm-packages/${chart}-*.tgz )
            local sha=""
            if [ -f "${chart_files[0]}" ]; then
              if [ ${#chart_files[@]} -gt 1 ]; then
                echo "Warning: Multiple chart packages for ${chart}, using ${chart_files[0]}"
              fi
              sha=$(sha256sum "${chart_files[0]}" | awk '{print $1}')
            else
              echo "Warning: No chart package found for ${chart} — sha256 will be empty"
            fi
            CHARTS_JSON=$(echo "$CHARTS_JSON" | jq \
              --arg name "$chart" \
              --arg version "$IMAGES_TAG" \
              --arg ghcr "$ghcr" \
              --arg sha256 "$sha" \
              '. + [{"name":$name,"version":$version,"ghcr":$ghcr,"sha256":$sha256}]')
          }

          CHARTS_JSON="[]"
          if [[ "$PUSH_CHARTS" == "true" ]]; then
            IFS=' ' read -ra OCI_CHARTS <<< "$OCI_CHART_NAMES"
            for CHART in "${OCI_CHARTS[@]}"; do
              append_chart "$CHART" "$OCI_HELM_PATH"
            done
          else
            echo "Skipping helmCharts in manifest (push_charts=false)"
          fi

          # --- vsaArtifacts (from OCI overrides) ---
          VSA_VERSIONS_JSON=$(yq -o=json '.ontapVersionVlmImageMappings' "$OCI_VLM_OVERRIDES" | jq \
            --arg vsaOcid "$VSA_IMAGE_OCID" \
            --arg mediatorOcid "$MEDIATOR_IMAGE_OCID" \
            '[.[] | {
              "ontapVersion": .ontapVersion,
              "vlmVersion": (.vlmImageTag | split("_") | .[0]),
              "vsaImageOcid": $vsaOcid,
              "mediatorImageOcid": $mediatorOcid
            }]')

          # --- Dockerfiles (OCI-only: worker/Dockerfile.oci and oci-proxy/Dockerfile) ---
          DOCKERFILES_JSON='[]'
          if [ -f "worker/Dockerfile.oci" ]; then
            DOCKERFILES_JSON=$(echo "$DOCKERFILES_JSON" | jq \
              --arg name "Dockerfile.oci.worker" \
              --arg sourcePath "worker/Dockerfile.oci" \
              '. + [{"name":$name,"sourcePath":$sourcePath}]')
          fi
          if [ -f "oci-proxy/Dockerfile.oci" ]; then
            DOCKERFILES_JSON=$(echo "$DOCKERFILES_JSON" | jq \
              --arg name "Dockerfile.oci.oci-proxy" \
              --arg sourcePath "oci-proxy/Dockerfile.oci" \
              '. + [{"name":$name,"sourcePath":$sourcePath}]')
          fi

          # --- Build context bundle (OCI Dockerfiles + OCI config for binary-based image rebuild) ---
          # Ships OCI-specific Dockerfiles (Dockerfile.oci) so existing GCP Dockerfiles are untouched.
          BUNDLE_NAME="release-build-context-${IMAGES_TAG}.tar.gz"
          BUNDLE_FILES=""
          for DF_DIR in worker oci-proxy; do
            [ -f "${DF_DIR}/Dockerfile.oci" ] && BUNDLE_FILES="${BUNDLE_FILES} ${DF_DIR}/Dockerfile.oci"
          done
          [ -f "common/vsa_config/vlm-config-oci.json" ] && BUNDLE_FILES="${BUNDLE_FILES} common/vsa_config/vlm-config-oci.json"
          [ -f "config/vmrs_oci.yaml" ] && BUNDLE_FILES="${BUNDLE_FILES} config/vmrs_oci.yaml"
          if [ -n "$BUNDLE_FILES" ]; then
            tar czf "artifacts/${BUNDLE_NAME}" ${BUNDLE_FILES}
            BUNDLE_SHA=$(sha256sum "artifacts/${BUNDLE_NAME}" | awk '{print $1}')
            BUNDLE_SIZE=$(stat -c%s "artifacts/${BUNDLE_NAME}" 2>/dev/null || stat -f%z "artifacts/${BUNDLE_NAME}")
            BUNDLE_OCI="ghcr.io/${GHCR_ORG}/${BINARY_PATH}/release-build-context:${IMAGES_TAG}"
            BUILD_CONTEXT_JSON=$(jq -n \
              --arg oci "$BUNDLE_OCI" \
              --arg sha256 "$BUNDLE_SHA" \
              --argjson sizeBytes "$BUNDLE_SIZE" \
              --arg filename "$BUNDLE_NAME" \
              '{"oci":$oci,"sha256":$sha256,"sizeBytes":$sizeBytes,"filename":$filename}')
            echo "Build context bundle: ${BUNDLE_NAME} (${BUNDLE_SIZE} bytes, sha256=${BUNDLE_SHA})"
          else
            BUILD_CONTEXT_JSON="null"
            echo "Warning: No build context files found — buildContext will be null in manifest"
          fi

          # --- OCI deployment guide (override templates + quick-start guide) ---
          DEPLOY_KIT_DIR="doc/guides/oci-deploy-templates"
          DEPLOY_KIT_FILES=("VCP_OCI_DEPLOY_GUIDE.md" "oci-proxy-overrides.yaml" "vcp-worker-overrides.yaml" "vlm-worker-overrides.yaml")
          DEPLOY_KIT_COPIED=()
          for f in "${DEPLOY_KIT_FILES[@]}"; do
            if [ ! -f "${DEPLOY_KIT_DIR}/${f}" ]; then
              echo "Error: OCI deployment guide file not found: ${DEPLOY_KIT_DIR}/${f}"
              exit 1
            fi
            cp "${DEPLOY_KIT_DIR}/${f}" "artifacts/${f}"
            DEPLOY_KIT_COPIED+=("${f}")
            echo "Copied OCI deployment guide file: ${f}"
          done
          DEPLOY_KIT_JSON=$(printf '%s\n' "${DEPLOY_KIT_COPIED[@]}" | jq -R . | jq -s .)

          # --- Assemble manifest ---
          jq -n \
            --arg apiVersion "v1" \
            --arg kind "ReleaseManifest" \
            --arg version "$IMAGES_TAG" \
            --arg createdAt "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            --arg createdBy "vcp-release-pipeline" \
            --argjson ontapVersions "$ONTAP_VERSIONS_JSON" \
            --argjson vsaVersions "$VSA_VERSIONS_JSON" \
            --argjson binaries "$BINARIES_JSON" \
            --argjson images "$IMAGES_JSON" \
            --arg ocirRegistry "$OCIR_REGISTRY" \
            --argjson ocirImages "$OCIR_IMAGES_JSON" \
            --argjson helmCharts "$CHARTS_JSON" \
            --argjson dockerfiles "$DOCKERFILES_JSON" \
            --argjson buildContext "$BUILD_CONTEXT_JSON" \
            --argjson deployKitFiles "$DEPLOY_KIT_JSON" \
            --arg minOntap "$MIN_ONTAP" \
            --arg maxOntap "$MAX_ONTAP" \
            '{
              "apiVersion": $apiVersion,
              "kind": $kind,
              "metadata": {
                "version": $version,
                "vcpVersion": $version,
                "ontapVersions": $ontapVersions,
                "createdAt": $createdAt,
                "createdBy": $createdBy
              },
              "vsaArtifacts": {
                "versions": $vsaVersions
              },
              "vcpArtifacts": {
                "binaries": $binaries,
                "images": $images,
                "containerRegistry": {
                  "registry": $ocirRegistry,
                  "images": $ocirImages
                },
                "helmCharts": $helmCharts,
                "dockerfiles": $dockerfiles,
                "buildContext": $buildContext
              },
              "deploymentKit": {
                "files": $deployKitFiles,
                "description": "OCI deployment guide and Helm override templates bundled with this manifest"
              },
              "compatibility": {
                "minimumOntapVersion": $minOntap,
                "maximumOntapVersion": $maxOntap
              }
            }' > "$MANIFEST"
          echo "Release manifest:"
          cat "$MANIFEST"
        shell: bash -e {0}

      - name: Push and sign release manifest as OCI artifact to GHCR
        if: ${{ inputs.create_release }}
        env:
          GHCR_ORG: vcp-vsa-control-plane
          MANIFEST_PATH: ${{ vars.OCI_RELEASE_MANIFEST }}
          IMAGES_TAG: ${{ inputs.tag }}
        run: |
          if [ -z "$MANIFEST_PATH" ]; then
            echo "Error: vars.OCI_RELEASE_MANIFEST is not set or empty"
            exit 1
          fi
          ARTIFACT_REF="ghcr.io/${GHCR_ORG}/${MANIFEST_PATH}/release-manifest:${IMAGES_TAG}"
          echo "Pushing release manifest + OCI deployment guide -> ${ARTIFACT_REF}"

          DEPLOY_KIT_LAYERS=()
          MANIFEST_JSON="artifacts/release-manifest.json"
          while IFS= read -r f; do
            if [ -f "artifacts/${f}" ]; then
              DEPLOY_KIT_LAYERS+=("artifacts/${f}:text/plain")
              echo "  bundling OCI deployment guide layer: ${f}"
            else
              echo "Error: deployment guide file listed in manifest but not found: artifacts/${f}"
              exit 1
            fi
          done < <(jq -r '.deploymentKit.files[]' "$MANIFEST_JSON")

          oras push "$ARTIFACT_REF" \
            --artifact-type "application/vnd.netapp.vcp.manifest.v1+json" \
            "artifacts/release-manifest.json:application/json" \
            "${DEPLOY_KIT_LAYERS[@]}"
          echo "Pushed ${ARTIFACT_REF}"

          DIGEST=$(oras resolve "$ARTIFACT_REF")
          if [ -z "$DIGEST" ]; then
            echo "Error: Failed to resolve digest for release manifest OCI artifact"
            exit 1
          fi
          echo "Signing release manifest: release-manifest@${DIGEST}"
          COSIGN_PASSWORD="" cosign sign --key /tmp/cosign.key "ghcr.io/${GHCR_ORG}/${MANIFEST_PATH}/release-manifest@${DIGEST}" --tlog-upload=false
          cosign verify --key /tmp/cosign.pub "ghcr.io/${GHCR_ORG}/${MANIFEST_PATH}/release-manifest@${DIGEST}" --insecure-ignore-tlog=true
          echo "Signed and verified release manifest"
        shell: bash -e {0}

      - name: Push release build context bundle to GHCR
        if: ${{ inputs.create_release }}
        env:
          GHCR_ORG: vcp-vsa-control-plane
          BINARY_PATH: ${{ vars.AR_BINARY_PATH }}
          IMAGES_TAG: ${{ inputs.tag }}
        run: |
          BUNDLE="artifacts/release-build-context-${IMAGES_TAG}.tar.gz"
          if [ ! -f "$BUNDLE" ]; then
            echo "No build context bundle found — skipping push"
            exit 0
          fi
          ARTIFACT_REF="ghcr.io/${GHCR_ORG}/${BINARY_PATH}/release-build-context:${IMAGES_TAG}"
          echo "Pushing build context bundle -> ${ARTIFACT_REF}"
          oras push "$ARTIFACT_REF" \
            --artifact-type "application/vnd.netapp.vcp.build-context.v1+tar+gzip" \
            "${BUNDLE}:application/gzip"
          echo "Pushed ${ARTIFACT_REF}"

          DIGEST=$(oras resolve "$ARTIFACT_REF")
          if [ -z "$DIGEST" ]; then
            echo "Error: Failed to resolve digest for release build context OCI artifact"
            exit 1
          fi
          echo "Signing release build context: release-build-context@${DIGEST}"
          COSIGN_PASSWORD="" cosign sign --key /tmp/cosign.key "ghcr.io/${GHCR_ORG}/${BINARY_PATH}/release-build-context@${DIGEST}" --tlog-upload=false
          cosign verify --key /tmp/cosign.pub "ghcr.io/${GHCR_ORG}/${BINARY_PATH}/release-build-context@${DIGEST}" --insecure-ignore-tlog=true
          echo "Signed and verified release build context"
        shell: bash -e {0}

      - name: Create a release
        if: ${{ inputs.create_release }}
        run: |
          set -e
          REPO="${{ github.repository }}"
          TAG="$newTag"
          TARGET="$prBaseBranch"
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${REPO}/releases/tags/${TAG}")
          if [ "$HTTP_CODE" = "200" ]; then
            echo "Release ${TAG} already exists"
            exit 0
          fi

          # Pick a previous tag of the same kind (DEV/RC/GA) so generated notes
          # aren't polluted by commits from a different release track.
          KIND=$(printf '%s' "$TAG" | sed -n 's/^[^-]*-\([^.]*\).*/\1/p')
          if [ -n "$KIND" ]; then
            echo "Tag kind detected: ${KIND}; looking for previous ${KIND} release"
            PREV_TAG=$(gh api "/repos/${REPO}/releases?per_page=100" \
              --jq "[.[] | select(.tag_name != \"${TAG}\") | select(.tag_name | test(\"-${KIND}\\\\.\")) | .tag_name] | .[0]" 2>/dev/null || true)
          else
            echo "Tag kind detected: GA; looking for previous GA release"
            PREV_TAG=$(gh api "/repos/${REPO}/releases?per_page=100" \
              --jq "[.[] | select(.tag_name != \"${TAG}\") | select(.tag_name | test(\"^[0-9]+\\\\.[0-9]+\\\\.[0-9]+$\")) | .tag_name] | .[0]" 2>/dev/null || true)
          fi
          if [ -z "$PREV_TAG" ] || [ "$PREV_TAG" = "null" ]; then
            echo "No same-kind predecessor found; falling back to latest release"
            PREV_TAG=$(gh api "/repos/${REPO}/releases?per_page=100" \
              --jq "[.[] | select(.tag_name != \"${TAG}\") | .tag_name] | .[0]" 2>/dev/null || true)
          fi

          NOTES_FILE="$(mktemp)"
          if [ -n "$PREV_TAG" ] && [ "$PREV_TAG" != "null" ]; then
            echo "Generating notes against previous tag: $PREV_TAG"
            gh api -X POST -H "Accept: application/vnd.github+json" \
              "/repos/${REPO}/releases/generate-notes" \
              -f tag_name="${TAG}" \
              -f target_commitish="${TARGET}" \
              -f previous_tag_name="${PREV_TAG}" \
              --jq .body > "$NOTES_FILE"
          else
            echo "No previous release tag found; generating notes without explicit previous_tag_name"
            gh api -X POST -H "Accept: application/vnd.github+json" \
              "/repos/${REPO}/releases/generate-notes" \
              -f tag_name="${TAG}" \
              -f target_commitish="${TARGET}" \
              --jq .body > "$NOTES_FILE"
          fi
          MAX=120000
          if [ "$(wc -c < "$NOTES_FILE")" -gt "$MAX" ]; then
            echo "Notes exceed ${MAX} chars, truncating"
            head -c "$MAX" "$NOTES_FILE" > "$NOTES_FILE.t"
            printf '\n\n_…release notes truncated; see full commit history on GitHub._\n' >> "$NOTES_FILE.t"
            mv "$NOTES_FILE.t" "$NOTES_FILE"
          fi
          if gh release create -R "https://github.com/${REPO}" \
              --title "${TAG}" \
              --notes-file "$NOTES_FILE" \
              ${{ inputs.pre_release && '--prerelease' || '' }} \
              "${TAG}" \
              --target "${TARGET}"; then
            echo "Successfully created release ${TAG}"
          else
            RETRY_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
              -H "Authorization: Bearer ${GH_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/${REPO}/releases/tags/${TAG}")
            if [ "$RETRY_CODE" = "200" ]; then
              echo "Release ${TAG} was created by concurrent build"
              rm -f "$NOTES_FILE"
              exit 0
            fi
            echo "Failed to create release ${TAG}"
            rm -f "$NOTES_FILE"
            exit 1
          fi
          rm -f "$NOTES_FILE"
        env:
          GH_TOKEN: ${{ secrets.GHVSA_PAT }}
          newTag: ${{ inputs.tag }}
          prBaseBranch: ${{ inputs.pr_base_branch }}

      - name: Generate output URLs
        id: generate_output_urls
        shell: bash -e {0}
        run: |
          IFS=',' read -ra IMAGES <<< "${{ inputs.images_to_build }}"
          for IMAGE in "${IMAGES[@]}"; do
            echo "GHCR_${IMAGE}_URL=ghcr.io/vcp-vsa-control-plane/${{ vars.AR_IMAGE_PATH }}/${IMAGE}:${{ inputs.tag }}" >> $GITHUB_OUTPUT
            if [[ "$IMAGE" != "oci-proxy" ]]; then
              echo "GCP_${IMAGE}_URL=${{ vars.AR_GCP_REGION }}-docker.pkg.dev/${{ vars.AR_GCP_PROJ }}/${{ vars.AR_IMAGE_PATH }}/${IMAGE}:${{ inputs.tag }}" >> $GITHUB_OUTPUT
            fi
          done
          echo "GHCR_oci-proxy_URL=ghcr.io/vcp-vsa-control-plane/${{ vars.AR_IMAGE_PATH }}/oci-proxy:${{ inputs.tag }}" >> $GITHUB_OUTPUT
          CHARTS=("vsa-control-plane" "vcp-worker-chart" "vsa-harvest-otel" "vlm-worker" "ontap-proxy")
          for CHART in "${CHARTS[@]}"; do
            echo "GHCR_${CHART}_HELM_URL=oci://ghcr.io/vcp-vsa-control-plane/${{ vars.AR_HELM_PATH }}/${CHART}:${{ inputs.tag }}" >> $GITHUB_OUTPUT
            echo "GCP_${CHART}_HELM_URL=oci://${{ vars.AR_GCP_REGION }}-docker.pkg.dev/${{ vars.AR_GCP_PROJ }}/${{ vars.AR_HELM_PATH }}/${CHART}:${{ inputs.tag }}" >> $GITHUB_OUTPUT
          done
          IFS=' ' read -ra OCI_CHARTS <<< "$OCI_CHART_NAMES"
          for CHART in "${OCI_CHARTS[@]}"; do
            echo "GHCR_${CHART}_HELM_URL=oci://ghcr.io/vcp-vsa-control-plane/${{ vars.AR_OCI_HELM_PATH }}/${CHART}:${{ inputs.tag }}" >> $GITHUB_OUTPUT
          done
          echo "GHCR_vcp-worker_BINARY_URL=ghcr.io/vcp-vsa-control-plane/${{ vars.AR_BINARY_PATH }}/vcp-worker:${{ inputs.tag }}" >> $GITHUB_OUTPUT
          echo "GHCR_oci-proxy_BINARY_URL=ghcr.io/vcp-vsa-control-plane/${{ vars.AR_BINARY_PATH }}/oci-proxy:${{ inputs.tag }}" >> $GITHUB_OUTPUT
          

  black_duck_scan_repo:
    name: Run black duck scan on the repo
    needs: build_and_publish
    runs-on: [ self-hosted,linux,bds ]
    container:
      image: ghcr.io/vcp-vsa-control-plane/vsa-builder:v9
      options: -v /var/run/docker.sock:/var/run/docker.sock --mount type=bind,source=/bds-inspect,target=/bds-inspect,ro --user root

    steps:
      - name: Check out the repo
        uses: actions/checkout@v4
        with:
          path: repo-dir


      - name: Set up Go
        uses: actions/setup-go@v3
        with:
          go-version-file: go.mod

      - name: Run BlackDuck Repo Scan
        run: |
          keytool -import -alias example -keystore  "/usr/lib/jvm/java-11-openjdk-amd64/lib/security/cacerts" -file /bds-inspect/blackduck.eng.netapp.com.der --storepass changeit --noprompt
          java -jar /bds-inspect/synopsys-detect-9.10.1.jar --detect.project.name="GCNV VSA Control Plane" \
          --detect.project.version.name=current --blackduck.url=https://blackduck.eng.netapp.com \
          --blackduck.api.token=${{ secrets.BLACKDUCKSCANSATOKEN }} --detect.cleanup=false \
          --detect.source.path=repo-dir/ \
          --detect.blackduck.signature.scanner.paths=repo-dir/ \
          --detect.code.location.name=GCNV_VSA_Control_Plane_currrent_code \
          --detect.tools=DETECTOR,SIGNATURE_SCAN --detect.detector.search.depth=50 \
          --detect.detector.search.continue=true \
          --blackduck.trust.cert=true --detect.blackduck.signature.scanner.snippet.matching=SNIPPET_MATCHING \
          --detect.blackduck.signature.scanner.upload.source.mode=true --logging.level.detect=INFO \
          --detect.go.path=/__w/_tool/go/1.24.13/x64/bin/go \
          --detect.accuracy.required=NONE
        shell: bash -e {0}
  black_duck_scan_image:
    name: Run black duck scan on the container images
    needs: [ build_and_publish]
    runs-on: [ self-hosted,linux,bds ]
    strategy:
      matrix:
        image: ${{ fromJson(needs.build_and_publish.outputs.IMAGES_TO_SCAN) }}
    steps:
      - name: Run BlackDuck Scan for container images
        shell: bash -e {0}
        run: |
            echo "Image used for scan is ${IMAGE} - $([[ "$IMAGE" == "cloud-backup-adc" ]] && echo "3.0" || echo "${{ inputs.tag }}")"
            docker run --rm  --network host -v /home/cvs/opt-dir:/home/cvs/opt-dir -v /var/run/docker.sock:/var/run/docker.sock \
            --mount type=bind,source=/bds-inspect,target=/bds-inspect,ro --user root \
            ghcr.io/vcp-vsa-control-plane/vsa-builder:v9 \
            bash -c "keytool -import -alias example -keystore \"/usr/lib/jvm/java-11-openjdk-amd64/lib/security/cacerts\" \
            -file /bds-inspect/blackduck.eng.netapp.com.der --storepass changeit --noprompt && \
            echo \"${{ secrets.GHVSA_PAT }}\" | docker login ghcr.io -u \"${{ github.actor }}\" --password-stdin && \
            java -jar /bds-inspect/synopsys-detect-9.10.1.jar --detect.project.name=\"GCNV VSA Control Plane\" \
            --detect.project.version.name=current --blackduck.url=https://blackduck.eng.netapp.com --blackduck.trust.cert=true \
            --blackduck.api.token="${{ secrets.BLACKDUCKSCANSATOKEN }}" --detect.cleanup=false --detect.tools=DOCKER \
            --detect.docker.image=ghcr.io/vcp-vsa-control-plane/${{ vars.AR_IMAGE_PATH }}/${IMAGE}:$([[ "$IMAGE" == "cloud-backup-adc" ]] && echo "3.0" || echo "${{ inputs.tag }}")  \
            --detect.code.location.name=GCNV_VSA_Control_Plane_docker_${IMAGE}_code \
            --detect.docker.path=/__w/_tool/go/1.24.13/x64/bin/docker --detect.tools.excluded=DETECTOR \
            --detect.docker.inspector.air.gap.path=/bds-inspect/packaged-inspectors/docker/ \
            --detect.docker.passthrough.shared.dir.path.local=/home/cvs/opt-dir"
            echo "BlackDuck scan completed for image: ${IMAGE}"
        env:
          IMAGE: ${{ matrix.image }}

  grype_scan_image:
    name: Run Anchore/Grype vulnerability scans (reusable)
    needs: [ build_and_publish ]
    uses: ./.github/workflows/anchore-grype.yml
    with:
      images_to_scan: ${{ needs.build_and_publish.outputs.IMAGES_TO_SCAN }}
      tag: ${{ inputs.tag }}
    secrets:
      GHVSA_PAT: ${{ secrets.GHVSA_PAT }}
      GHCR_REPO: ${{ secrets.GHCR_REPO }}

  send-slack-notification:
    if: ${{ inputs.send_slack_notification }}
    needs: [ setup-vsacictl, build_and_publish]
    runs-on: [ ubuntu-22.04 ]
    container:
      image: ghcr.io/vcp-vsa-control-plane/vsa-builder:v9
      options: -v /var/run/docker.sock:/var/run/docker.sock --user root

    steps:
      - name: Check out the repo
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v3
        with:
          go-version-file: go.mod

      - name: Install vsacictl
        uses: ./.github/actions/install-vsacictl
        with:
          cache-key: ${{ needs.setup-vsacictl.outputs.cache-key }}

      - name: Send slack message
        env:
          PR_TITLE: ${{ inputs.pr_title }}
          PR_USER: ${{ inputs.pr_user }}
          VSABUILDREPORTWEBHOOK: ${{ secrets.VSABUILDREPORTWEBHOOK }}
          NEW_TAG: ${{ inputs.tag }}
          GHCR_vsa_control_plane_HELM_URL: ${{ needs.build_and_publish.outputs.GHCR_vsa_control_plane_HELM_URL }}
          GCP_vsa_control_plane_HELM_URL: ${{ needs.build_and_publish.outputs.GHCR_vsa_control_plane_HELM_URL }}
          GHCR_vcp_worker_HELM_URL: ${{ needs.build_and_publish.outputs.GHCR_vcp_worker_HELM_URL }}
          GCP_vcp_worker_HELM_URL: ${{ needs.build_and_publish.outputs.GHCR_vcp_worker_HELM_URL }}
        run: |
          vsacictl slack notify_build_report

  update_jira_component_version:
    if: ${{ inputs.component_update}}
    name: Update JIRA component version
    needs: [ setup-vsacictl, build_and_publish ]
    runs-on: [ ubuntu-22.04 ]
    container:
      image: ghcr.io/vcp-vsa-control-plane/vsa-builder:v9
      options: -v /var/run/docker.sock:/var/run/docker.sock --user root

    steps:
      - name: Check out the repo
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v3
        with:
          go-version-file: go.mod

      - name: Install vsacictl
        uses: ./.github/actions/install-vsacictl
        with:
          cache-key: ${{ needs.setup-vsacictl.outputs.cache-key }}

      - name: Run jira tag_component_version
        env:
          PR_TITLE: ${{ inputs.pr_title }}
          JIRA_API_TOKEN: ${{ secrets.VCP_CI_JIRA_BOT_PAT }}
          PR_USER: ${{ inputs.pr_user }}
          REPOSITORY: VCP-VSA-control-Plane/vsa-control-plane
          NEW_TAG: ${{ inputs.tag }}
        run: vsacictl jira tag_component_version
