name: Breakability Batch Analysis

on:
  schedule:
    - cron: '0 6 * * 1-5'
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write
  security-events: read

jobs:
  list-prs:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.list.outputs.matrix }}
    steps:
      - name: List open Dependabot PRs
        id: list
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          MATRIX=$(gh pr list --repo "${{ github.repository }}" \
            --author "app/dependabot" \
            --state open \
            --json number \
            --jq '{include: [.[] | {pr_number: .number}]}')

          if [ "$MATRIX" = '{"include":[]}' ]; then
            echo "No open Dependabot PRs found"
          fi
          echo "matrix=$MATRIX" >> "$GITHUB_OUTPUT"

  analyze:
    needs: list-prs
    if: needs.list-prs.outputs.matrix != '{"include":[]}'
    runs-on: ubuntu-latest
    strategy:
      matrix: ${{ fromJSON(needs.list-prs.outputs.matrix) }}
      max-parallel: 3
      fail-fast: false
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 1

      - uses: actions/checkout@v4
        with:
          ref: refs/pull/${{ matrix.pr_number }}/head
          path: pr-checkout
          fetch-depth: 1

      - uses: ./.github/actions/breakability-check
        id: breakability
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          ecosystem: auto-detect
          comment-threshold: low
          pr-number: ${{ matrix.pr_number }}
        env:
          CURSOR_API_KEY: ${{ secrets.CURSOR_API_KEY }}

      - name: Log Results
        if: always()
        run: |
          echo "PR #${{ matrix.pr_number }}: score=${{ steps.breakability.outputs.score }} class=${{ steps.breakability.outputs.classification }} pkgs=${{ steps.breakability.outputs.package-count }}"
