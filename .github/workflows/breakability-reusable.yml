# Breakability Analysis — Reusable Workflow
# Use from consuming repos: uses: CSC-Security-sandbox/breakability/.github/workflows/breakability-reusable.yml@main

name: Breakability Reusable

on:
  workflow_call:
    inputs:
      pr_filter:
        description: 'PR numbers (empty = all Dependabot PRs)'
        type: string
        default: ''
      batch_count:
        description: 'Parallel batches'
        type: number
        default: 4
      skip_agent:
        description: 'Skip AI layer'
        type: boolean
        default: true
    secrets:
      token:
        required: true
      breakability_pat:
        required: false

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  analyze:
    uses: ./.github/workflows/breakability-agent.yml
    with:
      pr_filter: ${{ inputs.pr_filter }}
      batch_count: ${{ inputs.batch_count }}
      skip_agent: ${{ inputs.skip_agent }}
    secrets:
      GITHUB_TOKEN: ${{ secrets.token }}
      BREAKABILITY_PAT: ${{ secrets.breakability_pat }}
