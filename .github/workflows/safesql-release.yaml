name: SafeSQL Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g., v1.0.0, v1.1.0)'
        required: true
        type: string
      create_release:
        description: 'Create new GitHub release (uncheck to update existing release)'
        required: true
        type: boolean
        default: true

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24.12'  # Match toolchain version from go.mod

      - name: Validate version format
        run: |
          if [[ ! "${{ inputs.version }}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Error: Version must be in format vX.Y.Z (e.g., v1.0.0)"
            exit 1
          fi

      - name: Build SafeSQL Binary
        run: |
          make safesql-build-linux

      - name: Generate checksum
        run: |
          cd bin/build
          sha256sum linux/safesql > checksums.txt
          cat checksums.txt

      - name: Create Release
        if: inputs.create_release == true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ inputs.version }}
        run: |
          gh release create safesql-${VERSION} \
            --title "SafeSQL ${VERSION}" \
            bin/build/linux/safesql \
            bin/build/checksums.txt

      - name: Update Existing Release
        if: inputs.create_release == false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Upload/replace assets to existing release
          gh release upload safesql-${{ inputs.version }} \
            bin/build/linux/safesql \
            bin/build/checksums.txt \
            --clobber

      - name: Summary
        run: |
          echo "## SafeSQL Release ${{ inputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Built Binary" >> $GITHUB_STEP_SUMMARY
          echo "- safesql (Linux amd64): $(ls -lh bin/build/linux/safesql | awk '{print $5}')" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Release URL" >> $GITHUB_STEP_SUMMARY
          echo "https://github.com/${{ github.repository }}/releases/tag/safesql-${{ inputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Checksum" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          cat bin/build/checksums.txt >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
