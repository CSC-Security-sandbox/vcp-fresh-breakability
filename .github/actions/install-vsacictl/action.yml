name: 'Install vsacictl'
description: 'Restores and installs vsacictl binary from cache or workflow artifact'
inputs:
  cache-key:
    description: 'Cache key for the vsacictl binary'
    required: true

runs:
  using: 'composite'
  steps:
    - name: Restore vsacictl from cache
      id: restore-vsacictl
      uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
      with:
        path: bin/vsacictl
        key: ${{ inputs.cache-key }}

    - name: Download vsacictl artifact
      if: steps.restore-vsacictl.outputs.cache-hit != 'true'
      uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
      with:
        name: ${{ inputs.cache-key }}
        path: bin

    - name: Install vsacictl from cache
      shell: bash
      run: |
        if [ ! -f bin/vsacictl ]; then
          echo "❌ vsacictl binary not found in cache or workflow artifact. Please ensure the setup-vsacictl workflow completed successfully."
          exit 1
        fi
        
        sudo cp bin/vsacictl /usr/local/bin/vsacictl
        sudo chmod +x /usr/local/bin/vsacictl
        echo "✅ vsacictl installed from cache: ${{ inputs.cache-key }}"
        vsacictl help || echo "vsacictl version check complete"
