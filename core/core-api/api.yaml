        - jobId
        - createdAt
        - updatedAt
      properties:
        clusterId:
          type: string
          description: UUID of the cluster being upgraded
          example: "9760acf5-4638-11e7-9bdb-020073ca7773"
        status:
          type: string
          description: Current status of the upgrade
          enum:
            - PENDING
            - IN_PROGRESS
            - COMPLETED
            - FAILED
            - CANCELLED
          example: "IN_PROGRESS"
        jobId:
          type: string
          description: Unique job identifier for tracking the upgrade
          example: "9760acf5-4638-11e7-9bdb-020073ca7773"
        createdAt:
          type: string
          format: date-time
          description: Timestamp when the upgrade was initiated
          example: "2023-12-01T10:00:00Z"
        updatedAt:
          type: string
          format: date-time
          description: Timestamp when the upgrade status was last updated
          example: "2023-12-01T10:05:00Z"
    UpgradeProgress_v1:
      type: object
      title: UpgradeProgress
      description: Progress information for a cluster upgrade operation
      required:
        - jobId
        - status
      properties:
        jobId:
          type: string
          description: Unique job identifier for tracking the upgrade
          example: "9760acf5-4638-11e7-9bdb-020073ca7773"
        status:
          type: string
          description: Current status of the upgrade
          enum:
            - PENDING
            - IN_PROGRESS
            - COMPLETED
            - FAILED
            - CANCELLED
            - ROLLING_BACK
          example: "IN_PROGRESS"
        clusters:
          type: array
          description: Status of individual clusters in the upgrade operation
          items:
            $ref: '#/components/schemas/ClusterUpgradeStatus_v1'
        errors:
          type: array
          description: Any errors that occurred during the upgrade
          items:
            $ref: '#/components/schemas/UpgradeError_v1'
        warnings:
          type: array
          description: Any warnings that occurred during the upgrade
          items:
            type: string
    ClusterUpgradeStatus_v1:
      type: object
      title: ClusterUpgradeStatus
      description: Status of a single cluster in an upgrade operation
      required:
        - clusterId
        - status
      properties:
        clusterId:
          type: string
          description: UUID of the cluster
          example: "9760acf5-4638-11e7-9bdb-020073ca7773"
        status:
          type: string
          description: Current status of the cluster upgrade
          enum:
            - PENDING
            - IN_PROGRESS
            - COMPLETED
            - FAILED
            - CANCELLED
            - ROLLING_BACK
          example: "IN_PROGRESS"
        startTime:
          type: string
          format: date-time
          description: Timestamp when the cluster upgrade started
          example: "2023-12-01T10:00:00Z"
        endTime:
          type: string
          format: date-time
          description: Timestamp when the cluster upgrade completed
          example: "2023-12-01T10:30:00Z"
