      operationId: v1_getOntapCredentials
      parameters:
        - $ref: '#/components/parameters/poolIdPathParameter'
        - $ref: '#/components/parameters/userNameQueryParameter'
        - $ref: '#/components/parameters/accountNameQueryParameter'
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OntapCredentials_v1'
              example:
                secret_id: "secret-12345"
                certificate_id: "cert-67890"
                password: "password123"
                auth_type: 1
        "400":
          $ref: '#/components/responses/StandardError-400'
