apiVersion: v1
kind: Service
metadata:
  name: core-api
  labels:
    app: core-api
spec:
  clusterIP: None
  ports:
    - port: 50051
      name: core
  selector:
    app: core-api
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: core-api
  labels:
    app: core-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: core-api
  template:
    metadata:
      labels:
        app: core-api
    spec:
      containers:
      - name: core
        image: core-api
        env:
          - name: FIRESTORE_EMULATOR_HOST
            value: firestore_emulator:8200
          - name: FIRESTORE_PROJECT_ID
            value: dummy-project-id
        ports:
        - containerPort: 50051
          name: http
