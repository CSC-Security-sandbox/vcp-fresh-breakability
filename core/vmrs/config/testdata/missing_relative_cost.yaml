vmrs:
  ontap_overheads:
    amplification_factors:
      iops: 1.1
      throughput: 1.2
      capacity: 1.3
    num_disks_per_zone: 4
    workload_headroom:
      - workload: workload1
        headroom:
          iops: 1.4
          throughput: 1.5
      - workload: workload2
        headroom:
          iops: 1.7
          throughput: 1.8
    hotspot_prevention_factors:
      iops: 1.1
      throughput: 1.1
  disk_limits:
    - disk_type: hyperdisk_balanced
      qualified_vms:
      - vm_type: c4-standard-4
        ontap_perf:
          iops: 1
          throughput_in_mibs: 2
          capacity_in_gib: 3
        disk_perf:
          iops: 4
          throughput_in_mibs: 5
          capacity_in_gib: 6
      - vm_type: c4-standard-8
        ontap_perf:
          iops: 8
          throughput_in_mibs: 9
          capacity_in_gib: 10
        disk_perf:
          iops: 11
          throughput_in_mibs: 12
          capacity_in_gib: 13
  max_num_ha_pairs: 12
  selection_strategy: "least_cost_single_vm"
  max_disk_overprovisioning_factors:
    iops: 1.1
    throughput: 1.1
