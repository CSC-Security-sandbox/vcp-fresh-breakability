vmrs:
  selection_strategy: "least_cost_large_volume_cluster"
  max_num_ha_pairs: 12
  max_disk_overprovisioning_factors:
    iops: 1.1
    throughput: 1.1
  
  # No non_linear_scaling section - should fall back to linear scaling
      
  ontap_overheads:
    num_disks_per_zone: 8
    amplification_factors:
      iops: 1.1
      throughput: 1.2
      capacity: 1.3
    workload_headroom:
      - workload: all
        headroom:
          iops: 0.3
          throughput: 0.3
    hotspot_prevention_factors:
      iops: 1.1
      throughput: 1.1
      
  disk_limits:
    - disk_type: hyperdisk-balanced
      qualified_vms:
      - vm_type: c3-standard-4-lssd
        ontap_perf:
          iops: 8000
          throughput_in_mibs: 100
          capacity_in_gib: 213000
        disk_perf:
          iops: 25000
          throughput_in_mibs: 400
          capacity_in_gib: 257000
        relative_cost: 4
      - vm_type: c3-standard-8-lssd
        ontap_perf:
          iops: 19000
          throughput_in_mibs: 300
          capacity_in_gib: 213000
        disk_perf:
          iops: 50000
          throughput_in_mibs: 800
          capacity_in_gib: 257000
        relative_cost: 8
      - vm_type: c3-standard-22-lssd
        ontap_perf:
          iops: 34000
          throughput_in_mibs: 650
          capacity_in_gib: 213000
        disk_perf:
          iops: 120000
          throughput_in_mibs: 1800
          capacity_in_gib: 257000
        relative_cost: 22
      - vm_type: c3-standard-44-lssd
        ontap_perf:
          iops: 64000
          throughput_in_mibs: 1100
          capacity_in_gib: 426000
        disk_perf:
          iops: 160000
          throughput_in_mibs: 2400
          capacity_in_gib: 512000
        relative_cost: 44
      - vm_type: c3-standard-88-lssd
        ontap_perf:
          iops: 160000
          throughput_in_mibs: 7500
          capacity_in_gib: 426000
        disk_perf:
          iops: 160000
          throughput_in_mibs: 4800
          capacity_in_gib: 512000
        relative_cost: 88