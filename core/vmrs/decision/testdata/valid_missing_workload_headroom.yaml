vmrs:
  selection_strategy: "least_cost_single_vm"
  max_num_ha_pairs: 12
  max_disk_overprovisioning_factors:
    iops: 1.1
    throughput: 1.1
  ontap_overheads:
    num_disks_per_zone: 4
    amplification_factors:
      iops: 1.1
      throughput: 1.2
      capacity: 1.3
    hotspot_prevention_factors:
      iops: 1.4
      throughput: 1.5
  disk_limits:
    - disk_type: hyperdisk_balanced
      qualified_vms:
      - vm_type: c4-standard-4
        ontap_perf:
          iops: 1
          throughput_in_mibs: 2
          capacity_in_gib: 3
        disk_perf:
          iops: 4
          throughput_in_mibs: 5
          capacity_in_gib: 6
        relative_cost: 4
      - vm_type: c4-standard-8
        ontap_perf:
          iops: 3
          throughput_in_mibs: 9
          capacity_in_gib: 10
        disk_perf:
          iops: 11
          throughput_in_mibs: 12
          capacity_in_gib: 13
        relative_cost: 8
      - vm_type: c4-standard-16
        ontap_perf:
          iops: 20
          throughput_in_mibs: 20
          capacity_in_gib: 20
        disk_perf:
          iops: 11
          throughput_in_mibs: 12
          capacity_in_gib: 13
        relative_cost: 8
