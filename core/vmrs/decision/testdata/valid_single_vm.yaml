vmrs:
  selection_strategy: "least_cost_single_vm"
  max_num_ha_pairs: 12
  max_disk_overprovisioning_factors:
    iops: 1.1
    throughput: 1.1
  ontap_overheads:
    num_disks_per_zone: 4
    amplification_factors:
      iops: 1.1
      throughput: 1.2
      capacity: 1.3
    workload_headroom:
      - workload: workload1
        headroom:
          iops: 0.05
          throughput: 0.05
      - workload: workload2
        headroom:
          iops: 0.1
          throughput: 0.1
    hotspot_prevention_factors:
      iops: 1.4
      throughput: 1.5
  disk_limits:
    - disk_type: hyperdisk_balanced
      qualified_vms:
      - vm_type: c3-standard-4-lssd
        ontap_perf:
          iops: 15000
          throughput_in_mibs: 500
          capacity_in_gib: 1000
        disk_perf:
          iops: 18000
          throughput_in_mibs: 600
          capacity_in_gib: 1200
        relative_cost: 1
      - vm_type: c3-standard-8-lssd
        ontap_perf:
          iops: 30000
          throughput_in_mibs: 1000
          capacity_in_gib: 2000
        disk_perf:
          iops: 36000
          throughput_in_mibs: 1200
          capacity_in_gib: 2400
        relative_cost: 2
      - vm_type: c3-standard-16-lssd
        ontap_perf:
          iops: 60000
          throughput_in_mibs: 2000
          capacity_in_gib: 4000
        disk_perf:
          iops: 72000
          throughput_in_mibs: 2400
          capacity_in_gib: 4800
        relative_cost: 4
