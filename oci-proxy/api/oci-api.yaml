openapi: 3.0.4
info:
  title: OCI NetApp Files API
  description: |
    Oracle Cloud Infrastructure (OCI) NetApp Files API for VSA.
  version: "1.0.0"
servers:
  - url: https://api.example.com
  - url: http://localhost:8080
tags:
  - name: health
    description: Health check
  - name: pools
    description: Pool operations
  - name: svms
    description: SVM (Storage Virtual Machine) operations
  - name: workflows
    description: Asynchronous workflow status
paths:
  /health:
    get:
      operationId: getHealth
      summary: Get the server health status
      description: Returns the server health status.
      tags:
        - health
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Health'
        '400':
          $ref: '#/components/responses/StandardError-400'
        '401':
          $ref: '#/components/responses/StandardError-401'
        '403':
          $ref: '#/components/responses/StandardError-403'
        '404':
          $ref: '#/components/responses/StandardError-404'
        '429':
          $ref: '#/components/responses/StandardError-429'
        '500':
          $ref: '#/components/responses/StandardError-500'
        default:
          description: Unexpected error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /v1beta/pools:
    post:
      tags:
        - pools
      summary: Create a pool
      description: |
        Creates a new storage pool in the specified compartment and region. The service
        provisions the underlying VSA cluster and required OCI resources. You only supply
        high-level parameters (compartment, region, subnet, size, performance); the service
        applies instance types, images, and other deployment defaults.

        The operation is asynchronous. Use opc-work-request-id to poll for completion.
      operationId: createPool
      parameters:
        - $ref: '#/components/parameters/opcRequestIdHeader'
        - $ref: '#/components/parameters/tenancyOCIDHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreatePoolRequest'
            example:
              poolOCID: "ocid1.pool.oc1.eu-frankfurt-1.aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa"
              compartmentOCID: "ocid1.compartment.oc1..aaaaaaaapat5pvypcyr7xjb33om5j6howstzg2wfztjhbrlxcf2pz2wfen6a"
              displayName: "my-pool"
              subnetId: "ocid1.subnet.oc1.eu-frankfurt-1.aaaaaaaatzpssgybncib5yer7nh6eclwoz7vijeie5l37f7volgrjxfhrc5q"
              dataEndpointConfig:
                - sizeInGiB: 512
                  throughputGBps: 0.5
                  iops: 1500
                - sizeInGiB: 512
                  throughputGBps: 0.5
                  iops: 1500
              dataEndpointCount: 2              
              dataNicSubnetId: "ocid1.subnet.oc1.eu-frankfurt-1.aaaaaaaatzpssgybncib5yer7nh6eclwoz7vijeie5l37f7volgrjxfhrc5q"
              sizeInGiB: 100
              throughputGBps: 1
              primaryAvailabilityDomain: "IMtu:EU-FRANKFURT-1-AD-1"
              secondaryAvailabilityDomain: "IMtu:EU-FRANKFURT-1-AD-2"
              mediatorAvailabilityDomain: "IMtu:EU-FRANKFURT-1-AD-3"
              ociAdminPassword:
                ocid: "ocid1.vaultsecret.oc1.eu-frankfurt-1.amaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa"
                version: "1"
              description: "Demo pool"
              serialNumberPrefix: "955000000000000000"
      responses:
        "202":
          description: Accepted. Pool creation in progress.
          headers:
            Opc-Request-Id:
              $ref: '#/components/headers/opcRequestIdResponseHeader'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreatePoolAcceptedResponse'
              example:
                status: "in_progress"
                workflowId: "ad134355-08ad-cfd1-a728-b62c3cf754a5"
                poolOCID: "ocid1.pool.oc1.ashburn-1.testing-pool1"
        "400":
          description: Bad request
          headers:
            Opc-Request-Id:
              $ref: '#/components/headers/opcRequestIdResponseHeader'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PoolOperationErrorResponse'
        "401":
          description: Unauthorized
          headers:
            Opc-Request-Id:
              $ref: '#/components/headers/opcRequestIdResponseHeader'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PoolOperationErrorResponse'
        "403":
          description: Forbidden
          headers:
            Opc-Request-Id:
              $ref: '#/components/headers/opcRequestIdResponseHeader'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PoolOperationErrorResponse'
        "404":
          description: Not found
          headers:
            Opc-Request-Id:
              $ref: '#/components/headers/opcRequestIdResponseHeader'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PoolOperationErrorResponse'
        "409":
          description: Conflict
          headers:
            Opc-Request-Id:
              $ref: '#/components/headers/opcRequestIdResponseHeader'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PoolOperationErrorResponse'
        "422":
          description: Unprocessable entity
          headers:
            Opc-Request-Id:
              $ref: '#/components/headers/opcRequestIdResponseHeader'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PoolOperationErrorResponse'
        "429":
          description: Too many requests
          headers:
            Opc-Request-Id:
              $ref: '#/components/headers/opcRequestIdResponseHeader'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PoolOperationErrorResponse'
        "500":
          description: Internal server error
          headers:
            Opc-Request-Id:
              $ref: '#/components/headers/opcRequestIdResponseHeader'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PoolOperationErrorResponse'
        default:
          $ref: '#/components/responses/CreatePoolDefaultError'
      x-codegen-request-body-name: body
  /v1beta/pools/{poolOCID}:
    delete:
      tags:
        - pools
      summary: Delete pool
      description: |
        Deletes the specified pool and its underlying cluster and associated OCI resources.
        The operation is asynchronous.
      operationId: deletePool
      parameters:
        - $ref: '#/components/parameters/opcRequestIdHeader'
        - $ref: '#/components/parameters/tenancyOCIDHeader'
        - $ref: '#/components/parameters/poolOCIDPathParameter'
      responses:
        "202":
          description: Accepted. Pool deletion in progress.
          headers:
            Opc-Request-Id:
              $ref: '#/components/headers/opcRequestIdResponseHeader'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeletePoolAcceptedResponse'
              example:
                status: "in_progress"
                workflowId: "ad134355-08ad-cfd1-a728-b62c3cf754a5"
                poolOCID: "ocid1.pool.oc1.ashburn-1.testing-pool1"
        "204":
          description: No content. Pool deleted successfully.
          headers:
            Opc-Request-Id:
              $ref: '#/components/headers/opcRequestIdResponseHeader'
        "400":
          description: Bad request
          headers:
            Opc-Request-Id:
              $ref: '#/components/headers/opcRequestIdResponseHeader'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PoolOperationErrorResponse'
        "401":
          description: Unauthorized
          headers:
            Opc-Request-Id:
              $ref: '#/components/headers/opcRequestIdResponseHeader'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PoolOperationErrorResponse'
        "403":
          description: Forbidden
          headers:
            Opc-Request-Id:
              $ref: '#/components/headers/opcRequestIdResponseHeader'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PoolOperationErrorResponse'
        "404":
          description: Not found
          headers:
            Opc-Request-Id:
              $ref: '#/components/headers/opcRequestIdResponseHeader'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PoolOperationErrorResponse'
        "409":
          description: Conflict
          headers:
            Opc-Request-Id:
              $ref: '#/components/headers/opcRequestIdResponseHeader'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PoolOperationErrorResponse'
        "429":
          description: Too many requests
          headers:
            Opc-Request-Id:
              $ref: '#/components/headers/opcRequestIdResponseHeader'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PoolOperationErrorResponse'
        "500":
          description: Internal server error
          headers:
            Opc-Request-Id:
              $ref: '#/components/headers/opcRequestIdResponseHeader'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PoolOperationErrorResponse'
        default:
          $ref: '#/components/responses/DeletePoolDefaultError'
      x-codegen-request-body-name: body

  /v1beta/pools/{poolOCID}/svms:
    post:
      tags:
        - svms
      summary: Create SVM
      description: |
        Creates a new Storage Virtual Machine (SVM) in the target pool/cluster.
        The pool is identified by `poolOCID` in the path. The operation is asynchronous.
        Use the returned workflowId (workRequestId) with the work request tracking API.
      operationId: createSvmByPool
      parameters:
        - $ref: '#/components/parameters/opcRequestIdHeader'
        - $ref: '#/components/parameters/tenancyOCIDHeader'
        - $ref: '#/components/parameters/poolOCIDPathParameter'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateSvmRequest'
            example:
              svmOCID: "ocid1.svm.oc1..example"
              Name: "my-svm"
              svmAdminPassword:
                ocid: "ocid1.secret.oc1..example"
                version: "1"
              Ips: []
      responses:
        "202":
          description: Accepted. SVM creation in progress.
          headers:
            Opc-Request-Id:
              $ref: '#/components/headers/opcRequestIdResponseHeader'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateSvmAcceptedResponse'
              example:
                status: "in_progress"
                workflowId: "ad134355-08ad-cfd1-a728-b62c3cf754a5"
                svmOCID: "ocid1.svm.oc1..example"
        "400":
          description: Bad request
          headers:
            Opc-Request-Id:
              $ref: '#/components/headers/opcRequestIdResponseHeader'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SvmOperationErrorResponse'
        "401":
          description: Unauthorized
          headers:
            Opc-Request-Id:
              $ref: '#/components/headers/opcRequestIdResponseHeader'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SvmOperationErrorResponse'
        "403":
          description: Forbidden
          headers:
            Opc-Request-Id:
              $ref: '#/components/headers/opcRequestIdResponseHeader'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SvmOperationErrorResponse'
        "404":
          description: Not found
          headers:
            Opc-Request-Id:
              $ref: '#/components/headers/opcRequestIdResponseHeader'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SvmOperationErrorResponse'
        "409":
          description: Conflict
          headers:
            Opc-Request-Id:
              $ref: '#/components/headers/opcRequestIdResponseHeader'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SvmOperationErrorResponse'
        "422":
          description: Unprocessable entity
          headers:
            Opc-Request-Id:
              $ref: '#/components/headers/opcRequestIdResponseHeader'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SvmOperationErrorResponse'
        "429":
          description: Too many requests
          headers:
            Opc-Request-Id:
              $ref: '#/components/headers/opcRequestIdResponseHeader'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SvmOperationErrorResponse'
        "500":
          description: Internal server error
          headers:
            Opc-Request-Id:
              $ref: '#/components/headers/opcRequestIdResponseHeader'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SvmOperationErrorResponse'
        default:
          $ref: '#/components/responses/CreateSvmDefaultError'
      x-codegen-request-body-name: body

  /v1beta/pools/{poolOCID}/svms/{svmOCID}:
    delete:
      tags:
        - svms
      summary: Delete SVM
      description: |
        Deletes a Storage Virtual Machine (SVM) in the pool identified by `poolOCID`.
        The operation is asynchronous. Use the returned workflowId (workRequestId)
        with the work request tracking API.
      operationId: deleteSvm
      parameters:
        - $ref: '#/components/parameters/opcRequestIdHeader'
        - $ref: '#/components/parameters/tenancyOCIDHeader'
        - $ref: '#/components/parameters/poolOCIDPathParameter'
        - $ref: '#/components/parameters/svmOCIDPathParameter'
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                force:
                  type: boolean
                  default: false
                  description: Force-delete even if dependent resources exist.
            example:
              force: false
      responses:
        "202":
          description: Accepted. SVM deletion in progress.
          headers:
            Opc-Request-Id:
              $ref: '#/components/headers/opcRequestIdResponseHeader'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeleteSvmAcceptedResponse'
              example:
                status: "in_progress"
                workflowId: "ad134355-08ad-cfd1-a728-b62c3cf754a5"
                svmOCID: "ocid1.svm.oc1..example"
        "400":
          description: Bad request
          headers:
            Opc-Request-Id:
              $ref: '#/components/headers/opcRequestIdResponseHeader'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SvmOperationErrorResponse'
        "401":
          description: Unauthorized
          headers:
            Opc-Request-Id:
              $ref: '#/components/headers/opcRequestIdResponseHeader'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SvmOperationErrorResponse'
        "403":
          description: Forbidden
          headers:
            Opc-Request-Id:
              $ref: '#/components/headers/opcRequestIdResponseHeader'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SvmOperationErrorResponse'
        "404":
          description: Not found
          headers:
            Opc-Request-Id:
              $ref: '#/components/headers/opcRequestIdResponseHeader'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SvmOperationErrorResponse'
        "409":
          description: Conflict
          headers:
            Opc-Request-Id:
              $ref: '#/components/headers/opcRequestIdResponseHeader'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SvmOperationErrorResponse'
        "429":
          description: Too many requests
          headers:
            Opc-Request-Id:
              $ref: '#/components/headers/opcRequestIdResponseHeader'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SvmOperationErrorResponse'
        "500":
          description: Internal server error
          headers:
            Opc-Request-Id:
              $ref: '#/components/headers/opcRequestIdResponseHeader'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SvmOperationErrorResponse'
        default:
          $ref: '#/components/responses/DeleteSvmDefaultError'
      x-codegen-request-body-name: body

  /v1beta/workRequests/{workRequestId}:
    get:
      tags:
        - workflows
      summary: Get operation status
      description: Returns the status of an asynchronous operation (workflow) by its work request ID.
      operationId: getWorkflow
      parameters:
        - $ref: '#/components/parameters/opcRequestIdHeader'
        - $ref: '#/components/parameters/workRequestIdPathParameter'
      responses:
        "200":
          description: OK. Workflow status.
          headers:
            Opc-Request-Id:
              $ref: '#/components/headers/opcRequestIdResponseHeader'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetWorkflowStatusResponse'
              example:
                workflow_type: "OCICreatePoolWorkflow"
                status: "in_progress"
        "400":
          description: Bad request
          headers:
            Opc-Request-Id:
              $ref: '#/components/headers/opcRequestIdResponseHeader'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetWorkflowErrorResponse'
        "401":
          description: Unauthorized
          headers:
            Opc-Request-Id:
              $ref: '#/components/headers/opcRequestIdResponseHeader'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetWorkflowErrorResponse'
        "403":
          description: Forbidden
          headers:
            Opc-Request-Id:
              $ref: '#/components/headers/opcRequestIdResponseHeader'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetWorkflowErrorResponse'
        "404":
          description: Not found
          headers:
            Opc-Request-Id:
              $ref: '#/components/headers/opcRequestIdResponseHeader'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetWorkflowErrorResponse'
        "409":
          description: Conflict
          headers:
            Opc-Request-Id:
              $ref: '#/components/headers/opcRequestIdResponseHeader'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetWorkflowErrorResponse'
        "422":
          description: Unprocessable entity
          headers:
            Opc-Request-Id:
              $ref: '#/components/headers/opcRequestIdResponseHeader'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetWorkflowErrorResponse'
        "429":
          description: Too many requests
          headers:
            Opc-Request-Id:
              $ref: '#/components/headers/opcRequestIdResponseHeader'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetWorkflowErrorResponse'
        "500":
          description: Internal server error
          headers:
            Opc-Request-Id:
              $ref: '#/components/headers/opcRequestIdResponseHeader'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetWorkflowErrorResponse'
        default:
          $ref: '#/components/responses/GetWorkflowDefaultError'

components:
  headers:
    opcRequestIdResponseHeader:
      description: |
        Correlation ID for the request. Always returned on this response; include when contacting support.
        Echoes a valid client-provided Opc-Request-Id when supplied; otherwise the server-generated value.
      required: true
      schema:
        type: string
    opcWorkRequestIdResponseHeader:
      description: |
        Asynchronous operation identifier. Always returned on this response.
        Use as `workRequestId` when polling workflow status (e.g. GET /v1beta/workRequests/{workRequestId}).
      required: true
      schema:
        type: string
  parameters:
    opcRequestIdHeader:
      name: Opc-Request-Id
      in: header
      required: false
      description: |
        Optional correlation ID for the request. If omitted, the server generates one and returns it in the response.
        When provided, use the same value when contacting support.
      schema:
        type: string
    tenancyOCIDHeader:
      name: Tenancy-Ocid
      in: header
      required: true
      description: |
        Tenant OCID for the request context.
      schema:
        type: string
    workRequestIdPathParameter:
      name: workRequestId
      in: path
      required: true
      description: |
        Work request identifier (e.g. value returned in opc-work-request-id from Create Pool / Delete Pool).
      schema:
        type: string
    poolOCIDPathParameter:
      name: poolOCID
      in: path
      required: true
      description: Pool OCID path parameter.
      schema:
        type: string
    svmOCIDPathParameter:
      name: svmOCID
      in: path
      required: true
      description: SVM OCID path parameter.
      schema:
        type: string

  schemas:
    DeletePoolAcceptedResponse:
      type: object
      required:
        - status
        - workflowId
        - poolOCID
      properties:
        status:
          type: string
          description: Current workflow status for the delete operation.
          example: in_progress
        workflowId:
          type: string
          description: Workflow identifier used to poll operation status.
        poolOCID:
          type: string
          description: Pool OCID for the requested pool.

    GetWorkflowStatusResponse:
      type: object
      required:
        - workflow_type
        - status
      properties:
        workflow_type:
          type: string
          description: Workflow type name.
        status:
          type: string
          description: Current workflow status.
        error:
          $ref: '#/components/schemas/WorkflowStatusError'
          description: |
            Present when workflow execution has failure details (for example failed or timed out).
        poolMetadata:
          $ref: '#/components/schemas/OCICreatePoolWorkflowMetadata'
          description: |
            Present only when `workflow_type` is `OCICreatePoolWorkflow` and `status` is `completed`.
            Omitted for all other workflow types and statuses.
        svmMetadata:
          $ref: '#/components/schemas/OCICreateSVMWorkflowMetadata'
          description: |
            Present only when `workflow_type` is `OCICreateSVMWorkflow` and `status` is `completed`.
            Omitted for all other workflow types and statuses.

    GetWorkflowErrorResponse:
      type: object
      required:
        - errorMessage
      properties:
        errorMessage:
          type: string
          description: Error message for failed request.

    PoolOperationErrorResponse:
      type: object
      required:
        - status
        - poolOCID
        - errorMessage
      properties:
        status:
          type: string
          description: Operation status.
          example: failed
        poolOCID:
          type: string
          description: Pool OCID for the request.
        errorMessage:
          type: string
          description: Error message for the failed operation.

    SvmOperationErrorResponse:
      type: object
      required:
        - status
        - svmOCID
        - errorMessage
      properties:
        status:
          type: string
          description: Operation status.
          example: failed
        svmOCID:
          type: string
          description: SVM OCID for the request.
        errorMessage:
          type: string
          description: Error message for the failed operation.

    CreatePoolAcceptedResponse:
      type: object
      required:
        - status
        - workflowId
        - poolOCID
      properties:
        status:
          type: string
          description: Current workflow status for the create operation.
          example: in_progress
        workflowId:
          type: string
          description: Workflow identifier used to poll operation status.
        poolOCID:
          type: string
          description: Pool OCID for the requested pool.

    DataEndpointConfig:
      type: object
      description: Per-node capacity and performance configuration.
      required:
        - sizeInGiB
        - throughputGBps
        - iops
      properties:
        sizeInGiB:
          type: integer
          format: int64
          description: Capacity for this node in GiB. Typically a multiple of 1 TiB.
        throughputGBps:
          type: number
          format: double
          description: Throughput for this node in GBps.
        iops:
          type: integer
          format: int64
          description: IOPS for the node.

    TieringConfig:
      type: object
      description: |
        Cloud tiering configuration pointing at an OCI Object Storage bucket reached
        via its S3-compatible endpoint. All four fields are required when the parent
        request supplies a tieringConfig object.
      required:
        - secretId
        - namespace
        - bucketName
        - serverName
      properties:
        secretId:
          type: string
          description: |
            OCI Vault secret OCID holding the S3-compatible Customer Secret Key
            used to authenticate against the bucket.
        namespace:
          type: string
          description: |
            OCI Object Storage namespace that owns the bucket
        bucketName:
          type: string
          description: Name of the OCI Object Storage bucket to tier cold data into.
        serverName:
          type: string
          description: |
            Hostname of the S3-compatible endpoint for the bucket

    CreatePoolRequest:
      type: object
      required:
        - poolOCID
        - compartmentOCID
        - displayName
        - subnetId
        - sizeInGiB
        - throughputGBps
        - dataEndpointCount
        - primaryAvailabilityDomain
        - ociAdminPassword
        - dataNicSubnetId
      properties:
        poolOCID:
          type: string
          description: OCI pool resource OCID for the pool being created.
        compartmentOCID:
          type: string
          description: OCI compartment OCID (scope for the pool).
        displayName:
          type: string
          description: Human-readable pool name. Must be unique within the compartment.
        subnetId:
          type: string
          description: OCI subnet OCID for the pool. This is the service subnet in your VCN where pool resources will be placed.
        sizeInGiB:
          type: integer
          format: int64
          description: |
            Total pool capacity in GiB across all HA pairs. The service distributes this
            capacity across the underlying nodes. Typically a multiple of 1 TiB.
        throughputGBps:
          type: number
          format: double
          description: Total target throughput for the pool in GBps across all HA pairs.
        dataEndpointCount:
          type: integer
          format: int64
          minimum: 2
          multipleOf: 2
          description: |
            Number of data endpoints to provision for the pool. Must be >= 2
            and a multiple of 2
        dataEndpointConfig:
          type: array
          minItems: 2
          description: |
            Optional per-node capacity and performance configuration. When provided, must
            contain an even number of entries — exactly 2 per HA pair
          items:
            $ref: '#/components/schemas/DataEndpointConfig'
        primaryAvailabilityDomain:
          type: string
          description: Availability domain for the primary HA node (e.g. IMtu:EU-FRANKFURT-1-AD-1).
        secondaryAvailabilityDomain:
          type: string
          description: Availability domain for the secondary HA node. Required for HA deployments.
        mediatorAvailabilityDomain:
          type: string
          description: Availability domain for the mediator VM. Required for HA deployments.
        ociAdminPassword:
          $ref: '#/components/schemas/OCIOCIDVersionRef'
          description: OCI secret reference for admin password.
        description:
          type: string
          description: Optional description for the pool.
        dataNicSubnetId:
          type: string
          description: OCI subnet OCID for the data NIC
        tieringConfig:
          $ref: '#/components/schemas/TieringConfig'
          description: |
            Optional cloud tiering configuration. When provided, cold pool data is
            tiered to the specified OCI Object Storage bucket via the S3-compatible
            endpoint. Omit to disable tiering.
        kmsKeyId:
          type: string
          description: |
            Optional OCI Vault Master Encryption Key OCID used to encrypt pool data
            at rest. When omitted, the service default encryption is used.
        nsgIds:
          type: array
          description: |
            Optional list of OCI Network Security Group OCIDs to attach to the pool's
            VNICs. When omitted or empty, no NSGs are attached and only subnet-level
            security rules apply.
          items:
            type: string
    CreateSvmRequest:
      type: object
      required:
        - svmOCID
        - Name
        - svmAdminPassword
      properties:
        svmOCID:
          type: string
          description: OCI SVM resource OCID for the SVM being created.
        Name:
          type: string
          description: Requested SVM name.
        svmAdminPassword:
          $ref: '#/components/schemas/OCIOCIDVersionRef'
          description: OCI secret reference for the SVM admin password.
        Ips:
          type: array
          description: Optional list of IP addresses for the SVM.
          items:
            type: string

    CreateSvmAcceptedResponse:
      type: object
      required:
        - status
        - workflowId
        - svmOCID
      properties:
        status:
          type: string
          description: Current workflow status for the create operation.
          example: in_progress
        workflowId:
          type: string
          description: Workflow identifier used to poll operation status.
        svmOCID:
          type: string
          description: SVM OCID for the requested SVM.

    DeleteSvmAcceptedResponse:
      type: object
      required:
        - status
        - workflowId
        - svmOCID
      properties:
        status:
          type: string
          description: Current workflow status for the delete operation.
          example: in_progress
        workflowId:
          type: string
          description: Workflow identifier used to poll operation status.
        svmOCID:
          type: string
          description: SVM OCID for the requested SVM.

    SvmLif:
      type: object
      properties:
        name:
          type: string
        ipAddress:
          type: string
        node:
          type: string
        protocols:
          type: array
          items:
            type: string
            enum:
              - iscsi
              - nvme
              - nfs
              - cifs
              - s3


    WorkflowStatus:
      type: object
      description: Status of an asynchronous workflow (operation).
      properties:
        status:
          type: string
          description: Current workflow status (in_progress, completed, failed, timed_out).
        workflow_type:
          type: string
          description: Temporal workflow type name (from workflow execution info).
        error:
          $ref: '#/components/schemas/WorkflowStatusError'
        poolMetadata:
          $ref: '#/components/schemas/OCICreatePoolWorkflowMetadata'
          description: |
            Present only when `workflow_type` is `OCICreatePoolWorkflow` and `status` is `completed`.
            Omitted for all other workflow types and statuses.

    OCICreatePoolWorkflowVM:
      type: object
      required:
        - name
        - serialNumber
        - vsaManagementIP
        - interclusterIP
        - nodeIP
        - nodeUUID
        - haPair
        - sizeInGiB
        - iops
        - throughputGBps
      properties:
        name:
          type: string
          description: VM name from VLM config.
        serialNumber:
          type: string
          description: VM serial number from VLM config.
        vsaManagementIP:
          type: string
          description: VSA management IP for this VM.
        interclusterIP:
          type: string
          description: Intercluster IP address for this VM.
        nodeIP:
          type: string
          description: Node management internal IP address for this VM.
        nodeUUID:
          type: string
          description: UUID of the corresponding node
        haPair:
          type: string
          description: |
            Identifier of the HA pair this VM belongs to within the pool's
            VLM config, formatted as `ha_pair-<index>` where `<index>` is the
            zero-based position of the pair in `cloud.ha_pair`
            (e.g. `ha_pair-0`, `ha_pair-1`).
          example: "ha_pair-0"
        sizeInGiB:
          type: integer
          format: int64
          description: |
            Aggregated capacity for this VM in GiB, computed as the sum of
            `size` across all entries in the VM's `data_disks` from VLM config.
        iops:
          type: integer
          format: int64
          description: |
            Aggregated IOPS for this VM, computed as the sum of `disk_iops`
            across all entries in the VM's `data_disks` from VLM config.
        throughputGBps:
          type: number
          format: double
          description: |
            Aggregated throughput for this VM in GBps, computed as the sum of
            `disk_throughput` (MiBps) across all entries in the VM's `data_disks`
            from VLM config and converted from MiBps to GBps.

    OCICreatePoolWorkflowMetadata:
      type: object
      required:
        - vms
        - credentials
      properties:
        vms:
          type: array
          description: VM metadata for OCI pool nodes.
          items:
            $ref: '#/components/schemas/OCICreatePoolWorkflowVM'
        credentials:
          $ref: '#/components/schemas/OCICreatePoolWorkflowCredentials'

    OCICreatePoolWorkflowCredentials:
      type: object
      required:
        - secret
        - certificate
      properties:
        secret:
          $ref: '#/components/schemas/OCIOCIDVersionRef'
        certificate:
          $ref: '#/components/schemas/OCIOCIDVersionRef'

    OCIOCIDVersionRef:
      type: object
      required:
        - ocid
        - version
      properties:
        ocid:
          type: string
          description: OCI resource OCID.
        version:
          type: string
          description: Resource version identifier.

    OCICreateSVMWorkflowMetadata:
      type: object
      description: SVM metadata returned when an OCICreateSVMWorkflow completes successfully.
      properties:
        name:
          type: string
          description: SVM name as registered in ONTAP.
        svmOCID:
          type: string
          description: SVM OCID.
        lifs:
          type: array
          description: Logical interfaces created for the SVM.
          items:
            $ref: '#/components/schemas/SvmLif'

    WorkflowStatusError:
      type: object
      description: Present when the workflow failed or timed out.
      properties:
        message:
          type: string
          description: Primary error message.
        cause:
          type: string
          description: Root cause of the failure, if available.

    Health:
      type: object
      description: Server health status.
      properties:
        status:
          type: string
          description: Server health status (e.g. healthy).
          example: healthy

    NetworkSummary:
      type: object
      description: Network-related summary for the pool (e.g. VCN, subnets, NSGs).
      properties:
        vcnId:
          type: string
          description: OCI VCN OCID.
        managementSubnetId:
          type: string
          description: Management subnet OCID.
        dataSubnetId:
          type: string
          description: Data subnet OCID.
        nsgIds:
          type: array
          items:
            type: string
          description: List of network security group OCIDs.

    Any_v1Beta:
      title: Any
      required:
        - '@type'
      type: object
      properties:
        '@type':
          type: string
          description: The URL of the type
          example: type.googleapis.com/google.protobuf.Struct
        AnyValue:
          title: response
          additionalProperties:
            type: object
    Status_v1Beta:
      title: Status
      type: object
      properties:
        code:
          type: number
          format: double
          description: The status code
          example: 7.0
        message:
          type: string
          description: A developer-facing error message
        details:
          type: array
          items:
            $ref: '#/components/schemas/Any_v1Beta'
    Operation_v1beta:
      title: Operation
      type: object
      description: Long-running operation. Use opc-work-request-id to poll for completion.
      properties:
        name:
          type: string
          description: The full resource name of the operation (use to poll for status).
          example: /v1beta/pools/pool-id/operations/ba2c8826-2627-057c-42ba-343ee7ab1ebe
        metadata:
          $ref: '#/components/schemas/Any_v1Beta'
        done:
          type: boolean
          description: Is the operation done yet.
          default: false
        error:
          $ref: '#/components/schemas/Status_v1Beta'
        response:
          title: response
          additionalProperties:
            type: object

    Error:
      type: object
      required:
        - code
        - message
      properties:
        code:
          type: number
          description: OCI error code or HTTP status.
        message:
          type: string
          description: Human-readable error message.

  responses:
    CreatePoolDefaultError:
      description: Internal server error
      headers:
        Opc-Request-Id:
          $ref: '#/components/headers/opcRequestIdResponseHeader'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/PoolOperationErrorResponse'
    DeletePoolDefaultError:
      description: Internal server error
      headers:
        Opc-Request-Id:
          $ref: '#/components/headers/opcRequestIdResponseHeader'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/PoolOperationErrorResponse'
    CreateSvmDefaultError:
      description: Internal server error
      headers:
        Opc-Request-Id:
          $ref: '#/components/headers/opcRequestIdResponseHeader'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/SvmOperationErrorResponse'
    DeleteSvmDefaultError:
      description: Internal server error
      headers:
        Opc-Request-Id:
          $ref: '#/components/headers/opcRequestIdResponseHeader'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/SvmOperationErrorResponse'
    GetWorkflowDefaultError:
      description: Internal server error
      headers:
        Opc-Request-Id:
          $ref: '#/components/headers/opcRequestIdResponseHeader'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/GetWorkflowErrorResponse'
    StandardError-400:
      description: Bad request
      headers:
        Opc-Request-Id:
          $ref: '#/components/headers/opcRequestIdResponseHeader'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    StandardError-401:
      description: Unauthorized
      headers:
        Opc-Request-Id:
          $ref: '#/components/headers/opcRequestIdResponseHeader'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    StandardError-403:
      description: Forbidden
      headers:
        Opc-Request-Id:
          $ref: '#/components/headers/opcRequestIdResponseHeader'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    StandardError-404:
      description: Not found
      headers:
        Opc-Request-Id:
          $ref: '#/components/headers/opcRequestIdResponseHeader'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    StandardError-409:
      description: Conflict
      headers:
        Opc-Request-Id:
          $ref: '#/components/headers/opcRequestIdResponseHeader'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    StandardError-422:
      description: Unprocessable entity
      headers:
        Opc-Request-Id:
          $ref: '#/components/headers/opcRequestIdResponseHeader'
