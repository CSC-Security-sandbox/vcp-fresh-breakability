# Harvest Configuration File
Exporters:
  prometheus:
    exporter: Prometheus
    local_http_addr: 0.0.0.0
    port: {{.PORT}}
  service_control:
    exporter: ServiceControl
    url: {{.SERVICE_CONTROL_URL}}
    service_name: {{.SERVICE_NAME}}
    mappings:
      volume:
        - source: "capacity"
          target: "netapp.googleapis.com/volume/allocated_bytes"
        - source: "space_logical_used"
          target: "netapp.googleapis.com/volume/bytes_used"
        - source: "snapshots_size_used"
          target: "netapp.googleapis.com/volume/snapshot_bytes"
        - source: "read_ops"
          target: "netapp.googleapis.com/volume/operation_count"
          labels:
            type: "read"
        - source: "write_ops"
          target: "netapp.googleapis.com/volume/operation_count"
          labels:
            type: "write"
        - source: "other_ops"
          target: "netapp.googleapis.com/volume/operation_count"
          labels:
            type: "metadata"
        - source: "read_data"
          target: "netapp.googleapis.com/volume/throughput"
          labels:
            type: "read"
        - source: "write_data"
          target: "netapp.googleapis.com/volume/throughput"
          labels:
            type: "write"
        - source: "other_data"
          target: "netapp.googleapis.com/volume/throughput"
          labels:
            type: "metadata"
        - source: "read_latency"
          target: "netapp.googleapis.com/volume/average_latency"
          labels:
            method: "read"
        - source: "write_latency"
          target: "netapp.googleapis.com/volume/average_latency"
          labels:
            method: "write"
        - source: "other_latency"
          target: "netapp.googleapis.com/volume/average_latency"
          labels:
            method: "metadata"
        - source: "inode_files_used"
          target: "netapp.googleapis.com/volume/inode_used"
        - source: "inode_files_total"
          target: "netapp.googleapis.com/volume/inode_limit"
        - source: "new_status_code"
          target: "netapp.googleapis.com/internal/volume/volume_online"
        - source: "performance_tier_footprint"
          target: "netapp.googleapis.com/volume/auto_tiering/tiered_bytes"
          labels:
            type: "hot"
        - source: "capacity_tier_footprint"
          target: "netapp.googleapis.com/volume/auto_tiering/tiered_bytes"
          labels:
            type: "cold"
        - source: "client_protocol_reads"
          target: "netapp.googleapis.com/volume/auto_tiering/cold_tier_read_byte_count"
        - source: "cloud_bin_operation_size_put"
          target: "netapp.googleapis.com/volume/auto_tiering/cold_tier_write_byte_count"
      pool:
        - source: "performance_tier_footprint"
          target: "netapp.googleapis.com/storage_pool/auto_tiering/tiered_bytes"
          labels:
            type: "hot"
        - source: "capacity_tier_footprint"
          target: "netapp.googleapis.com/storage_pool/auto_tiering/tiered_bytes"
          labels:
            type: "cold"
        - source: "client_protocol_reads"
          target: "netapp.googleapis.com/storage_pool/auto_tiering/cold_tier_read_byte_count"
        - source: "cloud_bin_operation_size_put"
          target: "netapp.googleapis.com/storage_pool/auto_tiering/cold_tier_write_byte_count"
      backup:
        - source: "healthy"
          target: "netapp.googleapis.com/volume/backup_healthy"
        - source: "relationship_status"
          target: "netapp.googleapis.com/volume/backup_transferring"
        - source: "last_transfer_duration"
          target: "netapp.googleapis.com/volume/backup_last_transfer_duration"
        - source: "last_transfer_size"
          target: "netapp.googleapis.com/volume/backup_last_transfer_size"
        - source: "total_progress"
          target: "netapp.googleapis.com/volume/backup_current_transfer_bytes"
      replication:
        - source: "healthy"
          target: "netapp.googleapis.com/replication/healthy"
        - source: "last_transfer_duration"
          target: "netapp.googleapis.com/replication/last_transfer_duration"
        - source: "last_transfer_size"
          target: "netapp.googleapis.com/replication/last_transfer_size"
        - source: "total_progress"
          target: "netapp.googleapis.com/replication/current_transfer_bytes"
        - source: "lag_time"
          target: "netapp.googleapis.com/replication/lag_time"
        - source: "total_transfer_bytes"
          target: "netapp.googleapis.com/replication/total_transfer_byte_count"
        - source: "relationship_status"
          target: "netapp.googleapis.com/replication/transferring"
Defaults:
  collectors:
    - Rest
    - KeyPerf
  use_insecure_tls: false

Pollers:
  {{.POLLER_NAME}}:
    datacenter: {{.DATACENTER}}
    addr: {{.NODE_IP}}
    auth_style: {{.AUTH_STYLE}}
    username: {{.USERNAME}}
    password: {{.PASSWORD}}
    auth_type: {{.AUTH_TYPE}}
    secret_id: {{.SECRET_ID}}
    secret_project_number: {{.SECRET_PROJECT}}
    collectors:
      - Ems
      - Rest
      - RestPerf
      - KeyPerf


    labels:
      - project: {{.PROJECT}}
      - tenant_project: {{.TENANT_PROJECT}}
      - deployment_name: {{.DEPLOYMENT_NAME}}
      - pool_name: {{.POOL_NAME}}
      - is_regional_ha : {{.IS_REGIONAL_HA}}
    use_insecure_tls: true  # Disable TLS verification when connecting to ONTAP cluster
    exporters:
      - service_control
      - prometheus
PM2:
  - name: {{.POLLER_NAME}}
    script: /opt/harvest/bin/poller
    metrics_port: {{.PORT}}
    conf_path: /opt/harvest/conf
    harvest_conf: /configs/harvest/{{.LEASE_NAME}}/{{.FILE_NAME}}
    poller_name: {{.POLLER_NAME}}
    auto_restart: true
    version: 2.0.0