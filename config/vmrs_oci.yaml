# =============================================================================
# OCI Block Volume Performance — VPU 90, 50, 40 only
# =============================================================================
#
# Source: OCI perf-team reference table.
#
# Layout
# ------
#   throughput:                       Keyed by headline throughput in decimal
#     <GB/s integer>:                 GB/s. Selector does:
#                                         bucket = ceil(req.throughput_gbs)
#                                         tier   = throughput[bucket]
#                                     for O(1) flex lookup.
#
#       instances:                    Map of qualified OCI VM shapes that
#                                     deliver this throughput tier. The map
#                                     key is the OCI shape name (passed
#                                     verbatim to LaunchInstance.shape).
#                                     Today only one shape is qualified;
#                                     future shapes (E4.Flex, bare metal,
#                                     etc.) are added as siblings.
#         <shape>:
#           ocpus:                    OCPUs for this shape at this tier.
#                                     Passed to
#                                     LaunchInstance.shapeConfig.ocpus.
#           memory_gbs:               Memory (decimal GB) for this shape
#                                     at this tier. Passed to
#                                     LaunchInstance.shapeConfig.memoryInGBs.
#                                     Stay within OCI's per-shape flex
#                                     memory range (E5.Flex: 1–16 GB per
#                                     OCPU). Carried per (tier, shape)
#                                     rather than as a per-OCPU multiplier
#                                     so the perf team can deviate from a
#                                     flat ratio without code changes.
#           vpu:                      Per-volume capacity/IOPS table for
#                                     this specific shape (different shapes
#                                     can have different per-volume caps).
#             vpu_<NN>:
#               capacity_throughput_tb  TB PER VM (per VSA node) needed
#                                       at this VPU to deliver (full
#                                       tier throughput, listed iops).
#                                       NOT per-disk, NOT per-HA-pair.
#                                       The pool-create workflow slices
#                                       the customer's total capacity by
#                                       totalActiveVMs (AA: 2*HAPairs,
#                                       AP: HAPairs) before comparing
#                                       against this floor.
#               iops                    IOPS delivered at that capacity.
#
# Sizing reference (instance-level caps; same numbers for every shape today):
#
#   1 GB/s →  8 OCPU,  160,000 IOPS cap
#   2 GB/s → 16 OCPU,  320,000 IOPS cap
#   3 GB/s → 24 OCPU,  480,000 IOPS cap
#   4 GB/s → 32 OCPU,  640,000 IOPS cap        (E5 NIC hard cap @ 32 Gbps)
#   5 GB/s → 40 OCPU,  800,000 IOPS            (exceeds E5 32-Gbps NIC)
#   6 GB/s → 48 OCPU,  960,000 IOPS            (exceeds E5 32-Gbps NIC)
#
# Assumptions
# -----------
# 1) Throughput tiers advance in **integer 1 GB/s steps** (1, 2, 3, …).
#    The selector uses `bucket = ceil(req.throughput_gbs)` as the YAML
#    key, so any sub-1-GB/s granularity would round up and collapse onto
#    the next integer tier. If finer tiers (e.g. 1.5, 2.5 GB/s) ever
#    become real, both this file and the selector's bucketing logic must
#    be updated together — don't introduce a fractional key alone.
# 2) All shapes under one tier deliver the same headline throughput; the
#    tier's instance-level cap is implicit in the tier key itself.
#
# VPU order within each instance below: vpu_90 → vpu_50 → vpu_40. The
# selector ignores this file-level order and walks each instance's vpu
# map in ascending VPU number — vpu_40 → vpu_50 → vpu_90 — returning the
# first whose `capacity_throughput_tb` floor fits the request. There is
# no cost field; ascending-VPU walk reflects "try the lowest perf band
# first because its capacity floor is highest, step up if it doesn't
# fit", not any price optimization.
#
# Capacities are in decimal TB (10^12 bytes).
# =============================================================================

throughput:

  # ---------------------------------------------------------------------------
  # 1 GB/s →  8 OCPU,  160,000 IOPS instance cap
  # ---------------------------------------------------------------------------
  1:
    instances:
      VM.DenseIO.E5.Flex:
        ocpus: 8
        memory_gbs: 96
        vpu:
          vpu_90:
            capacity_throughput_tb: 0.73
            iops: 131400
          vpu_50:
            capacity_throughput_tb: 1.34
            iops: 160000
          vpu_40:
            capacity_throughput_tb: 1.52
            iops: 160000

  # ---------------------------------------------------------------------------
  # 2 GB/s → 16 OCPU,  320,000 IOPS instance cap
  # ---------------------------------------------------------------------------
  2:
    instances:
      VM.DenseIO.E5.Flex:
        ocpus: 16
        memory_gbs: 192
        vpu:
          vpu_90:
            capacity_throughput_tb: 1.46
            iops: 262800
          vpu_50:
            capacity_throughput_tb: 2.67
            iops: 320000
          vpu_40:
            capacity_throughput_tb: 3.05
            iops: 320000

  # ---------------------------------------------------------------------------
  # 3 GB/s → 24 OCPU,  480,000 IOPS instance cap
  # ---------------------------------------------------------------------------
  3:
    instances:
      VM.DenseIO.E5.Flex:
        ocpus: 24
        memory_gbs: 288
        vpu:
          vpu_90:
            capacity_throughput_tb: 2.18
            iops: 392400
          vpu_50:
            capacity_throughput_tb: 4.00
            iops: 480000
          vpu_40:
            capacity_throughput_tb: 4.57
            iops: 480000

  # ---------------------------------------------------------------------------
  # 4 GB/s → 32 OCPU,  640,000 IOPS instance cap (E5 NIC hard cap @ 32 Gbps)
  # ---------------------------------------------------------------------------
  4:
    instances:
      VM.DenseIO.E5.Flex:
        ocpus: 32
        memory_gbs: 384
        vpu:
          vpu_90:
            capacity_throughput_tb: 2.91
            iops: 523800
          vpu_50:
            capacity_throughput_tb: 5.34
            iops: 640000
          vpu_40:
            capacity_throughput_tb: 6.10
            iops: 640000

  # ---------------------------------------------------------------------------
  # 5 GB/s → 40 OCPU,  800,000 IOPS — exceeds E5 32-Gbps NIC hard cap
  # ---------------------------------------------------------------------------
  5:
    instances:
      VM.DenseIO.E5.Flex:
        ocpus: 40
        memory_gbs: 480
        vpu:
          vpu_90:
            capacity_throughput_tb: 3.64
            iops: 655200
          vpu_50:
            capacity_throughput_tb: 6.67
            iops: 800000
          vpu_40:
            capacity_throughput_tb: 7.62
            iops: 800000

  # ---------------------------------------------------------------------------
  # 6 GB/s → 48 OCPU,  960,000 IOPS — exceeds E5 32-Gbps NIC hard cap
  # ---------------------------------------------------------------------------
  6:
    instances:
      VM.DenseIO.E5.Flex:
        ocpus: 48
        memory_gbs: 576
        vpu:
          vpu_90:
            capacity_throughput_tb: 4.37
            iops: 786600
          vpu_50:
            capacity_throughput_tb: 8.00
            iops: 960000
          vpu_40:
            capacity_throughput_tb: 9.14
            iops: 960000
