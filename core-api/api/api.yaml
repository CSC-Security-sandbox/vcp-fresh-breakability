openapi: 3.0.4
info:
  title: CRUD API
  description: API for managing Pools, Svms, Volumes, and Snapshots.
  version: 1.0.0

servers:
  - url: https://api.example.com
    description: Main (production) server

paths:
  /pools:
    get:
      summary: List all pools
      responses:
        "200":
          description: A list of pools
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Pool'
    post:
      summary: Create a new pool
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Pool'
      responses:
        "201":
          description: Pool created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Pool'

  /pools/{poolId}:
    get:
      summary: Get a pool by ID
      parameters:
        - name: poolId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: A single pool
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Pool'
    put:
      summary: Update a pool by ID
      parameters:
        - name: poolId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Pool'
      responses:
        "200":
          description: Pool updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Pool'
    delete:
      summary: Delete a pool by ID
      parameters:
        - name: poolId
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Pool deleted

  /svms:
    get:
      summary: List all Svms
      responses:
        "200":
          description: A list of Svms
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Svm'
    post:
      summary: Create a new Svm
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Svm'
      responses:
        "201":
          description: Svm created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Svm'

  /svms/{svmId}:
    get:
      summary: Get an Svm by ID
      parameters:
        - name: svmId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: A single Svm
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Svm'
    put:
      summary: Update an Svm by ID
      parameters:
        - name: svmId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Svm'
      responses:
        "200":
          description: Svm updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Svm'
    delete:
      summary: Delete an Svm by ID
      parameters:
        - name: svmId
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Svm deleted

  /volumes:
    get:
      summary: List all volumes
      responses:
        "200":
          description: A list of volumes
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Volume'
    post:
      summary: Create a new volume
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Volume'
      responses:
        "201":
          description: Volume created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Volume'

  /volumes/{volumeId}:
    get:
      summary: Get a volume by ID
      parameters:
        - name: volumeId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: A single volume
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Volume'
    put:
      summary: Update a volume by ID
      parameters:
        - name: volumeId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Volume'
      responses:
        "200":
          description: Volume updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Volume'
    delete:
      summary: Delete a volume by ID
      parameters:
        - name: volumeId
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Volume deleted

  /snapshots:
    get:
      summary: List all snapshots
      responses:
        "200":
          description: A list of snapshots
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Snapshot'
    post:
      summary: Create a new snapshot
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Snapshot'
      responses:
        "201":
          description: Snapshot created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Snapshot'

  /snapshots/{snapshotId}:
    get:
      summary: Get a snapshot by ID
      parameters:
        - name: snapshotId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: A single snapshot
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Snapshot'
    put:
      summary: Update a snapshot by ID
      parameters:
        - name: snapshotId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Snapshot'
      responses:
        "200":
          description: Snapshot updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Snapshot'
    delete:
      summary: Delete a snapshot by ID
      parameters:
        - name: snapshotId
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Snapshot deleted

components:
  schemas:
    Snapshot:
      type: object
      properties:
        id:
          type: string
          x-oapi-codegen-extra-tags:
            gorm: primaryKey
        name:
          type: string
        time:
          type: string

    Volume:
      type: object
      properties:
        id:
          type: string
          x-oapi-codegen-extra-tags:
            gorm: primaryKey
        name:
          type: string
        size:
          type: integer
        snapshots:
          type: array
          x-oapi-codegen-extra-tags:
            firestore: svms,omitempty
            gorm: foreignkey:PostId;references:id
          items:
            $ref: '#/components/schemas/Snapshot'

    Svm:
      type: object
      properties:
        id:
          type: string
          x-oapi-codegen-extra-tags:
            gorm: primaryKey
        name:
          type: string
        volumes:
          type: array
          x-oapi-codegen-extra-tags:
            firestore: svms,omitempty
            gorm: foreignKey:id
          items:
            $ref: '#/components/schemas/Volume'

    Pool:
      type: object
      required:
        - name
        - id
      properties:
        id:
          type: string
          nullable: false
          x-oapi-codegen-extra-tags:
            gorm: primaryKey
        name:
          type: string
          nullable: false
        svms:
          type: array
          x-oapi-codegen-extra-tags:
            firestore: svms,omitempty
            gorm: foreignKey:id
          items:
            $ref: '#/components/schemas/Svm'