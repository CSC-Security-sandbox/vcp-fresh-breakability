debug: true
admintools:
  enabled: true
  additionalInitContainers:
    - name: wait-for-postgres
      image: temporalio/admin-tools:1.31.0
      command:
        - sh
        - -c
        - |
          echo "Waiting for PostgreSQL to be ready on postgres.default.svc.cluster.local:5432..."
          i=1
          while [ $i -le 60 ]; do
            if nc -z postgres.default.svc.cluster.local 5432 2>/dev/null; then
              echo "PostgreSQL port is open!"
              exit 0
            else
              echo "PostgreSQL not ready yet... (attempt $i/60). Retrying in 5 seconds..."
            fi
            sleep 5
            i=$((i + 1))
          done
          echo "PostgreSQL did not become ready in time. Exiting."
          exit 1

server:
  enabled: true
  replicaCount: 1
  resources: {}
  additionalInitContainers:
    - name: wait-for-postgres
      image: temporalio/admin-tools:1.31.0
      command:
        - sh
        - -c
        - |
          echo "Waiting for PostgreSQL to be ready on postgres.default.svc.cluster.local:5432..."
          i=1
          while [ $i -le 60 ]; do
            if nc -z postgres.default.svc.cluster.local 5432 2>/dev/null; then
              echo "PostgreSQL port is open!"
              sleep 10
              exit 0
            else
              echo "PostgreSQL not ready yet... (attempt $i/60)"
            fi
            sleep 5
            i=$((i + 1))
          done
          echo "PostgreSQL did not become ready in time. Exiting."
          exit 1
  config:
    persistence:
      defaultStore: default
      visibilityStore: visibility
      datastores:
        default:
          sql:
            pluginName: "postgres12"
            connectProtocol: "tcp"
            connectAddr: "postgres.default.svc.cluster.local:5432"
            databaseName: temporal
            user: postgres
            password: testpass
            maxConns: 20
            maxIdleConns: 20
            maxConnLifetime: "1h"
            createDatabase: true
            manageSchema: true
        visibility:
          sql:
            pluginName: "postgres12"
            connectProtocol: "tcp"
            connectAddr: "postgres.default.svc.cluster.local:5432"
            databaseName: temporal_visibility
            user: postgres
            password: testpass
            maxConns: 20
            maxIdleConns: 20
            maxConnLifetime: "1h"
            createDatabase: true
            manageSchema: true
    namespaces:
      create: true
      namespace:
        - name: default
          retention: 10d


web:
  enabled: true
