debug: false
# Set a image pull secret like below for ghcr.io
imagePullSecrets:
  - name: "temporal-image-pull-secret"
serviceAccount:
  create: true
  name: "temporal-server-ksa"
server:
  enabled: true
  replicaCount: 1
  config:
    persistence:
      default:
        driver: "sql"
        sql:
          driver: "postgres12"
          host: postgres.default.svc.cluster.local
          port: 5432
          database: temporal
          user: postgres
          password: testpass
          maxConns: 20
          maxIdleConns: 20
          maxConnLifetime: "1h"
      visibility:
        driver: "sql"

        sql:
          driver: "postgres12"
          host: postgres.default.svc.cluster.local
          port: 5432
          database: temporal_visibility
          user: postgres
          password: testpass
          maxConns: 20
          maxIdleConns: 20
          maxConnLifetime: "1h"
schema:
  createDatabase:
    enabled: true
  setup:
    enabled: true
  update:
    enabled: true

postgresql:
  enabled: true

# Disabling cassandra, mysql, prometheus, grafana, and elasticsearch as they are not needed for this deployment
cassandra:
  enabled: false

mysql:
  enabled: false

prometheus:
  enabled: false

grafana:
  enabled: false

elasticsearch:
  enabled: false
